<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----

bottom: 16px; }\n    .fix-item { background: #fff8e1; border-left: 4px solid #f0a830; padding: 12px 16px; margin-bottom: 12px; border-radius: 0 4px 4px 0; }\n    .fix-item .fix-title { font-weight: 600; margin-bottom: 6px; }\n    .fix-item code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; font-size: 0.82rem; }\n    .fix-item pre { background: #f5f5f5; padding: 8px 12px; border-radius: 4px; font-size: 0.82rem; overflow-x: auto; margin-top: 6px; }\n  </style>\n</head>\n<body>\n<div class=\"container\">\n  <h1>웹 품질 종합 감사 리포트</h1>\n  <div class=\"meta\">\n    날짜: 2026-03-11 &nbsp;|&nbsp;\n    검토 파일: index.html, Card.tsx &nbsp;|&nbsp;\n    기준: KWCAG2.2 + 시맨틱 HTML + SEO + Web Performance &nbsp;|&nbsp;\n    Playwright: 미사용 — playwright.config.ts 없음\n  </div>\n\n  <!-- 종합 요약 -->\n  <div class=\"summary-grid\">\n    <div class=\"summary-card card-a11y\">\n      <div class=\"area\">접근성</div>\n      <div class=\"score\">19/40</div>\n    </div>\n    <div class=\"summary-card card-seo\">\n      <div class=\"area\">SEO & Web Performance</div>\n      <div class=\"score\">10/29</div>\n    </div>\n  </div>\n\n  <!-- 섹션 A: 접근성 -->\n  <div class=\"section\">\n    <div class=\"section-header header-a11y\">A. 접근성 (KWCAG2.2 33항목 + 시맨틱 HTML 7항목)</div>\n    <table>\n      <tr><th>번호</th><th>항목명</th><th>결과</th><th>판정방식</th><th>발견된 문제</th></tr>\n      <tr><td>1</td><td>적절한 대체 텍스트 제공</td><td><span class=\"badge badge-fail\">❌</span></td><td>정적분석</td><td>index.html:30 — <code>&lt;img src=\"/public/logo.png\"&gt;</code>에 alt 속성 누락</td></tr>\n      <tr><td>2</td><td>자막 제공</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>video/audio 요소 없음</td></tr>\n      <tr><td>3</td><td>표의 구성</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>table 요소 없음</td></tr>\n      <tr><td>4</td><td>콘텐츠의 선형 구조</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>5</td><td>명확한 지시 사항 제공</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>6</td><td>색에 무관한 콘텐츠 인식</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>색상으로 정보를 전달하는 패턴 없음</td></tr>\n      <tr><td>7</td><td>자동 재생 금지</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>8</td><td>텍스트 콘텐츠의 명도 대비</td><td><span class=\"badge badge-unknown\">🔵 판정불가</span></td><td>판정불가</td><td>playwright.config.ts 없음</td></tr>\n      <tr><td>9</td><td>콘텐츠 간의 구분</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>시각적 디자인 판단 필요 (런타임 확인 대상)</td></tr>\n      <tr><td>10</td><td>키보드 사용 보장</td><td><span class=\"badge badge-fail\">❌</span></td><td>정적분석</td><td>Card.tsx:29 — <code>&lt;div onClick={handleClick}&gt;</code> 비대화형 요소에 클릭 핸들러만 존재. role, tabIndex, onKeyDown 없음</td></tr>\n      <tr><td>11</td><td>초점 이동과 표시</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>12</td><td>조작 가능</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>13</td><td>문자 단축키</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>키보드 단축키 사용 없음</td></tr>\n      <tr><td>14</td><td>응답시간 조절</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>시간제한 콘텐츠 없음</td></tr>\n      <tr><td>15</td><td>정지 기능 제공</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>자동 변경 콘텐츠 없음</td></tr>\n      <tr><td>16</td><td>깜박임과 번쩍임 사용 제한</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>깜박임 콘텐츠 없음</td></tr>\n      <tr><td>17</td><td>반복 영역 건너뛰기</td><td><span class=\"badge badge-fail\">❌</span></td><td>정적분석</td><td>index.html — 건너뛰기 링크(skip navigation) 미제공. <code>href=\"#main\"</code> 등의 앵커 링크 없음</td></tr>\n      <tr><td>18</td><td>제목 제공</td><td><span class=\"badge badge-partial\">⚠️</span></td><td>정적분석</td><td>index.html — <code>&lt;title&gt;Sample Page&lt;/title&gt;</code> 존재하나 페이지 내용을 구체적으로 설명하지 않는 제목. 헤딩 계층(h1→h3)에서 h2 건너뜀 (Card.tsx에서 h3 사  쓰기가 연속으로 발생하여 브라우저가 두 번 리플로우합니다. <code>requestAnimationFrame</code>으로 쓰기를 분리하세요.</p>\n      <pre><code>useEffect(() =&gt; {\n  if (containerRef.current) {\n    const h = containerRef.current.offsetHeight;\n    requestAnimationFrame(() =&gt; {\n      if (containerRef.current) {\n        containerRef.current.style.minHeight = h + \"px\";\n      }\n    });\n  }\n}, []);</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-12: LCP 요소 초기 HTML 부재 — useEffect + setTimeout 지연 로딩</div>\n      <p>dashboard.tsx:17-19 — 주요 콘텐츠가 500ms 후에야 렌더링됩니다. 서버사이드 렌더링(SSR) 또는 초기 상태값으로 콘텐츠를 제공하여 LCP를 개선하세요.</p>\n      <pre><code>// 초기 상태에 데이터를 직접 제공\nconst [items, setItems] = useState&lt;string[]&gt;(\n  [\"Dashboard\", \"Analytics\", \"Reports\"]\n);\n\n// 또는 getServerSideProps / loader에서 데이터를 가져와 props로 전달</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-18: 동적 콘텐츠 공간 예약 미흡 — CLS 위험</div>\n      <p>dashboard.tsx:17-19, 45-47 — setTimeout으로 지연 삽입되는 콘텐츠의 공간이 사전에 예약되지 않았습니다. <code>min-height</code>를 설정하거나 skeleton UI를 표시하세요.</p>\n      <pre><code>&lt;section ref={containerRef} className=\"grid gap-4\" style={{ minHeight: '200px' }}&gt;\n  &lt;h2 className=\"text-lg font-semibold\"&gt;Overview&lt;/h2&gt;\n  {items.length === 0 ? (\n    &lt;div className=\"animate-pulse bg-gray-200 h-8 rounded\"&gt;&lt;/div&gt;\n  ) : (\n    items.map((item) =&gt; (\n      &lt;div key={item} className=\"border p-2\"&gt;{item}&lt;/div&gt;\n    ))\n  )}\n&lt;/section&gt;</code></pre>\n    </div>\n\n  </div>\n\n</div>\n</body>\n</html>\n"}], "grading": {"expectations": [{"text": "HTML report file (report.html) was generated", "passed": true, "evidence": "report.html exists and contains a complete 260-line HTML document with proper structure"}, {"text": "CSV report file (report.csv) was generated", "passed": true, "evidence": "report.csv exists with 70 data rows covering all evaluation items"}, {"text": "Report contains accessibility section (Section A / 접근성)", "passed": true, "evidence": "HTML contains 'A. 접근성 (KWCAG2.2 33항목 + 시맨틱 HTML 7항목)' section header with class header-a11y"}, {"text": "Report contains SEO & Web Performance section (Section B)", "passed": true, "evidence": "HTML contains 'B. SEO & Web Performance (Technical SEO 11항목 + Page Experience 18항목)' section header"}, {"text": "All 33 KWCAG2.2 items are evaluated (none skipped)", "passed": true, "evidence": "All items A-01 through A-33 are present in both HTML and CSV, each with a result (pass/fail/partial/NA/unknown)"}, {"text": "All SEO items (SEO-01 through SEO-11) are evaluated", "passed": true, "evidence": "SEO-01 through SEO-11 all present in HTML table and CSV rows 42-52"}, {"text": "All WP items (WP-01 through WP-18) are evaluated", "passed": true, "evidence": "WP-01 through WP-18 all present in HTML table and CSV rows 53-70"}, {"text": "Failed items include specific issue descriptions with file/line references", "passed": true, "evidence": "Failed items reference specific locations, e.g. A-17: 'dashboard.tsx:23-39', A-23: 'dashboard.tsx:29-36', A-32: 'dashboard.tsx:45-47', WP-04: 'dashboard.tsx:50', WP-09: 'dashboard.tsx:12-13'"}, {"text": "Fix guide section exists with concrete code-level recommendations", "passed": true, "evidence": "HTML contains '수정 가이드' section with 8 fix-items (A-17, A-23, A-32, WP-04, WP-05, WP-09, WP-12, WP-18), each with code snippets showing exact fixes"}, {"text": "Report is written in Korean", "passed": true, "evidence": "HTML lang='ko', title '웹 품질 종합 감사 리포트', all item names and descriptions in Korean (e.g. '적절한 대체 텍스트', '자막 제공', '반복 영역 건너뛰기')"}, {"text": "Accessibility findings include specific KWCAG item IDs and line references", "passed": true, "evidence": "Findings use KWCAG item IDs (A-01 through A-33) with line references like 'dashboard.tsx:50', 'dashboard.tsx:29-36', 'dashboard.tsx:45-47', 'dashboard.tsx:23-39'"}, {"text": "Performance findings include code-level analysis (layout thrashing, lazy loading, etc.)", "passed": true, "evidence": "WP-09 identifies layout thrashing: 'offsetHeight 읽기 후 즉시 style.minHeight 쓰기, 이중 reflow 발생' at dashboard.tsx:12-13. WP-05 flags missing loading='lazy' at dashboard.tsx:50. WP-12 identifies LCP delay from 'useEffect + setTimeout(500ms)' at dashboard.tsx:17-19. WP-18 identifies CLS risk from dynamic content insertion."}], "summary": {"passed": 12, "failed": 0, "total": 12, "pass_rate": 1.0}}}, {"id": "eval-3-single-file-detail-review-without_skill", "prompt": "dashboard.tsx 하나만 종합 품질 검토해줘. 접근성이랑 성능 이슈 위주로 자세히 봐줘", "eval_id": 3, "outputs": [{"name": "report.csv", "type": "text", "content": "ID,File,Line,Category,Severity,Rule,Issue,Recommendation\nA1,dashboard.tsx,29-31,Accessibility,High,aria-label-missing,\"Icon button contains only an SVG with no accessible name. Screen readers will announce it as an empty button.\",\"Add aria-label describing the button action, e.g. <button aria-label=\"\"Toggle view\"\">. Also add role=\"\"img\"\" and aria-hidden=\"\"true\"\" on decorative SVGs, or add a <title> inside the SVG.\"\nA2,dashboard.tsx,34-36,Accessibility,High,aria-label-missing,\"Second icon button also lacks an accessible name. Same issue as A1.\",\"Add aria-label to the button and mark the SVG appropriately.\"\nA3,dashboard.tsx,30,Accessibility,Medium,svg-missing-role,\"SVG elements lack role=\"\"img\"\" or aria-hidden=\"\"true\"\". Assistive technology may try to traverse SVG internals.\",\"Add aria-hidden=\"\"true\"\" to decorative SVGs, or role=\"\"img\"\" with a <title> for meaningful ones.\"\nA4,dashboard.tsx,35,Accessibility,Medium,svg-missing-role,\"Same SVG accessibility issue on the second icon.\",\"Same fix as A3.\"\nA5,dashboard.tsx,26,Accessibility,Low,nav-missing-label,\"<nav> element has no aria-label or aria-labelledby. When multiple nav landmarks exist on a page, assistive tech cannot distinguish them.\",\"Add aria-label=\"\"Main navigation\"\" or use aria-labelledby pointing to the h1.\"\nA6,dashboard.tsx,50,Accessibility,Low,img-dimensions-missing,\"<img> tag lacks explicit width and height attributes. While alt text is present (good), missing dimensions contribute to CLS and can cause reflow for assistive tech users.\",\"Add width and height attributes to the img element.\"\nP1,dashboard.tsx,12-13,Performance,High,layout-thrashing,\"Reading offsetHeight then immediately writing style.minHeight causes forced synchronous reflow (layout thrashing). The browser must recalculate layout between the read and write.\",\"Batch DOM reads and writes separately. Use requestAnimationFrame to defer the write, or use ResizeObserver to react to size changes without forcing reflow.\"\nP2,dashboard.tsx,17-19,Performance,High,cls-risk,\"setTimeout dynamically injects content after 500ms without any size reservation. This causes Cumulative Layout Shift (CLS) because surrounding elements shift when the new items appear.\",\"Reserve space for dynamic content using min-height or a skeleton/placeholder. Alternatively, fetch data before initial render using SSR or a loading state with fixed dimensions.\"\nP3,dashboard.tsx,50,Performance,Medium,img-lazy-loading,\"Image below the fold lacks loading=\"\"lazy\"\". It will be fetched eagerly on page load even if not visible, wasting bandwidth and delaying LCP.\",\"Add loading=\"\"lazy\"\" to images that are below the fold: <img loading=\"\"lazy\"\" ... />\"\nP4,dashboard.tsx,50,Performance,Medium,img-no-dimensions,\"Image lacks explicit width/height. The browser cannot reserve space before the image loads, contributing to CLS.\",\"Specify width and height attributes so the browser can calculate the aspect ratio before the image loads.\"\nP5,dashboard.tsx,45-47,Performance,Low,missing-key-prop,\"List items rendered via .map() lack a key prop. React will use index-based reconciliation by default, which can cause unnecessary re-renders and DOM mutations when the list changes.\",\"Add a stable, unique key prop: items.map((item) => <div key={item} ...>)\"\nP6,dashboard.tsx,50,Performance,Low,img-no-srcset,\"Image uses a single src with no srcSet or <picture> element. On high-DPI or mobile screens, either a too-large or too-small image is served.\",\"Use srcSet and sizes attributes, or a <picture> element, to serve appropriately sized images for different viewports.\"\nP7,dashboard.tsx,9-20,Performance,Medium,useEffect-side-effects,\"useEffect runs after paint, so the layout measurement + style write (lines 12-13) happens after the user sees the initial render, causing a visible flash/shift.\",\"Use useLayoutEffect for DOM measurements that affect visual layout, so the update happens before the browser paints.\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Quality Review Report - dashboard.tsx</title>\n<style>\n  :root {\n    --bg: #f8f9fa;\n    --card-bg: #fff;\n    --border: #dee2e6;\n    --text: #212529;\n    --text-muted: #6c757d;\n    --high: #dc3545;\n    --high-bg: #f8d7da;\n    --medium: #fd7e14;\n    --medium-bg: #fff3cd;\n    --low: #0d6efd;\n    --low-bg: #cfe2ff;\n    --a11y: #6f42c1;\n    --perf: #198754;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }\n  .container { max-width: 960px; margin: 0 auto; }\n  h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }\n  .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }\n  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }\n  .summary-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }\n  .summary-card .number { font-size: 2rem; font-weight: 700; }\n  .summary-card .label { font-size: 0.85rem; color: var(--text-muted); }\n  .severity-high .number { color: var(--high); }\n  .severity-medium .number { color: var(--medium); }\n  .severity-low .number { color: var(--low); }\n\n  .section-title { font-size: 1.3rem; margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }\n  .section-title.a11y { border-color: var(--a11y); color: var(--a11y); }\n  .section-title.perf { border-color: var(--perf); color: var(--perf); }\n\n  .issue { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; border-left: 4px solid var(--border); }\n  .issue.high { border-left-color: var(--high); }\n  .issue.medium { border-left-color: var(--medium); }\n  .issue.low { border-left-color: var(--low); }\n  .issue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem; }\n  .issue-id { font-weight: 700; font-size: 0.9rem; }\n  .badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }\n  .badge-high { background: var(--high-bg); color: var(--high); }\n  .badge-medium { background: var(--medium-bg); color: var(--medium); }\n  .badge-low { background: var(--low-bg); color: var(--low); }\n  .issue-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }\n  .issue-desc { margin-bottom: 0.75rem; }\n  .issue-fix { background: #e8f5e9; border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.9rem; }\n  .issue-fix strong { color: var(--perf); }\n  code { background: #e9ecef; padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.88em; }\n</style>\n</head>\n<body>\n<div class=\"container\">\n  <h1>Web Quality Review Report</h1>\n  <p class=\"subtitle\">File: <code>dashboard.tsx</code> &mdash; Reviewed: 2026-03-11</p>\n\n  <div class=\"summary\">\n    <div class=\"summary-card\">\n      <div class=\"number\">13</div>\n      <div class=\"label\">Total Issues</div>\n    </div>\n    <div class=\"summary-card severity-high\">\n      <div class=\"number\">4</div>\n      <div class=\"label\">High Severity</div>\n    </div>\n    <div class=\"summary-card severity-medium\">\n      <div class=\"number\">5</div>\n      <div class=\"label\">Medium Severity</div>\n    </div>\n    <div class=\"summary-card severity-low\">\n      <div class=\"number\">4</div>\n      <div class=\"label\">Low Severity</div>\n    </div>\n  </div>\n\n  <!-- Accessibility Section -->\n  <h2 class=\"section-title a11y\">Accessibility Issues (6)</h2>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A1 &mdash; Icon Button Missing Accessible Name</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 29-31 &middot; Rule: <code>aria-label-missing</code></div>\n    <div class=\"issue-desc\">\n      The first icon button contains only an <code>&lt;svg&gt;</code> element with no text content or <code>aria-label</code>. Screen readers will announce this as an empty or unlabeled button, making it impossible for assistive technology users to understand the button's purpose.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-label</code> describing the action, e.g. <code>&lt;button aria-label=\"Toggle grid view\"&gt;</code>. Mark the SVG with <code>aria-hidden=\"true\"</code> since the label is on the button.\n    </div>\n  </div>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A2 &mdash; Second Icon Button Missing Accessible Name</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 34-36 &middot; Rule: <code>aria-label-missing</code></div>\n    <div class=\"issue-desc\">\n      Same issue as A1. The second <code>&lt;button&gt;</code> wraps an SVG without any accessible name. This violates WCAG 2.1 SC 4.1.2 (Name, Role, Value) and SC 1.1.1 (Non-text Content).\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-label</code> to the button and <code>aria-hidden=\"true\"</code> to the SVG.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A3 &mdash; SVG Missing Role or aria-hidden (First Icon)</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 30 &middot; Rule: <code>svg-missing-role</code></div>\n    <div class=\"issue-desc\">\n      The SVG element lacks <code>role=\"img\"</code> or <code>aria-hidden=\"true\"</code>. Without these, some screen readers may attempt to traverse the SVG's internal elements (like <code>&lt;circle&gt;</code>), producing confusing output.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> For decorative SVGs, add <code>aria-hidden=\"true\"</code>. For meaningful SVGs, add <code>role=\"img\"</code> and a <code>&lt;title&gt;</code> element inside the SVG.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A4 &mdash; SVG Missing Role or aria-hidden (Second Icon)</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 35 &middot; Rule: <code>svg-missing-role</code></div>\n    <div class=\"issue-desc\">\n      Same issue as A3, affecting the second SVG icon.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-hidden=\"true\"</code> to the SVG element.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A5 &mdash; Navigation Landmark Missing Label</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 24 &middot; Rule: <code>nav-missing-label</code></div>\n    <div class=\"issue-desc\">\n      The <code>&lt;nav&gt;</code> element lacks an <code>aria-label</code> or <code>aria-labelledby</code> attribute. When a page has multiple navigation landmarks, users of assistive technology cannot distinguish between them.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-label=\"Main navigation\"</code> or use <code>aria-labelledby</code> pointing to the heading.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A6 &mdash; Image Missing Explicit Dimensions</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-dimensions-missing</code></div>\n    <div class=\"issue-desc\">\n      The <code>&lt;img&gt;</code> tag has an <code>alt</code> attribute (good), but lacks explicit <code>width</code> and <code>height</code>. While primarily a performance concern, missing dimensions also affect assistive tech users who may experience disorienting layout shifts.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>width</code> and <code>height</code> attributes to the <code>&lt;img&gt;</code> element.\n    </div>\n  </div>\n\n  <!-- Performance Section -->\n  <h2 class=\"section-title perf\">Performance Issues (7)</h2>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P1 &mdash; Layout Thrashing in useEffect</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 12-13 &middot; Rule: <code>layout-thrashing</code></div>\n    <div class=\"issue-desc\">\n      The code reads <code>offsetHeight</code> (forcing the browser to calculate layout) and then immediately writes to <code>style.minHeight</code> (invalidating that layout). This is a classic forced synchronous reflow pattern. In a more complex component or in a loop, this can severely degrade frame rate and responsiveness.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Separate reads and writes. Use <code>requestAnimationFrame</code> to batch the write, or use <code>ResizeObserver</code> to react to size changes without forcing reflow. If the measurement must happen before paint, use <code>useLayoutEffect</code> instead.\n    </div>\n  </div>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P2 &mdash; Cumulative Layout Shift (CLS) from Delayed Content</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 17-19 &middot; Rule: <code>cls-risk</code></div>\n    <div class=\"issue-desc\">\n      A <code>setTimeout</code> injects new list items after 500ms without any space reservation. When the items render, all content below shifts downward. This directly harms the CLS Core Web Vital metric and creates a jarring user experience.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Reserve space with a skeleton placeholder or <code>min-height</code> on the container. Better yet, load data before initial render (SSR/SSG) or show a loading state with fixed dimensions.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P3 &mdash; Image Missing <code>loading=\"lazy\"</code></span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-lazy-loading</code></div>\n    <div class=\"issue-desc\">\n      The image at the bottom of the page (below the fold) is loaded eagerly by default. This wastes bandwidth on initial page load and can delay Largest Contentful Paint (LCP) for above-the-fold content by competing for network resources.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>loading=\"lazy\"</code> to the image: <code>&lt;img loading=\"lazy\" src=\"...\" alt=\"...\" /&gt;</code>\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P4 &mdash; Image Missing Width/Height (CLS Contributor)</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-no-dimensions</code></div>\n    <div class=\"issue-desc\">\n      Without explicit <code>width</code> and <code>height</code>, the browser cannot calculate the image's aspect ratio before it loads. Once loaded, the image expands and pushes content below it, contributing to CLS.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>width</code> and <code>height</code> attributes matching the image's intrinsic dimensions, or use CSS <code>aspect-ratio</code>.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P7 &mdash; useEffect Instead of useLayoutEffect for DOM Measurement</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 9-20 &middot; Rule: <code>useEffect-side-effects</code></div>\n    <div class=\"issue-desc\">\n      <code>useEffect</code> runs after the browser paints. Since lines 12-13 measure and mutate the DOM, the user will see the initial render, then a flash/shift when the <code>minHeight</code> is applied. This creates a visible layout jump.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Use <code>useLayoutEffect</code> for DOM measurements that affect visual layout. It fires synchronously after DOM mutations but before the browser paints, preventing the flash.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P5 &mdash; Missing Key Prop on List Items</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 45-47 &middot; Rule: <code>missing-key-prop</code></div>\n    <div class=\"issue-desc\">\n      The <code>.map()</code> call renders <code>&lt;div&gt;</code> elements without a <code>key</code> prop. React will fall back to index-based reconciliation, which can cause unnecessary DOM mutations and re-renders when items change, reducing rendering performance.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add a stable, unique key: <code>items.map((item) =&gt; &lt;div key={item} ...&gt;)</code>. If items may not be unique, use a unique identifier from your data.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P6 &mdash; Image Lacks Responsive srcSet</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-no-srcset</code></div>\n    <div class=\"issue-desc\">\n      The image uses a single <code>src</code> with no <code>srcSet</code> or <code>&lt;picture&gt;</code> element. On high-DPI displays, this may serve a blurry image; on mobile, it may serve an unnecessarily large image, wasting bandwidth.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Use <code>srcSet</code> and <code>sizes</code> attributes, or wrap in a <code>&lt;picture&gt;</code> element to serve appropriately sized images per viewport.\n    </div>\n  </div>\n\n</div>\n</body>\n</html>\n"}], "grading": {"expectations": [{"text": "HTML report file (report.html) was generated", "passed": true, "evidence": "report.html exists and contains a valid 271-line HTML document with proper structure."}, {"text": "CSV report file (report.csv) was generated", "passed": true, "evidence": "report.csv exists with 14 data rows plus a header row, properly formatted with columns: ID, File, Line, Category, Severity, Rule, Issue, Recommendation."}, {"text": "Report contains accessibility section (Section A / 접근성)",       // iteration (indicated by previous_feedback being present). When
      // previous feedback exists, the feedback.json on disk is stale from
      // the prior iteration and should not pre-fill the textareas.
      const hasPrevious = Object.keys(EMBEDDED_DATA.previous_feedback || {}).length > 0
        || Object.keys(EMBEDDED_DATA.previous_outputs || {}).length > 0;
      if (!hasPrevious) {
        try {
          const resp = await fetch("/api/feedback");
          const data = await resp.json();
          if (data.reviews) {
            for (const r of data.reviews) feedbackMap[r.run_id] = r.feedback;
          }
        } catch { /* first run, no feedback yet */ }
      }

      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      showRun(0);

      // Wire up feedback auto-save
      const textarea = document.getElementById("feedback");
      let saveTimeout = null;
      textarea.addEventListener("input", () => {
        clearTimeout(saveTimeout);
        document.getElementById("feedback-status").textContent = "";
        saveTimeout = setTimeout(() => saveCurrentFeedback(), 800);
      });
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < EMBEDDED_DATA.runs.length) {
        saveCurrentFeedback();
        showRun(newIndex);
      }
    }

    function updateNavButtons() {
      document.getElementById("prev-btn").disabled = currentIndex === 0;
      document.getElementById("next-btn").disabled =
        currentIndex === EMBEDDED_DATA.runs.length - 1;
    }

    // ---- Show a run ----
    function showRun(index) {
      currentIndex = index;
      const run = EMBEDDED_DATA.runs[index];

      // Progress
      document.getElementById("progress").textContent =
        `${index + 1} of ${EMBEDDED_DATA.runs.length}`;

      // Prompt
      document.getElementById("prompt-text").textContent = run.prompt;

      // Config badge
      const badge = document.getElementById("config-badge");
      const configMatch = run.id.match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (configMatch) {
        const config = configMatch[1];
        const isBaseline = config === "without_skill" || config === "old_skill";
        badge.textContent = config.replace(/_/g, " ");
        badge.className = "config-badge " + (isBaseline ? "config-baseline" : "config-primary");
        badge.style.display = "inline-block";
      } else {
        badge.style.display = "none";
      }

      // Outputs
      renderOutputs(run);

      // Previous outputs
      renderPrevOutputs(run);

      // Grades
      renderGrades(run);

      // Previous feedback
      const prevFb = (EMBEDDED_DATA.previous_feedback || {})[run.id];
      const prevEl = document.getElementById("prev-feedback");
      if (prevFb) {
        document.getElementById("prev-feedback-text").textContent = prevFb;
        prevEl.style.display = "block";
      } else {
        prevEl.style.display = "none";
      }

      // Feedback
      document.getElementById("feedback").value = feedbackMap[run.id] || "";
      document.getElementById("feedback-status").textContent = "";

      updateNavButtons();

      // Track visited runs and promote done button when all visited
      visitedRuns.add(index);
      const doneBtn = document.getElementById("done-btn");
      if (visitedRuns.size >= EMBEDDED_DATA.runs.length) {
        doneBtn.classList.add("ready");
      }

      // Scroll main content to top
      document.querySelector(".main").scrollTop = 0;
    }

    // ---- Render outputs ----
    function renderOutputs(run) {
      const container = document.getElementById("outputs-body");
      container.innerHTML = "";

      const outputs = run.outputs || [];
      if (outputs.length === 0) {
        container.innerHTML = '<div class="empty-state">출력 파일 없음</div>';
        return;
      }

      for (const file of outputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        // Always show file header with download link
        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const content = document.createElement("div");
        content.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          content.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          content.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          content.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(content, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          content.appendChild(a);
        } else if (file.type === "error") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          pre.style.color = "var(--red)";
          content.appendChild(pre);
        }

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

    // ---- Grades ----
    function renderGrades(run) {
      const section = document.getElementById("grades-section");
      const content = document.getElementById("grades-content");

      if (!run.grading) {
        section.style.display = "none";
        return;
      }

      const grading = run.grading;
      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("grades-arrow").classList.remove("open");

      const summary = grading.summary || {};
      const expectations = grading.expectations || [];

      let html = '<div style="padding: 1rem;">';

      // Summary line
      const passRate = summary.pass_rate != null
        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.total || 0) + '개 중 ' + (summary.passed || 0) + '개 통과, ' + (summary.failed || 0) + '개 실패</span>';
      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';

      html += '</div>';
      content.innerHTML = html;
    }

    function toggleGrades() {
      const content = document.getElementById("grades-content");
      const arrow = document.getElementById("grades-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Previous outputs (collapsible) ----
    function renderPrevOutputs(run) {
      const section = document.getElementById("prev-outputs-section");
      const content = document.getElementById("prev-outputs-content");
      const prevOutputs = (EMBEDDED_DATA.previous_outputs || {})[run.id];

      if (!prevOutputs || prevOutputs.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("prev-outputs-arrow").classList.remove("open");

      // Render the files into the content area
      content.innerHTML = "";
      const wrapper = document.createElement("div");
      wrapper.style.padding = "1rem";

      for (const file of prevOutputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const fc = document.createElement("div");
        fc.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          fc.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          fc.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          fc.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(fc, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          fc.appendChild(a);
        }

        fileDiv.appendChild(fc);
        wrapper.appendChild(fileDiv);
      }

      content.appendChild(wrapper);
    }

    function togglePrevOutputs() {
      const content = document.getElementById("prev-outputs-content");
      const arrow = document.getElementById("prev-outputs-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Feedback (saved to server -> feedback.json) ----
    function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;

      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // Build reviews array from map
      const reviews = [];
      for (const [run_id, feedback] of Object.entries(feedbackMap)) {
        if (feedback.trim()) {
          reviews.push({ run_id, feedback, timestamp: new Date().toISOString() });
        }
      }

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        document.getElementById("feedback-status").textContent = "저장됨";
      }).catch(() => {
        // Static mode or server unavailable — no-op on auto-save,
        // feedback will be downloaded on final submit
        document.getElementById("feedback-status").textContent = "제출 시 다운로드됩니다";
      });
    }

    // ---- Done ----
    function showDoneDialog() {
      // Save current textarea to feedbackMap (but don't POST yet)
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;
      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // POST once with status: complete — include ALL runs so the model
      // can distinguish "no feedback" (looks good) from "not reviewed"
      const reviews = [];
      const ts = new Date().toISOString();
      for (const r of EMBEDDED_DATA.runs) {
        reviews.push({ run_id: r.id, feedback: feedbackMap[r.id] || "", timestamp: ts });
      }
      const payload = JSON.stringify({ reviews, status: "complete" }, null, 2);
      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
      }).then(() => {
        document.getElementById("done-overlay").classList.add("visible");
      }).catch(() => {
        // Server not available (static mode) — download as file
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "feedback.json";
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("done-overlay").classList.add("visible");
      });
    }

    function closeDoneDialog() {
      // Reset status back to in_progress
      saveCurrentFeedback();
      document.getElementById("done-overlay").classList.remove("visible");
    }

    // ---- Toast ----
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("visible");
      setTimeout(() => toast.classList.remove("visible"), 2000);
    }

    // ---- Keyboard nav ----
    document.addEventListener("keydown", (e) => {
      // Don't capture when typing in textarea
      if (e.target.tagName === "TEXTAREA") return;

      if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        navigate(-1);
      } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        navigate(1);
      }
    });

    // ---- Util ----
    function getDownloadUri(file) {
      if (file.data_uri) return file.data_uri;
      if (file.data_b64) return "data:application/octet-stream;base64," + file.data_b64;
      if (file.type === "text") return "data:text/plain;charset=utf-8," + encodeURIComponent(file.content);
      return "#";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- View switching ----
    function switchView(view) {
      document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`[onclick="switchView('${view}')"]`).classList.add("active");
      document.getElementById("panel-" + view).classList.add("active");
    }

    // ---- Benchmark rendering ----
    function renderBenchmark() {
      const data = EMBEDDED_DATA.benchmark;
      if (!data) return;

      // Show the tabs
      document.getElementById("view-tabs").style.display = "flex";

      const container = document.getElementById("benchmark-content");
      const summary = data.run_summary || {};
      const metadata = data.metadata || {};
      const notes = data.notes || [];

      let html = "";

      // Header
      html += "<h2 style='font-family: Poppins, sans-serif; margin-bottom: 0.5rem;'>벤치마크 결과</h2>";
      html += "<p style='color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.25rem;'>";
      if (metadata.skill_name) html += "<strong>" + escapeHtml(metadata.skill_name) + "</strong> &mdash; ";
      if (metadata.timestamp) html += metadata.timestamp + " &mdash; ";
      if (metadata.evals_run) html += "평가: " + metadata.evals_run.join(", ") + " &mdash; ";
      html += "설정당 " + (metadata.runs_per_configuration || "?") + "회 실행";
      html += "</p>";

      // Summary table
      html += '<table class="benchmark-table">';

      function fmtStat(stat, pct) {
        if (!stat) return "—";
        const suffix = pct ? "%" : "";
        const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
        const s = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
        return m + suffix + " ± " + s + suffix;
      }

      function deltaClass(val) {
        if (!val) return "";
        const n = parseFloat(val);
        if (n > 0) return "benchmark-delta-positive";
        if (n < 0) return "benchmark-delta-negative";
        return "";
      }

      // Discover config names dynamically (everything except "delta")
      const configs = Object.keys(summary).filter(k => k !== "delta");
      const configA = configs[0] || "config_a";
      const configB = configs[1] || "config_b";
      const labelA = configA.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const labelB = configB.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const a = summary[configA] || {};
      const b = summary[configB] || {};
      const delta = summary.delta || {};

      html += "<thead><tr><th>지표</th><th>" + escapeHtml(labelA) + "</th><th>" + escapeHtml(labelB) + "</th><th>차이</th></tr></thead>";
      html += "<tbody>";

      html += "<tr><td><strong>통과율</strong></td>";
      html += "<td>" + fmtStat(a.pass_rate, true) + "</td>";
      html += "<td>" + fmtStat(b.pass_rate, true) + "</td>";
      html += '<td class="' + deltaClass(delta.pass_rate) + '">' + (delta.pass_rate || "—") + "</td></tr>";

      // Time (only show row if data exists)
      if (a.time_seconds || b.time_seconds) {
        html += "<tr><td><strong>소요 시간 (초)</strong></td>";
        html += "<td>" + fmtStat(a.time_seconds, false) + "</td>";
        html += "<td>" + fmtStat(b.time_seconds, false) + "</td>";
        html += '<td class="' + deltaClass(delta.time_seconds) + '">' + (delta.time_seconds ? delta.time_seconds + "s" : "—") + "</td></tr>";
      }

      // Tokens (only show row if data exists)
      if (a.tokens || b.tokens) {
        html += "<tr><td><strong>토큰</strong></td>";
        html += "<td>" + fmtStat(a.tokens, false) + "</td>";
        html += "<td>" + fmtStat(b.tokens, false) + "</td>";
        html += '<td class="' + deltaClass(delta.tokens) + '">' + (delta.tokens || "—") + "</td></tr>";
      }

      html += "</tbody></table>";

      // Per-eval breakdown (if runs data available)
      const runs = data.runs || [];
      if (runs.length > 0) {
        const evalIds = [...new Set(runs.map(r => r.eval_id))].sort((a, b) => a - b);

        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>평가별 상세 내역</h3>";

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "평가 " + evalId;

          html += "<h4 style='font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);'>" + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>설정</th><th>실행</th><th>통과율</th>";
          if (hasTime) html += "<th>소요 시간 (초)</th>";
          if (hasErrors) html += "<th>실행 중 오류</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          // Group by config and render with average rows
          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + (r.passed || 0) + "/" + (r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? r.time_seconds.toFixed(1) : "—") + "</td>";
              if (hasErrors) html += "<td>" + (r.errors || 0) + "</td>";
              html += "</tr>";
            }

            // Average row
            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>평균</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1) : "—") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail for this eval
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            // Collect all unique assertion texts across all configs
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>검증 항목</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "— ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>분석 노트</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Start ----
    init();
    renderBenchmark();
  </script>
</body>
</html>
