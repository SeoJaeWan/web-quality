<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----

ssibility,Minor,WCAG 2.1 SC 1.4.3 – Image Sizing,Image in section lacks explicit width/height; may shift layout for assistive tech users.,Add width and height attributes or use CSS aspect-ratio.\nS1,index.html,6,SEO,Major,SEO – Title Tag,\"Page title \"\"Sample Page\"\" is generic and non-descriptive; search engines rely on title for ranking.\",Use a specific descriptive title with target keywords (50-60 chars).\nS2,index.html,7,SEO,Critical,SEO – Meta Description,No <meta name=\"\"description\"\"> tag; search results will show auto-generated snippets.,Add a unique meta description (120-160 chars) summarizing the page.\nS3,index.html,8,SEO,Major,SEO – Structured Data,No JSON-LD or structured data markup; limits rich-result eligibility.,Add appropriate Schema.org JSON-LD (e.g. WebPage or Organization).\nS4,index.html,–,SEO,Minor,SEO – Canonical URL,No <link rel=\"\"canonical\"\"> tag; risks duplicate-content indexing issues.,Add a canonical link element pointing to the preferred URL.\nS5,index.html,–,SEO,Minor,SEO – Open Graph / Twitter Cards,No og: or twitter: meta tags; links shared on social media will lack rich previews.,Add Open Graph and Twitter Card meta tags.\nP1,index.html,10,Performance,Major,Web Vitals – Render Blocking,Synchronous external stylesheet in <head> blocks first paint.,Use media=\"\"print\"\" onload hack or load CSS asynchronously; inline critical CSS.\nP2,index.html,13-17,Performance,Major,Web Vitals – Font Display,\"@font-face missing font-display: swap; causes invisible text during font load (FOIT).\",Add font-display: swap to the @font-face rule.\nP3,index.html,33,Performance,Major,Web Vitals – CLS,Image missing width and height attributes causes layout shift when loaded.,Add explicit width and height attributes to <img>.\nP4,dashboard.tsx,11-13,Performance,Major,Web Vitals – Layout Thrashing,Reading offsetHeight then writing style.minHeight in same frame forces synchronous reflow.,Batch reads and writes or use requestAnimationFrame to separate them.\nP5,dashboard.tsx,17-19,Performance,Major,Web Vitals – CLS,Dynamic content inserted via setTimeout without size reservation shifts layout.,Reserve space with min-height or CSS containment before content loads.\nP6,dashboard.tsx,50,Performance,Minor,Web Vitals – LCP / Lazy Loading,\"Below-fold image lacks loading=\"\"lazy\"\"; browser will eagerly fetch it.\",Add loading=\"lazy\" to images below the initial viewport.\nP7,Card.tsx,13,Performance,Minor,Production Readiness,console.log left in production code; adds unnecessary I/O and can leak data.,Remove or guard with a debug flag / environment check.\nSEC1,index.html,42,Security,Critical,OWASP – XSS,innerHTML used with unsanitized user input from location.hash; enables reflected XSS.,Use textContent instead of innerHTML or sanitize input with DOMPurify.\nSEC2,Card.tsx,17,Security,Minor,Code Quality – DOM Queries,\"document.querySelector used inside a React component instead of refs; fragile and can select unintended elements.\",Use React useRef to reference elements within the component tree.\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Web Quality Review Report</title>\n  <style>\n    :root {\n      --critical: #dc2626;\n      --major: #ea580c;\n      --minor: #ca8a04;\n      --good: #16a34a;\n      --bg: #f8fafc;\n      --card-bg: #ffffff;\n      --border: #e2e8f0;\n      --text: #1e293b;\n      --text-muted: #64748b;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; max-width: 1100px; margin: 0 auto; }\n    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }\n    .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }\n    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }\n    .summary-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }\n    .summary-card .label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }\n    .summary-card .value { font-size: 2rem; font-weight: 700; }\n    .summary-card .value.critical { color: var(--critical); }\n    .summary-card .value.major { color: var(--major); }\n    .summary-card .value.minor { color: var(--minor); }\n    .summary-card .value.good { color: var(--good); }\n    .score-bar { display: flex; gap: 2px; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 2rem; }\n    .score-bar .seg { flex: 1; }\n    .score-bar .seg.fail { background: var(--critical); }\n    .score-bar .seg.warn { background: var(--major); }\n    .score-bar .seg.pass { background: var(--good); }\n    .category { margin-bottom: 2rem; }\n    .category h2 { font-size: 1.25rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; }\n    .issue { background: var(--card-bg); border: 1px solid var(--border); border-left: 4px solid var(--border); border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }\n    .issue.critical { border-left-color: var(--critical); }\n    .issue.major { border-left-color: var(--major); }\n    .issue.minor { border-left-color: var(--minor); }\n    .issue-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.4rem; }\n    .issue-id { font-weight: 700; font-size: 0.85rem; }\n    .badge { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 9999px; text-transform: uppercase; color: #fff; }\n    .badge.critical { background: var(--critical); }\n    .badge.major { background: var(--major); }\n    .badge.minor { background: var(--minor); }\n    .issue-file { font-size: 0.82rem; color: var(--text-muted); font-family: monospace; }\n    .issue-rule { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.3rem; }\n    .issue-desc { margin-bottom: 0.4rem; }\n    .issue-fix { font-size: 0.9rem; color: var(--text-muted); }\n    .issue-fix strong { color: var(--text); }\n    .file-summary { margin-bottom: 2rem; }\n    .file-summary table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }\n    .file-summary th, .file-summary td { text-align: left; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }\n    .file-summary th { background: #f1f5f9; font-weight: 600; }\n    footer { margin-top: 3rem; text-align: center; color: var(--text-muted); font-size: 0.82rem; }\n  </style>\n</head>\n<body>\n\n<h1>Web Quality Review Report</h1>\n<p class=\"subtitle\">Generated 2026-03-11 &mdash; 3 files reviewed &middot; 19 issues found</p>\n\n<!-- Summary Cards -->\n<div class=\"summary-grid\">\n  <div class=\"summary-card\">\n    <div class=\"label\">Critical Issues</div>\n    <div class=\"value critical\">4</div>\n  </div>\n  <div class=\"summary-card\">\n    <div class=\"label\">Major Issues</div>\n    <div class=\"value major\">9</div>\n  </div>\n  <div class=\"summary-card\">\n    <div class=\"label\">Minor Issues</div>\n    <div class=\"value minor\">6</div>\n  </div>\n  <div class=\"summary-card\">\n    <div class=\"label\">Overall Score</div>\n    <div class=\"value\" style=\"color:#ea580c;\">42 / 100</div>\n  </div>\n</div>\n\n<!-- Visual Score Bar -->\n<div class=\"score-bar\">\n  <div class=\"seg fail\"></div><div class=\"seg fail\"></div><div class=\"seg fail\"></div><div class=\"seg fail\"></div>\n  <div class=\"seg warn\"></div><div class=\"seg warn\"></div><div class=\"seg warn\"></div><div class=\"seg warn\"></div><div class=\"seg warn\"></div>\n  <div class=\"seg pass\"></div>\n</div>\n\n<!-- Per-File Summary Table -->\n<div class=\"file-summary\">\n  <h2 style=\"font-size:1.1rem; margin-bottom:0.75rem;\">Per-File Summary</h2>\n  <table>\n    <thead><tr><th>File</th><th>Critical</th><th>Major</th><th>Minor</th><th>Total</th></tr></thead>\n    <tbody>\n      <tr><td><code>index.html</code></td><td>2</td><td>4</td><td>2</td><td>8</td></tr>\n      <tr><td><code>dashboard.tsx</code></td><td>1</td><td>3</td><td>2</td><td>6</td></tr>\n      <tr><td><code>Card.tsx</code></td><td>0</td><td>2</td><td>2</td><td>4</td></tr>\n    </tbody>\n  </table>\n</div>\n\n<!-- ======================== ACCESSIBILITY ======================== -->\n<div class=\"category\">\n  <h2>Accessibility (6 issues)</h2>\n\n  <div class=\"issue critical\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A1</span>\n      <span class=\"badge critical\">Critical</span>\n    </div>\n    <div class=\"issue-file\">index.html : line 30</div>\n    <div class=\"issue-rule\">WCAG 2.1 SC 1.1.1 &ndash; Non-text Content</div>\n    <div class=\"issue-desc\">Image <code>&lt;img src=\"/public/logo.png\"&gt;</code> is missing an <code>alt</code> attribute. Screen readers cannot convey the image's meaning to users.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add a descriptive <code>alt</code> attribute, or use <code>alt=\"\"</code> if the image is purely decorative.</div>\n  </div>\n\n  <div class=\"issue critical\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A2</span>\n      <span class=\"badge critical\">Critical</span>\n    </div>\n    <div class=\"issue-file\">dashboard.tsx : lines 29-36</div>\n    <div class=\"issue-rule\">WCAG 2.1 SC 4.1.2 &ndash; Name, Role, Value</div>\n    <div class=\"issue-desc\">Two icon-only <code>&lt;button&gt;</code> elements contain only SVG graphics with no accessible name. Assistive technology will announce them as unlabelled buttons.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>aria-label=\"Description of action\"</code> to each button, or include visually-hidden text inside the button.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A3</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">Card.tsx : line 27</div>\n    <div class=\"issue-rule\">HTML Specification &ndash; ID Uniqueness</div>\n    <div class=\"issue-desc\">A hardcoded <code>id=\"card-item\"</code> is assigned to every Card instance. When multiple Cards are rendered, duplicate IDs violate the HTML spec and break ARIA references such as <code>aria-labelledby</code>.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Generate a unique ID per instance using a prop or React's <code>useId()</code> hook.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A4</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">Card.tsx : line 29</div>\n    <div class=\"issue-rule\">WCAG 2.1 SC 2.1.1 &ndash; Keyboard Accessible</div>\n    <div class=\"issue-desc\">A <code>&lt;div&gt;</code> element has an <code>onClick</code> handler but no keyboard interaction support: it lacks <code>role=\"button\"</code>, <code>tabIndex</code>, and <code>onKeyDown</code>. Keyboard-only users cannot activate it.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Replace the <code>&lt;div&gt;</code> with a <code>&lt;button&gt;</code>, or add <code>role=\"button\"</code>, <code>tabIndex={0}</code>, and an <code>onKeyDown</code> handler for Enter/Space.</div>\n  </div>\n\n  <div class=\"issue minor\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A5</span>\n      <span class=\"badge minor\">Minor</span>\n    </div>\n    <div class=\"issue-file\">dashboard.tsx : line 46</div>\n    <div class=\"issue-rule\">React Best Practice &ndash; List Keys</div>\n    <div class=\"issue-desc\">Items rendered via <code>.map()</code> do not have a <code>key</code> prop. This can cause screen readers to re-announce content unnecessarily on re-renders and leads to unpredictable DOM diffing.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add a stable, unique <code>key</code> to each list element (avoid using array index as key).</div>\n  </div>\n\n  <div class=\"issue minor\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A6</span>\n      <span class=\"badge minor\">Minor</span>\n    </div>\n    <div class=\"issue-file\">dashboard.tsx : line 50</div>\n    <div class=\"issue-rule\">WCAG 2.1 SC 1.4.3 &ndash; Image Sizing</div>\n    <div class=\"issue-desc\">Image lacks explicit <code>width</code> and <code>height</code> attributes, which can cause layout shifts that disorient assistive technology users.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>width</code> and <code>height</code> attributes or use CSS <code>aspect-ratio</code>.</div>\n  </div>\n</div>\n\n<!-- ======================== SEO ======================== -->\n<div class=\"category\">\n  <h2>SEO (5 issues)</h2>\n\n  <div class=\"issue critical\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">S2</span>\n      <span class=\"badge critical\">Critical</span>\n    </div>\n    <div class=\"issue-file\">index.html : line 7</div>\n    <div class=\"issue-rule\">SEO &ndash; Meta Description</div>\n    <div class=\"issue-desc\">No <code>&lt;meta name=\"description\"&gt;</code> tag is present. Search engines will auto-generate a snippet, which is often less compelling and may reduce click-through rate.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>&lt;meta name=\"description\" content=\"...\"&gt;</code> with a unique, keyword-rich summary of 120-160 characters.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">S1</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">index.html : line 6</div>\n    <div class=\"issue-rule\">SEO &ndash; Title Tag</div>\n    <div class=\"issue-desc\">The page title is \"Sample Page\" &mdash; generic and non-descriptive. Search engines rely heavily on the title tag for ranking and display.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Use a specific, descriptive title with target keywords (50-60 characters recommended).</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">S3</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">index.html</div>\n    <div class=\"issue-rule\">SEO &ndash; Structured Data</div>\n    <div class=\"issue-desc\">No JSON-LD or other structured data markup is present. The page is ineligible for rich results in search engines.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add appropriate Schema.org JSON-LD markup (e.g., <code>WebPage</code>, <code>Organization</code>) in a <code>&lt;script type=\"application/ld+json\"&gt;</code> block.</div>\n  </div>\n\n  <div class=\"issue minor\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">S4</span>\n      <span class=\"badge minor\">Minor</span>\n    </div>\n    <div class=\"issue-file\">index.html</div>\n    <div class=\"issue-rule\">SEO &ndash; Canonical URL</div>\n    <div class=\"issue-desc\">No <code>&lt;link rel=\"canonical\"&gt;</code> tag is present. This risks duplicate-content indexing issues if the page is accessible at multiple URLs.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>&lt;link rel=\"canonical\" href=\"https://example.com/\"&gt;</code> pointing to the preferred URL.</div>\n  </div>\n\n  <div class=\"issue minor\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">S5</span>\n      <span class=\"badge minor\">Minor</span>\n    </div>\n    <div class=\"issue-file\">index.html</div>\n    <div class=\"issue-rule\">SEO &ndash; Open Graph / Twitter Cards</div>\n    <div class=\"issue-desc\">No Open Graph (<code>og:</code>) or Twitter Card meta tags are present. Shared links on social media will lack rich previews.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>og:title</code>, <code>og:description</code>, <code>og:image</code>, and corresponding Twitter Card tags.</div>\n  </div>\n</div>\n\n<!-- ======================== PERFORMANCE ======================== -->\n<div class=\"category\">\n  <h2>Performance (7 issues)</h2>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P1</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">index.html : line 10</div>\n    <div class=\"issue-rule\">Web Vitals &ndash; Render Blocking Resource</div>\n    <div class=\"issue-desc\">A synchronous external stylesheet in <code>&lt;head&gt;</code> blocks first paint. The browser cannot render any content until this CSS file is fully downloaded and parsed.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Inline critical CSS and load the external stylesheet asynchronously using the <code>media=\"print\" onload</code> pattern or a <code>&lt;link rel=\"preload\"&gt;</code>.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P2</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">index.html : lines 13-17</div>\n    <div class=\"issue-rule\">Web Vitals &ndash; Font Display</div>\n    <div class=\"issue-desc\">The <code>@font-face</code> rule is missing <code>font-display: swap</code>. This causes Flash of Invisible Text (FOIT) while the custom font loads, degrading perceived performance.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>font-display: swap;</code> to the <code>@font-face</code> declaration.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P3</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">index.html : line 33</div>\n    <div class=\"issue-rule\">Web Vitals &ndash; Cumulative Layout Shift (CLS)</div>\n    <div class=\"issue-desc\">Image <code>&lt;img src=\"/public/promo.png\"&gt;</code> is missing <code>width</code> and <code>height</code> attributes. The browser cannot reserve space before the image loads, causing layout shift.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add explicit <code>width</code> and <code>height</code> attributes that match the image's intrinsic dimensions.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P4</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">dashboard.tsx : lines 11-13</div>\n    <div class=\"issue-rule\">Web Vitals &ndash; Layout Thrashing</div>\n    <div class=\"issue-desc\">Reading <code>offsetHeight</code> then immediately writing <code>style.minHeight</code> in the same frame forces the browser into a synchronous reflow-relayout cycle. This blocks the main thread and degrades responsiveness.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Batch reads and writes separately, or use <code>requestAnimationFrame</code> to defer the write to the next frame.</div>\n  </div>\n\n  <div class=\"issue major\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P5</span>\n      <span class=\"badge major\">Major</span>\n    </div>\n    <div class=\"issue-file\">dashboard.tsx : lines 17-19</div>\n    <div class=\"issue-rule\">Web Vitals &ndash; Cumulative Layout Shift (CLS)</div>\n    <div class=\"issue-desc\">Content is injected after a 500ms <code>setTimeout</code> without any space reservation. The container will grow when items appear, shifting all content below it.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Set a <code>min-height</code> on the container or use CSS containment (<code>contain: layout</code>) to reserve space before data arrives.</div>\n  </div>\n\n  <div class=\"issue minor\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P6</span>\n      <span class=\"badge minor\">Minor</span>\n    </div>\n    <div class=\"issue-file\">dashboard.tsx : line 50</div>\n    <div class=\"issue-rule\">Web Vitals &ndash; Lazy Loading</div>\n    <div class=\"issue-desc\">A below-fold image lacks <code>loading=\"lazy\"</code>. The browser will eagerly fetch it even though it is not immediately visible, wasting bandwidth and delaying above-fold resources.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Add <code>loading=\"lazy\"</code> to images that appear below the initial viewport.</div>\n  </div>\n\n  <div class=\"issue minor\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P7</span>\n      <span class=\"badge minor\">Minor</span>\n    </div>\n    <div class=\"issue-file\">Card.tsx : line 13</div>\n    <div class=\"issue-rule\">Production Readiness</div>\n    <div class=\"issue-desc\"><code>console.log</code> left in production code adds unnecessary I/O overhead and may leak internal data to users who open DevTools.</div>\n    <div class=\"issue-fix\"><strong>Fix:</strong> Remove the <code>console.log</code> call or guard it behind a debug environment variable.</div>\n  </div>\n</div>\n\n<!-- ======================== SECURITY ======================== -->\n<div class=\"category\">\n  <h2>Security (2 issues)</h2>\n\n  <div class=\"issue critical\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">SEC1</span>\n      <span class=\"badge critical\">Critical</span>\n    </div>\n    <div class=\"issue-file\">index.html : line 42</div>\n    <div class=\"issue-rule\">OWASP &ndash; Cross-Site Scripting (XSS)</div>\n    <div class=\"issue-desc\"><cod r-radius: 3px; font-size: 0.82rem; }\n    .fix-item p { line-height: 1.6; }\n    .fix-item pre { background: #f5f5f5; padding: 8px 12px; border-radius: 4px; font-size: 0.82rem; overflow-x: auto; margin-top: 6px; }\n  </style>\n</head>\n<body>\n<div class=\"container\">\n  <h1>웹 품질 종합 감사 리포트</h1>\n  <div class=\"meta\">\n    날짜: 2026-03-11 &nbsp;|&nbsp;\n    검토 파일: index.html, Card.tsx &nbsp;|&nbsp;\n    기준: KWCAG2.2 + 시맨틱 HTML + SEO + Web Performance &nbsp;|&nbsp;\n    Playwright: 미사용 — 정적분석만 수행\n  </div>\n\n  <!-- 종합 요약 -->\n  <div class=\"summary-grid\">\n    <div class=\"summary-card card-a11y\">\n      <div class=\"area\">접근성</div>\n      <div class=\"score\">24/40</div>\n    </div>\n    <div class=\"summary-card card-seo\">\n      <div class=\"area\">SEO & Web Performance</div>\n      <div class=\"score\">10/29</div>\n    </div>\n  </div>\n\n  <!-- 섹션 A: 접근성 -->\n  <div class=\"section\">\n    <div class=\"section-header header-a11y\">A. 접근성 (KWCAG2.2 33항목 + 시맨틱 HTML 7항목)</div>\n    <table>\n      <tr><th>번호</th><th>항목명</th><th>결과</th><th>판정방식</th><th>발견된 문제</th></tr>\n      <!-- 원칙 1: 인식의 용이성 -->\n      <tr>\n        <td>A-01</td><td>적절한 대체 텍스트 제공</td>\n        <td><span class=\"badge badge-fail\">&#10060;</span></td>\n        <td>정적분석</td>\n        <td>index.html:30 — <code>&lt;img src=\"/public/logo.png\"&gt;</code>에 alt 속성 누락</td>\n      </tr>\n      <tr>\n        <td>A-02</td><td>자막 제공</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>영상/음성 콘텐츠 없음</td>\n      </tr>\n      <tr>\n        <td>A-03</td><td>표의 구성</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>테이블 요소 없음</td>\n      </tr>\n      <tr>\n        <td>A-04</td><td>콘텐츠의 선형 구조</td>\n        <td><span class=\"badge badge-pass\">&#9989;</span></td>\n        <td>정적분석</td>\n        <td></td>\n      </tr>\n      <tr>\n        <td>A-05</td><td>명확한 지시 사항 제공</td>\n        <td><span class=\"badge badge-pass\">&#9989;</span></td>\n        <td>정적분석</td>\n        <td></td>\n      </tr>\n      <tr>\n        <td>A-06</td><td>색에 무관한 콘텐츠 인식</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>색상으로 정보를 구분하는 패턴 없음 (시각적 확인 필요)</td>\n      </tr>\n      <tr>\n        <td>A-07</td><td>자동 재생 금지</td>\n        <td><span class=\"badge badge-pass\">&#9989;</span></td>\n        <td>정적분석</td>\n        <td>autoplay 속성 및 자동 재생 패턴 없음</td>\n      </tr>\n      <tr>\n        <td>A-08</td><td>텍스트 콘텐츠의 명도 대비</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>명시적 color/background-color 값 없어 대비율 계산 불가 (시각적 확인 필요)</td>\n      </tr>\n      <tr>\n        <td>A-09</td><td>콘텐츠 간의 구분</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>시각적 디자인 판단 필요</td>\n      </tr>\n      <!-- 원칙 2: 운용의 용이성 -->\n      <tr>\n        <td>A-10</td><td>키보드 사용 보장</td>\n        <td><span class=\"badge badge-fail\">&#10060;</span></td>\n        <td>정적분석</td>\n        <td>Card.tsx:24 — <code>&lt;div onClick={handleClick}&gt;</code> 비대화형 요소에 onClick만 존재, onKeyDown/role/tabIndex 없음</td>\n      </tr>\n      <tr>\n        <td>A-11</td><td>초점 이동과 표시</td>\n        <td><span class=\"badge badge-partial\">&#9888;&#65039;</span></td>\n        <td>정적분석</td>\n        <td>CSS에 outline 제거 패턴 없으나, Card.tsx의 div에 tabIndex 없어 초점 도달 불가</td>\n      </tr>\n      <tr>\n        <td>A-12</td><td>조작 가능</td>\n        <td><span class=\"badge badge-pass\">&#9989;</span></td>\n        <td>정적분석</td>\n        <td></td>\n      </tr>\n      <tr>\n        <td>A-13</td><td>문자 단축키</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>키보드 단축키 패턴 없음</td>\n      </tr>\n      <tr>\n        <td>A-14</td><td>응답시간 조절</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>시간제한 콘텐츠 없음</td>\n      </tr>\n      <tr>\n        <td>A-15</td><td>정지 기능 제공</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>자동 변경 콘텐츠 없음</td>\n      </tr>\n      <tr>\n        <td>A-16</td><td>깜박임과 번쩍임 사용 제한</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>깜박임 콘텐츠 없음</td>\n      </tr>\n      <tr>\n        <td>A-17</td><td>반복 영역 건너뛰기</td>\n        <td><span class=\"badge badge-fail\">&#10060;</span></td>\n        <td>정적분석</td>\n        <td>index.html — 건너뛰기 링크(skip navigation) 미제공. <code>&lt;a href=\"#main-content\"&gt;</code> 등의 패턴 없음</td>\n      </tr>\n      <tr>\n        <td>A-18</td><td>제목 제공</td>\n        <td><span class=\"badge badge-partial\">&#9888;&#65039;</span></td>\n        <td>정적분석</td>\n        <td>index.html — <code>&lt;title&gt;Sample Page&lt;/title&gt;</code> 존재하나 페이지 내용을 구체적으로 설명하지 않음. h1 존재, h3는 Card.tsx에서 사용되나 h2 건너뜀</td>\n      </tr>\n      <tr>\n        <td>A-19</td><td>적절한 링크 텍스트</td>\n        <td><span class=\"badge badge-pass\">&#9989;</span></td>\n        <td>정적분석</td>\n        <td>\"About Us\", \"latest deals\" 등 목적 명확한 링크 텍스트</td>\n      </tr>\n      <tr>\n        <td>A-20</td><td>고정된 참조 위치 정보</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>전자출판문서 아님</td>\n      </tr>\n      <tr>\n        <td>A-21</td><td>단일 포인터 입력 지원</td>\n        <td><span class=\"badge badge-na\">&#10134;</span></td>\n        <td>정적분석</td>\n        <td>다중 포인터/경로 기반 동작 없음</td>\n      </tr>\n      <tr>\n        <td>A-22</td><td>포인터 입력 취소</td>\n        <td><span class=\"badge badge-pass\">&#9989;</span></td>\n        <td>정적분석</td>\n        <td>onMouseDown 즉시 실행 패턴 없음. Card.tsx는 onClick(mouseup 기반) 사용</td>\n      </tr>\n      <tr>\n        <td>A-23</td><td>레이블과 네임</td>\n        <td><span class=\"badge badge-partial\">&#9888;&#65039;</span></td>\n        <td>정적분석</td>\n        <td>Card.tsx — 클릭 가능한 div에 aria-label 없음. 시각적 텍스트(title  <code>&lt;img alt=\"Promo\"&gt;</code>의 alt 텍스트가 이미지 내용을 구체적으로 설명하지 않음. \"Promo\"만으로는 프로모션 내용 파악 불가</td></tr>\n      <tr><td>A-02</td><td>자막 제공</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>해당 요소 없음 (video/audio 미사용)</td></tr>\n      <tr><td>A-03</td><td>표의 구성</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>해당 요소 없음 (table 미사용)</td></tr>\n      <tr><td>A-04</td><td>콘텐츠의 선형 구조</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>A-05</td><td>명확한 지시 사항 제공</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td></td></tr>\n      <tr><td>A-06</td><td>색에 무관한 콘텐츠 인식</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>색상으로 정보를 구분하는 패턴 없음</td></tr>\n      <tr><td>A-07</td><td>자동 재생 금지</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>autoplay 속성 미사용</td></tr>\n      <tr><td>A-08</td><td>텍스트 콘텐츠의 명도 대비</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>인라인 color/background-color 미지정, Tailwind 클래스 사용으로 런타임 확인 필요</td></tr>\n      <tr><td>A-09</td><td>콘텐츠 간의 구분</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>border, gap, padding 클래스로 시각적 구분 제공</td></tr>\n      <tr><td>A-10</td><td>키보드 사용 보장</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>네이티브 &lt;button&gt; 요소 사용, 키보드 접근 자동 보장</td></tr>\n      <tr><td>A-11</td><td>초점 이동과 표시</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>outline:none / outline:0 미사용, 브라우저 기본 포커스 스타일 유지</td></tr>\n      <tr><td>A-12</td><td>조작 가능</td><td><span class=\"badge badge-partial\">⚠️</span></td><td>정적분석</td><td>dashboard.tsx:29,34 — SVG 아이콘 버튼의 크기가 16x16px로 최소 터치 영역(44x44px) 미달. padding으로 영역 확장 필요</td></tr>\n      <tr><td>A-13</td><td>문자 단축키</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>키보드 단축키 미사용</td></tr>\n      <tr><td>A-14</td><td>응답시간 조절</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>시간제한 콘텐츠 없음</td></tr>\n      <tr><td>A-15</td><td>정지 기능 제공</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>자동 변경 콘텐츠 없음</td></tr>\n      <tr><td>A-16</td><td>깜박임과 번쩍임 사용 제한</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>깜박임 효과 미사용</td></tr>\n      <tr><td>A-17</td><td>반복 영역 건너뛰기</td><td><span class=\"badge badge-fail\">❌</span></td><td>정적분석</td><td>dashboard.tsx — 건너뛰기 링크(skip navigation) 미제공. &lt;nav&gt; 영역을 건너뛰는 앵커 링크가 필요</td></tr>\n      <tr><td>A-18</td><td>제목 제공</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>h1(\"Dashboard\") → h2(\"Overview\") 계층 구조 적절</td></tr>\n      <tr><td>A-19</td><td>적절한 링크 텍스트</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>링크(&lt;a&gt;) 요소 미사용</td></tr>\n      <tr><td>A-20</td><td>고정된 참조 위치 정보</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>전자출판문서 형식 아님</td></tr>\n      <tr><td>A-21</td><td>단일 포인터 입력 지원</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>다중 포인터/경로 기반 동작 미사용</td></tr>\n      <tr><td>A-22</td><td>포인터 입력 취소</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>onMouseDown 직접 실행 패턴 미사용</td></tr>\n      <tr><td>A-23</td><td>레이블과 네임</td><td><span class=\"badge badge-fail\">❌</span></td><td>정적분석</td><td>dashboard.tsx:29-31,34-36 — 두 개의 아이콘 버튼(&lt;button&gt; 내 SVG만 존재)에 aria-label, title 등 접근 가능한 이름이 없음. 스크린 리더가 버튼 용도를 알 수 없음</td></tr>\n      <tr><td>A-24</td><td>동작 기반 작동</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>DeviceMotion/Orientation 미사용</td></tr>\n      <tr><td>A-25</td><td>기본 언어 표시</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>컴포넌트 파일로 &lt;html&gt; 태그 범위 외 (페이지 레벨에서 확인 필요)</td></tr>\n      <tr><td>A-26</td><td>사용자 요구에 따른 실행</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>의도하지 않은 새 창/초점 변화 없음</td></tr>\n      <tr><td>A-27</td><td>찾기 쉬운 도움 정보</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>도움 정보 미제공 (단일 페이지 컴포넌트)</td></tr>\n      <tr><td>A-28</td><td>오류 정정</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>폼 입력 요소 없음</td></tr>\n      <tr><td>A-29</td><td>레이블 제공</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>입력 요소(&lt;input&gt;, &lt;textarea&gt;, &lt;select&gt;) 없음</td></tr>\n      <tr><td>A-30</td><td>접근 가능한 인증</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>인증 기능 없음</td></tr>\n      <tr><td>A-31</td><td>반복 입력 정보</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>폼 입력 없음</td></tr>\n      <tr><td>A-32</td><td>마크업 오류 방지</td><td><span class=\"badge badge-fail\">❌</span></td><td>정적분석</td><td>dashboard.tsx:45-47 — items.map()으로 렌더링되는 &lt;div&gt; 요소에 key prop이 없음. React 리스트 렌더링 시 고유한 key가 필수</td></tr>\n      <tr><td>A-33</td><td>웹 애플리케이션 접근성 준수</td><td><span class=\"badge badge-partial\">⚠️</span></td><td>정적분석</td><td>dashboard.tsx:29-36 — 아이콘 버튼들이 네이티브 &lt;button&gt;을 사용하여 기본 역할은 있으나, 용도를 나타내는 aria-label이 없어 보조기술 사용자가 기능을 파악할 수 없음</td></tr>\n      <!-- 시맨틱 HTML 7항목 -->\n      <tr><td colspan=\"5\" style=\"background:#e8eef7; font-weight:600; padding:10px;\">시맨틱 HTML (7항목)</td></tr>\n      <tr><td>SH-01</td><td>프레젠테이션 태그 사용</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>&lt;b&gt;, &lt;i&gt; 단독 사용 없음</td></tr>\n      <tr><td>SH-02</td><td>연속 줄바꿈 대신 단락</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>연속 &lt;br&gt; 미사용</td></tr>\n      <tr><td>SH-03</td><td>랜드마크 요소 사용</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>&lt;main&gt;, &lt;nav&gt;, &lt;section&gt; 적절히 사용</td></tr>\n      <tr><td>SH-04</td><td>섹션 구조</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>&lt;section&gt;으로 콘텐츠 블록 구분</td></tr>\n      <tr><td>SH-05</td><td>인터랙티브 요소</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>네이티브 &lt;button&gt; 요소 사용</td></tr>\n      <tr><td>SH-06</td><td>리스트 구조</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>네비게이션 항목에 &lt;ul&gt;&lt;li&gt; 사용</td></tr>\n      <tr><td>SH-07</td><td>보조 콘텐츠 / 기타</td><td><span class=\"badge badge-partial\">⚠️</span></td><td>정적분석</td><td>dashboard.tsx:45-47 — 반복 렌더링되는 아이템 목록이 &lt;div&gt;로 구현됨. 의미적으로 &lt;ul&gt;&lt;li&gt; 구조가 더 적절</td></tr>\n    </table>\n  </div>\n\n  <!-- 섹션 B: SEO & Web Performance -->\n  <div class=\"section\">\n    <div class=\"section-header header-seo\">B. SEO & Web Performance (Technical SEO 11항목 + Page Experience 18항목)</div>\n    <table>\n      <tr><th>코드</th><th>영역</th><th>항목명</th><th>결과</th><th>판정방식</th><th>발견된 문제</th></tr>\n      <tr><td>SEO-01</td><td>Critical</td><td>noindex 없음</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>noindex 메타 태그 미사용</td></tr>\n      <tr><td>SEO-02</td><td>Critical</td><td>title 태그 존재하고 고유</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>컴포넌트 파일 — &lt;title&gt; 태그는 페이지/레이아웃 레벨에서 설정됨</td></tr>\n      <tr><td>SEO-03</td><td>Critical</td><td>페이지당 h1 하나</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>&lt;h1&gt; 1개 사용 (\"Dashboard\")</td></tr>\n      <tr><td>SEO-04</td><td>Critical</td><td>HTTPS 사용</td><td><span class=\"badge badge-pass\">✅</span></td><td>정적분석</td><td>외부 리소스 URL에 http:// 미사용. 이미지는 상대경로(/public/promo.png) 사용</td></tr>\n      <tr><td>SEO-05</td><td>High</td><td>meta description 존재</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>컴포넌트 파일 — meta description은 페이지/레이아웃 레벨에서 설정됨</td></tr>\n      <tr><td>SEO-06</td><td>High</td><td>canonical URL 설정</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>컴포넌트 파일 — canonical은 페이지/레이아웃 레벨에서 설정됨</td></tr>\n      <tr><td>SEO-07</td><td>High</td><td>구조화 데이터 (JSON-LD)</td><td><span class=\"badge badge-na\">➖</span></td><td>정적분석</td><td>대시보드 페이지 — 구조화 데이터 대상이 아닌 내부 관리 페이지</td></tr>\n      <tr><td>SEO-08</td><td>Medium</td><td>서술적 URL 구조</td><td><span class=\"badge badge-pass\">✅</span></td
