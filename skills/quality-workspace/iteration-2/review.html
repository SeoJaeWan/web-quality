d><td>폰트</td><td>중요 폰트 preload</td><td><span class=\"badge badge-na\">➖</span></td><td>폰트 로딩 코드 없음</td></tr>\n      <tr><td>WP-12</td><td>LCP</td><td>LCP 요소 초기 HTML 존재</td><td><span class=\"badge badge-fail\">❌</span></td><td>dashboard.tsx:17-19 — 주요 콘텐츠(Dashboard, Analytics, Reports)가 useEffect + setTimeout(500ms)으로 지연 로딩됨. 초기 HTML에 콘텐츠가 없어 LCP 지연 발생</td></tr>\n      <tr><td>WP-13</td><td>INP</td><td>이벤트 핸들러 즉각 피드백</td><td><span class=\"badge badge-na\">➖</span></td><td>클릭 이벤트 핸들러 없음</td></tr>\n      <tr><td>WP-14</td><td>INP</td><td>무거운 연산 지연 처리</td><td><span class=\"badge badge-pass\">✅</span></td><td></td></tr>\n      <tr><td>WP-15</td><td>INP</td><td>React memo 활용</td><td><span class=\"badge badge-pass\">✅</span></td><td>단순 컴포넌트로 memo 불필요</td></tr>\n      <tr><td>WP-16</td><td>CLS</td><td>뷰포트 위 동적 삽입 금지</td><td><span class=\"badge badge-pass\">✅</span></td><td></td></tr>\n      <tr><td>WP-17</td><td>CLS</td><td>애니메이션 transform/opacity</td><td><span class=\"badge badge-na\">➖</span></td><td>CSS 애니메이션 없음</td></tr>\n      <tr><td>WP-18</td><td>CLS</td><td>동적 콘텐츠 공간 예약</td><td><span class=\"badge badge-fail\">❌</span></td><td>dashboard.tsx:17-19, 45-47 — setTimeout으로 500ms 후 items 배열이 채워지면서 div 요소 3개가 동적 삽입됨. 사전에 min-height나 skeleton UI로 공간을 예약하지 않아 CLS 발생 위험</td></tr>\n    </table>\n  </div>\n\n  <!-- 수정 가이드 (❌ 항목만) -->\n  <div class=\"fix-guide\">\n    <h2>수정 가이드</h2>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">A-17: 반복 영역 건너뛰기</div>\n      <p>nav 영역 앞에 본문 바로가기 링크를 추가하세요. 키보드 사용자가 반복되는 내비게이션을 건너뛸 수 있습니다.</p>\n      <pre><code>&lt;a href=\"#main-content\" className=\"sr-only focus:not-sr-only\"&gt;\n  본문 바로가기\n&lt;/a&gt;\n&lt;main id=\"main-content\" className=\"p-4\"&gt;\n  ...\n&lt;/main&gt;</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">A-23: 레이블과 네임 — 아이콘 버튼 aria-label 누락</div>\n      <p>dashboard.tsx:29-36 — SVG만 포함된 두 개의 버튼에 <code>aria-label</code> 속성을 추가하여 스크린 리더가 버튼의 용도를 알 수 있게 하세요.</p>\n      <pre><code>&lt;button aria-label=\"알림\"&gt;\n  &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\"&gt;\n    &lt;circle cx=\"8\" cy=\"8\" r=\"8\" /&gt;\n  &lt;/svg&gt;\n&lt;/button&gt;\n&lt;button aria-label=\"설정\"&gt;\n  &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\"&gt;\n    &lt;rect width=\"16\" height=\"16\" /&gt;\n  &lt;/svg&gt;\n&lt;/button&gt;</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">A-32: 마크업 오류 방지 — key prop 누락</div>\n      <p>dashboard.tsx:45-47 — React 리스트 렌더링 시 각 자식 요소에 고유한 <code>key</code> prop을 제공해야 합니다. 인덱스 대신 안정적인 식별자 사용을 권장합니다.</p>\n      <pre><code>{items.map((item, index) =&gt; (\n  &lt;div key={item} className=\"border p-2\"&gt;{item}&lt;/div&gt;\n))}</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-04: img width/height 미설정 — CLS 방지</div>\n      <p>dashboard.tsx:50 — 이미지에 <code>width</code>와 <code>height</code> 속성을 추가하여 브라우저가 이미지 로드 전 공간을 예약할 수 있게 하세요.</p>\n      <pre><code>&lt;img\n  src=\"/public/promo.webp\"\n  alt=\"프로모션 배너 상세 설명\"\n  width=\"800\"\n  height=\"400\"\n  loading=\"lazy\"\n  className=\"mt-8\"\n/&gt;</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-05: loading=\"lazy\" 미설정</div>\n      <p>dashboard.tsx:50 — below-fold 이미지에 <code>loading=\"lazy\"</code>를 추가하여 초기 로딩 성능을 개선하세요.</p>\n      <pre><code>&lt;img src=\"/public/promo.png\" alt=\"Promo\" loading=\"lazy\" className=\"mt-8\" /&gt;</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-09: 레이아웃 스래싱 — offsetHeight 읽기/쓰기 혼합</div>\n      <p>dashboard.tsx:12-13 — <code>offsetHeight</code> 읽기 직후 <code>style.minHeight</code> 쓰기가 연속으로 발생하여 브라우저가 두 번 리플로우합니다. <code>requestAnimationFrame</code>으로 쓰기를 분리하세요.</p>\n      <pre><code>useEffect(() =&gt; {\n  if (containerRef.current) {\n    const h = containerRef.current.offsetHeight;\n    requestAnimationFrame(() =&gt; {\n      if (containerRef.current) {\n        containerRef.current.style.minHeight = h + \"px\";\n      }\n    });\n  }\n}, []);</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-12: LCP 요소 초기 HTML 부재 — useEffect + setTimeout 지연 로딩</div>\n      <p>dashboard.tsx:17-19 — 주요 콘텐츠가 500ms 후에야 렌더링됩니다. 서버사이드 렌더링(SSR) 또는 초기 상태값으로 콘텐츠를 제공하여 LCP를 개선하세요.</p>\n      <pre><code>// 초기 상태에 데이터를 직접 제공\nconst [items, setItems] = useState&lt;string[]&gt;(\n  [\"Dashboard\", \"Analytics\", \"Reports\"]\n);\n\n// 또는 getServerSideProps / loader에서 데이터를 가져와 props로 전달</code></pre>\n    </div>\n\n    <div class=\"fix-item\">\n      <div class=\"fix-title\">WP-18: 동적 콘텐츠 공간 예약 미흡 — CLS 위험</div>\n      <p>dashboard.tsx:17-19, 45-47 — setTimeout으로 지연 삽입되는 콘텐츠의 공간이 사전에 예약되지 않았습니다. <code>min-height</code>를 설정하거나 skeleton UI를 표시하세요.</p>\n      <pre><code>&lt;section ref={containerRef} className=\"grid gap-4\" style={{ minHeight: '200px' }}&gt;\n  &lt;h2 className=\"text-lg font-semibold\"&gt;Overview&lt;/h2&gt;\n  {items.length === 0 ? (\n    &lt;div className=\"animate-pulse bg-gray-200 h-8 rounded\"&gt;&lt;/div&gt;\n  ) : (\n    items.map((item) =&gt; (\n      &lt;div key={item} className=\"border p-2\"&gt;{item}&lt;/div&gt;\n    ))\n  )}\n&lt;/section&gt;</code></pre>\n    </div>\n\n  </div>\n\n</div>\n</body>\n</html>\n"}], "eval-3-single-file-detail-review-without_skill": [{"name": "report.csv", "type": "text", "content": "ID,File,Line,Category,Severity,Rule,Issue,Recommendation\nA1,dashboard.tsx,29-31,Accessibility,High,aria-label-missing,\"Icon button contains only an SVG with no accessible name. Screen readers will announce it as an empty button.\",\"Add aria-label describing the button action, e.g. <button aria-label=\"\"Toggle view\"\">. Also add role=\"\"img\"\" and aria-hidden=\"\"true\"\" on decorative SVGs, or add a <title> inside the SVG.\"\nA2,dashboard.tsx,34-36,Accessibility,High,aria-label-missing,\"Second icon button also lacks an accessible name. Same issue as A1.\",\"Add aria-label to the button and mark the SVG appropriately.\"\nA3,dashboard.tsx,30,Accessibility,Medium,svg-missing-role,\"SVG elements lack role=\"\"img\"\" or aria-hidden=\"\"true\"\". Assistive technology may try to traverse SVG internals.\",\"Add aria-hidden=\"\"true\"\" to decorative SVGs, or role=\"\"img\"\" with a <title> for meaningful ones.\"\nA4,dashboard.tsx,35,Accessibility,Medium,svg-missing-role,\"Same SVG accessibility issue on the second icon.\",\"Same fix as A3.\"\nA5,dashboard.tsx,26,Accessibility,Low,nav-missing-label,\"<nav> element has no aria-label or aria-labelledby. When multiple nav landmarks exist on a page, assistive tech cannot distinguish them.\",\"Add aria-label=\"\"Main navigation\"\" or use aria-labelledby pointing to the h1.\"\nA6,dashboard.tsx,50,Accessibility,Low,img-dimensions-missing,\"<img> tag lacks explicit width and height attributes. While alt text is present (good), missing dimensions contribute to CLS and can cause reflow for assistive tech users.\",\"Add width and height attributes to the img element.\"\nP1,dashboard.tsx,12-13,Performance,High,layout-thrashing,\"Reading offsetHeight then immediately writing style.minHeight causes forced synchronous reflow (layout thrashing). The browser must recalculate layout between the read and write.\",\"Batch DOM reads and writes separately. Use requestAnimationFrame to defer the write, or use ResizeObserver to react to size changes without forcing reflow.\"\nP2,dashboard.tsx,17-19,Performance,High,cls-risk,\"setTimeout dynamically injects content after 500ms without any size reservation. This causes Cumulative Layout Shift (CLS) because surrounding elements shift when the new items appear.\",\"Reserve space for dynamic content using min-height or a skeleton/placeholder. Alternatively, fetch data before initial render using SSR or a loading state with fixed dimensions.\"\nP3,dashboard.tsx,50,Performance,Medium,img-lazy-loading,\"Image below the fold lacks loading=\"\"lazy\"\". It will be fetched eagerly on page load even if not visible, wasting bandwidth and delaying LCP.\",\"Add loading=\"\"lazy\"\" to images that are below the fold: <img loading=\"\"lazy\"\" ... />\"\nP4,dashboard.tsx,50,Performance,Medium,img-no-dimensions,\"Image lacks explicit width/height. The browser cannot reserve space before the image loads, contributing to CLS.\",\"Specify width and height attributes so the browser can calculate the aspect ratio before the image loads.\"\nP5,dashboard.tsx,45-47,Performance,Low,missing-key-prop,\"List items rendered via .map() lack a key prop. React will use index-based reconciliation by default, which can cause unnecessary re-renders and DOM mutations when the list changes.\",\"Add a stable, unique key prop: items.map((item) => <div key={item} ...>)\"\nP6,dashboard.tsx,50,Performance,Low,img-no-srcset,\"Image uses a single src with no srcSet or <picture> element. On high-DPI or mobile screens, either a too-large or too-small image is served.\",\"Use srcSet and sizes attributes, or a <picture> element, to serve appropriately sized images for different viewports.\"\nP7,dashboard.tsx,9-20,Performance,Medium,useEffect-side-effects,\"useEffect runs after paint, so the layout measurement + style write (lines 12-13) happens after the user sees the initial render, causing a visible flash/shift.\",\"Use useLayoutEffect for DOM measurements that affect visual layout, so the update happens before the browser paints.\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Quality Review Report - dashboard.tsx</title>\n<style>\n  :root {\n    --bg: #f8f9fa;\n    --card-bg: #fff;\n    --border: #dee2e6;\n    --text: #212529;\n    --text-muted: #6c757d;\n    --high: #dc3545;\n    --high-bg: #f8d7da;\n    --medium: #fd7e14;\n    --medium-bg: #fff3cd;\n    --low: #0d6efd;\n    --low-bg: #cfe2ff;\n    --a11y: #6f42c1;\n    --perf: #198754;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }\n  .container { max-width: 960px; margin: 0 auto; }\n  h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }\n  .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }\n  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }\n  .summary-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }\n  .summary-card .number { font-size: 2rem; font-weight: 700; }\n  .summary-card .label { font-size: 0.85rem; color: var(--text-muted); }\n  .severity-high .number { color: var(--high); }\n  .severity-medium .number { color: var(--medium); }\n  .severity-low .number { color: var(--low); }\n\n  .section-title { font-size: 1.3rem; margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }\n  .section-title.a11y { border-color: var(--a11y); color: var(--a11y); }\n  .section-title.perf { border-color: var(--perf); color: var(--perf); }\n\n  .issue { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; border-left: 4px solid var(--border); }\n  .issue.high { border-left-color: var(--high); }\n  .issue.medium { border-left-color: var(--medium); }\n  .issue.low { border-left-color: var(--low); }\n  .issue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem; }\n  .issue-id { font-weight: 700; font-size: 0.9rem; }\n  .badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }\n  .badge-high { background: var(--high-bg); color: var(--high); }\n  .badge-medium { background: var(--medium-bg); color: var(--medium); }\n  .badge-low { background: var(--low-bg); color: var(--low); }\n  .issue-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }\n  .issue-desc { margin-bottom: 0.75rem; }\n  .issue-fix { background: #e8f5e9; border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.9rem; }\n  .issue-fix strong { color: var(--perf); }\n  code { background: #e9ecef; padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.88em; }\n</style>\n</head>\n<body>\n<div class=\"container\">\n  <h1>Web Quality Review Report</h1>\n  <p class=\"subtitle\">File: <code>dashboard.tsx</code> &mdash; Reviewed: 2026-03-11</p>\n\n  <div class=\"summary\">\n    <div class=\"summary-card\">\n      <div class=\"number\">13</div>\n      <div class=\"label\">Total Issues</div>\n    </div>\n    <div class=\"summary-card severity-high\">\n      <div class=\"number\">4</div>\n      <div class=\"label\">High Severity</div>\n    </div>\n    <div class=\"summary-card severity-medium\">\n      <div class=\"number\">5</div>\n      <div class=\"label\">Medium Severity</div>\n    </div>\n    <div class=\"summary-card severity-low\">\n      <div class=\"number\">4</div>\n      <div class=\"label\">Low Severity</div>\n    </div>\n  </div>\n\n  <!-- Accessibility Section -->\n  <h2 class=\"section-title a11y\">Accessibility Issues (6)</h2>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A1 &mdash; Icon Button Missing Accessible Name</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 29-31 &middot; Rule: <code>aria-label-missing</code></div>\n    <div class=\"issue-desc\">\n      The first icon button contains only an <code>&lt;svg&gt;</code> element with no text content or <code>aria-label</code>. Screen readers will announce this as an empty or unlabeled button, making it impossible for assistive technology users to understand the button's purpose.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-label</code> describing the action, e.g. <code>&lt;button aria-label=\"Toggle grid view\"&gt;</code>. Mark the SVG with <code>aria-hidden=\"true\"</code> since the label is on the button.\n    </div>\n  </div>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A2 &mdash; Second Icon Button Missing Accessible Name</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 34-36 &middot; Rule: <code>aria-label-missing</code></div>\n    <div class=\"issue-desc\">\n      Same issue as A1. The second <code>&lt;button&gt;</code> wraps an SVG without any accessible name. This violates WCAG 2.1 SC 4.1.2 (Name, Role, Value) and SC 1.1.1 (Non-text Content).\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-label</code> to the button and <code>aria-hidden=\"true\"</code> to the SVG.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A3 &mdash; SVG Missing Role or aria-hidden (First Icon)</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 30 &middot; Rule: <code>svg-missing-role</code></div>\n    <div class=\"issue-desc\">\n      The SVG element lacks <code>role=\"img\"</code> or <code>aria-hidden=\"true\"</code>. Without these, some screen readers may attempt to traverse the SVG's internal elements (like <code>&lt;circle&gt;</code>), producing confusing output.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> For decorative SVGs, add <code>aria-hidden=\"true\"</code>. For meaningful SVGs, add <code>role=\"img\"</code> and a <code>&lt;title&gt;</code> element inside the SVG.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A4 &mdash; SVG Missing Role or aria-hidden (Second Icon)</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 35 &middot; Rule: <code>svg-missing-role</code></div>\n    <div class=\"issue-desc\">\n      Same issue as A3, affecting the second SVG icon.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-hidden=\"true\"</code> to the SVG element.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A5 &mdash; Navigation Landmark Missing Label</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 24 &middot; Rule: <code>nav-missing-label</code></div>\n    <div class=\"issue-desc\">\n      The <code>&lt;nav&gt;</code> element lacks an <code>aria-label</code> or <code>aria-labelledby</code> attribute. When a page has multiple navigation landmarks, users of assistive technology cannot distinguish between them.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>aria-label=\"Main navigation\"</code> or use <code>aria-labelledby</code> pointing to the heading.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">A6 &mdash; Image Missing Explicit Dimensions</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-dimensions-missing</code></div>\n    <div class=\"issue-desc\">\n      The <code>&lt;img&gt;</code> tag has an <code>alt</code> attribute (good), but lacks explicit <code>width</code> and <code>height</code>. While primarily a performance concern, missing dimensions also affect assistive tech users who may experience disorienting layout shifts.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>width</code> and <code>height</code> attributes to the <code>&lt;img&gt;</code> element.\n    </div>\n  </div>\n\n  <!-- Performance Section -->\n  <h2 class=\"section-title perf\">Performance Issues (7)</h2>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P1 &mdash; Layout Thrashing in useEffect</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 12-13 &middot; Rule: <code>layout-thrashing</code></div>\n    <div class=\"issue-desc\">\n      The code reads <code>offsetHeight</code> (forcing the browser to calculate layout) and then immediately writes to <code>style.minHeight</code> (invalidating that layout). This is a classic forced synchronous reflow pattern. In a more complex component or in a loop, this can severely degrade frame rate and responsiveness.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Separate reads and writes. Use <code>requestAnimationFrame</code> to batch the write, or use <code>ResizeObserver</code> to react to size changes without forcing reflow. If the measurement must happen before paint, use <code>useLayoutEffect</code> instead.\n    </div>\n  </div>\n\n  <div class=\"issue high\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P2 &mdash; Cumulative Layout Shift (CLS) from Delayed Content</span>\n      <span class=\"badge badge-high\">High</span>\n    </div>\n    <div class=\"issue-meta\">Line 17-19 &middot; Rule: <code>cls-risk</code></div>\n    <div class=\"issue-desc\">\n      A <code>setTimeout</code> injects new list items after 500ms without any space reservation. When the items render, all content below shifts downward. This directly harms the CLS Core Web Vital metric and creates a jarring user experience.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Reserve space with a skeleton placeholder or <code>min-height</code> on the container. Better yet, load data before initial render (SSR/SSG) or show a loading state with fixed dimensions.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P3 &mdash; Image Missing <code>loading=\"lazy\"</code></span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-lazy-loading</code></div>\n    <div class=\"issue-desc\">\n      The image at the bottom of the page (below the fold) is loaded eagerly by default. This wastes bandwidth on initial page load and can delay Largest Contentful Paint (LCP) for above-the-fold content by competing for network resources.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>loading=\"lazy\"</code> to the image: <code>&lt;img loading=\"lazy\" src=\"...\" alt=\"...\" /&gt;</code>\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P4 &mdash; Image Missing Width/Height (CLS Contributor)</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-no-dimensions</code></div>\n    <div class=\"issue-desc\">\n      Without explicit <code>width</code> and <code>height</code>, the browser cannot calculate the image's aspect ratio before it loads. Once loaded, the image expands and pushes content below it, contributing to CLS.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add <code>width</code> and <code>height</code> attributes matching the image's intrinsic dimensions, or use CSS <code>aspect-ratio</code>.\n    </div>\n  </div>\n\n  <div class=\"issue medium\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P7 &mdash; useEffect Instead of useLayoutEffect for DOM Measurement</span>\n      <span class=\"badge badge-medium\">Medium</span>\n    </div>\n    <div class=\"issue-meta\">Line 9-20 &middot; Rule: <code>useEffect-side-effects</code></div>\n    <div class=\"issue-desc\">\n      <code>useEffect</code> runs after the browser paints. Since lines 12-13 measure and mutate the DOM, the user will see the initial render, then a flash/shift when the <code>minHeight</code> is applied. This creates a visible layout jump.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Use <code>useLayoutEffect</code> for DOM measurements that affect visual layout. It fires synchronously after DOM mutations but before the browser paints, preventing the flash.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P5 &mdash; Missing Key Prop on List Items</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 45-47 &middot; Rule: <code>missing-key-prop</code></div>\n    <div class=\"issue-desc\">\n      The <code>.map()</code> call renders <code>&lt;div&gt;</code> elements without a <code>key</code> prop. React will fall back to index-based reconciliation, which can cause unnecessary DOM mutations and re-renders when items change, reducing rendering performance.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Add a stable, unique key: <code>items.map((item) =&gt; &lt;div key={item} ...&gt;)</code>. If items may not be unique, use a unique identifier from your data.\n    </div>\n  </div>\n\n  <div class=\"issue low\">\n    <div class=\"issue-header\">\n      <span class=\"issue-id\">P6 &mdash; Image Lacks Responsive srcSet</span>\n      <span class=\"badge badge-low\">Low</span>\n    </div>\n    <div class=\"issue-meta\">Line 50 &middot; Rule: <code>img-no-srcset</code></div>\n    <div class=\"issue-desc\">\n      The image uses a single <code>src</code> with no <code>srcSet</code> or <code>&lt;picture&gt;</code> element. On high-DPI displays, this may serve a blurry image; on mobile, it may serve an unnecessarily large image, wasting bandwidth.\n    </div>\n    <div class=\"issue-fix\">\n      <strong>Fix:</strong> Use <code>srcSet</code> and <code>sizes</code> attributes, or wrap in a <code>&lt;picture&gt;</code> element to serve appropriately sized images per viewport.\n    </div>\n  </div>\n\n</div>\n</body>\n</html>\n"}]}, "benchmark": {"metadata": {"skill_name": "quality", "timestamp": "2026-03-11", "evals_run": ["full-3files-quality-review", "specified-2files-quality-audit", "single-file-detail-review"], "runs_per_configuration": 1}, "run_summary": {"with_skill": {"pass_rate": {"mean": 1.0, "stddev": 0.0}, "time_seconds": {"mean": 261.97, "stddev": 17.92}, "tokens": {"mean": 74928.33, "stddev": 1834.84}}, "without_skill": {"pass_rate": {"mean": 0.42, "stddev": 0.02}, "time_seconds": {"mean": 96.47, "stddev": 18.38}, "tokens": {"mean": 16858.33, "stddev": 1621.89}}, "delta": {"pass_rate": "+58.0%", "time_seconds": "+165.5", "tokens": "+58070"}}, "runs": [{"eval_id": 1, "eval_name": "full-3files-quality-review", "configuration": "with_skill", "run_number": 1, "result": {"pass_rate": 1.0, "passed": 10, "total": 10, "time_seconds": 284.7, "tokens": 76893}, "expectations": [{"text": "HTML report file (report.html) was generated", "passed": true, "evidence": "report.html exists with meaningful content, Korean-language quality audit report."}, {"text": "CSV report file (report.csv) was generated", "passed": true, "evidence": "report.csv exists with 70 rows covering accessibility (A-01 to A-33, SH-01 to SH-07), SEO (SEO-01 to SEO-11), and Web Performance (WP-01 to WP-18)."}, {"text": "Report contains accessibility section (Section A)", "passed": true, "evidence": "HTML report has section header 'A. 접근성 (KWCAG2.2 33항목 + 시맨틱 HTML 7항목)' with all accessibility items listed."}, {"text": "Report contains SEO and Web Performance section (Section B)", "passed": true, "evidence": "CSV contains SEO section (SEO-01 to SEO-11) and Web Performance section (WP-01 to WP-18). HTML report includes both sections."}, {"text": "All 33 KWCAG2.2 items are e     function showRun(index) {

      // Prompt
      document.getElementById("prompt-text").textContent = run.prompt;

      const badge = document.getElementById("config-badge");
      const configMatch = run.id.match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (configMatch) {
        const config = configMatch[1];
        const isBaseline = config === "without_skill" || config === "old_skill";

      if (outputs.length === 0) {

      for (const file of outputs) {

        // Always show file header with download link

        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";

        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);

        const content = document.createElement("div");

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          content.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          content.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          content.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(content, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          content.appendChild(a);

          const pre = document.createElement("pre");
          pre.textContent = file.content;
          pre.style.color = "var(--red)";
          content.appendChild(pre);
        }

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

    // ---- Grades ----
    function renderGrades(run) {
      const section = document.getElementById("grades-section");
      const content = document.getElementById("grades-content");

      if (!run.grading) {
        section.style.display = "none";
        return;
      }

      const grading = run.grading;
      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("grades-arrow").classList.remove("open");

      const summary = grading.summary || {};
      const expectations = grading.expectations || [];

      let html = '<div style="padding: 1rem;">';

      // Summary line
      const passRate = summary.pass_rate != null
        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.total || 0) + '개 중 ' + (summary.passed || 0) + '개 통과, ' + (summary.failed || 0) + '개 실패</span>';
      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';

      html += '</div>';
      content.innerHTML = html;

    // ---- Feedback (saved to server -> feedback.json) ----
    function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;

      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // Build reviews array from map
      const reviews = [];
      for (const [run_id, feedback] of Object.entries(feedbackMap)) {
        if (feedback.trim()) {
          reviews.push({ run_id, feedback, timestamp: new Date().toISOString() });
        }
      }

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        document.getElementById("feedback-status").textContent = "저장됨";
      }).catch(() => {
        // Static mode or server unavailable — no-op on auto-save,
        // feedback will be downloaded on final submit
        document.getElementById("feedback-status").textContent = "제출 시 다운로드됩니다";
      });
    }

    function showDoneDialog() {
      // Save current textarea to feedbackMap (but don't POST yet)
      const run = EMBEDDED_DATA.runs[currentIndex];

      html += '<table class="benchmark-table">';

      function fmtStat(stat, pct) {
        if (!stat) return "—";
        const suffix = pct ? "%" : "";
        const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
        const s = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
        return m + suffix + " ± " + s + suffix;
      }

      function deltaClass(val) {
        if (!val) return "";
        const n = parseFloat(val);
        if (n > 0) return "benchmark-delta-positive";
        if (n < 0) return "benchmark-delta-negative";
        return "";
      }

      // Discover config names dynamically (everything except "delta")
      const configs = Object.keys(summary).filter(k => k !== "delta");
      const configA = configs[0] || "config_a";
      const configB = configs[1] || "config_b";
      const labelA = configA.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const labelB = configB.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const a = summary[configA] || {};
      const b = summary[configB] || {};
      const delta = summary.delta || {};

      html += "<thead><tr><th>지표</th><th>" + escapeHtml(labelA) + "</th><th>" + escapeHtml(labelB) + "</th><th>차이</th></tr></thead>";
      html += "<tbody>";

      html += "<tr><td><strong>통과율</strong></td>";
      html += "<td>" + fmtStat(a.pass_rate, true) + "</td>";
      html += "<td>" + fmtStat(b.pass_rate, true) + "</td>";
      html += '<td class="' + deltaClass(delta.pass_rate) + '">' + (delta.pass_rate || "—") + "</td></tr>";

      // Time (only show row if data exists)
      if (a.time_seconds || b.time_seconds) {
        html += "<tr><td><strong>소요 시간 (초)</strong></td>";
        html += "<td>" + fmtStat(a.time_seconds, false) + "</td>";
        html += "<td>" + fmtStat(b.time_seconds, false) + "</td>";
        html += '<td class="' + deltaClass(delta.time_seconds) + '">' + (delta.time_seconds ? delta.time_seconds + "s" : "—") + "</td></tr>";
      }

      // Tokens (only show row if data exists)
      if (a.tokens || b.tokens) {
        html += "<tr><td><strong>토큰</strong></td>";
        html += "<td>" + fmtStat(a.tokens, false) + "</td>";
        html += "<td>" + fmtStat(b.tokens, false) + "</td>";
        html += '<td class="' + deltaClass(delta.tokens) + '">' + (delta.tokens || "—") + "</td></tr>";
      }

      html += "</tbody></table>";

      // Per-eval breakdown (if runs data available)
      const runs = data.runs || [];
      if (runs.length > 0) {
        const evalIds = [...new Set(runs.map(r => r.eval_id))].sort((a, b) => a - b);

        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>평가별 상세 내역</h3>";

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "평가 " + evalId;

          html += "<h4 style='font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);'>" + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>설정</th><th>실행</th><th>통과율</th>";
          if (hasTime) html += "<th>소요 시간 (초)</th>";
          if (hasErrors) html += "<th>실행 중 오류</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          // Group by config and render with average rows
          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + (r.passed || 0) + "/" + (r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? r.time_seconds.toFixed(1) : "—") + "</td>";
              if (hasErrors) html += "<td>" + (r.errors || 0) + "</td>";
              html += "</tr>";
            }

            // Average row
            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>평균</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1) : "—") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail for this eval
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            // Collect all unique assertion texts across all configs
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>검증 항목</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "— ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>분석 노트</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Start ----
    init();
    renderBenchmark();
  </script>
</body>
</html>
