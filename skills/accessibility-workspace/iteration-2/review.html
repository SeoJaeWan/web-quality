n  </tr>\n  <tr>\n    <td>폼 그룹 (fieldset/legend)</td>\n    <td class=\"result-na\">➖</td>\n    <td><span class=\"method-static\">정적분석</span></td>\n    <td>폼 요소 없음</td><td></td>\n  </tr>\n  <tr>\n    <td>기타 시맨틱 요소 (time/blockquote 등)</td>\n    <td class=\"result-na\">➖</td>\n    <td><span class=\"method-static\">정적분석</span></td>\n    <td>날짜/인용문 콘텐츠 없음</td><td></td>\n  </tr>\n</table>\n\n<h2>수정 필요 항목</h2>\n\n<h3>불합격 (❌)</h3>\n\n<div class=\"fix-fail\">\n  <p><strong>항목 11. 초점 이동과 표시</strong> — <code>Card.tsx:24-30</code></p>\n  <p><strong>문제:</strong> 클릭 가능한 <code>&lt;div onClick={handleClick}&gt;</code>에 <code>tabIndex</code>가 없어 키보드 초점을 받을 수 없음. 초점 표시 스타일도 미정의</p>\n  <p><strong>수정:</strong> <code>&lt;div tabIndex={0} className=\"... focus:outline-2 focus:outline-blue-500\" ...&gt;</code> 또는 <code>&lt;button&gt;</code> 요소로 변경</p>\n</div>\n\n<div class=\"fix-fail\">\n  <p><strong>항목 32. 마크업 오류 방지</strong> — <code>Card.tsx:27</code></p>\n  <p><strong>문제:</strong> <code>id=\"card-item\"</code>이 하드코딩되어 있어, 리스트 렌더링 시 동일 id가 중복됨 (HTML 유효성 위반)</p>\n  <p><strong>수정:</strong> <code>id={`card-${useId()}`}</code> 또는 id 속성 제거</p>\n</div>\n\n<div class=\"fix-fail\">\n  <p><strong>항목 33. 웹 애플리케이션 접근성</strong> — <code>Card.tsx:24-30</code></p>\n  <p><strong>문제:</strong> 클릭 가능한 커스텀 <code>&lt;div&gt;</code>에 WAI-ARIA <code>role</code> 속성이 없음. 스크린 리더가 이 요소를 대화형 컨트롤로 인식할 수 없음</p>\n  <p><strong>수정:</strong> <code>&lt;div role=\"button\" tabIndex={0} aria-label={title} onKeyDown={handleKeyDown} onClick={handleClick}&gt;</code> 또는 <code>&lt;button&gt;</code> 요소로 변경</p>\n</div>\n\n<div class=\"fix-fail\">\n  <p><strong>시맨틱 HTML: 대화형 요소</strong> — <code>Card.tsx:24-30</code></p>\n  <p><strong>문제:</strong> 클릭 가능한 <code>&lt;div onClick&gt;</code>이 <code>&lt;button&gt;</code> 또는 <code>&lt;a&gt;</code>로 대체 가능</p>\n  <p><strong>수정:</strong> 카드 전체 클릭이 필요하면 <code>&lt;button&gt;</code>으로 변경하거나, 카드 내부에 별도 <code>&lt;a&gt;</code>/<code>&lt;button&gt;</code> 배치</p>\n</div>\n\n<h3>권고 (⚠️)</h3>\n\n<div class=\"fix-partial\">\n  <p><strong>항목 23. 레이블과 네임</strong></p>\n  <p><strong>내용:</strong> 클릭 가능한 &lt;div&gt;에 aria-label이 없어 보조 기술 사용자가 요소의 용도를 파악하기 어려움. <code>aria-label={title}</code> 또는 <code>aria-labelledby</code>로 h3 제목과 연결 권고</p>\n</div>\n\n<div class=\"fix-partial\">\n  <p><strong>시맨틱 HTML: 섹션 구조</strong></p>\n  <p><strong>내용:</strong> 카드가 독립적인 콘텐츠 단위라면 최상위 &lt;div&gt;를 &lt;article&gt;로 변경하여 시맨틱 의미를 강화할 수 있음</p>\n</div>\n\n</body>\n</html>"}], "eval-2-card-component-a11y-without_skill": [{"name": "report.csv", "type": "text", "content": "번호,KWCAG 항목,심각도,라인,문제 설명,개선 방안\n1,\"5.1.1 키보드 접근성 (운용의 용이성)\",심각,24-30,\"div 요소에 onClick 핸들러만 있고 onKeyDown/onKeyUp 핸들러가 없어 키보드 사용자가 카드를 클릭할 수 없음. div는 기본적으로 포커스를 받지 않으므로 tabIndex도 없어 탭 키로 접근 불가.\",\"role=\"\"button\"\", tabIndex={0}, onKeyDown (Enter/Space 처리)을 추가하거나 시맨틱 <button> 요소로 변경\"\n2,\"5.1.1 키보드 접근성 (초점 이동)\",심각,24,\"div에 tabIndex가 없어 키보드 탭 순서에서 완전히 제외됨. 클릭 가능한 요소임에도 키보드로 포커스를 줄 수 없음.\",\"tabIndex={0}을 추가하여 자연스러운 탭 순서에 포함시키고 :focus-visible 스타일로 포커스 표시기 제공\"\n3,\"5.3.1 적절한 역할 부여 (인식의 용이성)\",심각,24,\"클릭 가능한 div에 ARIA role 속성이 없음. 스크린 리더 사용자가 요소의 목적(버튼/링크)을 파악할 수 없음.\",\"role=\"\"button\"\" 추가 또는 시맨틱 <button> 요소 사용\"\n4,\"5.1.3 초점의 시각화 (운용의 용이성)\",주요,24-30,\"포커스 표시(focus indicator)를 위한 스타일이 정의되지 않음. 기본 outline이 제거될 가능성 있음.\",\"Tailwind focus:ring-2 focus:ring-blue-500 focus-visible:outline-2 등 추가\"\n5,\"5.3.3 콘텐츠의 선형화 (이해의 용이성)\",주요,25,\"id=\"\"card-item\"\"이 하드코딩되어 리스트 렌더링 시 중복 ID 발생. 보조 기술이 특정 요소를 정확히 참조하지 못함.\",\"React useId() 훅으로 고유 ID 생성\"\n6,\"5.2.1 접근 가능한 이름 (인식의 용이성)\",주요,24,\"클릭 가능한 div에 aria-label 또는 aria-labelledby가 없어 스크린 리더 사용자가 요소 목적 파악 어려움.\",\"aria-labelledby로 내부 h3 제목과 프로그래밍적 연결\"\n7,\"5.1.2 조작 가능 (충분한 크기)\",보통,28,\"클릭 가능한 요소의 최소 터치/클릭 영역 크기가 명시적으로 보장되지 않음. 콘텐츠가 적을 경우 Target Size 기준 미충족 가능.\",\"min-height와 min-width를 명시적으로 설정하여 최소 클릭 영역 보장\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Card.tsx KWCAG 2.2 접근성 검토 보고서</title>\n  <style>\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n    body { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #222; line-height: 1.7; padding: 2rem; }\n    .container { max-width: 960px; margin: 0 auto; }\n    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }\n    .meta { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }\n    .summary { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }\n    .summary h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }\n    .summary .counts { display: flex; gap: 1.5rem; flex-wrap: wrap; }\n    .count-box { padding: 0.75rem 1.25rem; border-radius: 6px; font-weight: 600; font-size: 0.95rem; }\n    .count-critical { background: #fde8e8; color: #b91c1c; }\n    .count-major { background: #fff3cd; color: #92400e; }\n    .count-minor { background: #e0f2fe; color: #0369a1; }\n    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }\n    th { background: #1e293b; color: #fff; text-align: left; padding: 0.75rem 1rem; font-size: 0.85rem; }\n    td { padding: 0.75rem 1rem; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: top; }\n    tr:last-child td { border-bottom: none; }\n    .severity-critical { color: #b91c1c; font-weight: 700; }\n    .severity-major { color: #92400e; font-weight: 700; }\n    .severity-minor { color: #0369a1; font-weight: 700; }\n    code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85rem; }\n    pre { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; margin: 0.5rem 0; overflow-x: auto; font-size: 0.82rem; line-height: 1.5; }\n    .fix { margin-top: 0.5rem; }\n  </style>\n</head>\n<body>\n  <div class=\"container\">\n    <h1>Card.tsx KWCAG 2.2 접근성 검토 보고서</h1>\n    <p class=\"meta\">파일: <code>features/web-sample/components/Card.tsx</code> | 검토일: 2026-03-11 | 기준: KWCAG 2.2 (한국형 웹 콘텐츠 접근성 지침 2.2)</p>\n\n    <div class=\"summary\">\n      <h2>검토 요약</h2>\n      <p style=\"margin-bottom:0.75rem;\">Card 컴포넌트에서 총 <strong>7건</strong>의 접근성 문제가 발견되었습니다.</p>\n      <div class=\"counts\">\n        <span class=\"count-box count-critical\">심각 (Critical): 3건</span>\n        <span class=\"count-box count-major\">주요 (Major): 3건</span>\n        <span class=\"count-box count-minor\">보통 (Minor): 1건</span>\n      </div>\n    </div>\n\n    <table>\n      <thead>\n        <tr>\n          <th style=\"width:3%\">#</th>\n          <th style=\"width:12%\">KWCAG 항목</th>\n          <th style=\"width:10%\">심각도</th>\n          <th style=\"width:6%\">라인</th>\n          <th style=\"width:30%\">문제 설명</th>\n          <th style=\"width:39%\">개선 방안</th>\n        </tr>\n      </thead>\n      <tbody>\n        <!-- Issue 1 -->\n        <tr>\n          <td>1</td>\n          <td>5.1.1 키보드 접근성<br/>(운용의 용이성)</td>\n          <td><span class=\"severity-critical\">심각</span></td>\n          <td>24-30</td>\n          <td>\n            <code>&lt;div&gt;</code> 요소에 <code>onClick</code> 핸들러만 부여되어 있고 <code>onKeyDown</code>/<code>onKeyUp</code> 핸들러가 없습니다.\n            키보드 사용자는 이 카드를 클릭할 수 없습니다. <code>&lt;div&gt;</code>는 기본적으로 포커스를 받지 않으므로 <code>tabIndex</code>도 지정되어 있지 않아 탭 키로도 접근이 불가합니다.\n          </td>\n          <td>\n            <div class=\"fix\">\n              <strong>방법 1 (권장):</strong> 클릭 가능한 요소라면 <code>&lt;button&gt;</code> 또는 <code>&lt;a&gt;</code> 등 인터랙티브 HTML 요소로 변경합니다.<br/>\n              <strong>방법 2:</strong> <code>role=\"button\"</code>, <code>tabIndex={0}</code>, <code>onKeyDown</code> (Enter/Space 처리)을 함께 추가합니다.\n              <pre>&lt;div\n  role=\"button\"\n  tabIndex={0}\n  onClick={handleClick}\n  onKeyDown={(e) =&gt; {\n    if (e.key === 'Enter' || e.key === ' ') {\n      e.preventDefault();\n      handleClick();\n    }\n  }}\n&gt;</pre>\n            </div>\n          </td>\n        </tr>\n        <!-- Issue 2 -->\n        <tr>\n          <td>2</td>\n          <td>5.1.1 키보드 접근성<br/>(초점 이동)</td>\n          <td><span class=\"severity-critical\">심각</span></td>\n          <td>24</td>\n          <td>\n            <code>&lt;div&gt;</code>에 <code>tabIndex</code>가 없어 키보드 탭 순서에서 완전히 제외됩니다.\n            클릭 가능한 요소임에도 키보드로 포커스를 줄 수 없으므로 키보드 전용 사용자가 해당 카드와 상호작용할 수 없습니다.\n          </td>\n          <td>\n            <code>tabIndex={0}</code>을 추가하여 자연스러운 탭 순서에 포함시킵니다. 동시에 <code>:focus-visible</code> 등의 스타일로 포커스 표시기를 제공해야 합니다.\n          </td>\n        </tr>\n        <!-- Issue 3 -->\n        <tr>\n          <td>3</td>\n          <td>5.3.1 적절한 역할 부여<br/>(인식의 용이성)</td>\n          <td><span class=\"severity-critical\">심각</span></td>\n          <td>24</td>\n          <td>\n            클릭 가능한 <code>&lt;div&gt;</code>에 ARIA <code>role</code> 속성이 없습니다.\n            스크린 리더 사용자는 이 요소가 클릭 가능한 버튼인지, 단순한 텍스트 컨테이너인지 구분할 수 없습니다.\n            보조 기술이 요소의 목적과 상호작용 방법을 전달하지 못합니다.\n          </td>\n          <td>\n            <code>role=\"button\"</code> 또는 시맨틱 <code>&lt;button&gt;</code> 요소를 사용합니다. 카드가 링크 역할이라면 <code>&lt;a&gt;</code> 또는 <code>role=\"link\"</code>를 사용합니다.\n          </td>\n        </tr>\n        <!-- Issue 4 -->\n        <tr>\n          <td>4</td>\n          <td>5.1.3 초점의 시각화<br/>(운용의 용이성)</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>24-30</td>\n          <td>\n            포커스를 받을 수 있게 수정하더라도 현재 코드에는 포커스 표시(focus indicator)를 위한 스타일이 전혀 정의되어 있지 않습니다. Tailwind CSS의 <code>rounded border p-4</code>만 적용된 상태이므로, 브라우저 기본 포커스 아웃라인이 <code>outline: none</code> 등으로 제거될 가능성이 있습니다.\n          </td>\n          <td>\n            Tailwind의 <code>focus:ring-2 focus:ring-blue-500 focus-visible:outline-2</code> 등을 추가하여 포커스 상태가 시각적으로 명확히 표시되도록 합니다.\n            <pre>className={`rounded border p-4 focus:ring-2 focus:ring-blue-500 focus:outline-none ${className}`}</pre>\n          </td>\n        </tr>\n        <!-- Issue 5 -->\n        <tr>\n          <td>5</td>\n          <td>5.3.3 콘텐츠의 선형화<br/>(이해의 용이성)</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>25</td>\n          <td>\n            <code>id=\"card-item\"</code>이 하드코딩되어 있어, 카드가 리스트에서 여러 번 렌더링될 경우 동일한 <code>id</code>가 중복됩니다.\n            중복 ID는 HTML 명세 위반이며, 보조 기술(스크린 리더)이 특정 요소를 정확히 참조하지 못하게 합니다.\n            <code>aria-labelledby</code>, <code>aria-describedby</code> 등이 ID를 참조할 때 잘못된 요소를 가리킬 수 있습니다.\n          </td>\n          <td>\n            고유한 ID를 생성하도록 변경합니다. React 18+에서는 <code>useId()</code> 훅을 사용할 수 있습니다.\n            <pre>const id = React.useId();\n// ...\n&lt;div id={`card-${id}`} ...&gt;</pre>\n          </td>\n        </tr>\n        <!-- Issue 6 -->\n        <tr>\n          <td>6</td>\n          <td>5.2.1 접근 가능한 이름<br/>(인식의 용이성)</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>24</td>\n          <td>\n            클릭 가능한 <code>&lt;div&gt;</code>에 접근 가능한 이름(accessible name)이 제공되지 않았습니다.\n            <code>aria-label</code> 또는 <code>aria-labelledby</code>가 없으므로 스크린 리더 사용자는 이 요소의 목적을 파악하기 어렵습니다. 내부의 <code>&lt;h3&gt;</code>에 제목이 있지만 프로그래밍적으로 연결되어 있지 않습니다.\n          </td>\n          <td>\n            <code>aria-label</code> 또는 <code>aria-labelledby</code>를 사용하여 접근 가능한 이름을 제공합니다.\n            <pre>&lt;h3 id={`card-title-${id}`} ...&gt;{title}&lt;/h3&gt;\n// div에 추가:\naria-labelledby={`card-title-${id}`}</pre>\n          </td>\n        </tr>\n        <!-- Issue 7 -->\n        <tr>\n          <td>7</td>\n          <td>5.1.2 조작 가능<br/>(운용의 용이성 - 충분한 크기)</td>\n          <td><span class=\"severity-minor\">보통</span></td>\n          <td>28</td>\n          <td>\n            클릭 가능한 카드 요소에 대해 최소 터치/클릭 영역 크기가 CSS에서 명시적으로 보장되지 않습니다.\n            <code>p-4</code>(padding 1rem)이 적용되어 있어 어느 정도의 크기는 확보되지만, 콘텐츠가 매우 적을 경우 WCAG 2.2의 Target Size 기준(최소 24x24 CSS px)을 충족하지 못할 수 있습니다.\n          </td>\n          <td>\n            <code>min-height</code>와 <code>min-width</code>를 명시적으로 설정하여 최소 클릭 영역을 보장합니다.\n            <pre>className={`rounded border p-4 min-h-[44px] ${className}`}</pre>\n          </td>\n        </tr>\n      </tbody>\n    </table>\n\n    <div class=\"summary\">\n      <h2>참고: KWCAG 2.2 관련 검사 항목 매핑</h2>\n      <table style=\"margin:0;border:none;\">\n        <thead>\n          <tr>\n            <th>KWCAG 2.2 원칙</th>\n            <th>관련 지침</th>\n            <th>이 파일의 해당 이슈</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr><td>인식의 용이성</td><td>5.2.1 접근 가능한 이름, 5.3.1 적절한 역할</td><td>#3, #6</td></tr>\n          <tr><td>운용의 용이성</td><td>5.1.1 키보드 접근성, 5.1.2 조작 가능, 5.1.3 초점의 시각화</td><td>#1, #2, #4, #7</td></tr>\n          <tr><td>이해의 용이성</td><td>5.3.3 콘텐츠의 선형화 (중복 ID)</td><td>#5</td></tr>\n          <tr><td>견고성</td><td>마크업 유효성 (중복 ID로 인한 파싱 이슈)</td><td>#5</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n</body>\n</html>\n"}], "eval-3-semantic-html-review-with_skill": [{"name": "report.csv", "type": "text", "content": "번호,항목명,원칙,결과,판정방식,발견된 문제,수정 가이드\n1,적절한 대체 텍스트,인식의 용이성,❌,정적분석,\"index.html:30 — <img src=\"\"/public/logo.png\"\">에 alt 속성 누락. 의미 있는 이미지(로고)에 대체 텍스트 필요.\",\"<img src=\"\"/public/logo.png\"\" alt=\"\"사이트 로고\"\" width=\"\"120\"\" height=\"\"40\"\" />\"\n2,자막 제공,인식의 용이성,➖,정적분석,영상/음성 콘텐츠 없음,\n3,표의 구성,인식의 용이성,➖,정적분석,table 요소 없음,\n4,콘텐츠의 선형 구조,인식의 용이성,✅,정적분석,DOM 순서와 시각적 순서 일치,\n5,명확한 지시 사항,인식의 용이성,✅,정적분석,색상/위치/모양만으로 지시하는 텍스트 없음,\n6,색에 무관한 콘텐츠 인식,인식의 용이성,➖,정적분석,색상만으로 정보 구분하는 요소 없음 (시각 확인 필요),\n7,자동 재생 금지,인식의 용이성,✅,정적분석,autoplay 속성 및 .play() 자동 호출 없음,\n8,텍스트 콘텐츠의 명도 대비,인식의 용이성,🔵 판정불가,판정불가,playwright.config.ts 없음,Playwright 설치 후 재검토\n9,콘텐츠 간의 구분,인식의 용이성,⚠️,정적분석,\"인접 콘텐츠 간 시각적 구분이 인라인 CSS에 명시되지 않음. 외부 CSS 의존.\",콘텐츠 블록 간 margin/border/background-color로 시각적 구분 추가 권고\n10,키보드 사용 보장,운용의 용이성,🔵 판정불가,판정불가,playwright.config.ts 없음,Playwright 설치 후 재검토\n11,초점 이동과 표시,운용의 용이성,✅,정적분석,\"outline:none/0 사용 없음, onfocus=this.blur() 패턴 없음\",\n12,조작 가능,운용의 용이성,➖,정적분석,컨트롤 크기가 인라인 CSS에 명시되지 않 ng> 히어로 배너, 프로모션 배너, 텍스트 콘텐츠 등 의미적으로 구분되는 영역이 <code>&lt;section&gt;</code>이나 <code>&lt;article&gt;</code>로 감싸지지 않음. 각 콘텐츠 블록을 <code>&lt;section&gt;</code>으로 감싸고 적절한 헤딩을 제공하면 페이지 구조 이해도가 향상됨.</p>\n</div>\n\n</body>\n</html>"}], "eval-3-semantic-html-review-without_skill": [{"name": "report.csv", "type": "text", "content": "ID,카테고리,이슈,심각도,라인,KWCAG 2.2 항목,설명,개선 방안\nS-01,시맨틱 HTML,시맨틱 랜드마크 요소 미사용,주요(Major),20-45,\"4.1.2, 2.4.1\",\"header/nav/main/footer 등 시맨틱 랜드마크 요소가 전혀 사용되지 않아 스크린 리더 사용자가 페이지 구조를 파악하기 어려움\",콘텐츠를 header/nav/main/footer 등으로 구조화\nS-02,시맨틱 HTML,네비게이션 영역 미구분,주요(Major),24,\"2.4.1, 1.3.1\",\"About Us 링크가 nav 요소 없이 단독 존재하여 보조 기술에서 탐색 영역으로 인식 불가\",\"<nav aria-label=\"\"메인 네비게이션\"\"> 요소로 링크를 감싸기\"\nS-03,시맨틱 HTML,콘텐츠 섹션 미구분,경미(Minor),21-35,1.3.1,\"다양한 콘텐츠가 섹션 구분 없이 나열되어 있어 논리적 구조 파악이 어려움\",관련 콘텐츠를 section으로 그룹화하고 적절한 헤딩 부여\nS-04,시맨틱 HTML,문서 언어와 실제 콘텐츠 불일치 가능성,정보(Info),2,3.1.1,\"html lang=\"\"en\"\"으로 선언되어 있으나 실제 콘텐츠 언어와 불일치할 수 있음\",실제 콘텐츠 언어에 맞게 lang 속성 설정\nA-01,접근성,이미지 alt 속성 누락,심각(Critical),30,1.1.1,\"logo.png 이미지에 alt 속성이 없어 스크린 리더 사용자가 이미지 내용을 알 수 없음\",\"alt=\"\"회사 로고\"\" 등 대체 텍스트 추가. 장식용이면 alt=\"\"\"\" 사용\"\nA-02,접근성,건너뛰기 링크(Skip Navigation) 미제공,심각(Critical),20,2.4.1,키보드 사용자가 반복 영역을 건너뛰고 주요 콘텐츠로 이동할 수 있는 링크 없음,\"body 바로 뒤에 <a href=\"\"#main-content\"\">본문 바로가기</a> 추가\"\nA-03,접근성,링크 텍스트 맥락 부족,경미(Minor),35,2.4.4,\"latest deals 링크가 독립적으로 읽었을 때 목적이 불명확할 수 있음\",링크 텍스트를 구체적으로 변경하거나 aria-label 활용\nA-04,접근성,innerHTML을 통한 XSS 취약점 및 접근성 문제,심각(Critical),37-44,4.1.2,\"innerHTML로 사용자 입력을 직접 삽입하여 XSS 취약점 존재. 동적 콘텐츠가 스크린 리더에 전달 안 될 수 있음\",\"textContent 사용 및 aria-live=\"\"polite\"\" 영역 활용\"\nA-05,접근성,meta description 누락,주요(Major),7,-,\"meta description이 없어 검색 엔진과 보조 기술이 페이지 내용을 요약할 수 없음\",\"<meta name=\"\"description\"\" content=\"\"...\"\"> 추가\"\nA-06,접근성,이미지 width/height 누락 (CLS 위험),경미(Minor),33,-,\"promo.png에 width/height 속성이 없어 레이아웃 시프트(CLS) 발생 가능. 인지 장애 사용자에게 혼란 유발 가능\",이미지에 width와 height 속성 명시 또는 CSS aspect-ratio 사용\nA-07,접근성,font-display 미설정,주요(Major),13-17,-,\"@font-face에 font-display: swap이 없어 폰트 로딩 중 텍스트가 보이지 않을 수 있음(FOIT)\",font-display: swap 추가\nA-08,접근성,페이지 제목 구체성 부족,정보(Info),6,2.4.2,\"Sample Page라는 제목이 페이지 목적을 구체적으로 설명하지 못함\",페이지의 실제 목적을 반영하는 구체적인 제목 사용\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>시맨틱 HTML 및 접근성 검토 보고서 - index.html</title>\n  <style>\n    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; color: #333; line-height: 1.6; }\n    .container { max-width: 960px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }\n    h1 { color: #1a1a2e; border-bottom: 3px solid #e94560; padding-bottom: 10px; }\n    h2 { color: #16213e; margin-top: 30px; }\n    h3 { color: #0f3460; }\n    table { width: 100%; border-collapse: collapse; margin: 15px 0; }\n    th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; vertical-align: top; }\n    th { background: #16213e; color: #fff; }\n    tr:nth-child(even) { background: #f9f9f9; }\n    .severity-critical { background: #ff4444; color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }\n    .severity-major { background: #ff8800; color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }\n    .severity-minor { background: #ffcc00; color: #333; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }\n    .severity-info { background: #4488ff; color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }\n    .summary-box { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }\n    .summary-item { flex: 1; min-width: 140px; padding: 15px; border-radius: 8px; text-align: center; }\n    .summary-item.critical { background: #ffe0e0; border: 2px solid #ff4444; }\n    .summary-item.major { background: #fff0d0; border: 2px solid #ff8800; }\n    .summary-item.minor { background: #fffde0; border: 2px solid #ffcc00; }\n    .summary-item.info { background: #e0edff; border: 2px solid #4488ff; }\n    .summary-item .count { font-size: 2em; font-weight: bold; }\n    .code-block { background: #f4f4f4; border: 1px solid #ddd; border-radius: 4px; padding: 10px; font-family: 'Consolas', monospace; font-size: 0.9em; overflow-x: auto; white-space: pre-wrap; }\n    .pass { color: #28a745; font-weight: bold; }\n    .fail { color: #dc3545; font-weight: bold; }\n    .meta { color: #666; font-size: 0.9em; }\n  </style>\n</head>\n<body>\n  <div class=\"container\">\n    <h1>시맨틱 HTML 및 접근성 검토 보고서</h1>\n    <p class=\"meta\">대상 파일: <strong>index.html</strong> | 검토 기준: <strong>KWCAG 2.2</strong> | 검토일: 2026-03-11</p>\n\n    <h2>1. 요약 (Summary)</h2>\n    <div class=\"summary-box\">\n      <div class=\"summary-item critical\"><div class=\"count\">3</div>심각 (Critical)</div>\n      <div class=\"summary-item major\"><div class=\"count\">4</div>주요 (Major)</div>\n      <div class=\"summary-item minor\"><div class=\"count\">3</div>경미 (Minor)</div>\n      <div class=\"summary-item info\"><div class=\"count\">2</div>정보 (Info)</div>\n    </div>\n    <p>총 <strong>12건</strong>의 이슈가 발견되었습니다. 이 중 심각 3건, 주요 4건은 즉시 개선이 필요합니다.</p>\n\n    <h2>2. 시맨틱 HTML 구조 검토</h2>\n\n    <table>\n      <thead>\n        <tr><th>#</th><th>이슈</th><th>심각도</th><th>라인</th><th>설명</th><th>KWCAG 2.2 관련 항목</th><th>개선 방안</th></tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>S-01</td>\n          <td>시맨틱 랜드마크 요소 미사용</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>20-45</td>\n          <td>페이지에 <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;footer&gt;</code> 등의 시맨틱 랜드마크 요소가 전혀 사용되지 않았습니다. 모든 콘텐츠가 <code>&lt;body&gt;</code> 직접 하위에 나열되어 있어 스크린 리더 사용자가 페이지 구조를 파악하기 어렵습니다.</td>\n          <td>4.1.2 (마크업 오류 방지), 2.4.1 (반복 영역 건너뛰기)</td>\n          <td>콘텐츠를 <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;footer&gt;</code> 등으로 구조화하세요. 주요 콘텐츠를 <code>&lt;main&gt;</code> 태그로 감싸세요.</td>\n        </tr>\n        <tr>\n          <td>S-02</td>\n          <td>네비게이션 영역 미구분</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>24</td>\n          <td>\"About Us\" 링크가 <code>&lt;nav&gt;</code> 요소 없이 단독으로 존재합니다. 네비게이션 링크는 <code>&lt;nav&gt;</code> 랜드마크로 감싸야 보조 기술에서 탐색 영역으로 인식합니다.</td>\n          <td>2.4.1 (반복 영역 건너뛰기), 1.3.1 (정보와 관계)</td>\n          <td><code>&lt;nav aria-label=\"메인 네비게이션\"&gt;</code> 요소로 링크를 감싸세요.</td>\n        </tr>\n        <tr>\n          <td>S-03</td>\n          <td>콘텐츠 섹션 미구분</td>\n          <td><span class=\"severity-minor\">경미</span></td>\n          <td>21-35</td>\n          <td>제목(<code>&lt;h1&gt;</code>), 이미지, 텍스트 등 다양한 콘텐츠가 섹션 구분 없이 나열되어 있습니다. <code>&lt;section&gt;</code> 또는 <code>&lt;article&gt;</code> 태그를 사용하여 논리적 단위로 구분하면 접근성이 향상됩니다.</td>\n          <td>1.3.1 (정보와 관계)</td>\n          <td>관련 콘텐츠를 <code>&lt;section&gt;</code>으로 그룹화하고 적절한 헤딩을 부여하세요.</td>\n        </tr>\n        <tr>\n          <td>S-04</td>\n          <td>문서 언어와 실제 콘텐츠 불일치 가능성</td>\n          <td><span class=\"severity-info\">정보</span></td>\n          <td>2</td>\n          <td><code>&lt;html lang=\"en\"&gt;</code>으로 영어 문서로 선언되어 있습니다. 한국어 콘텐츠가 포함될 경우 <code>lang=\"ko\"</code>로 변경하거나 해당 요소에 <code>lang</code> 속성을 지정해야 합니다.</td>\n          <td>3.1.1 (기본 언어 표시)</td>\n          <td>실제 콘텐츠 언어에 맞게 <code>lang</code> 속성을 설정하세요.</td>\n        </tr>\n      </tbody>\n    </table>\n\n    <h2>3. 접근성 (Accessibility) 검토</h2>\n\n    <table>\n      <thead>\n        <tr><th>#</th><th>이슈</th><th>심각도</th><th>라인</th><th>설명</th><th>KWCAG 2.2 관련 항목</th><th>개선 방안</th></tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>A-01</td>\n          <td>이미지 alt 속성 누락</td>\n          <td><span class=\"severity-critical\">심각</span></td>\n          <td>30</td>\n          <td><code>&lt;img src=\"/public/logo.png\"&gt;</code>에 <code>alt</code> 속성이 없습니다. 스크린 리더 사용자가 이미지의 내용을 전혀 알 수 없으며, KWCAG 2.2의 필수 요구사항을 위반합니다.</td>\n          <td>1.1.1 (적절한 대체 텍스트 제공)</td>\n          <td><code>alt=\"회사 로고\"</code> 등 이미지 목적을 설명하는 대체 텍스트를 추가하세요. 장식용 이미지라면 <code>alt=\"\"</code>와 <code>role=\"presentation\"</code>을 사용하세요.</td>\n        </tr>\n        <tr>\n          <td>A-02</td>\n          <td>건너뛰기 링크(Skip Navigation) 미제공</td>\n          <td><span class=\"severity-critical\">심각</span></td>\n          <td>20</td>\n          <td>페이지 상단에 키보드 사용자가 반복 영역을 건너뛰고 주요 콘텐츠로 이동할 수 있는 건너뛰기 링크가 없습니다.</td>\n          <td>2.4.1 (반복 영역 건너뛰기)</td>\n          <td><code>&lt;body&gt;</code> 바로 뒤에 <code>&lt;a href=\"#main-content\" class=\"skip-link\"&gt;본문 바로가기&lt;/a&gt;</code>를 추가하고, 주요 콘텐츠 영역에 <code>id=\"main-content\"</code>를 부여하세요.</td>\n        </tr>\n        <tr>\n          <td>A-03</td>\n          <td>링크 텍스트 맥락 부족</td>\n          <td><span class=\"severity-minor\">경미</span></td>\n          <td>35</td>\n          <td><code>&lt;a href=\"...\"&gt;latest deals&lt;/a&gt;</code> 링크의 텍스트가 주변 문맥 없이는 목적을 명확히 알기 어려울 수 있습니다. 독립적으로 읽었을 때 링크의 목적을 이해할 수 있어야 합니다.</td>\n          <td>2.4.4 (링크 텍스트)</td>\n          <td>링크 텍스트를 더 구체적으로 변경하거나, <code>aria-label</code>을 활용하여 링크 목적을 명확히 하세요.</td>\n        </tr>\n        <tr>\n          <td>A-04</td>\n          <td>innerHTML을 통한 XSS 취약점 및 접근성 문제</td>\n          <td><span class=\"severity-critical\">심각</span></td>\n          <td>37-44</td>\n          <td><code>innerHTML</code>으로 사용자 입력(<code>location.hash</code>)을 직접 삽입하고 있어 XSS 공격에 취약합니다. 동적으로 삽입된 콘텐츠가 스크린 리더에 적절히 전달되지 않을 수 있습니다.</td>\n          <td>4.1.2 (마크업 오류 방지)</td>\n          <td><code>textContent</code>를 사용하고, 동적 콘텐츠 변경 시 <code>aria-live=\"polite\"</code> 영역을 활용하여 보조 기술에 변경 사항을 알리세요.</td>\n        </tr>\n        <tr>\n          <td>A-05</td>\n          <td>meta description 누락</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>7</td>\n          <td><code>&lt;meta name=\"description\"&gt;</code>이 없어 검색 엔진과 보조 기술이 페이지 내용을 요약할 수 없습니다.</td>\n          <td>-</td>\n          <td><code>&lt;meta name=\"description\" content=\"페이지 설명\"&gt;</code>을 <code>&lt;head&gt;</code>에 추가하세요.</td>\n        </tr>\n        <tr>\n          <td>A-06</td>\n          <td>이미지 width/height 누락 (CLS 위험)</td>\n          <td><span class=\"severity-minor\">경미</span></td>\n          <td>33</td>\n          <td><code>&lt;img src=\"/public/promo.png\"&gt;</code>에 <code>width</code>와 <code>height</code> 속성이 없어 레이아웃 시프트(CLS)가 발생할 수 있습니다. 시각적 불안정은 인지 장애 사용자에게 혼란을 줄 수 있습니다.</td>\n          <td>-</td>\n          <td>이미지에 <code>width</code>와 <code>height</code> 속성을 명시하거나 CSS <code>aspect-ratio</code>를 사용하세요.</td>\n        </tr>\n        <tr>\n          <td>A-07</td>\n          <td>font-display 미설정</td>\n          <td><span class=\"severity-major\">주요</span></td>\n          <td>13-17</td>\n          <td><code>@font-face</code>에 <code>font-display: swap</code>이 설정되지 않아 폰트 로딩 중 텍스트가 보이지 않을 수 있습니다(FOIT). 저시력 사용자나 저속 네트워크 환경에서 콘텐츠 접근이 지연됩니다.</td>\n          <td>-</td>\n          <td><code>font-display: swap;</code>을 <code>@font-face</code> 규칙에 추가하세요.</td>\n        </tr>\n        <tr>\n          <td>A-08</td>\n          <td>페이지 제목 구체성 부족</td>\n          <td><span class=\"severity-info\">정보</span></td>\n          <td>6</td>\n          <td>\"Sample Page\"라는 제목은 페이지의 목적을 구체적으로 설명하지 못합니다. 접근성 측면에서 페이지 제목은 내용을 명확히 나타내야 합니다.</td>\n          <td>2.4.2 (제목 제공)</td>\n          <td>페이지의 실제 목적을 반영하는 구체적인 제목을 사용하세요.</td>\n        </tr>\n      </tbody>\n    </table>\n\n    <h2>4. 개선된 코드 예시</h2>\n    <div class=\"code-block\">&lt;!DOCTYPE html&gt;\n&lt;html lang=\"ko\"&gt;\n&lt;head&gt;\n  &lt;meta charset=\"UTF-8\" /&gt;\n  &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /&gt;\n  &lt;title&gt;회사명 - 메인 페이지&lt;/title&gt;\n  &lt;meta name=\"description\" content=\"회사의 주요 서비스와 최신 프로모션을 확인하세요.\" /&gt;\n  &lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\" media=\"print\" onload=\"this.media='all'\" /&gt;\n  &lt;style&gt;\n    @font-face {\n      font-family: \"CustomFont\";\n      src: url(\"/fonts/custom.woff2\") format(\"woff2\");\n      font-display: swap;\n    }\n    .skip-link { position: absolute; left: -9999px; }\n    .skip-link:focus { position: static; }\n  &lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;a href=\"#main-content\" class=\"skip-link\"&gt;본문 바로가기&lt;/a&gt;\n\n  &lt;header&gt;\n    &lt;h1&gt;Welcome to the Sample Page&lt;/h1&gt;\n    &lt;nav aria-label=\"메인 네비게이션\"&gt;\n      &lt;a href=\"https://example.com/about\"&gt;About Us&lt;/a&gt;\n    &lt;/nav&gt;\n  &lt;/header&gt;\n\n  &lt;main id=\"main-content\"&gt;\n    &lt;section aria-labelledby=\"hero-heading\"&gt;\n      &lt;h2 id=\"hero-heading\" class=\"visually-hidden\"&gt;메인 배너&lt;/h2&gt;\n      &lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" /&gt;\n      &lt;img src=\"/public/logo.png\" alt=\"회사 로고\" width=\"120\" height=\"40\" /&gt;\n      &lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"600\" height=\"300\" /&gt;\n    &lt;/section&gt;\n\n    &lt;section&gt;\n      &lt;p&gt;Check out our &lt;a href=\"https://example.com/deals\"&gt;최신 할인 프로모션 보기&lt;/a&gt;.&lt;/p&gt;\n      &lt;div id=\"label\" aria-live=\"polite\"&gt;&lt;/div&gt;\n    &lt;/section&gt;\n  &lt;/main&gt;\n\n  &lt;footer&gt;\n    &lt;p&gt;&amp;copy; 2026 Company Name&lt;/p&gt;\n  &lt;/footer&gt;\n\n  &lt;script&gt;\n    var label = document.getElementById(\"label\");\n    var userInput = location.hash.slice(1);\n    if (label) {\n      label.textContent = \"Hello, \" + decodeURIComponent(userInput);\n    }\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</div>\n\n    <h2>5. 검토 결론</h2>\n    <p>index.html 페이지는 기본적인 HTML 문서 구조(<code>&lt;!DOCTYPE html&gt;</code>, <code>lang</code> 속성, <code>charset</code>)는 갖추고 있으나, <strong>시맨틱 랜드마크 요소가 전혀 사용되지 않아</strong> 보조 기술 사용자의 페이지 탐색에 심각한 제한이 있습니다.</p>\n    <p>가장 시급한 개선 사항:</p>\n    <ul>\n      <li><strong>alt 속성 누락</strong> (라인 30) - KWCAG 2.2 1.1.1 위반</li>\n      <li><strong>건너뛰기 링크 미제공</strong> - KWCAG 2.2 2.4.1 위반</li>\n      <li><strong>innerHTML XSS 취약점</strong> (라인 42) - 보안 및 접근성 동시 위험</li>\n      <li><strong>시맨틱 랜드마크 요소 도입</strong> - header, nav, main, footer 구조화 필요</li>\n    </ul>\n  </div>\n</body>\n</html>"}]}, "benchmark": {"metadata": {"skill_name": "accessibility", "timestamp": "2026-03-13", "evals_run": ["kwcag-full-review", "card-component-a11y", "semantic-html-review"], "runs_per_configuration": 1, "model": "sonnet", "notes": "iteration-2: model changed from opus to sonnet"}, "run_summary": {"with_skill": {"pass_rate": {"mean": 0.957, "stddev": 0.047}, "time_seconds": {"mean": 349.3, "stddev": 57.0}, "tokens": {"mean": 67909, "stddev": 5580}}, "without_skill": {"pass_rate": {"mean": 0.557, "stddev": 0.042}, "time_seconds": {"mean": 203.3, "stddev": 100.2}, "tokens": {"mean": 26704, "stddev": 9659}}, "delta": {"pass_rate": "+40.0%", "time_seconds": "+146.0", "tokens": "+41205"}}, "runs": [{"eval_id": 1, "eval_name": "kwcag-full-review", "configuration": "with_skill", "run_number": 1, "result": {"pass_rate": 0.9, "passed": 9, "total": 10, "time_seconds": 429.4, "tokens": 75760}, "expectations": [{"text": "All 33 KWCAG2.2 items are evaluated in the report", "passed": true, "evidence": "CSV contains rows numbered 1-33, all with result and verdict method"}, {"text": "Semantic HTML review section is included in the report", "passed": true, "evidence": "HTML report contains 시맨틱 HTML 검토 section with 7 items"}, {"text": "Found issues include filename:line references", "passed": true, "evidence": "page.tsx:83, StatsCard.tsx:10-21, Navbar.tsx:59-72 etc."}, {"text": "report.html file is generated", "passed": true, "evidence": "File exists (512 lines)"}, {"text": "report.csv file is generated", "passed": true, "evidence": "File exists (41 lines)"}, {"text": "Detected missing alt attribute on img       const hasPrevious = Object.keys(EMBEDDED_DATA.previous_feedback || {}).length > 0
        || Object.keys(EMBEDDED_DATA.previous_outputs || {}).length > 0;
      if (!hasPrevious) {
        try {
          const resp = await fetch("/api/feedback");
          const data = await resp.json();
          if (data.reviews) {
            for (const r of data.reviews) feedbackMap[r.run_id] = r.feedback;
          }
        } catch { /* first run, no feedback yet */ }
      }

      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      showRun(0);

      // Wire up feedback auto-save
      const textarea = document.getElementById("feedback");
      let saveTimeout = null;
      textarea.addEventListener("input", () => {
        clearTimeout(saveTimeout);
        document.getElementById("feedback-status").textContent = "";
        saveTimeout = setTimeout(() => saveCurrentFeedback(), 800);
      });
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < EMBEDDED_DATA.runs.length) {
        saveCurrentFeedback();
        showRun(newIndex);
      }
    }

    function updateNavButtons() {
      document.getElementById("prev-btn").disabled = currentIndex === 0;
      document.getElementById("next-btn").disabled =
        currentIndex === EMBEDDED_DATA.runs.length - 1;
    }

    // ---- Show a run ----
    function showRun(index) {
      currentIndex = index;
      const run = EMBEDDED_DATA.runs[index];

      // Progress
      document.getElementById("progress").textContent =
        `${index + 1} of ${EMBEDDED_DATA.runs.length}`;

      // Prompt
      document.getElementById("prompt-text").textContent = run.prompt;

      // Config badge
      const badge = document.getElementById("config-badge");
      const configMatch = run.id.match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (configMatch) {
        const config = configMatch[1];
        const isBaseline = config === "without_skill" || config === "old_skill";
        badge.textContent = config.replace(/_/g, " ");
        badge.className = "config-badge " + (isBaseline ? "config-baseline" : "config-primary");
        badge.style.display = "inline-block";
      } else {
        badge.style.display = "none";
      }

      // Outputs
      renderOutputs(run);

      // Previous outputs
      renderPrevOutputs(run);

      // Grades
      renderGrades(run);

      // Previous feedback
      const prevFb = (EMBEDDED_DATA.previous_feedback || {})[run.id];
      const prevEl = document.getElementById("prev-feedback");
      if (prevFb) {
        document.getElementById("prev-feedback-text").textContent = prevFb;
        prevEl.style.display = "block";
      } else {
        prevEl.style.display = "none";
      }

      // Feedback
      document.getElementById("feedback").value = feedbackMap[run.id] || "";
      document.getElementById("feedback-status").textContent = "";

      updateNavButtons();

      // Track visited runs and promote done button when all visited
      visitedRuns.add(index);
      const doneBtn = document.getElementById("done-btn");
      if (visitedRuns.size >= EMBEDDED_DATA.runs.length) {
        doneBtn.classList.add("ready");
      }

      // Scroll main content to top
      document.querySelector(".main").scrollTop = 0;
    }

    // ---- Render outputs ----
    function renderOutputs(run) {
      const container = document.getElementById("outputs-body");
      container.innerHTML = "";

      const outputs = run.outputs || [];
      if (outputs.length === 0) {
        container.innerHTML = '<div class="empty-state">출력 파일 없음</div>';
        return;
      }

      for (const file of outputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        // Always show file header with download link
        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const content = document.createElement("div");
        content.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          content.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          content.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          content.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(content, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          content.appendChild(a);
        } else if (file.type === "error") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          pre.style.color = "var(--red)";
          content.appendChild(pre);
        }

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

    // ---- Grades ----
    function renderGrades(run) {
      const section = document.getElementById("grades-section");
      const content = document.getElementById("grades-content");

      if (!run.grading) {
        section.style.display = "none";
        return;
      }

      const grading = run.grading;
      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("grades-arrow").classList.remove("open");

      const summary = grading.summary || {};
      const expectations = grading.expectations || [];

      let html = '<div style="padding: 1rem;">';

      // Summary line
      const passRate = summary.pass_rate != null
        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.total || 0) + '개 중 ' + (summary.passed || 0) + '개 통과, ' + (summary.failed || 0) + '개 실패</span>';
      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';

      html += '</div>';
      content.innerHTML = html;
    }

    function toggleGrades() {
      const content = document.getElementById("grades-content");
      const arrow = document.getElementById("grades-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Previous outputs (collapsible) ----
    function renderPrevOutputs(run) {
      const section = document.getElementById("prev-outputs-section");
      const content = document.getElementById("prev-outputs-content");
      const prevOutputs = (EMBEDDED_DATA.previous_outputs || {})[run.id];

      if (!prevOutputs || prevOutputs.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("prev-outputs-arrow").classList.remove("open");

      // Render the files into the content area
      content.innerHTML = "";
      const wrapper = document.createElement("div");
      wrapper.style.padding = "1rem";

      for (const file of prevOutputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const fc = document.createElement("div");
        fc.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          fc.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          fc.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          fc.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(fc, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          fc.appendChild(a);
        }

        fileDiv.appendChild(fc);
        wrapper.appendChild(fileDiv);
      }

      content.appendChild(wrapper);
    }

    function togglePrevOutputs() {
      const content = document.getElementById("prev-outputs-content");
      const arrow = document.getElementById("prev-outputs-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Feedback (saved to server -> feedback.json) ----
    function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;

      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // Build reviews array from map
      const reviews = [];
      for (const [run_id, feedback] of Object.entries(feedbackMap)) {
        if (feedback.trim()) {
          reviews.push({ run_id, feedback, timestamp: new Date().toISOString() });
        }
      }

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        document.getElementById("feedback-status").textContent = "저장됨";
      }).catch(() => {
        // Static mode or server unavailable — no-op on auto-save,
        // feedback will be downloaded on final submit
        document.getElementById("feedback-status").textContent = "제출 시 다운로드됩니다";
      });
    }

    // ---- Done ----
    function showDoneDialog() {
      // Save current textarea to feedbackMap (but don't POST yet)
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;
      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // POST once with status: complete — include ALL runs so the model
      // can distinguish "no feedback" (looks good) from "not reviewed"
      const reviews = [];
      const ts = new Date().toISOString();
      for (const r of EMBEDDED_DATA.runs) {
        reviews.push({ run_id: r.id, feedback: feedbackMap[r.id] || "", timestamp: ts });
      }
      const payload = JSON.stringify({ reviews, status: "complete" }, null, 2);
      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
      }).then(() => {
        document.getElementById("done-overlay").classList.add("visible");
      }).catch(() => {
        // Server not available (static mode) — download as file
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "feedback.json";
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("done-overlay").classList.add("visible");
      });
    }

    function closeDoneDialog() {
      // Reset status back to in_progress
      saveCurrentFeedback();
      document.getElementById("done-overlay").classList.remove("visible");
    }

    // ---- Toast ----
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("visible");
      setTimeout(() => toast.classList.remove("visible"), 2000);
    }

    // ---- Keyboard nav ----
    document.addEventListener("keydown", (e) => {
      // Don't capture when typing in textarea
      if (e.target.tagName === "TEXTAREA") return;

      if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        navigate(-1);
      } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        navigate(1);
      }
    });

    // ---- Util ----
    function getDownloadUri(file) {
      if (file.data_uri) return file.data_uri;
      if (file.data_b64) return "data:application/octet-stream;base64," + file.data_b64;
      if (file.type === "text") return "data:text/plain;charset=utf-8," + encodeURIComponent(file.content);
      return "#";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- View switching ----
    function switchView(view) {
      document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`[onclick="switchView('${view}')"]`).classList.add("active");
      document.getElementById("panel-" + view).classList.add("active");
    }

    // ---- Benchmark rendering ----
    function renderBenchmark() {
      const data = EMBEDDED_DATA.benchmark;
      if (!data) return;

      // Show the tabs
      document.getElementById("view-tabs").style.display = "flex";

      const container = document.getElementById("benchmark-content");
      const summary = data.run_summary || {};
      const metadata = data.metadata || {};
      const notes = data.notes || [];

      let html = "";

      // Header
      html += "<h2 style='font-family: Poppins, sans-serif; margin-bottom: 0.5rem;'>벤치마크 결과</h2>";
      html += "<p style='color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.25rem;'>";
      if (metadata.skill_name) html += "<strong>" + escapeHtml(metadata.skill_name) + "</strong> &mdash; ";
      if (metadata.timestamp) html += metadata.timestamp + " &mdash; ";
      if (metadata.evals_run) html += "평가: " + metadata.evals_run.join(", ") + " &mdash; ";
      html += "설정당 " + (metadata.runs_per_configuration || "?") + "회 실행";
      html += "</p>";

      // Summary table
      html += '<table class="benchmark-table">';

      function fmtStat(stat, pct) {
        if (!stat) return "—";
        const suffix = pct ? "%" : "";
        const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
        const s = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
        return m + suffix + " ± " + s + suffix;
      }

      function deltaClass(val) {
        if (!val) return "";
        const n = parseFloat(val);
        if (n > 0) return "benchmark-delta-positive";
        if (n < 0) return "benchmark-delta-negative";
        return "";
      }

      // Discover config names dynamically (everything except "delta")
      const configs = Object.keys(summary).filter(k => k !== "delta");
      const configA = configs[0] || "config_a";
      const configB = configs[1] || "config_b";
      const labelA = configA.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const labelB = configB.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const a = summary[configA] || {};
      const b = summary[configB] || {};
      const delta = summary.delta || {};

      html += "<thead><tr><th>지표</th><th>" + escapeHtml(labelA) + "</th><th>" + escapeHtml(labelB) + "</th><th>차이</th></tr></thead>";
      html += "<tbody>";

      html += "<tr><td><strong>통과율</strong></td>";
      html += "<td>" + fmtStat(a.pass_rate, true) + "</td>";
      html += "<td>" + fmtStat(b.pass_rate, true) + "</td>";
      html += '<td class="' + deltaClass(delta.pass_rate) + '">' + (delta.pass_rate || "—") + "</td></tr>";

      // Time (only show row if data exists)
      if (a.time_seconds || b.time_seconds) {
        html += "<tr><td><strong>소요 시간 (초)</strong></td>";
        html += "<td>" + fmtStat(a.time_seconds, false) + "</td>";
        html += "<td>" + fmtStat(b.time_seconds, false) + "</td>";
        html += '<td class="' + deltaClass(delta.time_seconds) + '">' + (delta.time_seconds ? delta.time_seconds + "s" : "—") + "</td></tr>";
      }

      // Tokens (only show row if data exists)
      if (a.tokens || b.tokens) {
        html += "<tr><td><strong>토큰</strong></td>";
        html += "<td>" + fmtStat(a.tokens, false) + "</td>";
        html += "<td>" + fmtStat(b.tokens, false) + "</td>";
        html += '<td class="' + deltaClass(delta.tokens) + '">' + (delta.tokens || "—") + "</td></tr>";
      }

      html += "</tbody></table>";

      // Per-eval breakdown (if runs data available)
      const runs = data.runs || [];
      if (runs.length > 0) {
        const evalIds = [...new Set(runs.map(r => r.eval_id))].sort((a, b) => a - b);

        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>평가별 상세 내역</h3>";

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "평가 " + evalId;

          html += "<h4 style='font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);'>" + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>설정</th><th>실행</th><th>통과율</th>";
          if (hasTime) html += "<th>소요 시간 (초)</th>";
          if (hasErrors) html += "<th>실행 중 오류</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          // Group by config and render with average rows
          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + (r.passed || 0) + "/" + (r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? r.time_seconds.toFixed(1) : "—") + "</td>";
              if (hasErrors) html += "<td>" + (r.errors || 0) + "</td>";
              html += "</tr>";
            }

            // Average row
            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>평균</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1) : "—") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail for this eval
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            // Collect all unique assertion texts across all configs
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>검증 항목</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "— ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>분석 노트</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Start ----
    init();
    renderBenchmark();
  </script>
</body>
</html>
