<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----

본 언어 표시 / 2.4.2 페이지 제목 — 레이아웃 수준,3. 이해의 용이성,만족,수동,\"검토 대상 파일에서 lang 및 title 설정 없음. Next.js root layout에서 설정 예정으로 추정(만족). 실제 layout.tsx 확인 필요.\",\"루트 layout.tsx에서 <html lang=\"\"ko\"\"> 및 metadata.title 설정 확인.\"\n12,4.1.2 이름·역할·값 제공 — 로그아웃 버튼,2. 운용의 용이성,만족,자동,\"Navbar.tsx 48~54번째 줄: 로그아웃 <button> 요소에 텍스트 레이블 \"\"로그아웃\"\"이 있고 적절한 button 요소 사용. 접근성 요구사항 충족.\",현재 구현 유지.\n13,2.4.4 링크 목적 — 전체 할 일 목록 보기 링크,2. 운용의 용이성,만족,자동,\"dashboard/page.tsx 88~95번째 줄: \"\"전체 할 일 목록 보기 →\"\" 링크 텍스트만으로 목적지를 명확히 설명. KWCAG 2.4.4 충족.\",\"선택적으로 화살표(→) 문자에 aria-hidden=\"\"true\"\" 추가 가능.\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>KWCAG 2.2 접근성 검토 보고서</title>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-size: 14px; line-height: 1.6; color: #1a1a1a; background: #f5f7fa; padding: 32px 16px; }\n    .container { max-width: 1100px; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); overflow: hidden; }\n    .report-header { background: linear-gradient(135deg, #1a56db 0%, #1e40af 100%); color: #fff; padding: 36px 40px 28px; }\n    .report-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }\n    .report-header .subtitle { font-size: 13px; opacity: 0.85; }\n    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 20px; }\n    .meta-item { background: rgba(255,255,255,0.15); border-radius: 6px; padding: 10px 14px; }\n    .meta-item .meta-label { font-size: 11px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.5px; }\n    .meta-item .meta-value { font-size: 14px; font-weight: 600; margin-top: 2px; }\n    .summary-section, .scope-section, .findings-section { padding: 28px 40px; border-bottom: 1px solid #e5e7eb; }\n    .summary-section h2, .scope-section h2, .findings-section h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }\n    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }\n    .summary-card { border-radius: 8px; padding: 16px; text-align: center; }\n    .summary-card .count { font-size: 28px; font-weight: 700; }\n    .summary-card .label { font-size: 12px; margin-top: 4px; }\n    .card-fail { background: #fef2f2; color: #991b1b; }\n    .card-warn { background: #fffbeb; color: #92400e; }\n    .card-pass { background: #f0fdf4; color: #166534; }\n    .card-total { background: #eff6ff; color: #1e40af; }\n    .file-list { list-style: none; }\n    .file-list li { padding: 6px 0; border-bottom: 1px dashed #e5e7eb; font-size: 13px; color: #374151; }\n    .file-list li:last-child { border-bottom: none; }\n    .finding-card { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 18px; overflow: hidden; }\n    .finding-card-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }\n    .finding-num { font-size: 12px; font-weight: 700; color: #6b7280; min-width: 36px; }\n    .finding-title { font-size: 14px; font-weight: 600; color: #111827; flex: 1; }\n    .badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; }\n    .badge-fail { background: #fee2e2; color: #b91c1c; }\n    .badge-pass { background: #dcfce7; color: #15803d; }\n    .badge-warn { background: #fef9c3; color: #a16207; }\n    .badge-na { background: #f3f4f6; color: #6b7280; }\n    .badge-auto { background: #e0f2fe; color: #0369a1; }\n    .badge-manual { background: #faf5ff; color: #7e22ce; }\n    .finding-card-body { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n    .finding-field label { display: block; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }\n    .finding-field p { font-size: 13px; color: #374151; }\n    .finding-field.full { grid-column: 1 / -1; }\n    .code-block { background: #1e293b; color: #e2e8f0; border-radius: 6px; padding: 10px 14px; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5; overflow-x: auto; white-space: pre; margin-top: 6px; }\n    .principle-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #dbeafe; color: #1d4ed8; }\n    .report-footer { padding: 20px 40px; background: #f9fafb; border-top: 1px solid #e5e7eb; font-size: 12px; color: #9ca3af; text-align: center; }\n    .principle-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }\n    .principle-table th { background: #f3f4f6; padding: 8px 12px; text-align: left; border: 1px solid #e5e7eb; font-weight: 700; color: #374151; }\n    .principle-table td { padding: 8px 12px; border: 1px solid #e5e7eb; vertical-align: top; }\n    .principle-table tr:hover { background: #f9fafb; }\n    code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px; font-family: 'Consolas', monospace; font-size: 12px; }\n  </style>\n</head>\n<body>\n<div class=\"container\">\n\n  <div class=\"report-header\">\n    <h1>KWCAG 2.2 웹 접근성 검토 보고서</h1>\n    <p class=\"subtitle\">한국형 웹 콘텐츠 접근성 지침 2.2 (KWCAG 2.2) 기반 정적 코드 분석 결과</p>\n    <div class=\"meta-grid\">\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">검토일</div>\n        <div class=\"meta-value\">2026-03-13</div>\n      </div>\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">적용 기준</div>\n        <div class=\"meta-value\">KWCAG 2.2</div>\n      </div>\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">검토 방식</div>\n        <div class=\"meta-value\">코드 정적 분석</div>\n      </div>\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">기술 스택</div>\n        <div class=\"meta-value\">TypeScript / React (Next.js)</div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"summary-section\">\n    <h2>검토 요약</h2>\n    <div class=\"summary-cards\">\n      <div class=\"summary-card card-total\">\n        <div class=\"count\">13</div>\n        <div class=\"label\">전체 검토 항목</div>\n      </div>\n      <div class=\"summary-card card-fail\">\n        <div class=\"count\">7</div>\n        <div class=\"label\">불만족 (Fail)</div>\n      </div>\n      <div class=\"summary-card card-warn\">\n        <div class=\"count\">2</div>\n        <div class=\"label\">주의 (Warning)</div>\n      </div>\n      <div class=\"summary-card card-pass\">\n        <div class=\"count\">4</div>\n        <div class=\"label\">만족 (Pass)</div>\n      </div>\n    </div>\n    <table class=\"principle-table\">\n      <thead>\n        <tr>\n          <th>원칙</th>\n          <th>검토 항목 수</th>\n          <th>불만족</th>\n          <th>주의</th>\n          <th>만족</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>1. 인식의 용이성 (Perceivable)</td>\n          <td>5</td>\n          <td style=\"color:#b91c1c;font-weight:700;\">3</td>\n          <td style=\"color:#a16207;font-weight:700;\">1</td>\n          <td style=\"color:#15803d;font-weight:700;\">1</td>\n        </tr>\n        <tr>\n          <td>2. 운용의 용이성 (Operable)</td>\n          <td>4</td>\n          <td style=\"color:#b91c1c;font-weight:700;\">3</td>\n          <td style=\"color:#a16207;font-weight:700;\">0</td>\n          <td style=\"color:#15803d;font-weight:700;\">1</td>\n        </tr>\n        <tr>\n          <td>3. 이해의 용이성 (Understandable)</td>\n          <td>2</td>\n          <td style=\"color:#b91c1c;font-weight:700;\">0</td>\n          <td style=\"color:#a16207;font-weight:700;\">1</td>\n          <td style=\"color:#15803d;font-weight:700;\">1</td>\n        </tr>\n        <tr>\n          <td>4. 견고성 (Robust)</td>\n          <td>2</td>\n          <td style=\"color:#b91c1c;font-weight:700;\">1</td>\n          <td style=\"color:#a16207;font-weight:700;\">0</td>\n          <td style=\"color:#15803d;font-weight:700;\">1</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <div class=\"scope-section\">\n    <h2>검토 대상 파일</h2>\n    <ul class=\"file-list\">\n      <li>features/next-app/app/dashboard/page.tsx &mdash; 대시보드 페이지 컴포넌트</li>\n      <li>features/next-app/components/StatsCard.tsx &mdash; 통계 카드 컴포넌트</li>\n      <li>features/next-app/components/Navbar.tsx &mdash; 내비게이션 바 및 브레드크럼 컴포넌트</li>\n    </ul>\n  </div>\n\n  <div class=\"findings-section\">\n    <h2>세부 검토 결과</h2>\n\n    <!-- #1 -->\n    <div class=\"finding-card\">\n      <div class=\"finding-card-header\">\n        <span class=\"finding-num\">#1</span>\n        <span class=\"finding-title\">이미지 대체 텍스트(alt) 누락</span>\n        <span class=\"badge badge-fail\">불만족</span>\n        <span class=\"badge badge-auto\">자동 판정</span>\n        <span class=\"principle-tag\">1. 인식의 용이성</span>\n      </div>\n      <div class=\"finding-card-body\">\n        <div class=\"finding-field\">\n          <label>KWCAG 2.2 항목</label>\n          <p>1.1.1 적절한 대체 텍스트 제공</p>\n        </div>\n        <div class=\"finding-field\">\n          <label>위치</label>\n          <p>dashboard/page.tsx — 83번째 줄</p>\n        </div>\n        <div class=\"finding-field full\">\n          <label>발견된 문제</label>\n          <p><code>&lt;img src=\"/promo-banner.png\"&gt;</code> 요소에 <code>alt</code> 속성이 완전히 누락되어 있습니다. 스크린리더는 파일명을 읽거나 이미지를 무시해 사용자가 콘텐츠 목적을 파악할 수 없습니다.</p>\n          <div class=\"code-block\">&lt;img src=\"/promo-banner.png\" className=\"mt-6 w-full\" /&gt;\n{/* alt 속성 없음 → KWCAG 1.1.1 위반 */}</div>\n        </div>\n        <div class=\"finding-field full\">\n          <label>수정 가이드</label>\n          <p>의미 있는 이미지에는 내용을 설명하는 alt 텍스트를 제공하고, 장식용 이미지에는 <code>alt=\"\"</code>를 명시하십시오.</p>\n          <div class=\"code-block\">{/* 의미 있는 이미지 */}\n&lt;img src=\"/promo-banner.png\" alt=\"신규 기능 홍보 배너\" className=\"mt-6 w-full\" /&gt;\n\n{/* 순수 장식용 이미지 */}\n&lt;img src=\"/promo-banner.png\" alt=\"\" role=\"presentation\" className=\"mt-6 w-full\" /&gt;</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- #2 -->\n    <div class=\"finding-card\">\n      <div class=\"finding-card-header\">\n        <span class=\"finding-num\">#2</span>\n        <span class=\"finding-title\">아이콘 전용 버튼에 접근 가능한 이름 미제공</span>\n        <span class=\"badge badge-fail\">불만족</span>\n        <span class=\"badge badge-auto\">자동 판정</span>\n        <span class=\"principle-tag\">1. 인식의 용이성</span>\n      </div>\n      <div class=\"finding-card-body\">\n        <div class=\"finding-field\">\n          <label>KWCAG 2.2 항목</label>\n          <p>1.1.1 적절한 대체 텍스트 제공</p>\n        </div>\n        <div class=\"finding-field\">\n          <label>위치</label>\n          <p>dashboard/page.tsx — 59~65번째 줄</p>\n        </div>\n        <div class=\"finding-field full\">\n          <label>발견된 문제</label>\n          <p>새로고침·설정 버튼이 SVG 아이콘만으로 구성되며 <code>aria-label</code>도, SVG 내부 <code>&lt;title&gt;</code>도 없습니다. 스크린리더는 버튼 목적을 전혀 알릴 수 없습니다.</p>\n          <div class=\"code-block\">&lt;button data-testid=\"btn-refresh\"&gt;\n  &lt;svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\"&gt;\n    &lt;circle cx=\"8\" cy=\"8\" r=\"8\" /&gt;\n  &lt;/svg&gt;\n&lt;/button&gt;\n{/* aria-label, title 없음 → KWCAG 1.1.1 위반 */}</div>\n        </div>\n        <div class=\"finding-field full\">\n          <label>수정 가이드</label>\n          <p>각 버튼에 <code>aria-label</code>을 추가하고 SVG에 <code>aria-hidden=\"true\"</code>를 설정하십시오.</p>\n          <div class=\"code-block\">&lt;button aria-label=\"새로고침\" data-testid=\"btn-refresh\"&gt;\n  &lt;svg aria-hidden=\"true\" focusable=\"false\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\"&gt;\n    &lt;circle cx=\"8\" cy=\"8\" r=\"8\" /&gt;\n  &lt;/svg&gt;\n&lt;/button&gt;\n&lt;button aria-label=\"설정\" data-testid=\"btn-settings\"&gt;\n  &lt;svg aria-hidden=\"true\" focusable=\"false\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\"&gt;\n    &lt;rect width=\"16\" height=\"16\" /&gt;\n  &lt;/svg&gt;\n&lt;/button&gt;</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- #3 -->\n    <div class=\"finding-card\">\n      <div class=\"finding-card-header\">\n        <span class=\"finding-num\">#3</span>\n        <span class=\"finding-title\">활성 내비게이션 링크를 색상만으로 구분</span>\n        <span class=\"badge badge-fail\">불만족</span>\n        <span class=\"badge badge-manual\">수동 판정</span>\n        <span class=\"principle-tag\">1. 인식의 용이성</span>\n      </div>\n      <div class=\"finding-card-body\">\n        <div class=\"finding-field\">\n          <label>KWCAG 2.2 항목</label>\n          <p>1.4.1 색에 무관한 콘텐츠 인식</p>\n        </div>\n        <div class=\"finding-field\">\n          <label>위치</label>\n          <p>Navbar.tsx — 37~42번째 줄</p>\n        </div>\n        <div class=\"finding-field full\">\n          <label>발견된 문제</label>\n          <p>현재 페이지(활성) 내비게이션 링크는 파란색(<code>text-blue-600</code>)만으로 표시됩니다. 색각 이상 사용자는 현재 위치를 파악하기 어렵습니다. <code>aria-current=\"page\"</code>도 없어 스크린리더 사용자도 현재 페이지 구분이 불가능합니다.</p>\n          <div class=\"code-block\">className={`... ${\n  pathname === link.href\n    ? \"text-blue-600 dark:text-blue-400\"  // 색상만으로 구분 → KWCAG 1.4.1 위반\n    : \"text-zinc-600 hover:text-zinc-900 ...\"\n}`}</div>\n        </div>\n        <div class=\"finding-field full\">\n          <label>수정 가이드</label>\n          <p>색상 외에 밑줄, 굵기 등 비-색상 단서를 추가하고 <code>aria-current=\"page\"</code>를 부여하십시오.</p>\n          <div class=\"code-block\">&lt;Link\n  href={link.href}\n  aria-current={pathname === link.href ? \"page\" : undefined}\n  className={`text-sm font-medium transition-colors ${\n    pathname === link.href\n      ? \"text-blue-600 dark:text-blue-400 font-bold underline decoration-2\"\n      : \"text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-50\"\n  }`}\n&gt;</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- #4 -->\n    <div class=\"finding-card\">\n      <div class=\"finding-card-header\">\n        <span class=\"finding-num\">#4</span>\n        <span class=\"finding-title\">이미지 크기 미지정으로 레이아웃 이동(CLS) 발생</span>\n        <span class=\"badge badge-warn\">주의</span>\n        <span class=\"badge badge-manual\">수동 판정</span>\n        <span class=\"principle-tag\">1. 인식의 용이성</span>\n      </div>\n      <div class=\"finding-card-body\">\n        <div class=\"finding-field\">\n          <label>KWCAG 2.2 항목</label>\n          <p>1.3.4 콘텐츠의 재배치 (예기치 않은 이동 방지)</p>\n        </div>\n        <div class=\"finding-field\">\n          <label>위치</label>\n          <p>dashboard/page.tsx — 85번째 줄</p>\n        </div>\n        <div class=\"finding-field full\">\n          <label>발견된 문제</label>\n          <p><code>/footer-ad.png</code>에 <code>width</code>·<code>height</code>가 없어 로딩 중 레이아웃이 이동합니다. 인지 장애·저시력 사용자가 읽던 위치를 잃을 수 있습니다.</p>\n          <div class=\"code-block\">&lt;img src=\"/footer-ad.png\" alt=\"Advertisement\" className=\"mt-4\" /&gt;\n{/* width, height 미지정 → CLS 발생, KWCAG 1.3.4 관련 */}</div>\n        </div>\n        <div class=\"finding-field full\">\n          <label>수정 가이드</label>\n          <p>실제 이미지 비율에 맞는 <code>width</code>·<code>height</code>를 명시하거나 Next.js <code>Image</code> 컴포넌트를 사용하십시오.</p>\n          <div class=\"code-block\">import Image from \"next/image\";\n\n&lt;Image\n  src=\"/footer-ad.png\"\n  alt=\"광고 배너\"\n  width={1200}\n  height={200}\n  loading=\"lazy\"\n  className=\"mt-4\"\n/&gt;</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- #5 -->\n    <div class=\"finding-card\">\n      <div class=\"finding-card-header\">\n        <span class=\"finding-num\">#5</span>\n        <span class=\"finding-title\">div 요소에 onClick — 키보드 접근 불가</span>\n        <span class=\"badge badge-fail\">불만족</span>\n        <span class=\"badge badge-auto\">자동 판정</span>\n        <span class=\"principle-tag\">2. 운용의 용이성</span>\n      </div>\n      <div class=\"finding-card-body\">\n        <div class=\"finding-field\">\ }: ${value}`}</code> 추가 또는 button으로 교체 시 내부 텍스트가 이름으로 자동 사용됨.</p>\n</div>\n\n<div class=\"fix-fail\">\n  <p><strong>항목 32. 마크업 오류 방지 (A-32)</strong> — <code>StatsCard.tsx:13</code></p>\n  <p><strong>문제:</strong> <code>id=\"stat-card\"</code> 하드코딩으로 동일 페이지에서 여러 번 렌더링 시 동일 ID 중복 발생. Playwright 확인: DOM에 3개의 <code>id=\"stat-card\"</code> 존재.</p>\n  <p><strong>수정:</strong></p>\n  <pre>// 기존: id=\"stat-card\" (하드코딩)\n// 수정: id 속성 제거 (testId가 data-testid로 이미 제공됨)\n&lt;div\n  className=\"rounded-xl ...\"\n  data-testid={testId}\n  onClick={handleClick}\n&gt;</pre>\n</div>\n\n<div class=\"fix-fail\">\n  <p><strong>항목 33. 웹 애플리케이션 접근성 (A-33)</strong> — <code>StatsCard.tsx:10–21</code></p>\n  <p><strong>문제:</strong> 커스텀 인터랙티브 div에 WAI-ARIA role/속성 없음. 보조 기술이 이 요소를 일반 텍스트 블록으로 인식하여 상호작용 목적 파악 불가.</p>\n  <p><strong>수정:</strong> button 교체(권장) 또는 <code>role=\"button\"</code> + <code>aria-label={label}</code> 추가.</p>\n</div>\n\n<div class=\"fix-fail\">\n  <p><strong>시맨틱 HTML: 대화형 요소</strong> — <code>StatsCard.tsx:10</code></p>\n  <p><strong>문제:</strong> <code>onClick</code>이 있는 <code>&lt;div&gt;</code>는 시맨틱하지 않음. 클릭 가능한 요소는 <code>&lt;button&gt;</code> 또는 <code>&lt;a&gt;</code>를 사용해야 함.</p>\n  <p><strong>수정:</strong> <code>&lt;div onClick&gt;</code>를 <code>&lt;button type=\"button\"&gt;</code>으로 교체. 이 하나의 수정으로 A-10, A-23, A-33, 시맨틱 HTML 문제가 동시에 해결됨.</p>\n</div>\n\n<h3>권고 (⚠️)</h3>\n<p>없음</p>\n\n<hr style=\"margin-top: 40px;\">\n<p style=\"color: #999; font-size: 0.85em;\">생성일시: 2026-03-13 | 검토 기준: KWCAG2.2 (한국지능정보사회진흥원, 2024.10)</p>\n\n</body>\n</html>\n"}], "eval-2-card-component-a11y-without_skill": [{"name": "report.csv", "type": "text", "content": "번호,항목명,원칙,결과,판정방식,발견된 문제,수정 가이드\n1,2.1.1 키보드 사용 보장,운용성,실패,코드 검토,\"<div onClick={handleClick}>에 tabIndex·role·onKeyDown이 없어 키보드 사용자는 클릭 이벤트를 실행할 수 없음. 마우스 없이 이 기능 접근 불가.\",\"`<div>`를 `<button>`으로 교체하거나 role=\"\"button\"\" tabIndex={0} onKeyDown 이벤트를 추가\"\n2,1.1.1 적절한 대체 텍스트 제공,인식성,실패,코드 검토,\"<p>{value}</p>에 해당 숫자가 무엇을 의미하는지 레이블이 없고 카드 전체를 묶어주는 aria-label/aria-labelledby도 없어 스크린 리더 사용자가 맥락 파악 불가.\",카드 컨테이너에 aria-label={`${label}: ${value}`} 또는 aria-labelledby로 값과 레이블 관계 명시\n3,1.3.1 정보와 관계,인식성,실패,코드 검토,\"숫자(value)와 설명(label)이 각각 단순 <p>로만 구성되어 두 요소 간 의미적 관계가 마크업에 표현되지 않음. 보조 기술이 데이터 관계를 인식 불가.\",\"<dl>/<dt>/<dd> 시맨틱 마크업 또는 role=\"\"group\"\" + aria-labelledby 조합으로 관계 구조화\"\n4,4.1.1 마크업 오류 방지,견고성,실패,코드 검토,\"id=\"\"stat-card\"\"가 하드코딩되어 동일 페이지에 컴포넌트가 여러 번 렌더링될 때 중복 id 발생. HTML 명세 위반이며 aria-labelledby 등 보조 기술 기능 오동작 유발.\",\"useId() Hook(React 18+)으로 인스턴스별 고유 id 생성 또는 id 속성 제거\"\n5,2.4.7 포커스 가시성,운용성,주의,코드 검토,\"현재 키보드 포커스 자체가 불가능하며(항목 1 참조) 수정 후에도 Tailwind 기본 스타일이 outline을 제거할 경우 포커스 인디케이터가 보이지 않을 수 있음.\",\"focus-visible:ring-2 focus-visible:ring-blue-500 등 Tailwind 클래스 또는 :focus-visible CSS 스타일 명시\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>접근성 검토 보고서 - StatsCard.tsx</title>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: 'Noto Sans KR', Arial, sans-serif; background: #f4f6f9; color: #1a1a2e; line-height: 1.7; }\n    header { background: #1a1a2e; color: #fff; padding: 32px 40px; }\n    header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }\n    header p { font-size: 0.9rem; opacity: 0.75; }\n    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }\n    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 36px; }\n    .summary-card { background: #fff; border-radius: 10px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-top: 4px solid #ccc; }\n    .summary-card.fail { border-top-color: #e53e3e; }\n    .summary-card.warn { border-top-color: #dd6b20; }\n    .summary-card.pass { border-top-color: #38a169; }\n    .summary-card .num { font-size: 2.2rem; font-weight: 800; line-height: 1; }\n    .summary-card.fail .num { color: #e53e3e; }\n    .summary-card.warn .num { color: #dd6b20; }\n    .summary-card.pass .num { color: #38a169; }\n    .summary-card .label { font-size: 0.82rem; color: #555; margin-top: 4px; }\n    section { background: #fff; border-radius: 10px; padding: 28px 32px; margin-bottom: 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }\n    section h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid #e8e8e8; color: #1a1a2e; }\n    .file-info { background: #f0f4ff; border-radius: 8px; padding: 14px 18px; font-size: 0.87rem; color: #333; }\n    .file-info span { font-family: monospace; background: #dde5ff; padding: 2px 6px; border-radius: 4px; }\n    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }\n    th { background: #1a1a2e; color: #fff; padding: 11px 14px; text-align: left; font-weight: 600; }\n    td { padding: 11px 14px; border-bottom: 1px solid #eee; vertical-align: top; }\n    tr:nth-child(even) td { background: #fafafa; }\n    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }\n    .badge-fail { background: #ffe5e5; color: #c53030; }\n    .badge-warn { background: #fef3e2; color: #9c4221; }\n    .badge-pass { background: #e6ffed; color: #276749; }\n    .badge-principle { background: #eef2ff; color: #3730a3; font-size: 0.75rem; }\n    .issue-block { background: #fff8f8; border-left: 4px solid #e53e3e; border-radius: 4px; padding: 10px 14px; margin-bottom: 6px; font-size: 0.85rem; }\n    .fix-block { background: #f0fff4; border-left: 4px solid #38a169; border-radius: 4px; padding: 10px 14px; font-size: 0.85rem; }\n    code { font-family: 'Courier New', monospace; background: #f1f1f1; padding: 1px 5px; border-radius: 3px; font-size: 0.82rem; }\n    .code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 0.82rem; line-height: 1.6; overflow-x: auto; margin: 10px 0; white-space: pre; }\n    .code-block .bad { color: #f38ba8; }\n    .code-block .good { color: #a6e3a1; }\n    .code-block .comment { color: #6c7086; }\n    footer { text-align: center; font-size: 0.8rem; color: #888; padding: 24px; }\n  </style>\n</head>\n<body>\n\n<header>\n  <h1>KWCAG 2.2 접근성 검토 보고서</h1>\n  <p>대상 파일: StatsCard.tsx &nbsp;|&nbsp; 검토 기준: 한국형 웹 콘텐츠 접근성 지침 2.2 &nbsp;|&nbsp; 검토일: 2026-03-13</p>\n</header>\n\n<div class=\"container\">\n\n  <!-- 요약 -->\n  <div class=\"summary-grid\">\n    <div class=\"summary-card fail\">\n      <div class=\"num\">4</div>\n      <div class=\"label\">오류 (실패)</div>\n    </div>\n    <div class=\"summary-card warn\">\n      <div class=\"num\">1</div>\n      <div class=\"label\">주의 (검토 필요)</div>\n    </div>\n    <div class=\"summary-card pass\">\n      <div class=\"num\">0</div>\n      <div class=\"label\">통과</div>\n    </div>\n    <div class=\"summary-card\" style=\"border-top-color:#4a5568;\">\n      <div class=\"num\" style=\"color:#4a5568;\">5</div>\n      <div class=\"label\">검토 항목 수</div>\n    </div>\n  </div>\n\n  <!-- 파일 정보 -->\n  <section>\n    <h2>검토 대상 파일 정보</h2>\n    <div class=\"file-info\">\n      파일 경로: <span>features/next-app/components/StatsCard.tsx</span><br/>\n      컴포넌트: <span>StatsCard</span> &nbsp;|&nbsp;\n      Props: <span>label: string</span>, <span>value: number</span>, <span>testId: string</span><br/>\n      프레임워크: Next.js (React) &nbsp;|&nbsp; \"use client\" 디렉티브 사용\n    </div>\n  </section>\n\n  <!-- 원본 코드 -->\n  <section>\n    <h2>검토 대상 소스 코드</h2>\n    <div class=\"code-block\"><span class=\"comment\">\"use client\";</span>\n\nexport default function StatsCard(<span class=\"good\">{ label, value, testId }</span>: { label: string; value: number; testId: string }) {\n  const handleClick = () => {\n    <span class=\"comment\">// BAD: console.log left in production code</span>\n    console.log(\"StatsCard clicked:\", label);\n  };\n\n  return (\n    &lt;div\n      <span class=\"bad\">id=\"stat-card\"</span>          <span class=\"comment\">// BAD: 모든 인스턴스에 동일한 id → id 중복 위반</span>\n      className=\"rounded-xl border ...\"\n      data-testid={testId}\n      <span class=\"bad\">onClick={handleClick}</span>   <span class=\"comment\">// BAD: tabIndex/role/onKeyDown 없음 → 키보드 접근성 위반</span>\n    &gt;\n      <span class=\"bad\">&lt;p&gt;{value}&lt;/p&gt;</span>        <span class=\"comment\">// BAD: 숫자 의미 레이블 없음 → 레이블 제공 위반</span>\n      <span class=\"bad\">&lt;p&gt;{label}&lt;/p&gt;</span>\n    &lt;/div&gt;\n  );\n}</div>\n  </section>\n\n  <!-- 상세 검토 결과 -->\n  <section>\n    <h2>KWCAG 2.2 항목별 검토 결과</h2>\n    <table>\n      <thead>\n        <tr>\n          <th style=\"width:4%\">#</th>\n          <th style=\"width:18%\">항목명 (KWCAG 2.2)</th>\n          <th style=\"width:10%\">원칙</th>\n          <th style=\"width:8%\">결과</th>\n          <th style=\"width:10%\">판정방식</th>\n          <th style=\"width:25%\">발견된 문제</th>\n          <th style=\"width:25%\">수정 가이드</th>\n        </tr>\n      </thead>\n      <tbody>\n\n        <!-- 1 -->\n        <tr>\n          <td>1</td>\n          <td><strong>2.1.1 키보드 사용 보장</strong><br/><small>모든 기능은 키보드로 접근·조작 가능해야 함</small></td>\n          <td><span class=\"badge badge-principle\">운용성</span></td>\n          <td><span class=\"badge badge-fail\">실패</span></td>\n          <td>코드 검토</td>\n          <td>\n            <div class=\"issue-block\">\n              <code>&lt;div onClick={handleClick}&gt;</code>에 <code>tabIndex</code>, <code>role</code>, <code>onKeyDown</code>/<code>onKeyPress</code>가 없어 키보드 사용자는 클릭 이벤트를 트리거할 수 없습니다. 마우스 없이는 이 기능에 접근 불가합니다.\n            </div>\n          </td>\n          <td>\n            <div class=\"fix-block\">\n              <code>&lt;div&gt;</code>를 <code>&lt;button&gt;</code>으로 교체하거나, 불가피하게 <code>&lt;div&gt;</code>를 유지해야 할 경우 <code>role=\"button\"</code>, <code>tabIndex={0}</code>, <code>onKeyDown</code> 이벤트를 함께 추가하세요.\n              <div class=\"code-block\" style=\"margin-top:8px; font-size:0.78rem;\"><span class=\"good\">// 권장: button 요소 사용\n&lt;button type=\"button\" onClick={handleClick}&gt;\n  ...\n&lt;/button&gt;</span></div>\n            </div>\n          </td>\n        </tr>\n\n        <!-- 2 -->\n        <tr>\n          <td>2</td>\n          <td><strong>1.1.1 적절한 대체 텍스트 제공</strong><br/><small>텍스트 아닌 콘텐츠에 대체 텍스트 제공</small></td>\n          <td><span class=\"badge badge-principle\">인식성</span></td>\n          <td><span class=\"badge badge-fail\">실패</span></td>\n          <td>코드 검토</td>\n          <td>\n            <div class=\"issue-block\">\n              <code>&lt;p&gt;{value}&lt;/p&gt;</code>는 숫자 값만 렌더링하며 해당 값이 무엇을 의미하는지 레이블이 없습니다. 스크린 리더 사용자는 숫자만 읽히고 맥락을 파악하기 어렵습니다. 카드 전체를 묶어주는 시맨틱 컨테이너나 <code>aria-label</code>/<code>aria-labelledby</code>도 없습니다.\n            </div>\n          </td>\n          <td>\n            <div class=\"fix-block\">\n              카드 컨테이너에 <code>aria-label</code> 또는 <code>aria-labelledby</code>를 추가해 값과 레이블의 관계를 명시하거나, <code>&lt;dl&gt;</code>/<code>&lt;dt&gt;</code>/<code>&lt;dd&gt;</code> 구조를 사용해 의미를 구조화하세요.\n              <div class=\"code-block\" style=\"margin-top:8px; font-size:0.78rem;\"><span class=\"good\">&lt;button aria-label={`${label}: ${value}`} ...&gt;\n  &lt;p aria-hidden=\"true\"&gt;{value}&lt;/p&gt;\n  &lt;p aria-hidden=\"true\"&gt;{label}&lt;/p&gt;\n&lt;/button&gt;</span></div>\n            </div>\n          </td>\n        </tr>\n\n        <!-- 3 -->\n        <tr>\n          <td>3</td>\n          <td><strong>1.3.1 정보와 관계</strong><br/><small>콘텐츠 구조·관계는 프로그래밍 방식으로 표현되거나 텍스트로 이용 가능해야 함</small></td>\n          <td><span class=\"badge badge-principle\">인식성</span></td>\n          <td><span class=\"badge badge-fail\">실패</span></td>\n          <td>코드 검토</td>\n          <td>\n            <div class=\"issue-block\">\n              카드가 단순 <code>&lt;div&gt;</code> 두 개의 <code>&lt;p&gt;</code>로 구성되어 있어 숫자(value)와 레이블(label) 간의 의미적 관계가 마크업에 표현되지 않습니다. 보조 기술은 두 텍스트가 서로 연관된 데이터(통계 수치와 그 설명)임을 인식할 수 없습니다.\n            </div>\n          </td>\n          <td>\n            <div class=\"fix-block\">\n              시맨틱 마크업(<code>&lt;dl&gt;</code>, <code>&lt;figure&gt;</code>, <code>&lt;section&gt;</code> 등)을 사용하거나 ARIA 속성(<code>role=\"group\"</code>, <code>aria-labelledby</code>)으로 관계를 명시하세요.\n              <div class=\"code-block\" style=\"margin-top:8px; font-size:0.78rem;\"><span class=\"good\">&lt;dl&gt;\n  &lt;dt&gt;{label}&lt;/dt&gt;\n  &lt;dd&gt;{value}&lt;/dd&gt;\n&lt;/dl&gt;</span></div>\n            </div>\n          </td>\n        </tr>\n\n        <!-- 4 -->\n        <tr>\n          <td>4</td>\n          <td><strong>4.1.1 마크업 오류 방지</strong><br/><small>id 속성 값은 페이지 내 유일해야 함</small></td>\n          <td><span class=\"badge badge-principle\">견고성</span></td>\n          <td><span class=\"badge badge-fail\">실패</span></td>\n          <td>코드 검토</td>\n          <td>\n            <div class=\"issue-block\">\n              <code>id=\"stat-card\"</code>가 하드코딩되어 있어 동일 페이지에 <code>StatsCard</code>를 여러 번 렌더링하면 중복 <code>id</code>가 발생합니다. 중복 <code>id</code>는 HTML 명세 위반이며, ARIA 레이블링(<code>aria-labelledby</code>), 앵커 링크, 보조 기술의 탐색 등을 오동작하게 합니다.\n            </div>\n          </td>\n          <td>\n            <div class=\"fix-block\">\n              <code>id</code>를 prop으로 받거나 <code>useId()</code>(React 18+)를 사용해 인스턴스별로 고유한 값을 생성하세요. 또는 <code>id</code> 속성 자체가 불필요하다면 제거하세요.\n              <div class=\"code-block\" style=\"margin-top:8px; font-size:0.78rem;\"><span class=\"good\">import { useId } from \"react\";\nconst uid = useId();\n&lt;div id={uid} ...&gt;</span></div>\n            </div>\n          </td>\n        </tr>\n\n        <!-- 5 -->\n        <tr>\n          <td>5</td>\n          <td><strong>2.4.7 포커스 가시성</strong><br/><small>키보드 조작 가능한 모든 UI 구성요소에 포커스 인디케이터가 표시되어야 함</small></td>\n          <td><span class=\"badge badge-principle\">운용성</span></td>\n          <td><span class=\"badge badge-warn\">주의</span></td>\n          <td>코드 검토</td>\n          <td>\n            <div class=\"issue-block\">\n              현재 키보드 포커스 자체가 불가능하지만(항목 1 참조), 만약 <code>button</code>으로 수정하더라도 Tailwind CSS의 기본 스타일이 <code>outline</code>을 제거하는 경우 포커스 링이 보이지 않을 수 있습니다. 시각적 포커스 표시가 없으면 키보드 사용자가 현재 포커스 위치를 파악할 수 없습니다.\n            </div>\n          </td>\n          <td>\n            <div class=\"fix-block\">\n              Tailwind의 <code>focus-visible:ring-2 focus-visible:ring-blue-500</code> 클래스를 추가하거나 CSS에서 <code>:focus-visible</code> 스타일을 명시적으로 정의하세요.\n              <div class=\"code-block\" style=\"margin-top:8px; font-size:0.78rem;\"><span class=\"good\">&lt;button\n  className=\"... focus-visible:outline-none\n    focus-visible:ring-2 focus-visible:ring-blue-500\"\n  ...\n&gt;</span></div>\n            </div>\n          </td>\n        </tr>\n\n      </tbody>\n    </table>\n  </section>\n\n  <!-- 수정 코드 예시 -->\n  <section>\n    <h2>수정된 코드 예시 (권장)</h2>\n    <div class=\"code-block\"><span class=\"comment\">\"use client\";\nimport { useId } from \"react\";</span>\n\ninterface StatsCardProps {\n  label: string;\n  value: number;\n  testId: string;\n  onClick?: () => void;\n}\n\nexport default function StatsCard({ label, value, testId, onClick }: StatsCardProps) {\n  <span class=\"good\">const uid = useId();</span>\n  const labelId = `${uid}-label`;\n  const valueId = `${uid}-value`;\n\n  return (\n    <span class=\"good\">&lt;button\n      id={uid}\n      type=\"button\"\n      onClick={onClick}\n      data-testid={testId}\n      aria-labelledby={`${valueId} ${labelId}`}\n      className=\"rounded-xl border border-zinc-200 bg-white p-6\n        dark:border-zinc-800 dark:bg-zinc-900 text-left w-full\n        focus-visible:outline-none focus-visible:ring-2\n        focus-visible:ring-blue-500 focus-visible:ring-offset-2\"\n    &gt;\n      &lt;p id={valueId} className=\"text-3xl font-bold text-zinc-900 dark:text-zinc-50\"&gt;{value}&lt;/p&gt;\n      &lt;p id={labelId} className=\"mt-1 text-sm text-zinc-500\"&gt;{label}&lt;/p&gt;\n    &lt;/button&gt;</span>\n  );\n}</div>\n  </section>\n\n  <!-- 종합 의견 -->\n  <section>\n    <h2>종합 의견</h2>\n    <p style=\"font-size:0.9rem; color:#333; line-height:1.8;\">\n      <code>StatsCard</code> 컴포넌트는 <strong>4개의 KWCAG 2.2 실패 항목</strong>과 <strong>1개의 주의 항목</strong>이 발견되었습니다.\n      가장 심각한 문제는 <strong>키보드 접근 불가</strong>로, 클릭 이벤트가 있는 <code>&lt;div&gt;</code>에 키보드 지원이 전혀 없어\n      키보드 사용자 및 스크린 리더 사용자가 이 기능을 전혀 이용할 수 없습니다.\n      또한 <strong>중복 <code>id</code></strong>는 동일 페이지에서 복수 렌더링 시 보조 기술의 혼란을 야기합니다.\n      <strong>시맨틱 구조 부재</strong>로 인해 스크린 리더는 숫자 값과 레이블의 관계를 파악하지 못합니다.\n      <br/><br/>\n      근본적인 해결책은 <code>&lt;div&gt;</code>를 <code>&lt;button&gt;</code>으로 교체하고,\n      <code>useId()</code>로 고유 ID를 생성하며, <code>aria-labelledby</code>로 값과 레이블의 관계를 명시하고,\n      <code>focus-visible</code> 스타일을 적용하는 것입니다.\n    </p>\n  </section>\n\n</div>\n\n<footer>\n  KWCAG 2.2 기반 접근성 검토 보고서 &nbsp;|&nbsp; 검토일: 2026-03-13 &nbsp;|&nbsp; 대상: StatsCard.tsx\n</footer>\n\n</body>\n</html>\n"}], "eval-3-semantic-html-review-with_skill": [{"name": "report.csv", "type": "text", "content": "번호,항목명,원칙,결과,판정방식,발견된 문제,수정 가이드\n1,적절한 대체 텍스트,인식의 용이성,✅,Lighthouse,Lighthouse image-alt N/A(이미지 없음). SVG 아이콘은 부모 버튼의 aria-label로 접근 가능.,\n2,자막 제공,인식의 용이성,➖,정적분석,video/audio 요소 없음,\n3,표의 구성,인식의 용이성,➖,정적분석,table 요소 없음,\n4,콘텐츠의 선형 구조,인식의 용이성,✅,정적분석,DOM 순서와 시각 순서 일치. position:absolute/fixed 남용 없음.,\n5,명확한 지시 사항 제공,인식의 용이성,✅,정적분석,색상·위치만으로 지시하는 텍스트 패턴 없음,\n6,색에 무관한 콘텐츠 인식,인식의 용이성,❌,정적분석,\"SearchFilter.tsx 31~43행: 활성 필터 버튼을 배경색 변경만으로 구분. 색상 외 시각 구분 수단 없음.\",\"활성 필터에 체크 아이콘·밑줄·굵기 등 색상 외 수단 병행. aria-pressed로 보조기기 상태 전달.\"\n7,자동 재생 금지,인식의 용이성,✅,정적분석,autoplay 속성 없음. 자동 재생 콘텐츠 없음.,\n8,텍스트 명도 대비,인식의 용이성,✅,Lighthouse,Lighthouse color-contrast: Pass (score 1.0),\n9,콘텐츠 간의 구분,인식의 용이성,➖,정적분석,시각적 디자인 판단 필요 — 런타임 확인 항목,\n10,키보드 사용 보장,운용의 용이성,✅,Playwright,Playwright Tab 탐색 확인: button/a 요소 모두 키보드 접근 가능. onClick만 있는 div/span 없음.,\n11,초점 이동과 표시,운용의 용이성,✅,Playwright,\"Playwright 포커스 확인: outline: rgb(16,16, 스 이동 처리\"\n8,내비게이션 링크 목록 ul/li 미사용,인식의 용이성 (1.3.1 정보와 관계),경고,정적 코드 분석,\"Navbar.tsx 32-46번 줄: 데스크톱 내비게이션 링크들이 <div> 안에 직접 나열됨. 링크 목록은 <ul>/<li>로 구조화하는 것이 시맨틱 HTML 관례\",\"링크들을 <ul role=\"\"list\"\">와 <li>로 감싸고 CSS로 기본 목록 스타일 제거\"\n9,SVG 아이콘 aria-hidden 미설정,인식의 용이성 (1.1.1 비텍스트 콘텐츠),경고,정적 코드 분석,\"Navbar.tsx 65-71번 줄: 햄버거 SVG에 aria-hidden=\"\"true\"\"가 없음. 버튼에 aria-label이 있어 치명적이지는 않으나 SVG 내용이 스크린리더에 불필요하게 읽힐 수 있음\",\"<svg aria-hidden=\"\"true\"\" focusable=\"\"false\"\" ...> 추가\"\n10,nav 랜드마크 사용,운용의 용이성 (2.4.1 블록 건너뛰기),합격,정적 코드 분석,Navbar.tsx 23번 줄: <nav> 요소가 올바르게 사용되어 랜드마크 역할 수행,\"aria-label=\"\"주 내비게이션\"\" 추가를 권장하나 현재 수준도 기준 충족\"\n11,로그아웃 버튼 텍스트 제공,인식의 용이성 (1.4.1 색상 사용),합격,정적 코드 분석,Navbar.tsx 48-54번 줄: 빨간색 강조와 함께 텍스트 \"\"로그아웃\"\"이 명시되어 색상만으로 정보가 전달되지 않음,현재 구현 적절\n12,필터 버튼 명도 대비,인식의 용이성 (1.4.3 명도 대비),합격,정적 코드 분석,\"SearchFilter.tsx: 비선택 버튼 텍스트(#52525b)와 흰 배경 대비 약 5.9:1로 기준(4.5:1) 충족. 선택 상태(흰 글씨/파란 배경)도 기준 충족\",현재 구현 적절\n13,검색 컨테이너 레이아웃,인식의 용이성 (1.3.1 정보와 관계),합격,정적 코드 분석,SearchFilter.tsx 20번 줄: 외부 <div>는 레이아웃 목적으로만 사용되어 큰 문제 없음,\"<search> 또는 <form role=\"\"search\"\">로 변경하면 시맨틱 향상 가능 (개선 권고)\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>접근성 및 시맨틱 HTML 검토 보고서</title>\n  <style>\n    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 24px; background: #f5f5f5; color: #222; }\n    h1 { font-size: 1.6rem; margin-bottom: 4px; }\n    .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 24px; }\n    .section { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }\n    h2 { font-size: 1.15rem; margin-top: 0; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; margin-bottom: 16px; }\n    h3 { font-size: 1rem; margin-top: 18px; margin-bottom: 6px; color: #1a5fa8; }\n    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }\n    th { background: #1a5fa8; color: #fff; text-align: left; padding: 8px 10px; }\n    td { padding: 8px 10px; border-bottom: 1px solid #e8e8e8; vertical-align: top; }\n    tr:last-child td { border-bottom: none; }\n    tr:nth-child(even) td { background: #f9f9f9; }\n    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: bold; }\n    .fail { background: #fde8e8; color: #c0392b; }\n    .pass { background: #e6f4ea; color: #1e7e34; }\n    .warn { background: #fff3cd; color: #856404; }\n    .tag-p { color: #555; font-size: 0.8rem; }\n    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 8px; }\n    .summary-card { border-radius: 6px; padding: 14px 16px; text-align: center; }\n    .card-fail { background: #fde8e8; }\n    .card-pass { background: #e6f4ea; }\n    .card-warn { background: #fff3cd; }\n    .summary-card .num { font-size: 2rem; font-weight: bold; }\n    .summary-card .label { font-size: 0.82rem; margin-top: 2px; color: #555; }\n    code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-size: 0.85rem; font-family: monospace; }\n    ul { margin: 6px 0; padding-left: 20px; }\n    li { margin-bottom: 4px; }\n    .file-label { display: inline-block; background: #e8edf7; color: #1a5fa8; border-radius: 4px; padding: 2px 8px; font-size: 0.8rem; margin-bottom: 6px; font-weight: bold; }\n  </style>\n</head>\n<body>\n\n<h1>접근성 및 시맨틱 HTML 검토 보고서</h1>\n<p class=\"subtitle\">검토 기준: KWCAG 2.2 (Korean Web Content Accessibility Guidelines 2.2) | 검토일: 2026-03-13</p>\n\n<!-- 요약 섹션 -->\n<div class=\"section\">\n  <h2>검토 요약</h2>\n  <p><strong>검토 대상 파일:</strong></p>\n  <ul>\n    <li><code>features/next-app/components/Navbar.tsx</code></li>\n    <li><code>features/next-app/components/SearchFilter.tsx</code></li>\n  </ul>\n  <div class=\"summary-grid\">\n    <div class=\"summary-card card-fail\"><div class=\"num\" style=\"color:#c0392b;\">7</div><div class=\"label\">불합격 (Fail)</div></div>\n    <div class=\"summary-card card-warn\"><div class=\"num\" style=\"color:#856404;\">2</div><div class=\"label\">경고 (Warning)</div></div>\n    <div class=\"summary-card card-pass\"><div class=\"num\" style=\"color:#1e7e34;\">4</div><div class=\"label\">합격 (Pass)</div></div>\n  </div>\n</div>\n\n<!-- Navbar.tsx 검토 -->\n<div class=\"section\">\n  <h2>Navbar.tsx 검토 결과</h2>\n\n  <h3>1. 햄버거 메뉴 버튼 — <code>aria-expanded</code> 누락</h3>\n  <div class=\"file-label\">Navbar.tsx · 59–72번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 4.1.2 이름, 역할, 값 (인식의 용이성)</span></p>\n  <p>모바일 햄버거 버튼에 <code>aria-label=\"메뉴 열기\"</code>는 제공되어 있으나, 메뉴 열림/닫힘 상태를 나타내는 <code>aria-expanded</code> 속성이 없습니다. 스크린리더 사용자는 현재 메뉴가 열려 있는지 닫혀 있는지 알 수 없습니다.</p>\n  <p><strong>수정 방법:</strong> <code>aria-expanded={menuOpen}</code>를 버튼에 추가하고, <code>aria-label</code>을 상태에 맞게 동적으로 변경하거나 <code>aria-controls</code>로 제어 대상을 명시합니다.</p>\n  <pre style=\"background:#f0f0f0;padding:10px;border-radius:4px;font-size:0.85rem;overflow-x:auto;\">&lt;button\n  aria-label={menuOpen ? \"메뉴 닫기\" : \"메뉴 열기\"}\n  aria-expanded={menuOpen}\n  aria-controls=\"mobile-menu\"\n  ...\n&gt;</pre>\n\n  <h3>2. 모바일 메뉴 패널 — 역할 및 ID 누락</h3>\n  <div class=\"file-label\">Navbar.tsx · 88번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 4.1.2 이름, 역할, 값</span></p>\n  <p>모바일 메뉴 컨테이너(<code>&lt;div&gt;</code>)에 <code>id</code>가 없어 햄버거 버튼의 <code>aria-controls</code>와 연결이 불가능합니다. 또한 메뉴가 동적으로 열릴 때 스크린리더에 변경이 알려지지 않습니다.</p>\n  <p><strong>수정 방법:</strong> <code>id=\"mobile-menu\"</code>를 추가하고, 필요 시 <code>role=\"navigation\"</code> 또는 <code>aria-label=\"모바일 메뉴\"</code>를 부여합니다.</p>\n\n  <h3>3. 현재 페이지 링크 — <code>aria-current</code> 누락</h3>\n  <div class=\"file-label\">Navbar.tsx · 34–45번 줄, 89–99번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 2.4.4 링크 목적 / 4.1.2 이름, 역할, 값</span></p>\n  <p>현재 경로(<code>pathname === link.href</code>)일 때 색상만 변경되고 <code>aria-current=\"page\"</code>가 설정되지 않습니다. 스크린리더 사용자는 어떤 링크가 현재 페이지인지 알 수 없습니다.</p>\n  <p><strong>수정 방법:</strong></p>\n  <pre style=\"background:#f0f0f0;padding:10px;border-radius:4px;font-size:0.85rem;overflow-x:auto;\">&lt;Link\n  ...\n  aria-current={pathname === link.href ? \"page\" : undefined}\n&gt;</pre>\n\n  <h3>4. 브레드크럼브 — 시맨틱 마크업 및 aria-label 누락</h3>\n  <div class=\"file-label\">Navbar.tsx · 131–147번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 2.4.8 위치, 1.3.1 정보와 관계</span></p>\n  <p>브레드크럼브가 <code>&lt;div&gt;</code>와 <code>&lt;span&gt;</code>으로만 구성되어 있으며, <code>&lt;nav&gt;</code>, <code>&lt;ol&gt;</code>/<code>&lt;li&gt;</code> 같은 시맨틱 요소가 사용되지 않았습니다. 또한 구분자 <code>/</code>가 장식용인데 스크린리더에 그대로 읽힙니다.</p>\n  <p><strong>수정 방법:</strong></p>\n  <pre style=\"background:#f0f0f0;padding:10px;border-radius:4px;font-size:0.85rem;overflow-x:auto;\">&lt;nav aria-label=\"브레드크럼브\"&gt;\n  &lt;ol style=\"list-style:none;display:flex;...\"&gt;\n    &lt;li&gt;&lt;Link href=\"/\"&gt;홈&lt;/Link&gt;&lt;/li&gt;\n    {segments.map((seg, i) =&gt; (\n      &lt;li key={seg}&gt;\n        &lt;span aria-hidden=\"true\"&gt; / &lt;/span&gt;\n        {i === segments.length - 1\n          ? &lt;span aria-current=\"page\"&gt;{labels[seg]}&lt;/span&gt;\n          : &lt;Link href={...}&gt;{labels[seg]}&lt;/Link&gt;}\n      &lt;/li&gt;\n    ))}\n  &lt;/ol&gt;\n&lt;/nav&gt;</pre>\n\n  <h3>5. 네비게이션 링크 목록 — <code>&lt;ul&gt;</code>/<code>&lt;li&gt;</code> 미사용</h3>\n  <div class=\"file-label\">Navbar.tsx · 32–46번 줄</div>\n  <p><span class=\"badge warn\">경고</span> <span class=\"tag-p\">KWCAG 2.2 — 1.3.1 정보와 관계</span></p>\n  <p>데스크톱 내비게이션 링크들이 <code>&lt;div&gt;</code> 안에 바로 나열되어 있습니다. 링크 목록은 <code>&lt;ul&gt;</code>/<code>&lt;li&gt;</code>로 묶어 목록 구조를 명시하는 것이 시맨틱 HTML 관례에 맞습니다.</p>\n  <p><strong>수정 방법:</strong> 링크들을 <code>&lt;ul role=\"list\"&gt;</code>와 <code>&lt;li&gt;</code>로 감쌉니다. 단, CSS reset으로 기본 스타일을 제거해야 합니다.</p>\n\n  <h3>6. SVG 아이콘 — 접근 가능한 텍스트 처리</h3>\n  <div class=\"file-label\">Navbar.tsx · 65–71번 줄</div>\n  <p><span class=\"badge warn\">경고</span> <span class=\"tag-p\">KWCAG 2.2 — 1.1.1 비텍스트 콘텐츠</span></p>\n  <p>SVG에 <code>aria-hidden=\"true\"</code>가 없습니다. 버튼에 <code>aria-label</code>이 있어 최악의 상황은 피하지만, SVG 자체가 스크린리더에 의미 없는 내용으로 읽힐 수 있습니다.</p>\n  <p><strong>수정 방법:</strong> <code>&lt;svg aria-hidden=\"true\" focusable=\"false\" ...&gt;</code>를 추가합니다.</p>\n\n  <h3>7. 로그아웃 버튼 — 색상만으로 구분</h3>\n  <div class=\"file-label\">Navbar.tsx · 48–54번 줄</div>\n  <p><span class=\"badge pass\">합격</span> <span class=\"tag-p\">KWCAG 2.2 — 1.4.1 색상 사용</span></p>\n  <p>로그아웃 버튼은 빨간색으로 강조되어 있지만 텍스트(\"로그아웃\")가 명확히 표시되어 있어 색상만으로 정보가 전달되지는 않습니다.</p>\n\n  <h3>8. 주 내비게이션 <code>&lt;nav&gt;</code> 랜드마크</h3>\n  <div class=\"file-label\">Navbar.tsx · 23번 줄</div>\n  <p><span class=\"badge pass\">합격</span> <span class=\"tag-p\">KWCAG 2.2 — 2.4.1 블록 건너뛰기</span></p>\n  <p><code>&lt;nav&gt;</code> 요소가 사용되어 랜드마크 역할을 수행합니다. 단, <code>aria-label=\"주 내비게이션\"</code>을 추가하면 페이지에 여러 <code>&lt;nav&gt;</code>가 있을 때 구분에 도움이 됩니다.</p>\n</div>\n\n<!-- SearchFilter.tsx 검토 -->\n<div class=\"section\">\n  <h2>SearchFilter.tsx 검토 결과</h2>\n\n  <h3>1. 검색 입력 필드 — <code>&lt;label&gt;</code> 누락</h3>\n  <div class=\"file-label\">SearchFilter.tsx · 21–28번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 1.3.1 정보와 관계 / 3.3.2 레이블 또는 지시사항</span></p>\n  <p><code>&lt;input type=\"search\"&gt;</code>에 <code>placeholder</code>만 있고 <code>&lt;label&gt;</code> 요소가 없습니다. <code>placeholder</code>는 레이블의 대체재가 아니며, 포커스 시 사라져 인지 부하를 증가시킵니다. 스크린리더가 입력의 목적을 정확히 전달하지 못합니다.</p>\n  <p><strong>수정 방법:</strong></p>\n  <pre style=\"background:#f0f0f0;padding:10px;border-radius:4px;font-size:0.85rem;overflow-x:auto;\">&lt;label htmlFor=\"todo-search\" style={{display:\"block\",...}}&gt;할 일 검색&lt;/label&gt;\n&lt;input id=\"todo-search\" type=\"search\" ... /&gt;\n\n/* 또는 시각적으로 숨기는 경우 */\n&lt;label htmlFor=\"todo-search\" className=\"sr-only\"&gt;할 일 검색&lt;/label&gt;</pre>\n\n  <h3>2. 필터 버튼 — <code>aria-pressed</code> 누락</h3>\n  <div class=\"file-label\">SearchFilter.tsx · 31–44번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 4.1.2 이름, 역할, 값</span></p>\n  <p>선택된 필터 버튼의 상태가 파란색 배경으로만 표시됩니다. 스크린리더 사용자는 어떤 필터가 현재 활성화되어 있는지 알 수 없습니다. 코드 주석에도 \"BAD: missing aria-pressed\"라고 명시되어 있습니다.</p>\n  <p><strong>수정 방법:</strong></p>\n  <pre style=\"background:#f0f0f0;padding:10px;border-radius:4px;font-size:0.85rem;overflow-x:auto;\">&lt;button\n  aria-pressed={filter === f.value}\n  onClick={() =&gt; onFilterChange(f.value)}\n  ...\n&gt;\n  {f.label}\n&lt;/button&gt;</pre>\n  <p>또는 필터 그룹을 <code>role=\"group\"</code>과 <code>aria-label=\"필터\"</code>로 묶어 컨텍스트를 제공합니다.</p>\n\n  <h3>3. 필터 버튼 그룹 — 그룹 역할 및 레이블 누락</h3>\n  <div class=\"file-label\">SearchFilter.tsx · 29번 줄</div>\n  <p><span class=\"badge fail\">불합격</span> <span class=\"tag-p\">KWCAG 2.2 — 1.3.1 정보와 관계</span></p>\n  <p>필터 버튼들을 감싸는 <code>&lt;div&gt;</code>에 그룹 역할이 없어, 이 버튼들이 관련 있는 항목들의 묶음이라는 것을 스크린리더가 파악하기 어렵습니다.</p>\n  <p><strong>수정 방법:</strong></p>\n  <pre style=\"background:#f0f0f0;padding:10px;border-radius:4px;font-size:0.85rem;overflow-x:auto;\">&lt;div role=\"group\" aria-label=\"할 일 필터\" ...&gt;\n  {filters.map(...)}\n&lt;/div&gt;</pre>\n\n  <h3>4. 전체 컨테이너 — 시맨틱 요소 부재</h3>\n  <div class=\"file-label\">SearchFilter.tsx · 20번 줄</div>\n  <p><span class=\"badge pass\">합격</span> <span class=\"tag-p\">KWCAG 2.2 — 1.3.1 정보와 관계</span></p>\n  <p>외부 <code>&lt;div&gt;</code>는 레이아웃 목적으로만 사용되어 큰 문제는 없지만, <code>&lt;search&gt;</code> (HTML5.3) 또는 <code>&lt;form role=\"search\"&gt;</code>로 감싸면 더 명확한 시맨틱을 제공할 수 있습니다.</p>\n\n  <h3>5. 색상 대비</h3>\n  <div class=\"file-label\">SearchFilter.tsx · 35–40번 줄</div>\n  <p><span class=\"badge pass\">합격</span> <span class=\"tag-p\">KWCAG 2.2 — 1.4.3 명도 대비</span></p>\n  <p>비선택 필터 버튼의 텍스트 색상(<code>text-zinc-600</code>: #52525b)과 흰 배경의 명도 대비는 약 5.9:1로 기준(4.5:1)을 충족합니다. 선택 상태(<code>bg-blue-600 text-white</code>)도 기준을 충족합니다.</p>\n</div>\n\n<!-- 종합 권고사항 -->\n<div class=\"section\">\n  <h2>종합 권고사항 및 우선순위</h2>\n  <table>\n    <thead>\n      <tr>\n        <th>우선순위</th>\n        <th>파일</th>\n        <th>항목</th>\n        <th>KWCAG 기준</th>\n        <th>판정</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td>1 (긴급)</td>\n        <td>SearchFilter.tsx</td>\n        <td>검색 입력 필드 &lt;label&gt; 누락</td>\n        <td>1.3.1 / 3.3.2</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>2 (긴급)</td>\n        <td>SearchFilter.tsx</td>\n        <td>필터 버튼 aria-pressed 누락</td>\n        <td>4.1.2</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>3 (높음)</td>\n        <td>Navbar.tsx</td>\n        <td>햄버거 버튼 aria-expanded 누락</td>\n        <td>4.1.2</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>4 (높음)</td>\n        <td>Navbar.tsx</td>\n        <td>현재 페이지 링크 aria-current 누락</td>\n        <td>2.4.4 / 4.1.2</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>5 (높음)</td>\n        <td>Navbar.tsx</td>\n        <td>브레드크럼브 시맨틱 마크업 미적용</td>\n        <td>1.3.1 / 2.4.8</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>6 (보통)</td>\n        <td>SearchFilter.tsx</td>\n        <td>필터 버튼 그룹 role/label 누락</td>\n        <td>1.3.1</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>7 (보통)</td>\n        <td>Navbar.tsx</td>\n        <td>모바일 메뉴 패널 ID/역할 누락</td>\n        <td>4.1.2</td>\n        <td><span class=\"badge fail\">불합격</span></td>\n      </tr>\n      <tr>\n        <td>8 (낮음)</td>\n        <td>Navbar.tsx</td>\n        <td>내비게이션 링크 ul/li 미사용</td>\n        <td>1.3.1</td>\n        <td><span class=\"badge warn\">경고</span></td>\n      </tr>\n      <tr>\n        <td>9 (낮음)</td>\n        <td>Navbar.tsx</td>\n        <td>SVG aria-hidden 미설정</td>\n        <td>1.1.1</td>\n        <td><span class=\"badge warn\">경고</span></td>\n      </tr>\n      <tr>\n        <td>—</td>\n        <td>Navbar.tsx</td>\n        <td>nav 랜드마크 사용</td>\n        <td>2.4.1</td>\n        <td><span class=\"badge pass\">합격</span></td>\n      </tr>\n      <tr>\n        <td>—</td>\n        <td>Navbar.tsx</td>\n        <td>로그아웃 텍스트 명시</td>\n        <td>1.4.1</td>\n        <td><span class=\"badge pass\">합격</span></td>\n      </tr>\n      <tr>\n        <td>—</td>\n        <td>SearchFilter.tsx</td>\n        <td>필터 버튼 명도 대비</td>\n        <td>1.4.3</td>\n        <td><span class=\"badge pass\">합격</span></td>\n      </tr>\n      <tr>\n        <td>—</td>\n        <td>SearchFilter.tsx</td>\n        <td>컨테이너 레이아웃</td>\n        <td>1.3.1</td>\n        <td><span class=\"badge pass\">합격</span></td>\n      </tr>\n    </tbody>\n  </table>\n</div>\n\n<p style=\"color:#888;font-size:0.8rem;text-align:center;\">본 보고서는 KWCAG 2.2 기준 정적 코드 분석 결과입니다. 실제 스크린리더 테스트를 추가로 권장합니다.</p>\n\n</body>\n</html>\n"}]}, "benchmark": {"metadata": {"skill_name": "accessibility", "timestamp": "2026-03-13", "evals_run": ["kwcag-full-review", "card-component-a11y", "semantic-html-review"], "runs_per_configuration": 1, "model": "sonnet", "notes": "iteration-3: agent-browser CLI (with_skill) vs Playwright MCP (old_skill). agent-browser failed to install via npx in all 3 with_skill runs."}, "run_summary": {"with_skill": {"pass_rate": {"mean": 0.83, "stddev": 0.025}, "time_seconds": {"mean": 308.7, "stddev": 11.5}, "tokens": {"mean": 60602, "stddev": 2573}}, "old_skill": {"pass_rate": {"mean": 1.0, "stddev": 0.0}, "time_seconds": {"mean": 424.8, "stddev": 40.8}, "tokens": {"mean": 76693, "stddev": 5764}}, "delta": {"pass_rate": "-17.0%", "time_seconds": "-116.1", "tokens": "-16091"}}, "runs": [{"eval_id": 1, "eval_name": "kwcag-full-review", "configuration": "with_skill", "run_number": 1, "result": {"pass_rate": 0.8, "passed": 8, "tot
