<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----

 id=\\\"stat-card\\\">\",\n    \"issue\": \"id 값이 \\\"stat-card\\\"로 하드코딩되어 있습니다. 이 컴포넌트가 리스트 내에서 여러 번 렌더링되면 동일한 id가 중복되어 HTML 유효성 규칙(id 고유성)을 위반합니다. 중복 id는 보조 기술의 요소 식별을 방해합니다.\",\n    \"suggestion\": \"id를 props로 전달받아 고유하게 만들거나, testId처럼 동적으로 생성하세요. 예: id={`stat-card-${testId}`}\"\n  },\n  {\n    \"id\": \"A11Y-005\",\n    \"severity\": \"minor\",\n    \"kwcag\": \"5.1.2 (초점 이동과 표시)\",\n    \"wcag\": \"2.4.7 Focus Visible (Level AA)\",\n    \"line\": 10,\n    \"code\": \"<div ... onClick={handleClick}>\",\n    \"element\": \"<div>\",\n    \"issue\": \"클릭 가능한 요소에 포커스 표시 스타일이 정의되지 않았습니다. tabIndex를 추가하더라도 포커스 시 시각적 표시(focus ring 등)가 없으면 키보드 사용자가 현재 포커스 위치를 파악할 수 없습니다.\",\n    \"suggestion\": \"focus:outline 또는 focus-visible:ring 등의 Tailwind 클래스를 추가하세요. 예: className=\\\"... focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:outline-none\\\"\"\n  },\n  {\n    \"id\": \"A11Y-006\",\n    \"severity\": \"minor\",\n    \"kwcag\": \"5.1.3 (조작 가능)\",\n    \"wcag\": \"2.5.5 Target Size (Level AAA) / 2.5.8 Target Size Minimum (Level AA, WCAG 2.2)\",\n    \"line\": 14,\n    \"code\": \"className=\\\"rounded-xl border border-zinc-200 bg-white p-6 ...\\\"\",\n    \"element\": \"<div>\",\n    \"issue\": \"클릭 가능한 요소의 최소 터치/클릭 영역 크기가 명시적으로 보장되지 않습니다. WCAG 2.2의 Target Size Minimum(2.5.8)은 최소 24x24 CSS px을 요구합니다. p-6 패딩이 적용되어 있어 실질적으로 충분할 가능성이 높으나, 명시적 min-height/min-width 설정이 없습니다.\",\n    \"suggestion\": \"min-h-[44px] min-w-[44px] 등의 최소 크기를 명시적으로 지정하는 것을 권장합니다.\"\n  },\n  {\n    \"id\": \"A11Y-007\",\n    \"severity\": \"major\",\n    \"kwcag\": \"5.2.1 (텍스트 콘텐츠의 명도 대비)\",\n    \"wcag\": \"1.4.3 Contrast Minimum (Level AA)\",\n    \"line\": 20,\n    \"code\": \"className=\\\"mt-1 text-sm text-zinc-500\\\"\",\n    \"element\": \"<p className=\\\"... text-zinc-500\\\">{label}</p>\",\n    \"issue\": \"text-zinc-500(#71717a)은 흰색 배경(#ffffff)에서 명도 대비율이 약 4.6:1로, 일반 텍스트(14px 이상)의 최소 기준 4.5:1은 충족하지만, text-sm(14px)에 bold가 아닌 경우 대비율이 기준에 근접하여 경계선에 있습니다. 다크 모드에서 dark:text-zinc-500 n    \"element\": \"aria-label=\\\"메뉴 열기\\\"\",\n    \"result\": \"warning\",\n    \"wcag\": \"4.1.2 Name, Role, Value (Level A)\",\n    \"issue\": \"The `aria-label` is always \\\"메뉴 열기\\\" (open menu) regardless of whether the menu is open or closed. When the menu is open, the label should indicate it can be closed.\",\n    \"suggestion\": \"Make the label dynamic: `aria-label={menuOpen ? \\\"메뉴 닫기\\\" : \\\"메뉴 열기\\\"}`.\"\n  },\n  {\n    \"id\": \"A-11\",\n    \"name\": \"mobile-menu-missing-role\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 88,\n    \"element\": \"<div data-testid=\\\"mobile-menu\\\">\",\n    \"result\": \"warning\",\n    \"wcag\": \"4.1.2 Name, Role, Value (Level A)\",\n    \"issue\": \"The mobile dropdown menu is a plain <div> without a navigation landmark role. Assistive technologies cannot identify this as a navigation region.\",\n    \"suggestion\": \"Change the element to `<nav aria-label=\\\"모바일 메뉴\\\">` or add `role=\\\"navigation\\\"` with an `aria-label`.\"\n  },\n  {\n    \"id\": \"A-12\",\n    \"name\": \"hamburger-missing-aria-controls\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 59,\n    \"element\": \"<button data-testid=\\\"hamburger-menu\\\">\",\n    \"result\": \"warning\",\n    \"wcag\": \"4.1.2 Name, Role, Value (Level A)\",\n    \"issue\": \"The hamburger button does not specify `aria-controls` to programmatically link it to the menu it controls.\",\n    \"suggestion\": \"Add an `id` to the mobile menu div (e.g., `id=\\\"mobile-nav-menu\\\"`) and add `aria-controls=\\\"mobile-nav-menu\\\"` to the hamburger button.\"\n  },\n  {\n    \"id\": \"A-13\",\n    \"name\": \"breadcrumbs-missing-nav-landmark\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 132,\n    \"element\": \"<div data-testid=\\\"breadcrumbs\\\">\",\n    \"result\": \"fail\",\n    \"wcag\": \"1.3.1 Info and Relationships (Level A)\",\n    \"issue\": \"Breadcrumbs are rendered in a plain <div> instead of a <nav> landmark with `aria-label=\\\"Breadcrumb\\\"`. Screen reader users cannot identify this as a breadcrumb navigation.\",\n    \"suggestion\": \"Wrap the breadcrumbs in `<nav aria-label=\\\"Breadcrumb\\\">` and use an `<ol>` list to convey the hierarchical structure.\"\n  },\n  {\n    \"id\": \"A-14\",\n    \"name\": \"breadcrumbs-not-using-list-structure\",\n    \"file\": \"Navbar.tsx\",\n    \"lines\": [132, 146],\n    \"element\": \"Breadcrumbs component\",\n    \"result\": \"warning\",\n    \"wcag\": \"1.3.1 Info and Relationships (Level A)\",\n    \"issue\": \"Breadcrumb items are rendered as inline spans/links without an ordered list (<ol>/<li>) structure. Assistive technologies cannot convey the number of items or the sequential nature of the navigation.\",\n    \"suggestion\": \"Render breadcrumbs as `<ol><li>` items within a `<nav aria-label=\\\"Breadcrumb\\\">` element.\"\n  },\n  {\n    \"id\": \"A-15\",\n    \"name\": \"breadcrumbs-missing-aria-current\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 138,\n    \"element\": \"<span className=\\\"text-zinc-900 ...\\\">{labels[seg] || seg}</span>\",\n    \"result\": \"warning\",\n    \"wcag\": \"1.3.1 Info and Relationships (Level A)\",\n    \"issue\": \"The current (last) breadcrumb segment does not have `aria-current=\\\"page\\\"` to indicate it represents the current page.\",\n    \"suggestion\": \"Add `aria-current=\\\"page\\\"` to the last breadcrumb span element.\"\n  },\n  {\n    \"id\": \"A-16\",\n    \"name\": \"nav-link-missing-aria-current\",\n    \"file\": \"Navbar.tsx\",\n    \"lines\": [34, 89],\n    \"element\": \"Active navigation links\",\n    \"result\": \"warning\",\n    \"wcag\": \"1.3.1 Info and Relationships (Level A)\",\n    \"issue\": \"Active navigation links (where `pathname === link.href`) are styled differently but do not have `aria-current=\\\"page\\\"`. The active state is communicated only visually through color change.\",\n    \"suggestion\": \"Add `aria-current={pathname === link.href ? \\\"page\\\" : undefined}` to each navigation link.\"\n  },\n  {\n    \"id\": \"A-17\",\n    \"name\": \"dashboard-page-missing-main-landmark\",\n    \"file\": \"dashboard/page.tsx\",\n    \"line\": 42,\n    \"element\": \"<div> (root element)\",\n    \"result\": \"warning\",\n    \"wcag\": \"1.3.1 Info and Relationships (Level A)\",\n    \"issue\": \"The dashboard page root element is a generic <div> rather than a <main> landmark. Screen reader users rely on landmarks to navigate page regions efficiently.\",\n    \"suggestion\": \"Replace the outermost `<div>` with `<main>` to create a proper main content landmark.\"\n  },\n  {\n    \"id\": \"A-18\",\n    \"name\": \"dynamic-content-no-live-region\",\n    \"file\": \"dashboard/page.tsx\",\n    \"lines\": [72, 74],\n    \"element\": \"Dynamically inserted recentItems\",\n    \"result\": \"warning\",\n    \"wcag\": \"4.1.3 Status Messages (Level AA)\",\n    \"issue\": \"Content is dynamically inserted after a 500ms delay but the container does not use `aria-live` or `role=\\\"status\\\"`. Screen reader users will not be notified when new items appear.\",\n    \"suggestion\": \"Add `aria-live=\\\"polite\\\"` to the container of dynamically loaded items, or use `role=\\\"status\\\"` to announce updates.\"\n  }\n]\n"}], "eval-2-single-component-with_skill": [{"name": "result.json", "type": "text", "content": "{\n  \"summary\": {\n    \"files_reviewed\": [\"StatsCard.tsx\"],\n    \"total_items_checked\": 33,\n    \"violations\": 2,\n    \"advisories\": 1\n  },\n  \"findings\": [\n    {\n      \"id\": \"A-10\",\n      \"name\": \"키보드 사용 보장\",\n      \"result\": \"❌\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"StatsCard.tsx:10 — <div>에 onClick 핸들러가 있으나 role, tabIndex, onKeyDown이 없어 키보드로 접근 및 조작 불가\",\n      \"fix_guide\": \"클릭 가능 요소는 <button> 또는 <a> 사용. 커스텀 요소라면 role=\\\"button\\\" + tabIndex={0} + onKeyDown 추가. 권장: <div> 대신 <button>으로 교체\"\n    },\n    {\n      \"id\": \"A-32\",\n      \"name\": \"마크업 오류 방지\",\n      \"result\": \"❌\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"StatsCard.tsx:13 — id=\\\"stat-card\\\"가 하드코딩되어 있어 리스트 렌더링 시 동일 id가 중복됨 (id는 페이지 내 유일해야 함)\",\n      \"fix_guide\": \"id는 페이지 내 유일해야 함. 반복 컴포넌트에 동일 id 사용 금지. 예: id={`stat-card-${testId}`} 등 고유값 사용\"\n    },\n    {\n      \"id\": \"S-04\",\n      \"name\": \"대화형 요소\",\n      \"result\": \"⚠️\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"StatsCard.tsx:10 — 클릭 가능한 <div>가 시맨틱 요소 대신 사용됨. onClick 핸들러가 있으므로 <button>이 적절\",\n      \"fix_guide\": \"클릭 가능 <div>/<span> → <button> 또는 <a> 사용. <button className=\\\"rounded-xl ...\\\"> 으로 교체 권장\"\n    }\n  ]\n}\n"}], "eval-2-single-component-without_skill": [{"name": "result.json", "type": "text", "content": "[\n  {\n    \"id\": \"A11Y-001\",\n    \"severity\": \"critical\",\n    \"kwcag\": \"5.1.1 (키보드 접근성)\",\n    \"wcag\": \"2.1.1 Keyboard (Level A)\",\n    \"line\": 17,\n    \"code\": \"onClick={handleClick}\",\n    \"element\": \"<div onClick={handleClick}>\",\n    \"issue\": \"비대화형 요소인 <div>에 onClick 핸들러가 있으나 키보드 접근이 불가능합니다. tabIndex, role, onKeyDown/onKeyPress 속성이 모두 누락되어 키보드 사용자가 해당 요소와 상호작용할 수 없습니다.\",\n    \"suggestion\": \"<div>를 <button>으로 변경하거나, role=\\\"button\\\", tabIndex={0}, onKeyDown 핸들러(Enter/Space 키 처리)를 추가하세요.\",\n    \"fixExample\": \"<button onClick={handleClick} className=\\\"...\\\"> 또는 <div role=\\\"button\\\" tabIndex={0} onClick={handleClick} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') handleClick(); }}>\"\n  },\n  {\n    \"id\": \"A11Y-002\",\n    \"severity\": \"critical\",\n    \"kwcag\": \"5.1.1 (키보드 접근성)\",\n    \"wcag\": \"2.1.1 Keyboard (Level A)\",\n    \"line\": 10,\n    \"code\": \"<div ... onClick={handleClick}>\",\n    \"element\": \"<div>\",\n    \"issue\": \"<div> 요소에 tabIndex가 없어 키보드 포커스를 받을 수 없습니다. 클릭 가능한 요소는 반드시 키보드 포커스를 받을 수 있어야 합니다.\",\n    \"suggestion\": \"tabIndex={0}을 추가하거나, 네이티브 대화형 요소인 <button>을 사용하세요.\"\n  },\n  {\n    \"id\": \"A11Y-003\",\n    \"severity\": \"major\",\n    \"kwcag\": \"5.3.1 (적절한 역할 부여)\",\n    \"wcag\": \"4.1.2 Name, Role, Value (Level A)\",\n    \"line\": 10,\n    \"code\": \"<div ... onClick={handleClick}>\",\n    \"element\": \"<div>\",\n    \"issue\": \"클릭 가능한 <div>에 ARIA role 속성이 없습니다. 보조 기술(스크린 리더)이 이 요소가 상호작용 가능한 요소임을 인식할 수 없습니다.\",\n    \"suggestion\": \"role=\\\"button\\\"을 추가하거나, 의미론적으로 적합한 <button> 요소를 사용하세요.\"\n  },\n  {\n    \"id\": \"A11Y-004\",\n    \"severity\": \"major\",\n    \"kwcag\": \"5.3.2 (마크업 오류 방지)\",\n    \"wcag\": \"4.1.1 Parsing (Level A)\",\n    \"line\": 13,\n    \"code\": \"id=\\\"stat-card\\\"\",\n    \"element\": \"<div id=\\\"stat-card\\\">\",\n    \"issue\": \"id 값이 \\\"stat-card\\\"로 하드코딩되어 있습니다. 이 컴포넌트가 리스트 내에서 여러 번 렌더링되면 동일한 id가 중복되어 HTML 유효성 규칙(id 고유성)을 위반합니다. 중복 id는 보조 기술의 요소 식별을 방해합니다.\",\n    \"suggestion\": \"id를 props로 전달받아 고유하게 만들거나, testId처럼 동적으로 생성하세요. 예: id={`stat-card-${testId}`}\"\n  },\n  {\n    \"id\": \"A11Y-005\",\n    \"severity\": \"minor\",\n    \"kwcag\": \"5.1.2 (초점 이동과 표시)\",\n    \"wcag\": \"2.4.7 Focus Visible (Level AA)\",\n    \"line\": 10,\n    \"code\": \"<div ... onClick={handleClick}>\",\n    \"element\": \"<div>\",\n    \"issue\": \"클릭 가능한 요소에 포커스 표시 스타일이 정의되지 않았습니다. tabIndex를 추가하더라도 포커스 시 시각적 표시(focus ring 등)가 없으면 키보드 사용자가 현재 포커스 위치를 파악할 수 없습니다.\",\n    \"suggestion\": \"focus:outline 또는 focus-visible:ring 등의 Tailwind 클래스를 추가하세요. 예: className=\\\"... focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:outline-none\\\"\"\n  },\n  {\n    \"id\": \"A11Y-006\",\n    \"severity\": \"minor\",\n    \"kwcag\": \"5.1.3 (조작 가능)\",\n    \"wcag\": \"2.5.5 Target Size (Level AAA) / 2.5.8 Target Size Minimum (Level AA, WCAG 2.2)\",\n    \"line\": 14,\n    \"code\": \"className=\\\"rounded-xl border border-zinc-200 bg-white p-6 ...\\\"\",\n    \"element\": \"<div>\",\n    \"issue\": \"클릭 가능한 요소의 최소 터치/클릭 영역 크기가 명시적으로 보장되지 않습니다. WCAG 2.2의 Target Size Minimum(2.5.8)은 최소 24x24 CSS px을 요구합니다. p-6 패딩이 적용되어 있어 실질적으로 충분할 가능성이 높으나, 명시적 min-height/min-width 설정이 없습니다.\",\n    \"suggestion\": \"min-h-[44px] min-w-[44px] 등의 최소 크기를 명시적으로 지정하는 것을 권장합니다.\"\n  },\n  {\n    \"id\": \"A11Y-007\",\n    \"severity\": \"major\",\n    \"kwcag\": \"5.2.1 (텍스트 콘텐츠의 명도 대비)\",\n    \"wcag\": \"1.4.3 Contrast Minimum (Level AA)\",\n    \"line\": 20,\n    \"code\": \"className=\\\"mt-1 text-sm text-zinc-500\\\"\",\n    \"element\": \"<p className=\\\"... text-zinc-500\\\">{label}</p>\",\n    \"issue\": \"text-zinc-500(#71717a)은 흰색 배경(#ffffff)에서 명도 대비율이 약 4.6:1로, 일반 텍스트(14px 이상)의 최소 기준 4.5:1은 충족하지만, text-sm(14px)에 bold가 아닌 경우 대비율이 기준에 근접하여 경계선에 있습니다. 다크 모드에서 dark:text-zinc-500이 별도 지정되지 않아 dark:bg-zinc-900(#18181b) 배경에서의 대비율도 검토가 필요합니다.\",\n    \"suggestion\": \"라이트 모드에서는 text-zinc-600 이상, 다크 모드에서는 dark:text-zinc-400 등 더 밝은 색상을 사용하여 충분한 명도 대비를 확보하세요.\"\n  },\n  {\n    \"id\": \"A11Y-008\",\n    \"severity\": \"minor\",\n    \"kwcag\": \"5.3.1 (적절한 역할 부여) / 5.2.3 (콘텐츠의 선형구조)\",\n    \"wcag\": \"1.3.1 Info and Relationships (Level A)\",\n    \"line\": \"19-20\",\n    \"code\": \"<p>{value}</p><p>{label}</p>\",\n    \"element\": \"<p> elements\",\n    \"issue\": \"통계 값(value)과 레이블(label)의 관계가 프로그래밍적으로 명확하지 않습니다. 스크린 리더 사용자는 숫자 값이 무엇을 의미하는지 맥락을 파악하기 어려울 수 있습니다. 또한 시각적 순서(값 → 레이블)와 논리적 순서(레이블 → 값)가 반대입니다.\",\n    \"suggestion\": \"aria-label 또는 aria-labelledby를 활용하여 값과 레이블의 관계를 명시하세요. 예: <div role=\\\"group\\\" aria-label={`${label}: ${value}`}> 또는 시각적으로 숨겨진 레이블을 값 앞에 배치하세요.\"\n  }\n]\n"}], "eval-3-aria-semantic-with_skill": [{"name": "result.json", "type": "text", "content": "{\n  \"summary\": {\n    \"files_reviewed\": [\"Navbar.tsx\", \"SearchFilter.tsx\"],\n    \"total_items_checked\": 40,\n    \"violations\": 3,\n    \"advisories\": 2\n  },\n  \"findings\": [\n    {\n      \"id\": \"A-29\",\n      \"name\": \"레이블 제공\",\n      \"result\": \"❌\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"SearchFilter.tsx:21 — <input type=\\\"search\\\">에 label, aria-label, title 속성이 없음. placeholder=\\\"할 일 검색...\\\"만 존재하며 placeholder는 레이블 대체 불가\",\n      \"fix_guide\": \"aria-label 추가: <input type=\\\"search\\\" aria-label=\\\"할 일 검색\\\" placeholder=\\\"할 일 검색...\\\"> 또는 시각적 <label> 요소를 연결\"\n    },\n    {\n      \"id\": \"A-33\",\n      \"name\": \"웹 애플리케이션 접근성\",\n      \"result\": \"❌\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"Navbar.tsx:59 — 햄버거 메뉴 토글 버튼에 aria-expanded 속성 누락. menuOpen 상태를 토글하지만 보조기술에 메뉴 열림/닫힘 상태를 전달하지 않음\",\n      \"fix_guide\": \"aria-expanded 추가: <button aria-label=\\\"메뉴 열기\\\" aria-expanded={menuOpen} aria-controls=\\\"mobile-menu\\\"> 및 모바일 메뉴 div에 id=\\\"mobile-menu\\\" 추가\"\n    },\n    {\n      \"id\": \"A-33\",\n      \"name\": \"웹 애플리케이션 접근성\",\n      \"result\": \"❌\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"SearchFilter.tsx:32 — 필터 토글 버튼들(전체/진행중/완료)에 aria-pressed 속성 누락. 시각적으로 선택 상태를 표시하지만 보조기술에 현재 선택 상태를 전달하지 않음\",\n      \"fix_guide\": \"aria-pressed 추가: <button aria-pressed={filter === f.value} onClick={() => onFilterChange(f.value)}>{f.label}</button>\"\n    },\n    {\n      \"id\": \"S-03\",\n      \"name\": \"랜드마크 요소\",\n      \"result\": \"⚠️\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"Navbar.tsx:132 — Breadcrumbs 컴포넌트가 일반 <div>로 구성됨. 탐색 영역(breadcrumb)은 <nav> 랜드마크를 사용해야 보조기술이 인식 가능\",\n      \"fix_guide\": \"<div> 대신 <nav aria-label=\\\"breadcrumb\\\"> 사용: <nav aria-label=\\\"breadcrumb\\\" className=\\\"mx-auto max-w-5xl px-4 py-2 text-sm text-zinc-500\\\">\"\n    },\n    {\n      \"id\": \"S-05\",\n      \"name\": \"목록 구조\",\n      \"result\": \"⚠️\",\n      \"verdict_method\": \"정적분석\",\n      \"issue\": \"SearchFilter.tsx:29 — 필터 버튼 그룹이 의미 없는 <div>로 감싸져 있음. 관련된 옵션 그룹임을 보조기술에 전달하지 않음\",\n      \"fix_guide\": \"그룹 컨테이너에 role=\\\"group\\\"과 aria-label 추가: <div role=\\\"group\\\" aria-label=\\\"할 일 필터\\\" className=\\\"flex gap-1 ...\\\">\"\n    }\n  ]\n}\n"}], "eval-3-aria-semantic-without_skill": [{"name": "result.json", "type": "text", "content": "[\n  {\n    \"id\": \"ARIA-01\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 59,\n    \"severity\": \"high\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<button> (hamburger menu)\",\n    \"issue\": \"Hamburger menu button is missing `aria-expanded` attribute to communicate whether the mobile menu is currently open or closed.\",\n    \"detail\": \"The button toggles `menuOpen` state but does not reflect this via `aria-expanded={menuOpen}`. Screen reader users cannot determine the current state of the collapsible menu.\",\n    \"wcag\": \"WCAG 2.1 SC 4.1.2 (Name, Role, Value)\",\n    \"recommendation\": \"Add `aria-expanded={menuOpen}` to the hamburger button element.\"\n  },\n  {\n    \"id\": \"ARIA-02\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 59,\n    \"severity\": \"medium\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<button> (hamburger menu)\",\n    \"issue\": \"Hamburger button is missing `aria-controls` to associate it with the mobile menu panel it toggles.\",\n    \"detail\": \"Without `aria-controls`, assistive technologies cannot programmatically determine which region of the page is controlled by this button.\",\n    \"wcag\": \"WCAG 2.1 SC 4.1.2 (Name, Role, Value)\",\n    \"recommendation\": \"Add an `id` to the mobile menu `<div>` (e.g., `id=\\\"mobile-menu-panel\\\"`) and set `aria-controls=\\\"mobile-menu-panel\\\"` on the hamburger button.\"\n  },\n  {\n    \"id\": \"ARIA-03\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 63,\n    \"severity\": \"low\",\n    \"type\": \"static-aria-label\",\n    \"element\": \"<button aria-label=\\\"메뉴 열기\\\">\",\n    \"issue\": \"The `aria-label` is static (\\\"메뉴 열기\\\" / \\\"Open menu\\\") and does not change when the menu is open. When the menu is expanded, the label should reflect \\\"메뉴 닫기\\\" (Close menu).\",\n    \"detail\": \"The SVG icon changes between hamburger and X visually, but the accessible name stays the same regardless of state.\",\n    \"wcag\": \"WCAG 2.1 SC 4.1.2 (Name, Role, Value)\",\n    \"recommendation\": \"Use a dynamic aria-label: `aria-label={menuOpen ? '메뉴 닫기' : '메뉴 열기'}`.\"\n  },\n  {\n    \"id\": \"ARIA-04\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 88,\n    \"severity\": \"medium\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<div> (mobile menu panel)\",\n    \"issue\": \"The mobile menu container `<div>` lacks `role=\\\"menu\\\"` or `role=\\\"navigation\\\"` and has no `aria-label` to identify it as a navigation region.\",\n    \"detail\": \"The mobile menu is rendered conditionally but is a plain `<div>` with no landmark role. Assistive technology users cannot easily locate or identify this region.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships)\",\n    \"recommendation\": \"Either wrap mobile links in a `<nav aria-label=\\\"모바일 메뉴\\\">` or add `role=\\\"navigation\\\"` with an `aria-label`.\"\n  },\n  {\n    \"id\": \"SEM-01\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 32,\n    \"severity\": \"medium\",\n    \"type\": \"non-semantic-html\",\n    \"element\": \"<div> wrapping desktop nav links\",\n    \"issue\": \"Desktop navigation links are wrapped in a generic `<div>` instead of a semantic `<ul>/<li>` list structure or a nested `<nav>`.\",\n    \"detail\": \"Using a list structure for navigation links allows screen readers to announce the number of items and provides better landmark navigation. Alternatively, the links could be grouped inside a labeled region.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships)\",\n    \"recommendation\": \"Wrap the navigation links in `<ul>` with each link in an `<li>`, or use a nested landmark structure.\"\n  },\n  {\n    \"id\": \"SEM-02\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 23,\n    \"severity\": \"low\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<nav> (main navbar)\",\n    \"issue\": \"The `<nav>` element lacks an `aria-label` to distinguish it from other navigation landmarks on the page (e.g., breadcrumbs could also be a `<nav>`).\",\n    \"detail\": \"When a page has multiple `<nav>` elements, each should have a unique accessible name so users can differentiate them.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships)\",\n    \"recommendation\": \"Add `aria-label=\\\"메인 내비게이션\\\"` to the primary `<nav>` element.\"\n  },\n  {\n    \"id\": \"SEM-03\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 132,\n    \"severity\": \"medium\",\n    \"type\": \"non-semantic-html\",\n    \"element\": \"<div> (breadcrumbs)\",\n    \"issue\": \"Breadcrumbs are rendered inside a `<div>` instead of a `<nav>` with `aria-label=\\\"breadcrumb\\\"`. The breadcrumb items also lack an `<ol>` list structure.\",\n    \"detail\": \"The WAI-ARIA Authoring Practices recommend breadcrumbs be placed in a `<nav aria-label=\\\"breadcrumb\\\">` containing an `<ol>` list. The current item should have `aria-current=\\\"page\\\"`.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships), SC 2.4.8 (Location)\",\n    \"recommendation\": \"Replace the outer `<div>` with `<nav aria-label=\\\"breadcrumb\\\">`, wrap items in `<ol>/<li>`, and add `aria-current=\\\"page\\\"` to the last breadcrumb.\"\n  },\n  {\n    \"id\": \"SEM-04\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 34,\n    \"severity\": \"low\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<Link> (active nav link)\",\n    \"issue\": \"The currently active navigation link (determined by `pathname === link.href`) has no `aria-current=\\\"page\\\"` attribute.\",\n    \"detail\": \"While the active link is visually distinguished with a different color, screen reader users have no programmatic indication of which link corresponds to the current page.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships)\",\n    \"recommendation\": \"Add `aria-current={pathname === link.href ? 'page' : undefined}` to each nav link.\"\n  },\n  {\n    \"id\": \"ARIA-05\",\n    \"file\": \"Navbar.tsx\",\n    \"line\": 65,\n    \"severity\": \"low\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<svg> (hamburger icon)\",\n    \"issue\": \"The SVG icon inside the hamburger button lacks `aria-hidden=\\\"true\\\"` to ensure it is ignored by assistive technology.\",\n    \"detail\": \"Although the parent button has `aria-label`, the SVG itself is not explicitly hidden. Some screen readers may attempt to announce the SVG content.\",\n    \"wcag\": \"Best practice\",\n    \"recommendation\": \"Add `aria-hidden=\\\"true\\\"` to the `<svg>` element.\"\n  },\n  {\n    \"id\": \"ARIA-06\",\n    \"file\": \"SearchFilter.tsx\",\n    \"line\": 32,\n    \"severity\": \"high\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<button> (filter toggle buttons)\",\n    \"issue\": \"Filter toggle buttons are missing `aria-pressed` to indicate the currently selected filter state.\",\n    \"detail\": \"The buttons visually distinguish the active filter via background color, but screen reader users cannot determine which filter is currently active. The code comment on line 30 explicitly acknowledges this issue (A-33).\",\n    \"wcag\": \"WCAG 2.1 SC 4.1.2 (Name, Role, Value)\",\n    \"recommendation\": \"Add `aria-pressed={filter === f.value}` to each filter button.\"\n  },\n  {\n    \"id\": \"ARIA-07\",\n    \"file\": \"SearchFilter.tsx\",\n    \"line\": 21,\n    \"severity\": \"medium\",\n    \"type\": \"missing-aria-attribute\",\n    \"element\": \"<input type=\\\"search\\\">\",\n    \"issue\": \"The search input lacks an associated `<label>` element or `aria-label` attribute. Only `placeholder` is provided, which is not a reliable accessible name.\",\n    \"detail\": \"Placeholder text disappears when the user types and is not consistently announced by all screen readers as the accessible name for the input.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships), SC 3.3.2 (Labels or Instructions)\",\n    \"recommendation\": \"Add `aria-label=\\\"할 일 검색\\\"` to the input, or provide a visible or visually-hidden `<label>` element associated via `htmlFor`.\"\n  },\n  {\n    \"id\": \"SEM-05\",\n    \"file\": \"SearchFilter.tsx\",\n    \"line\": 20,\n    \"severity\": \"medium\",\n    \"type\": \"non-semantic-html\",\n    \"element\": \"<div> (root wrapper)\",\n    \"issue\": \"The SearchFilter component's root element is a generic `<div>`. A `<search>` element (HTML5) or `role=\\\"search\\\"` landmark would better convey the purpose of this region.\",\n    \"detail\": \"Using a `<search>` element or `role=\\\"search\\\"` allows screen reader users to jump directly to the search functionality via landmark navigation.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships)\",\n    \"recommendation\": \"Replace the outer `<div>` with `<search>` (if targeting modern browsers) or add `role=\\\"search\\\"` to the wrapper.\"\n  },\n  {\n    \"id\": \"SEM-06\",\n    \"file\": \"SearchFilter.tsx\",\n    \"line\": 29,\n    \"severity\": \"medium\",\n    \"type\": \"non-semantic-html\",\n    \"element\": \"<div> (filter button group)\",\n    \"issue\": \"The filter button group wrapper is a plain `<div>` instead of using `role=\\\"group\\\"` with an `aria-label` to convey that the buttons form a related set.\",\n    \"detail\": \"Without grouping semantics, screen readers announce each button independently with no context that they form a filter control set.\",\n    \"wcag\": \"WCAG 2.1 SC 1.3.1 (Info and Relationships)\",\n    \"recommendation\": \"Add `role=\\\"group\\\"` and `aria-label=\\\"필터\\\"` to the wrapper `<div>`, or use a `<fieldset>/<legend>` pattern.\"\n  }\n]\n"}]}, "benchmark": {"metadata": {"skill_name": "a11y-static", "timestamp": "2026-03-14", "evals_run": ["full-3files-analysis", "single-component", "aria-semantic"], "runs_per_configuration": 1}, "runs": [{"eval_id": 1, "eval_name": "full-3files-analysis", "configuration": "with_skill", "run_number": 1, "result": {"pass_rate": 1.0, "passed": 8, "total": 8, "time_seconds": 87.5, "tokens": 34530, "errors": 0}, "expecta     // ---- State ----
    let feedbackMap = {};  // run_id -> feedback text
    let currentIndex = 0;
    let visitedRuns = new Set();

    // ---- Init ----
    async function init() {
      // Load saved feedback from server — but only if this isn't a fresh
      // iteration (indicated by previous_feedback being present). When
      // previous feedback exists, the feedback.json on disk is stale from
      // the prior iteration and should not pre-fill the textareas.
      const hasPrevious = Object.keys(EMBEDDED_DATA.previous_feedback || {}).length > 0
        || Object.keys(EMBEDDED_DATA.previous_outputs || {}).length > 0;
      if (!hasPrevious) {
        try {
          const resp = await fetch("/api/feedback");
          const data = await resp.json();
          if (data.reviews) {
            for (const r of data.reviews) feedbackMap[r.run_id] = r.feedback;
          }
        } catch { /* first run, no feedback yet */ }
      }

      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      showRun(0);

      // Wire up feedback auto-save
      const textarea = document.getElementById("feedback");
      let saveTimeout = null;
      textarea.addEventListener("input", () => {
        clearTimeout(saveTimeout);
        document.getElementById("feedback-status").textContent = "";
        saveTimeout = setTimeout(() => saveCurrentFeedback(), 800);
      });
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < EMBEDDED_DATA.runs.length) {
        saveCurrentFeedback();
        showRun(newIndex);
      }
    }

    function updateNavButtons() {
      document.getElementById("prev-btn").disabled = currentIndex === 0;
      document.getElementById("next-btn").disabled =
        currentIndex === EMBEDDED_DATA.runs.length - 1;
    }

    // ---- Show a run ----
    function showRun(index) {
      currentIndex = index;
      const run = EMBEDDED_DATA.runs[index];

      // Progress
      document.getElementById("progress").textContent =
        `${index + 1} of ${EMBEDDED_DATA.runs.length}`;

      // Prompt
      document.getElementById("prompt-text").textContent = run.prompt;

      // Config badge
      const badge = document.getElementById("config-badge");
      const configMatch = run.id.match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (configMatch) {
        const config = configMatch[1];
        const isBaseline = config === "without_skill" || config === "old_skill";
        badge.textContent = config.replace(/_/g, " ");
        badge.className = "config-badge " + (isBaseline ? "config-baseline" : "config-primary");
        badge.style.display = "inline-block";
      } else {
        badge.style.display = "none";
      }

      // Outputs
      renderOutputs(run);

      // Previous outputs
      renderPrevOutputs(run);

      // Grades
      renderGrades(run);

      // Previous feedback
      const prevFb = (EMBEDDED_DATA.previous_feedback || {})[run.id];
      const prevEl = document.getElementById("prev-feedback");
      if (prevFb) {
        document.getElementById("prev-feedback-text").textContent = prevFb;
        prevEl.style.display = "block";
      } else {
        prevEl.style.display = "none";
      }

      // Feedback
      document.getElementById("feedback").value = feedbackMap[run.id] || "";
      document.getElementById("feedback-status").textContent = "";

      updateNavButtons();

      // Track visited runs and promote done button when all visited
      visitedRuns.add(index);
      const doneBtn = document.getElementById("done-btn");
      if (visitedRuns.size >= EMBEDDED_DATA.runs.length) {
        doneBtn.classList.add("ready");
      }

      // Scroll main content to top
      document.querySelector(".main").scrollTop = 0;
    }

    // ---- Render outputs ----
    function renderOutputs(run) {
      const container = document.getElementById("outputs-body");
      container.innerHTML = "";

      const outputs = run.outputs || [];
      if (outputs.length === 0) {
        container.innerHTML = '<div class="empty-state">출력 파일 없음</div>';
        return;
      }

      for (const file of outputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        // Always show file header with download link
        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const content = document.createElement("div");
        content.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          content.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          content.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          content.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(content, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          content.appendChild(a);
        } else if (file.type === "error") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          pre.style.color = "var(--red)";
          content.appendChild(pre);
        }

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "시트: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "스프레드시트 렌더링 오류: " + err.message;
      }
    }

    // ---- Grades ----
    function renderGrades(run) {
      const section = document.getElementById("grades-section");
      const content = document.getElementById("grades-content");

      if (!run.grading) {
        section.style.display = "none";
        return;
      }

      const grading = run.grading;
      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("grades-arrow").classList.remove("open");

      const summary = grading.summary || {};
      const expectations = grading.expectations || [];

      let html = '<div style="padding: 1rem;">';

      // Summary line
      const passRate = summary.pass_rate != null
        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.total || 0) + '개 중 ' + (summary.passed || 0) + '개 통과, ' + (summary.failed || 0) + '개 실패</span>';
      html += '</div>';

      // Assertions list
      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';

      html += '</div>';
      content.innerHTML = html;
    }

    function toggleGrades() {
      const content = document.getElementById("grades-content");
      const arrow = document.getElementById("grades-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Previous outputs (collapsible) ----
    function renderPrevOutputs(run) {
      const section = document.getElementById("prev-outputs-section");
      const content = document.getElementById("prev-outputs-content");
      const prevOutputs = (EMBEDDED_DATA.previous_outputs || {})[run.id];

      if (!prevOutputs || prevOutputs.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "block";
      // Reset to collapsed
      content.classList.remove("open");
      document.getElementById("prev-outputs-arrow").classList.remove("open");

      // Render the files into the content area
      content.innerHTML = "";
      const wrapper = document.createElement("div");
      wrapper.style.padding = "1rem";

      for (const file of prevOutputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "다운로드";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const fc = document.createElement("div");
        fc.className = "output-file-content";

        if (file.type === "text") {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          fc.appendChild(pre);
        } else if (file.type === "image") {
          const img = document.createElement("img");
          img.src = file.data_uri;
          img.alt = file.name;
          fc.appendChild(img);
        } else if (file.type === "pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = file.data_uri;
          fc.appendChild(iframe);
        } else if (file.type === "xlsx") {
          renderXlsx(fc, file.data_b64);
        } else if (file.type === "binary") {
          const a = document.createElement("a");
          a.className = "download-link";
          a.href = file.data_uri;
          a.download = file.name;
          a.textContent = file.name + " 다운로드";
          fc.appendChild(a);
        }

        fileDiv.appendChild(fc);
        wrapper.appendChild(fileDiv);
      }

      content.appendChild(wrapper);
    }

    function togglePrevOutputs() {
      const content = document.getElementById("prev-outputs-content");
      const arrow = document.getElementById("prev-outputs-arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    // ---- Feedback (saved to server -> feedback.json) ----
    function saveCurrentFeedback() {
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;

      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // Build reviews array from map
      const reviews = [];
      for (const [run_id, feedback] of Object.entries(feedbackMap)) {
        if (feedback.trim()) {
          reviews.push({ run_id, feedback, timestamp: new Date().toISOString() });
        }
      }

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        document.getElementById("feedback-status").textContent = "저장됨";
      }).catch(() => {
        // Static mode or server unavailable — no-op on auto-save,
        // feedback will be downloaded on final submit
        document.getElementById("feedback-status").textContent = "제출 시 다운로드됩니다";
      });
    }

    // ---- Done ----
    function showDoneDialog() {
      // Save current textarea to feedbackMap (but don't POST yet)
      const run = EMBEDDED_DATA.runs[currentIndex];
      const text = document.getElementById("feedback").value;
      if (text.trim() === "") {
        delete feedbackMap[run.id];
      } else {
        feedbackMap[run.id] = text;
      }

      // POST once with status: complete — include ALL runs so the model
      // can distinguish "no feedback" (looks good) from "not reviewed"
      const reviews = [];
      const ts = new Date().toISOString();
      for (const r of EMBEDDED_DATA.runs) {
        reviews.push({ run_id: r.id, feedback: feedbackMap[r.id] || "", timestamp: ts });
      }
      const payload = JSON.stringify({ reviews, status: "complete" }, null, 2);
      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
      }).then(() => {
        document.getElementById("done-overlay").classList.add("visible");
      }).catch(() => {
        // Server not available (static mode) — download as file
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "feedback.json";
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("done-overlay").classList.add("visible");
      });
    }

    function closeDoneDialog() {
      // Reset status back to in_progress
      saveCurrentFeedback();
      document.getElementById("done-overlay").classList.remove("visible");
    }

    // ---- Toast ----
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("visible");
      setTimeout(() => toast.classList.remove("visible"), 2000);
    }

    // ---- Keyboard nav ----
    document.addEventListener("keydown", (e) => {
      // Don't capture when typing in textarea
      if (e.target.tagName === "TEXTAREA") return;

      if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        navigate(-1);
      } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        navigate(1);
      }
    });

    // ---- Util ----
    function getDownloadUri(file) {
      if (file.data_uri) return file.data_uri;
      if (file.data_b64) return "data:application/octet-stream;base64," + file.data_b64;
      if (file.type === "text") return "data:text/plain;charset=utf-8," + encodeURIComponent(file.content);
      return "#";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- View switching ----
    function switchView(view) {
      document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`[onclick="switchView('${view}')"]`).classList.add("active");
      document.getElementById("panel-" + view).classList.add("active");
    }

    // ---- Benchmark rendering ----
    function renderBenchmark() {
      const data = EMBEDDED_DATA.benchmark;
      if (!data) return;

      // Show the tabs
      document.getElementById("view-tabs").style.display = "flex";

      const container = document.getElementById("benchmark-content");
      const summary = data.run_summary || {};
      const metadata = data.metadata || {};
      const notes = data.notes || [];

      let html = "";

      // Header
      html += "<h2 style='font-family: Poppins, sans-serif; margin-bottom: 0.5rem;'>벤치마크 결과</h2>";
      html += "<p style='color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.25rem;'>";
      if (metadata.skill_name) html += "<strong>" + escapeHtml(metadata.skill_name) + "</strong> &mdash; ";
      if (metadata.timestamp) html += metadata.timestamp + " &mdash; ";
      if (metadata.evals_run) html += "평가: " + metadata.evals_run.join(", ") + " &mdash; ";
      html += "설정당 " + (metadata.runs_per_configuration || "?") + "회 실행";
      html += "</p>";

      // Summary table
      html += '<table class="benchmark-table">';

      function fmtStat(stat, pct) {
        if (!stat) return "—";
        const suffix = pct ? "%" : "";
        const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
        const s = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
        return m + suffix + " ± " + s + suffix;
      }

      function deltaClass(val) {
        if (!val) return "";
        const n = parseFloat(val);
        if (n > 0) return "benchmark-delta-positive";
        if (n < 0) return "benchmark-delta-negative";
        return "";
      }

      // Discover config names dynamically (everything except "delta")
      const configs = Object.keys(summary).filter(k => k !== "delta");
      const configA = configs[0] || "config_a";
      const configB = configs[1] || "config_b";
      const labelA = configA.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const labelB = configB.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      const a = summary[configA] || {};
      const b = summary[configB] || {};
      const delta = summary.delta || {};

      html += "<thead><tr><th>지표</th><th>" + escapeHtml(labelA) + "</th><th>" + escapeHtml(labelB) + "</th><th>차이</th></tr></thead>";
      html += "<tbody>";

      html += "<tr><td><strong>통과율</strong></td>";
      html += "<td>" + fmtStat(a.pass_rate, true) + "</td>";
      html += "<td>" + fmtStat(b.pass_rate, true) + "</td>";
      html += '<td class="' + deltaClass(delta.pass_rate) + '">' + (delta.pass_rate || "—") + "</td></tr>";

      // Time (only show row if data exists)
      if (a.time_seconds || b.time_seconds) {
        html += "<tr><td><strong>소요 시간 (초)</strong></td>";
        html += "<td>" + fmtStat(a.time_seconds, false) + "</td>";
        html += "<td>" + fmtStat(b.time_seconds, false) + "</td>";
        html += '<td class="' + deltaClass(delta.time_seconds) + '">' + (delta.time_seconds ? delta.time_seconds + "s" : "—") + "</td></tr>";
      }

      // Tokens (only show row if data exists)
      if (a.tokens || b.tokens) {
        html += "<tr><td><strong>토큰</strong></td>";
        html += "<td>" + fmtStat(a.tokens, false) + "</td>";
        html += "<td>" + fmtStat(b.tokens, false) + "</td>";
        html += '<td class="' + deltaClass(delta.tokens) + '">' + (delta.tokens || "—") + "</td></tr>";
      }

      html += "</tbody></table>";

      // Per-eval breakdown (if runs data available)
      const runs = data.runs || [];
      if (runs.length > 0) {
        const evalIds = [...new Set(runs.map(r => r.eval_id))].sort((a, b) => a - b);

        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>평가별 상세 내역</h3>";

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "평가 " + evalId;

          html += "<h4 style='font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);'>" + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>설정</th><th>실행</th><th>통과율</th>";
          if (hasTime) html += "<th>소요 시간 (초)</th>";
          if (hasErrors) html += "<th>실행 중 오류</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          // Group by config and render with average rows
          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + (r.passed || 0) + "/" + (r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? r.time_seconds.toFixed(1) : "—") + "</td>";
              if (hasErrors) html += "<td>" + (r.errors || 0) + "</td>";
              html += "</tr>";
            }

            // Average row
            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>평균</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1) : "—") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail for this eval
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            // Collect all unique assertion texts across all configs
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>검증 항목</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "— ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>분석 노트</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Start ----
    init();
    renderBenchmark();
  </script>
</body>
</html>
