<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>Fix Guide</h2>\n\n<div class=\"fix-section\">\n  <h4>SEO-02: title tag too short and generic</h4>\n  <p><strong>File:</strong> <code>index.html</code>, line 6</p>\n  <p><strong>Current:</strong> <code>&lt;title&gt;Sample Page&lt;/title&gt;</code> (11 chars)</p>\n  <p><strong>Fix:</strong> Replace with a descriptive, keyword-rich title of 50-60 characters.</p>\n  <pre>&lt;title&gt;Welcome to Example Store | Premium Products &amp; Free Shipping&lt;/title&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>SEO-05: Missing meta description</h4>\n  <p><strong>File:</strong> <code>index.html</code>, <code>&lt;head&gt;</code> section</p>\n  <p><strong>Fix:</strong> Add a compelling meta description of 150-160 characters.</p>\n  <pre>&lt;meta name=\"description\" content=\"Discover premium products with free shipping and 30-day returns. Shop our latest deals and save up to 20%. Trusted by thousands of customers.\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>SEO-06: Missing canonical URL</h4>\n  <p><strong>File:</strong> <code>index.html</code>, <code>&lt;head&gt;</code> section</p>\n  <p><strong>Fix:</strong> Add a self-referencing canonical link.</p>\n  <pre>&lt;link rel=\"canonical\" href=\"https://example.com/\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>SEO-07: Missing structured data (JSON-LD)</h4>\n  <p><strong>File:</strong> <code>index.html</code>, <code>&lt;head&gt;</code> section</p>\n  <p><strong>Fix:</strong> Add JSON-LD structured data. For a homepage, use Organization or WebSite schema.</p>\n  <pre>&lt;script type=\"application/ld+json\"&gt;\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"Organization\",\n  \"name\": \"Example Store\",\n  \"url\": \"https://example.com\",\n  \"logo\": \"https://example.com/public/logo.png\"\n}\n&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-01: Render-blocking inline script</h4>\n  <p><strong>File:</strong> <code>index.html</code>, lines 37-44</p>\n  <p><strong>Fix:</strong> Move the script to an external file and add <code>defer</code>, or wrap the logic in a <code>DOMContentLoaded</code> listener and place the script tag with <code>defer</code>.</p>\n  <pre>&lt;script defer src=\"/js/main.js\"&gt;&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-02: LCP image missing fetchpriority and preload</h4>\n  <p><strong>File:</strong> <code>index.html</code>, line 27 and <code>&lt;head&gt;</code></p>\n  <p><strong>Fix:</strong> Add <code>fetchpriority=\"high\"</code> to the hero image and a preload link in the head.</p>\n  <pre>&lt;!-- In &lt;head&gt; --&gt;\n&lt;link rel=\"preload\" href=\"/public/hero.png\" as=\"image\" fetchpriority=\"high\"&gt;\n\n&lt;!-- On the img tag --&gt;\n&lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-03: Render-blocking external stylesheet</h4>\n  <p><strong>File:</strong> <code>index.html</code>, line 10</p>\n  <p><strong>Fix:</strong> Inline critical above-fold CSS and defer the external stylesheet.</p>\n  <pre>&lt;style&gt;/* Inline critical above-fold CSS here */&lt;/style&gt;\n&lt;link rel=\"preload\" href=\"https://cdn.example.com/styles.css\" as=\"style\" onload=\"this.onload=null;this.rel='stylesheet'\"&gt;\n&lt;noscript&gt;&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\"&gt;&lt;/noscript&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-04: Image missing width/height (CLS risk)</h4>\n  <p><strong>File:</strong> <code>index.html</code>, line 33</p>\n  <p><strong>Current:</strong> <code>&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\"&gt;</code></p>\n  <p><strong>Fix:</strong> Add explicit <code>width</code> and <code>height</code> attributes.</p>\n  <pre>&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"600\" height=\"300\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-05: Below-fold images missing loading=\"lazy\"</h4>\n  <p><strong>File:</strong> <code>index.html</code>, lines 30, 33</p>\n  <p><strong>Fix:</strong> Add <code>loading=\"lazy\"</code> to non-LCP images.</p>\n  <pre>&lt;img src=\"/public/logo.png\" width=\"120\" height=\"40\" loading=\"lazy\"&gt;\n&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"600\" height=\"300\" loading=\"lazy\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-06: No modern image formats</h4>\n  <p><strong>File:</strong> <code>index.html</code>, all <code>&lt;img&gt;</code> tags</p>\n  <p><strong>Fix:</strong> Use <code>&lt;picture&gt;</code> element with WebP/AVIF sources and PNG fallback.</p>\n  <pre>&lt;picture&gt;\n  &lt;source type=\"image/avif\" srcset=\"/public/hero.avif\"&gt;\n  &lt;source type=\"image/webp\" srcset=\"/public/hero.webp\"&gt;\n  &lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;\n&lt;/picture&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-10: @font-face missing font-display</h4>\n  <p><strong>File:</strong> <code>index.html</code>, lines 13-17</p>\n  <p><strong>Fix:</strong> Add <code>font-display: swap</code> (or <code>optional</code> for minimal CLS).</p>\n  <pre>@font-face {\n  font-family: \"CustomFont\";\n  src: url(\"/fonts/custom.woff2\") format(\"woff2\");\n  font-display: swap;\n}</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-11: Critical font not preloaded</h4>\n  <p><strong>File:</strong> <code>index.html</code>, <code>&lt;head&gt;</code> section</p>\n  <p><strong>Fix:</strong> Add a preload link for the font file.</p>\n  <pre>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</pre>\n</div>\n\n</body>\n</html>\n"}], "grading": {"eval_id": 2, "eval_name": "meta-tags-structured-data", "configuration": "with_skill", "expectations": [{"text": "meta-description-missing: meta description \ub204\ub77d \uac10\uc9c0", "passed": true, "evidence": "SEO-05: 'meta description \ud0dc\uadf8 \uc644\uc804\ud788 \ub204\ub77d' - Fail\ub85c \uac10\uc9c0"}, {"text": "json-ld-missing: JSON-LD \uad6c\uc870\ud654 \ub370\uc774\ud130 \ub204\ub77d \uac10\uc9c0", "passed": true, "evidence": "SEO-07: 'script type=application/ld+json \uc5c6\uc74c' - Fail\ub85c \uac10\uc9c0"}, {"text": "canonical-missing: canonical URL \ub204\ub77d \uac10\uc9c0", "passed": true, "evidence": "SEO-06: 'link rel=canonical \ud0dc\uadf8 \ub204\ub77d' - Fail\ub85c \uac10\uc9c0"}, {"text": "title-quality-issue: title \ud0dc\uadf8\uac00 \ub108\ubb34 \uc9e7\uac70\ub098 \uc77c\ubc18\uc801\uc784\uc744 \uc9c0\uc801", "passed": true, "evidence": "SEO-02: 'title\uc774 Sample Page(11\uc790)\ub85c \uad8c\uc7a5 \ubc94\uc704 50-60\uc790\uc5d0 \ud06c\uac8c \ubbf8\ub2ec' - Fail\ub85c \uac10\uc9c0"}]}}, {"id": "eval-2-meta-tags-structured-data-without_skill", "prompt": "index.html\uc758 \uba54\ud0c0 \ud0dc\uadf8\uc640 \uad6c\uc870\ud654 \ub370\uc774\ud130\ub97c SEO \uad00\uc810\uc5d0\uc11c \uc810\uac80\ud574\uc918", "eval_id": 2, "outputs": [{"name": "report.csv", "type": "text", "content": "ID,Category,Severity,Element/Line,Issue,Recommendation\n1,Meta Tags,High,<head> (line 3-18),Missing meta description tag,\"Add <meta name=\"\"description\"\" content=\"\"...\"\"> with a concise 150-160 character summary of the page content.\"\n2,Meta Tags,Medium,<head> (line 3-18),Missing Open Graph meta tags (og:title og:description og:image og:url og:type),\"Add Open Graph tags for better social media sharing: <meta property=\"\"og:title\"\" content=\"\"...\"\"> etc.\"\n3,Meta Tags,Medium,<head> (line 3-18),Missing Twitter Card meta tags (twitter:card twitter:title twitter:description twitter:image),\"Add Twitter Card tags: <meta name=\"\"twitter:card\"\" content=\"\"summary_large_image\"\"> etc.\"\n4,Meta Tags,Low,<head> (line 3-18),Missing canonical link tag,\"Add <link rel=\"\"canonical\"\" href=\"\"https://example.com/\"\"> to prevent duplicate content issues.\"\n5,Meta Tags,Low,<head> (line 3-18),Missing robots meta tag,\"Add <meta name=\"\"robots\"\" content=\"\"index, follow\"\"> to explicitly control crawler behavior.\"\n6,Meta Tags,Low,<title> (line 6),Title tag is generic - \"\"Sample Page\"\" is not descriptive or keyword-rich,\"Use a descriptive title (50-60 characters) containing primary keywords, e.g. \"\"Your Brand - Primary Keyword | Secondary Keyword\"\".\"\n7,Meta Tags,Low,<html> (line 2),Missing hreflang tags for internationalization,\"If targeting multiple languages/regions, add <link rel=\"\"alternate\"\" hreflang=\"\"x\"\" href=\"\"...\"\"> tags.\"\n8,Structured Data,High,<head> (line 3-18),No JSON-LD structured data present,\"Add JSON-LD <script type=\"\"application/ld+json\"\"> with at minimum a WebPage or Organization schema.\"\n9,Structured Data,High,Page-level,Missing Organization or WebSite schema markup,\"Add Organization schema with name, url, logo, and sameAs properties for brand recognition in search results.\"\n10,Structured Data,Medium,Page-level,No BreadcrumbList structured data,\"Add BreadcrumbList schema to enable breadcrumb display in search results.\"\n11,Structured Data,Low,Page-level,No SiteNavigationElement or SearchAction schema,\"Consider adding SearchAction (sitelinks searchbox) or SiteNavigationElement for enhanced SERP features.\"\n12,Accessibility/SEO,Medium,<img> (line 30),Image missing alt attribute - hurts both accessibility and image SEO,\"Add a descriptive alt attribute: <img src=\"\"/public/logo.png\"\" alt=\"\"Company logo\"\" ...>.\"\n13,Performance/SEO,Medium,<link> (line 10),Render-blocking CSS loaded synchronously in <head>,\"Use media=\"\"print\"\" onload=\"\"this.media='all'\"\" or preload pattern to avoid render-blocking.\"\n14,Performance/SEO,Medium,@font-face (line 13-17),Missing font-display: swap causes invisible text during font load (FOIT),\"Add font-display: swap; to the @font-face declaration to improve perceived load time.\"\n15,Meta Tags,Low,<head> (line 3-18),Missing favicon declaration,\"Add <link rel=\"\"icon\"\" href=\"\"/favicon.ico\"\"> and optionally apple-touch-icon for better branding in tabs and bookmarks.\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>SEO Review: Meta Tags &amp; Structured Data - index.html</title>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 960px; margin: 0 auto; padding: 24px; background: #f8f9fa; }\n    h1 { font-size: 1.6rem; margin-bottom: 8px; }\n    .subtitle { color: #555; margin-bottom: 24px; font-size: 0.95rem; }\n    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 32px; }\n    .summary-card { background: #fff; border-radius: 8px; padding: 16px; text-align: center; border: 1px solid #e0e0e0; }\n    .summary-card .count { font-size: 2rem; font-weight: 700; }\n    .summary-card .label { font-size: 0.85rem; color: #666; }\n    .high .count { color: #d32f2f; }\n    .medium .count { color: #f57c00; }\n    .low .count { color: #1976d2; }\n    .total .count { color: #333; }\n    section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #e0e0e0; }\n    section h2 { font-size: 1.15rem; margin-bottom: 14px; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }\n    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }\n    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }\n    th { background: #f5f5f5; font-weight: 600; }\n    .severity { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; color: #fff; }\n    .severity-high { background: #d32f2f; }\n    .severity-medium { background: #f57c00; }\n    .severity-low { background: #1976d2; }\n    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 0.85em; }\n    .rec { color: #2e7d32; font-style: italic; }\n    footer { margin-top: 32px; text-align: center; font-size: 0.8rem; color: #888; }\n  </style>\n</head>\n<body>\n\n  <h1>SEO Review: Meta Tags &amp; Structured Data</h1>\n  <p class=\"subtitle\">File: <code>index.html</code> | Reviewed: 2026-03-11 | Total issues: 15</p>\n\n  <div class=\"summary-grid\">\n    <div class=\"summary-card total\"><div class=\"count\">15</div><div class=\"label\">Total Issues</div></div>\n    <div class=\"summary-card high\"><div class=\"count\">3</div><div class=\"label\">High Severity</div></div>\n    <div class=\"summary-card medium\"><div class=\"count\">5</div><div class=\"label\">Medium Severity</div></div>\n    <div class=\"summary-card low\"><div class=\"count\">7</div><div class=\"label\">Low Severity</div></div>\n  </div>\n\n  <!-- Section 1: Meta Tags -->\n  <section>\n    <h2>1. Meta Tag Issues (8 findings)</h2>\n    <table>\n      <thead>\n        <tr><th>#</th><th>Severity</th><th>Location</th><th>Issue</th><th>Recommendation</th></tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>1</td>\n          <td><span class=\"severity severity-high\">HIGH</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>Missing <code>&lt;meta name=\"description\"&gt;</code> tag. This is one of the most critical on-page SEO elements; search engines use it for snippet generation.</td>\n          <td class=\"rec\">Add a meta description of 150-160 characters that accurately summarizes the page and includes target keywords.</td>\n        </tr>\n        <tr>\n          <td>2</td>\n          <td><span class=\"severity severity-medium\">MEDIUM</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>Missing Open Graph meta tags (<code>og:title</code>, <code>og:description</code>, <code>og:image</code>, <code>og:url</code>, <code>og:type</code>). Shared links on social platforms will not display rich previews.</td>\n          <td class=\"rec\">Add OG tags. At minimum: <code>og:title</code>, <code>og:description</code>, <code>og:image</code>, and <code>og:url</code>.</td>\n        </tr>\n        <tr>\n          <td>3</td>\n          <td><span class=\"severity severity-medium\">MEDIUM</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>Missing Twitter Card meta tags. Twitter/X shares will lack rich card rendering.</td>\n          <td class=\"rec\">Add <code>&lt;meta name=\"twitter:card\" content=\"summary_large_image\"&gt;</code> and corresponding title, description, image tags.</td>\n        </tr>\n        <tr>\n          <td>4</td>\n          <td><span class=\"severity severity-low\">LOW</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>Missing <code>&lt;link rel=\"canonical\"&gt;</code> tag. Without it, search engines may index duplicate URLs (e.g., with query parameters or trailing slashes).</td>\n          <td class=\"rec\">Add a self-referencing canonical URL: <code>&lt;link rel=\"canonical\" href=\"https://example.com/\"&gt;</code>.</td>\n        </tr>\n        <tr>\n          <td>5</td>\n          <td><span class=\"severity severity-low\">LOW</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>Missing <code>&lt;meta name=\"robots\"&gt;</code> tag. While the default is index/follow, explicit declaration is a best practice.</td>\n          <td class=\"rec\">Add <code>&lt;meta name=\"robots\" content=\"index, follow\"&gt;</code>.</td>\n        </tr>\n        <tr>\n          <td>6</td>\n          <td><span class=\"severity severity-low\">LOW</span></td>\n          <td><code>&lt;title&gt;</code> (line 6)</td>\n          <td>Title is generic: \"Sample Page\". Non-descriptive titles reduce click-through rates and miss keyword targeting opportunities.</td>\n          <td class=\"rec\">Use a descriptive, keyword-rich title of 50-60 characters. Format: \"Primary Keyword - Brand Name\".</td>\n        </tr>\n        <tr>\n          <td>7</td>\n          <td><span class=\"severity severity-low\">LOW</span></td>\n          <td><code>&lt;html&gt;</code> (line 2)</td>\n          <td>No <code>hreflang</code> tags present. If the site targets multiple regions or languages, this is needed for proper localization signals.</td>\n          <td class=\"rec\">Add <code>&lt;link rel=\"alternate\" hreflang=\"en\" href=\"...\"&gt;</code> if multilingual content exists.</td>\n        </tr>\n        <tr>\n          <td>8</td>\n          <td><span class=\"severity severity-low\">LOW</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>Missing favicon declaration. Favicons appear in browser tabs, bookmarks, and Google search results.</td>\n          <td class=\"rec\">Add <code>&lt;link rel=\"icon\" href=\"/favicon.ico\"&gt;</code> and <code>&lt;link rel=\"apple-touch-icon\" href=\"/apple-touch-icon.png\"&gt;</code>.</td>\n        </tr>\n      </tbody>\n    </table>\n  </section>\n\n  <!-- Section 2: Structured Data -->\n  <section>\n    <h2>2. Structured Data Issues (4 findings)</h2>\n    <table>\n      <thead>\n        <tr><th>#</th><th>Severity</th><th>Location</th><th>Issue</th><th>Recommendation</th></tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>9</td>\n          <td><span class=\"severity severity-high\">HIGH</span></td>\n          <td><code>&lt;head&gt;</code></td>\n          <td>No JSON-LD structured data is present anywhere in the document. Search engines cannot generate rich results (rich snippets, knowledge panels) without structured data.</td>\n          <td class=\"rec\">Add a <code>&lt;script type=\"application/ld+json\"&gt;</code> block with at minimum a <code>WebPage</code> schema including name, description, and url.</td>\n        </tr>\n        <tr>\n          <td>10</td>\n          <td><span class=\"severity severity-high\">HIGH</span></td>\n          <td>Page-level</td>\n          <td>Missing <code>Organization</code> or <code>WebSite</code> schema markup. Without this, Google cannot associate the page with a brand entity or enable sitelinks search box.</td>\n          <td class=\"rec\">Add Organization schema with <code>name</code>, <code>url</code>, <code>logo</code>, and <code>sameAs</code> (social profiles). Add WebSite schema with <code>SearchAction</code> for sitelinks search box eligibility.</td>\n        </tr>\n        <tr>\n          <td>11</td>\n          <td><span class=\"severity severity-medium\">MEDIUM</span></td>\n          <td>Page-level</td>\n          <td>No <code>BreadcrumbList</code> structured data. Breadcrumbs in search results improve CTR and help users understand site hierarchy.</td>\n          <td class=\"rec\">Add BreadcrumbList JSON-LD with <code>itemListElement</code> entries reflecting the page's position in the site hierarchy.</td>\n        </tr>\n        <tr>\n          <td>12</td>\n          <td><span class=\"severity severity-low\">LOW</span></td>\n          <td>Page-level</td>\n          <td>No <code>SearchAction</code> or <code>SiteNavigationElement</code> schema. These enable enhanced SERP features like sitelinks search box.</td>\n          <td class=\"rec\">Consider adding <code>SearchAction</code> within a <code>WebSite</code> schema to enable the sitelinks searchbox.</td>\n        </tr>\n      </tbody>\n    </table>\n  </section>\n\n  <!-- Section 3: SEO-Related Performance & Accessibility -->\n  <section>\n    <h2>3. SEO-Adjacent Issues (3 findings)</h2>\n    <table>\n      <thead>\n        <tr><th>#</th><th>Severity</th><th>Location</th><th>Issue</th><th>Recommendation</th></tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>13</td>\n          <td><span class=\"severity severity-medium\">MEDIUM</span></td>\n          <td><code>&lt;img&gt;</code> (line 30)</td>\n          <td>Image <code>/public/logo.png</code> is missing the <code>alt</code> attribute. Missing alt text harms image SEO and accessibility (a Core Web Vitals / page experience signal).</td>\n          <td class=\"rec\">Add a descriptive <code>alt</code> attribute, e.g., <code>alt=\"Company logo\"</code>.</td>\n        </tr>\n        <tr>\n          <td>14</td>\n          <td><span class=\"severity severity-medium\">MEDIUM</span></td>\n          <td><code>&lt;link&gt;</code> (line 10)</td>\n          <td>Render-blocking CSS loaded synchronously. This increases Largest Contentful Paint (LCP), which is a Google ranking factor.</td>\n          <td class=\"rec\">Use <code>media=\"print\" onload=\"this.media='all'\"</code> pattern or inline critical CSS and load the rest asynchronously.</td>\n        </tr>\n        <tr>\n          <td>15</td>\n          <td><span class=\"severity severity-medium\">MEDIUM</span></td>\n          <td><code>@font-face</code> (line 13-17)</td>\n          <td>Missing <code>font-display: swap</code>. This causes Flash of Invisible Text (FOIT), degrading CLS and user experience -- both ranking signals.</td>\n          <td class=\"rec\">Add <code>font-display: swap;</code> to the <code>@font-face</code> rule.</td>\n        </tr>\n      </tbody>\n    </table>\n  </section>\n\n  <!-- Recommended JSON-LD Example -->\n  <section>\n    <h2>Recommended JSON-LD Structured Data (Example)</h2>\n    <p style=\"margin-bottom: 12px; font-size: 0.9rem; color: #555;\">Below is a minimal JSON-LD block that addresses the structured data gaps identified above:</p>\n    <pre style=\"background: #f5f5f5; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; line-height: 1.5;\"><code>&lt;script type=\"application/ld+json\"&gt;\n{\n  \"@context\": \"https://schema.org\",\n  \"@graph\": [\n    {\n      \"@type\": \"Organization\",\n      \"name\": \"Example Company\",\n      \"url\": \"https://example.com\",\n      \"logo\": \"https://example td><td>CRP</td><td>No render-blocking scripts</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; no <code>&lt;script src=&gt;</code> tags present. Script loading strategy is managed by the framework bundler.</td>\n    </tr>\n    <tr>\n      <td>WP-02</td><td>CRP</td><td>LCP image fetchpriority + preload</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td><strong>dashboard.tsx line 50:</strong> The <code>&lt;img src=\"/public/promo.png\"&gt;</code> is the largest content element candidate. No <code>fetchpriority=\"high\"</code> is set and no <code>&lt;link rel=\"preload\" as=\"image\"&gt;</code> exists. If this image is the LCP element, add <code>fetchpriority=\"high\"</code> and a corresponding preload link in the document head.</td>\n    </tr>\n    <tr>\n      <td>WP-03</td><td>CRP</td><td>Critical CSS handling</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>No <code>&lt;link rel=\"stylesheet\"&gt;</code> tags in component files. CSS is handled via Tailwind utility classes (inline).</td>\n    </tr>\n    <tr>\n      <td>WP-04</td><td>Image</td><td>img width/height or aspect-ratio (CLS prevention)</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx line 50:</strong> <code>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\" /&gt;</code> has neither <code>width</code>/<code>height</code> attributes nor <code>aspect-ratio</code> CSS. When the image loads, the browser cannot reserve space, causing a layout shift (CLS).</td>\n    </tr>\n    <tr>\n      <td>WP-05</td><td>Image</td><td>loading=\"lazy\" for below-fold images</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx line 50:</strong> The image is positioned below the fold (after grid items with <code>className=\"mt-8\"</code>) but does not have <code>loading=\"lazy\"</code>. This causes unnecessary early loading and wastes bandwidth.</td>\n    </tr>\n    <tr>\n      <td>WP-06</td><td>Image</td><td>Modern image format (WebP/AVIF)</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx line 50:</strong> Uses <code>.png</code> format. No <code>&lt;picture&gt;</code> element with <code>.webp</code> or <code>.avif</code> sources. Modern formats offer 25-50% smaller file sizes.</td>\n    </tr>\n    <tr>\n      <td>WP-07</td><td>JS</td><td>Code splitting</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td>No dynamic <code>import()</code> expressions found in either file. The Dashboard component and its dependencies are bundled into a single chunk. For a dashboard page with potentially heavy content, route-based or component-based code splitting should be used.</td>\n    </tr>\n    <tr>\n      <td>WP-08</td><td>JS</td><td>Tree shaking patterns</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>No whole-library imports detected (e.g., <code>import _ from 'lodash'</code>). Imports are specific: <code>React</code>, <code>useEffect</code>, <code>useRef</code>, <code>useState</code> from React.</td>\n    </tr>\n    <tr>\n      <td>WP-09</td><td>JS</td><td>No layout thrashing</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 12-13:</strong> In <code>useEffect</code>, reads <code>containerRef.current.offsetHeight</code> (forces reflow) then immediately writes <code>containerRef.current.style.minHeight</code> (triggers another reflow). This is a layout thrashing pattern.</td>\n    </tr>\n    <tr>\n      <td>WP-10</td><td>Font</td><td>font-display optimization (no block)</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>No <code>@font-face</code> declarations in the reviewed files. Font loading is managed elsewhere.</td>\n    </tr>\n    <tr>\n      <td>WP-11</td><td>Font</td><td>Critical font preload</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td>No font preload links found in these component files. Ensure critical fonts are preloaded in the document head.</td>\n    </tr>\n    <tr>\n      <td>WP-12</td><td>LCP</td><td>LCP element in initial HTML</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 17-19:</strong> The main dashboard content (<code>items</code>) is loaded via <code>useEffect</code> + <code>setTimeout</code>, meaning the LCP text content is JS-dependent and not present in initial HTML. This delays LCP by at least 500ms after component mount.</td>\n    </tr>\n    <tr>\n      <td>WP-13</td><td>INP</td><td>Event handler immediate visual feedback</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>Card.tsx lines 11-21:</strong> The <code>handleClick</code> function performs DOM query and style mutation but provides no immediate visual state change (e.g., button press state, loading indicator). The user gets no immediate feedback on click.</td>\n    </tr>\n    <tr>\n      <td>WP-14</td><td>INP</td><td>Heavy computation deferred</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>No synchronous heavy loops or large data processing detected. The <code>setTimeout</code> in dashboard.tsx is asynchronous. No <code>requestIdleCallback</code> or Web Worker needed for current workloads.</td>\n    </tr>\n    <tr>\n      <td>WP-15</td><td>INP</td><td>React memo usage</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td><strong>Card.tsx:</strong> The <code>Card</code> component is not wrapped in <code>React.memo()</code>. If rendered in a list (as the pattern suggests), it will re-render on every parent state change. Consider wrapping with <code>React.memo</code> for performance.</td>\n    </tr>\n    <tr>\n      <td>WP-16</td><td>CLS</td><td>No dynamic insertion above viewport</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 17-19:</strong> <code>setItems([\"Dashboard\", \"Analytics\", \"Reports\"])</code> is called in <code>useEffect</code> after a 500ms delay, injecting content into the top of the <code>&lt;section&gt;</code> grid. Since this section is near the top of the viewport, this causes a layout shift as the new items push existing content (including the image) downward.</td>\n    </tr>\n    <tr>\n      <td>WP-17</td><td>CLS</td><td>Animations use only transform/opacity</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td>No CSS transitions or animations detected in these files. Tailwind classes used are static. However, <strong>Card.tsx line 19</strong> directly mutates <code>style.background</code> which could cause a repaint (though not a layout shift). Consider using CSS classes instead of direct style manipulation.</td>\n    </tr>\n    <tr>\n      <td>WP-18</td><td>CLS</td><td>Dynamic content space reservation</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 17-19, 41:</strong> The <code>&lt;section&gt;</code> grid that receives dynamically loaded items has no <code>min-height</code> or placeholder to reserve space. When items appear after 500ms, the layout shifts. Should reserve space with <code>min-height</code> or use skeleton placeholders.</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>Correction Guide</h2>\n\n<div class=\"fix-section\">\n<h3>WP-04 (Fail): Image missing width/height \u2014 CLS prevention</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 50</p>\n<p><strong>Current:</strong></p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\" /&gt;</pre>\n<p><strong>Fix:</strong></p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\"\n     width={800} height={400} /&gt;</pre>\n<p>Or use CSS aspect-ratio:</p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\"\n     className=\"mt-8 w-full\" style={{ aspectRatio: '2/1' }} /&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-05 (Fail): Below-fold image without lazy loading</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 50</p>\n<p><strong>Fix:</strong> Add <code>loading=\"lazy\"</code> and <code>decoding=\"async\"</code>:</p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\"\n     width={800} height={400} loading=\"lazy\" decoding=\"async\" /&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-06 (Fail): Legacy image format (.png)</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 50</p>\n<p><strong>Fix:</strong> Convert to WebP/AVIF and use <code>&lt;picture&gt;</code> for format fallback:</p>\n<pre>&lt;picture&gt;\n  &lt;source type=\"image/avif\" srcSet=\"/public/promo.avif\" /&gt;\n  &lt;source type=\"image/webp\" srcSet=\"/public/promo.webp\" /&gt;\n  &lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\"\n       width={800} height={400} loading=\"lazy\" decoding=\"async\" /&gt;\n&lt;/picture&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-07 (Fail): No code splitting</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code></p>\n<p><strong>Fix:</strong> Use <code>React.lazy()</code> for route-level or heavy component splitting:</p>\n<pre>// In router or parent component:\nconst Dashboard = React.lazy(() =&gt; import('./pages/dashboard'));</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-09 (Fail): Layout thrashing in useEffect</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> lines 12-13</p>\n<p><strong>Current:</strong></p>\n<pre>const h = containerRef.current.offsetHeight;\ncontainerRef.current.style.minHeight = h + \"px\";</pre>\n<p><strong>Fix:</strong> Use <code>requestAnimationFrame</code> to batch reads and writes, or use CSS <code>min-height</code> directly:</p>\n<pre>// Option 1: Use CSS instead\n// Remove the JS measurement entirely; set min-height via CSS class\n\n// Option 2: If measurement is needed, batch with rAF\nconst h = containerRef.current.offsetHeight;\nrequestAnimationFrame(() =&gt; {\n  containerRef.current.style.minHeight = h + \"px\";\n});</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-12 (Fail): LCP content loaded via JS (useEffect)</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> lines 17-19</p>\n<p><strong>Fix:</strong> Use server-side rendering (SSR) or static generation to include the initial items in the HTML:</p>\n<pre>// Next.js example:\nexport async function getServerSideProps() {\n  const items = [\"Dashboard\", \"Analytics\", \"Reports\"];\n  return { props: { items } };\n}\n\n// Or initialize state with data instead of loading in useEffect:\nconst [items] = useState([\"Dashboard\", \"Analytics\", \"Reports\"]);</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-13 (Fail): Click handler without immediate visual feedback</h3>\n<p><strong>File:</strong> <code>Card.tsx</code> lines 11-21</p>\n<p><strong>Fix:</strong> Add immediate visual state change on click:</p>\n<pre>const [isActive, setIsActive] = useState(false);\n\nconst handleClick = () =&gt; {\n  setIsActive(true); // Immediate visual feedback\n  // ... rest of handler\n};</pre>\n<p>Or use CSS <code>:active</code> pseudo-class for instant feedback.</p>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-16 (Fail): Dynamic content insertion above viewport causes CLS</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> lines 17-19</p>\n<p><strong>Fix:</strong> Either pre-render the items server-side (see WP-12 fix) or reserve space with a placeholder/skeleton:</p>\n<pre>{items.length === 0 ? (\n  &lt;div style={{ minHeight: '120px' }} className=\"animate-pulse bg-gray-100 rounded\" /&gt;\n) : (\n  items.map((item) =&gt; &lt;div key={item} className=\"border p-2\"&gt;{item}&lt;/div&gt;)\n)}</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-18 (Fail): No space reservation for dynamic content</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 41</p>\n<p><strong>Fix:</strong> Add <code>min-height</code> to the container section to prevent layout shift:</p>\n<pre>&lt;section ref={containerRef} className=\"grid gap-4\" style={{ minHeight: '300px' }}&gt;</pre>\n<p>Or use skeleton loading placeholders as shown in WP-16 fix above.</p>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-02 (Advisory): LCP image lacks fetchpriority and preload</h3>\n<p>If the promo image is the LCP element, add <code>fetchpriority=\"high\"</code> to the <code>&lt;img&gt;</code> tag and a <code>&lt;link rel=\"preload\" as=\"image\"&gt;</code> in the document head.</p>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-11 (Advisory): Font preload not present</h3>\n<p>Ensure critical fonts used on this page are preloaded in the document <code>&lt;head&gt;</code> with <code>&lt;link rel=\"preload\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</code>.</p>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-15 (Advisory): Card component not memoized</h3>\n<p>Wrap <code>Card</code> with <code>React.memo()</code> to prevent unnecessary re-renders when used in lists:</p>\n<pre>export default React.memo(Card);</pre>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-17 (Advisory): Direct style mutation in Card.tsx</h3>\n<p>Replace <code>(el as HTMLElement).style.background = \"yellow\"</code> with a React state-driven class toggle for better performance and predictability.</p>\n</div>\n\n</body>\n</html>\n"}], "grading": {"eval_id": 3, "eval_name": "image-cls-optimization", "configuration": "with_skill", "expectations": [{"text": "img-dimensions-missing: \uc774\ubbf8\uc9c0 width/height \uc18d\uc131 \ub204\ub77d \uac10\uc9c0", "passed": true, "evidence": "WP-04: 'promo.png\uc5d0 width/height \uc18d\uc131 \ub204\ub77d. CLS \uc704\ud5d8' - Fail\ub85c \uac10\uc9c0"}, {"text": "lazy-loading-missing: loading=lazy \ub204\ub77d \uac10\uc9c0", "passed": true, "evidence": "WP-05: 'below-fold \uc774\ubbf8\uc9c0\uc5d0 loading=lazy \uc5c6\uc74c' - Fail\ub85c \uac10\uc9c0"}, {"text": "layout-thrashing: \ub808\uc774\uc544\uc6c3 \uc2a4\ub798\uc2f1 \ud328\ud134 \uac10\uc9c0", "passed": true, "evidence": "WP-09: 'offsetHeight \uc77d\uae30 \uc9c1\ud6c4 style.minHeight \uc4f0\uae30 - \uac15\uc81c \ub9ac\ud50c\ub85c\uc6b0' - Fail\ub85c \uac10\uc9c0"}, {"text": "dynamic-content-cls: \ub3d9\uc801 \ucf58\ud150\uce20 CLS \ubb38\uc81c \uac10\uc9c0", "passed": true, "evidence": "WP-18: 'setTimeout\uc73c\ub85c \ub3d9\uc801 \ucf58\ud150\uce20 \uc0bd\uc785 \uc2dc min-height \ub4f1 \uacf5\uac04 \uc608\uc57d \uc5c6\uc74c' - Fail\ub85c \uac10\uc9c0"}]}}, {"id": "eval-3-image-cls-optimization-without_skill", "prompt": "dashboard.tsx\uc5d0\uc11c \uc774\ubbf8\uc9c0 \ucd5c\uc801\ud654\uc640 \ub80c\ub354\ub9c1 \uc131\ub2a5 \ubb38\uc81c\ub97c \uc810\uac80\ud574\uc918. \ud2b9\ud788 CLS \ubc29\uc9c0\ub791 \ub85c\ub529 \ucd5c\uc801\ud654 \uc704\uc8fc\ub85c", "eval_id": 3, "outputs": [{"name": "report.csv", "type": "text", "content": "id,file,line,severity,category,issue,recommendation\n1,dashboard.tsx,50,high,image-optimization,\"img element missing width and height attributes, causing CLS\",\"Add explicit width and height attributes to the <img> tag so the browser can reserve space before the image loads (e.g. <img width=\"\"800\"\" height=\"\"400\"\" .../>)\"\n2,dashboard.tsx,50,high,image-optimization,\"img element missing loading=\"\"lazy\"\" for below-fold image\",\"Add loading=\"\"lazy\"\" to defer loading of off-screen images and reduce initial page weight\"\n3,dashboard.tsx,50,medium,image-optimization,\"Image served as PNG without modern format alternatives\",\"Use <picture> with WebP/AVIF sources and PNG fallback, or use Next.js <Image> component for automatic format negotiation\"\n4,dashboard.tsx,50,medium,image-optimization,\"No srcset or sizes attributes for responsive images\",\"Add srcset and sizes attributes to serve appropriately sized images for different viewports\"\n5,dashboard.tsx,16-19,high,cls-prevention,\"Dynamic content inserted via setTimeout without reserved space\",\"Reserve layout space with min-height or CSS aspect-ratio on the container before async content arrives\"\n6,dashboard.tsx,10-14,high,rendering-performance,\"Layout thrashing in useEffect: offsetHeight read immediately followed by style.minHeight write\",\"Batch DOM reads and writes separately, or use requestAnimationFrame to schedule the style write after the read\"\n7,dashboard.tsx,45-47,medium,rendering-performance,\"List items rendered without key prop, causing inefficient reconciliation\",\"Add a stable unique key to each mapped element (e.g. key={item} or a unique id)\"\n8,dashboard.tsx,41,medium,cls-prevention,\"Grid container has no explicit min-height or aspect-ratio to hold space while items load\",\"Set a CSS min-height or skeleton placeholder on the grid section to prevent layout shift when items appear\"\n9,Card.tsx,17-20,low,rendering-performance,\"Direct DOM manipulation via document.querySelector instead of React ref\",\"Replace global DOM query with useRef to avoid unintended side effects and improve predictability\"\n10,Card.tsx,27,medium,cls-prevention,\"Duplicate id=\"\"card-item\"\" when Card is rendered in a list\",\"Use unique ids (e.g. based on title or index) to avoid DOM conflicts that can confuse assistive tech and cause unpredictable behavior\"\n11,Card.tsx,13,low,rendering-performance,\"console.log left in production code\",\"Remove console.log statements or gate them behind a development-only flag to avoid minor performance overhead\"\n12,dashboard.tsx,50,medium,image-optimization,\"No fetchpriority attribute to hint browser about image importance\",\"Add fetchpriority=\"\"low\"\" for below-fold promotional images to let the browser prioritize critical resources first\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>Image Optimization &amp; CLS Review - dashboard.tsx</title>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }\n  h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }\n  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }\n  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }\n  .summary-card { padding: 1rem; border-radius: 8px; text-align: center; }\n  .summary-card .count { font-size: 2rem; font-weight: 700; }\n  .summary-card .label { font-size: 0.85rem; color: #555; }\n  .high-bg { background: #fde8e8; }\n  .medium-bg { background: #fef3cd; }\n  .low-bg { background: #d4edda; }\n  .category-section { margin-bottom: 2rem; }\n  .category-section h2 { font-size: 1.2rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.4rem; margin-bottom: 1rem; }\n  .issue-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }\n  .issue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }\n  .issue-header .location { font-family: monospace; font-size: 0.85rem; color: #555; }\n  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }\n  .badge-high { background: #f5c6cb; color: #721c24; }\n  .badge-medium { background: #ffeeba; color: #856404; }\n  .badge-low { background: #c3e6cb; color: #155724; }\n  .issue-desc { margin-bottom: 0.5rem; }\n  .recommendation { background: #f8f9fa; border-left: 3px solid #007bff; padding: 0.5rem 0.75rem; font-size: 0.9rem; color: #333; }\n  .recommendation strong { color: #007bff; }\n  table.details { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.85rem; }\n  table.details th, table.details td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }\n  table.details th { background: #f4f4f4; }\n</style>\n</head>\n<body>\n\n<h1>Image Optimization &amp; CLS Prevention Review</h1>\n<p class=\"subtitle\">Target: <code>dashboard.tsx</code>, <code>Card.tsx</code> | Focus: CLS prevention, image optimization, rendering performance</p>\n\n<!-- Summary -->\n<div class=\"summary\">\n  <div class=\"summary-card high-bg\">\n    <div class=\"count\">3</div>\n    <div class=\"label\">High Severity</div>\n  </div>\n  <div class=\"summary-card medium-bg\">\n    <div class=\"count\">6</div>\n    <div class=\"label\">Medium Severity</div>\n  </div>\n  <div class=\"summary-card low-bg\">\n    <div class=\"count\">3</div>\n    <div class=\"label\">Low Severity</div>\n  </div>\n</div>\n\n<!-- Image Optimization -->\n<div class=\"category-section\">\n  <h2>Image Optimization (5 issues)</h2>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\"><code>&lt;img&gt;</code> element is missing <code>width</code> and <code>height</code> attributes. Without intrinsic dimensions the browser cannot reserve space during layout, directly causing Cumulative Layout Shift (CLS).</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add explicit <code>width</code> and <code>height</code> attributes that match the image's intrinsic aspect ratio. Example: <code>&lt;img src=\"/public/promo.png\" alt=\"Promo\" width=\"800\" height=\"400\" /&gt;</code>. Alternatively, use the CSS <code>aspect-ratio</code> property on the element.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">Below-fold image lacks <code>loading=\"lazy\"</code>. The image is rendered after a long scrollable grid section (<code>className=\"mt-8\"</code>), meaning it is almost certainly below the viewport on initial load.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add <code>loading=\"lazy\"</code> to the <code>&lt;img&gt;</code> tag. This defers the network request until the user scrolls near the image, saving bandwidth and improving Largest Contentful Paint (LCP) for above-fold content.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">Image is served as a single PNG with no modern format alternatives (WebP, AVIF). Modern formats reduce file size by 25-50% compared to PNG.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Use a <code>&lt;picture&gt;</code> element with <code>&lt;source&gt;</code> tags for AVIF and WebP, falling back to PNG. Or adopt the Next.js <code>&lt;Image&gt;</code> component which handles format negotiation automatically.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">No <code>srcset</code> or <code>sizes</code> attributes for responsive image serving. Mobile devices may download an image far larger than needed.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Provide multiple resolutions via <code>srcset</code> and define <code>sizes</code> to match your layout breakpoints.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">No <code>fetchpriority</code> attribute. For a below-fold promotional image, the browser may still fetch it with default priority, competing with critical above-fold resources.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add <code>fetchpriority=\"low\"</code> to deprioritize the below-fold image and let the browser focus bandwidth on above-fold content.</div>\n  </div>\n</div>\n\n<!-- CLS Prevention -->\n<div class=\"category-section\">\n  <h2>CLS Prevention (3 issues)</h2>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:16-19</span>\n    </div>\n    <p class=\"issue-desc\">Dynamic content is injected after a 500ms <code>setTimeout</code> with no space reserved in the layout. When the three list items appear, every element below them shifts downward -- a textbook CLS violation.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Reserve space before the async data arrives. Options: (1) set a CSS <code>min-height</code> on the grid container that accounts for the expected items, (2) render skeleton/placeholder elements immediately that are later replaced with real data, or (3) use CSS <code>contain: layout</code> on the container to prevent its children from affecting external layout.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:41</span>\n    </div>\n    <p class=\"issue-desc\">The grid container (<code>&lt;section&gt;</code>) has no explicit dimensions or skeleton state. Its height is entirely determined by its children, which arrive asynchronously.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add a <code>min-height</code> style or render placeholder skeleton cards so the layout is stable before real content loads.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">Card.tsx:27</span>\n    </div>\n    <p class=\"issue-desc\">All Card instances share the same <code>id=\"card-item\"</code>. Duplicate IDs can cause unpredictable behavior in assistive technology and in any JavaScript that queries by ID, potentially leading to layout or interaction bugs.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Generate unique IDs per Card instance (e.g., <code>id={`card-${title.toLowerCase().replace(/\\s+/g, '-')}`}</code>).</div>\n  </div>\n</div>\n\n<!-- Rendering Performance -->\n<div class=\"category-section\">\n  <h2>Rendering Performance (4 issues)</h2>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:10-14</span>\n    </div>\n    <p class=\"issue-desc\"><strong>Layout thrashing</strong> in <code>useEffect</code>: reading <code>offsetHeight</code> (forces a synchronous reflow) then immediately writing <code>style.minHeight</code> (invalidates layout, triggers another reflow). This forced-reflow cycle degrades frame rate and delays First Contentful Paint.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Separate reads and writes. Use <code>requestAnimationFrame</code> to schedule the write after the read:\n      <br/><code>const h = containerRef.current.offsetHeight;</code>\n      <br/><code>requestAnimationFrame(() => { containerRef.current.style.minHeight = h + \"px\"; });</code>\n      <br/>Or better yet, achieve the same result with pure CSS (<code>min-height: fit-content</code>).</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:45-47</span>\n    </div>\n    <p class=\"issue-desc\">List items rendered via <code>.map()</code> without a <code>key</code> prop. React cannot efficiently reconcile the list and may re-render all items instead of just the changed ones.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add a stable, unique key: <code>{items.map((item) => &lt;div key={item} ...&gt;)}</code>. If items can have duplicates, use a unique identifier or combine with the index.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-low\">LOW</span>\n      <span class=\"location\">Card.tsx:17-20</span>\n    </div>\n    <p class=\"issue-desc\">Direct DOM manipulation via <code>document.querySelector</code> inside a React component bypasses the virtual DOM, creating a mismatch between React's internal state and the actual DOM.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Use a <code>useRef</code> to reference the target element and update its style through state or the ref, staying within React's rendering model.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-low\">LOW</span>\n      <span class=\"location\">Card.tsx:13</span>\n    </div>\n    <p class=\"issue-desc\"><code>console.log</code> left in an event handler. While the performance impact is minor, it adds unnecessary overhead in production and can slow down the event loop if triggered frequently.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Remove the <code>console.log</code> or guard it with a development-only check (e.g., <code>if (process.env.NODE_ENV === 'development')</code>).</div>\n  </div>\n</div>\n\n<!-- Detailed Table -->\n<h2 style=\"margin-top:2rem; margin-bottom:1rem;\">Full Issue Table</h2>\n<table class=\"details\">\n<thead>\n<tr><th>#</th><th>File</th><th>Line</th><th>Severity</th><th>Category</th><th>Issue</th></tr>\n</thead>\n<tbody>\n<tr><td>1</td><td>dashboard.tsx</td><td>50</td><td>High</td><td>Image Optimization</td><td>Missing width/height attributes (CLS)</td></tr>\n<tr><td>2</td><td>dashboard.tsx</td><td>50</td><td>High</td><td>Image Optimization</td><td>Missing loading=\"lazy\" for below-fold image</td></tr>\n<tr><td>3</td><td>dashboard.tsx</td><td>50</td><td>Medium</td><td>Image Optimization</td><td>No modern format alternatives (WebP/AVIF)</td></tr>\n<tr><td>4</td><td>dash
