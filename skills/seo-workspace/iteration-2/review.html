<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Feedback ---- */
    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    /* ---- Grades (collapsible) ---- */
    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(255, 193, 7, 0.12); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(33, 150, 243, 0.12); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(255, 193, 7, 0.12); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    /* ---- Navigation ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    /* ---- Done overlay ---- */
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .done-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .done-card button:hover {
      background: var(--bg);
    }
    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>평가 리뷰: <span id="skill-name"></span></h1>
        <div class="instructions">각 출력을 검토하고 아래에 피드백을 남겨주세요. 화살표 키 또는 버튼으로 이동할 수 있습니다. 완료되면 피드백을 복사하여 Claude Code에 붙여넣으세요.</div>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">출력 결과</button>
      <button class="view-tab" onclick="switchView('benchmark')">벤치마크</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <!-- Prompt -->
      <div class="section">
        <div class="section-header">프롬프트 <span class="config-badge" id="config-badge" style="display:none;"></span></div>
        <div class="section-body">
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <!-- Outputs -->
      <div class="section">
        <div class="section-header">출력</div>
        <div class="section-body" id="outputs-body">
          <div class="empty-state">출력 파일을 찾을 수 없습니다</div>
        </div>
      </div>

      <!-- Previous Output (collapsible) -->
      <div class="section" id="prev-outputs-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="togglePrevOutputs()">
            <span class="arrow" id="prev-outputs-arrow">&#9654;</span>
            이전 출력
          </div>
        </div>
        <div class="grades-content" id="prev-outputs-content"></div>
      </div>

      <!-- Grades (collapsible) -->
      <div class="section" id="grades-section" style="display:none;">
        <div class="section-header">
          <div class="grades-toggle" onclick="toggleGrades()">
            <span class="arrow" id="grades-arrow">&#9654;</span>
            평가 등급
          </div>
        </div>
        <div class="grades-content" id="grades-content"></div>
      </div>

      <!-- Feedback -->
      <div class="section">
        <div class="section-header">피드백</div>
        <div class="section-body">
          <textarea
            class="feedback-textarea"
            id="feedback"
            placeholder="이 출력에 대해 어떻게 생각하시나요? 문제점, 제안사항, 또는 잘된 점이 있나요?"
          ></textarea>
          <div class="feedback-status" id="feedback-status"></div>
          <div class="prev-feedback" id="prev-feedback" style="display:none;">
            <div class="prev-feedback-label">이전 피드백</div>
            <div id="prev-feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="outputs-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; 이전</button>
      <button class="done-btn" id="done-btn" onclick="showDoneDialog()">모든 리뷰 제출</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">다음 &#8594;</button>
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">벤치마크 데이터가 없습니다. 벤치마크를 실행하면 여기에 정량적 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- Done overlay -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-card">
      <h2>리뷰 완료</h2>
      <p>피드백이 저장되었습니다. Claude Code 세션으로 돌아가서 리뷰가 끝났다고 알려주세요.</p>
      <div class="btn-row">
        <button onclick="closeDoneDialog()">확인</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ---- Embedded data (injected by generate_review.py) ----

ng에 width/height 미지정.\"\nWP-05,이미지,High,loading=lazy (below-fold),Fail,정적분석,\"index.html, dashboard.tsx\",\"index.html 30·33행, dashboard.tsx 50행: below-fold 이미지에 loading=\"\"lazy\"\" 미설정.\"\nWP-06,이미지,Medium,현대 이미지 포맷 (WebP/AVIF),Fail,정적분석,\"index.html, dashboard.tsx\",\"모든 이미지가 .png 포맷. <picture> 요소 및 WebP/AVIF 미사용.\"\nWP-07,JS,Medium,코드 스플리팅,Advisory,정적분석,dashboard.tsx,\"동적 import() 미사용. 앱 규모 확대 시 적용 권장.\"\nWP-08,JS,Medium,트리 쉐이킹 패턴,Pass,정적분석,dashboard.tsx,\"전체 라이브러리 임포트 패턴 미발견.\"\nWP-09,JS,High,레이아웃 스래싱 없음,Fail,정적분석,dashboard.tsx,\"11-13행: offsetHeight 읽기 직후 style.minHeight 쓰기 — 레이아웃 스래싱.\"\nWP-10,폰트,High,font-display 최적화 (block 금지),Fail,정적분석,index.html,\"13-17행: @font-face에 font-display 속성 누락.\"\nWP-11,폰트,High,중요 폰트 preload,Fail,정적분석,index.html,\"custom.woff2 사용하나 <link rel=\"\"preload\"\" as=\"\"font\"\"> 없음.\"\nWP-12,LCP,Critical,LCP 요소 초기 HTML에 존재,Fail,정적분석,dashboard.tsx,\"17-19행: 주요 콘텐츠가 useEffect+setTimeout으로 JS 실행 후에만 렌더링.\"\nWP-13,INP,High,이벤트 핸들러 즉각 시각 피드백,Advisory,정적분석,dashboard.tsx,\"29-36행: SVG 버튼에 클릭 핸들러 미정의. 추가 시 즉각 피드백 구현 권장.\"\nWP-14,INP,High,무거운 연산 지연 처리,Pass,정적분석,dashboard.tsx,\"동기적 무거운 연산 루프 미발견.\"\nWP-15,INP,Medium,React memo 활용,Advisory,정적분석,dashboard.tsx,\"Dashboard 컴포넌트에 React.memo() 미적용. 규모 확대 시 권장.\"\nWP-16,CLS,High,뷰포트 위 동적 삽입 금지,Pass,정적분석,\"index.html, dashboard.tsx\",\"prepend()/insertBefore() 패턴 미발견.\"\nWP-17,CLS,Medium,애니메이션 transform/opacity만,Pass,정적분석,\"index.html, dashboard.tsx\",\"레이아웃 속성(height/width/top/left 등) transition 미발견.\"\nWP-18,CLS,High,동적 콘텐츠 공간 예약,Fail,정적분석,dashboard.tsx,\"41행: setTimeout으로 동적 삽입되는 아이템에 min-height 등 공간 예약 없음.\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>SEO &amp; Web Performance 검토 결과</title>\n<style>\n  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 1200px; margin: 0 auto; padding: 24p L)</div></div>\n    <div class=\"stat-card\"><div class=\"number pass\">11</div><div class=\"label\">통과 (PASS)</div></div>\n    <div class=\"stat-card\"><div class=\"number warn\">3</div><div class=\"label\">권고 (Advisory)</div></div>\n    <div class=\"stat-card\"><div class=\"number na\">1</div><div class=\"label\">해당없음 (N/A)</div></div>\n  </div>\n  <p style=\"margin-top:12px; color:#6b7280; font-size:14px;\">Lighthouse 실행 불가 (개발 서버 없음) &mdash; 전체 항목 정적분석으로 판정</p>\n</div>\n\n<h2>Technical SEO (11항목)</h2>\n<table>\n  <thead>\n    <tr><th>코드</th><th>우선순위</th><th>항목</th><th>결과</th><th>판정방식</th><th>발견된 문제</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>SEO-01</td><td>Critical</td><td>noindex 없음</td>\n      <td class=\"pass\">&#10003; Pass</td><td>정적분석</td>\n      <td>두 파일 모두 noindex 메타 태그 없음. 정상.</td>\n    </tr>\n    <tr>\n      <td>SEO-02</td><td>Critical</td><td>title 태그 존재하고 고유 (50-60자)</td>\n      <td class=\"fail\">&#10007; Fail</td><td>정적분석</td>\n      <td><strong>index.html</strong>: <code>&lt;title&gt;Sample Page&lt;/title&gt;</code> &mdash; 11자로 너무 짧음 (권장 50-60자). 페이지 내용을 대표하지 못하는 범용적 제목.<br>\n      <strong>dashboard.tsx</strong>: React 컴포넌트에 title 설정 없음 (document.title 또는 Helmet 등 미사용).</td>\n    </tr>\n    <tr>\n      <td>SEO-03</td><td>Critical</td><td>페이지당 h1 하나</td>\n      <td class=\"pass\">&#10003; Pass</td><td>정적분석</td>\n      <td>index.html: h1 1개. dashboard.tsx: h1 1개. 정상.</td>\n    </tr>\n    <tr>\n      <td>SEO-04</td><td>Critical</td><td>HTTPS 사용</td>\n      <td class=\"pass\">&#10003; Pass</td><td>정적분석</td>\n      <td>index.html의 외부 링크 및 리소스가 모두 https:// 사용. dashboard.tsx는 상대경로 사용. 정상.</td>\n    </tr>\n    <tr>\n      <td>SEO-05</td><td>High</td><td>meta description 존재 (150-160자)</td>\n      <td class=\"fail\">&#10007; Fail</td><td>정적분석</td>\n      <td><strong>index.html</strong>: <code>&lt;meta name=\"description\"&gt;</code> 태그 완전 누락. 검색 결과에 적절한 설명이 표시되지 않음.</td>\n    </tr>\n    <tr>\n      <td>SEO-06</td><td>High</td><td>canonical URL 설정 td><td>트리 쉐이킹 패턴</td>\n      <td class=\"pass\">&#10003; Pass</td><td>정적분석</td>\n      <td>전체 라이브러리 임포트 (<code>import _ from 'lodash'</code> 등) 패턴 미발견.</td>\n    </tr>\n    <tr>\n      <td>WP-09</td><td>JS</td><td>레이아웃 스래싱 없음</td>\n      <td class=\"fail\">&#10007; Fail</td><td>정적분석</td>\n      <td><strong>dashboard.tsx (11-13행)</strong>: <code>useEffect</code> 내에서 <code>offsetHeight</code> 읽기 직후 <code>style.minHeight</code> 쓰기 &mdash; 레이아웃 스래싱 패턴.</td>\n    </tr>\n    <tr>\n      <td>WP-10</td><td>폰트</td><td>font-display 최적화 (block 금지)</td>\n      <td class=\"fail\">&#10007; Fail</td><td>정적분석</td>\n      <td><strong>index.html (13-17행)</strong>: <code>@font-face</code>에 <code>font-display</code> 속성 누락. 폰트 로딩 중 텍스트가 보이지 않을 수 있음 (FOIT).</td>\n    </tr>\n    <tr>\n      <td>WP-11</td><td>폰트</td><td>중요 폰트 preload</td>\n      <td class=\"fail\">&#10007; Fail</td><td>정적분석</td>\n      <td><strong>index.html</strong>: <code>/fonts/custom.woff2</code> 사용하나 <code>&lt;link rel=\"preload\" as=\"font\"&gt;</code> 없음.</td>\n    </tr>\n    <tr>\n      <td>WP-12</td><td>LCP</td><td>LCP 요소 초기 HTML에 존재</td>\n      <td class=\"fail\">&#10007; Fail</td><td>정적분석</td>\n      <td><strong>dashboard.tsx (17-19행)</strong>: 대시보드 주요 콘텐츠가 <code>useEffect</code> + <code>setTimeout</code>으로 JS 실행 후에만 렌더링됨. LCP 지연 원인.</td>\n    </tr>\n    <tr>\n      <td>WP-13</td><td>INP</td><td>이벤트 핸들러 즉각 시각 피드백</td>\n      <td class=\"warn\">&#9888; Advisory</td><td>정적분석</td>\n      <td><strong>dashboard.tsx (29-36행)</strong>: SVG 아이콘 버튼에 클릭 핸들러 미정의 상태. 핸들러 추가 시 즉각적 시각 피드백(loading 상태 등) 구현 권장.</td>\n    </tr>\n    <tr>\n      <td>WP-14</td><td>INP</td><td>무거운 연산 지연 처리</td>\n      <td class=\"pass\">&#10003; Pass</td><td>정적분석</td>\n      <td>동기적 무거운 연산 루프 미발견.</td>\n    </tr>\n    <tr>\n      <td>WP-15</td><td>INP</td><td>React memo 활용</td>\n      <td class=\"warn\">&#9888; Advisory</td><td>정적분석</td>\n      <td><strong>dashboard.tsx</strong>: Dashboard 컴포넌트에 <code>React.memo()</code> 미적용. 부모 리렌더 시 불필요한 리렌더 발생 가 de>defer</code> 속성을 추가하거나, DOM 조작이 필요한 경우 <code>DOMContentLoaded</code> 이벤트를 사용하세요.</p>\n<pre>&lt;!-- 수정 후 --&gt;\n&lt;script defer src=\"/scripts/main.js\"&gt;&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-02: LCP 이미지 최적화 (index.html 27행)</h4>\n<pre>&lt;!-- head 내 preload 추가 --&gt;\n&lt;link rel=\"preload\" href=\"/public/hero.png\" as=\"image\" fetchpriority=\"high\"&gt;\n\n&lt;!-- img 태그에 fetchpriority 추가 --&gt;\n&lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-03: Critical CSS 처리 (index.html 10행)</h4>\n<pre>&lt;!-- 수정 전 --&gt;\n&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\" /&gt;\n\n&lt;!-- 수정 후: Critical CSS 인라인 + 나머지 비동기 로드 --&gt;\n&lt;style&gt;/* 위 폴드 필수 CSS */&lt;/style&gt;\n&lt;link rel=\"preload\" href=\"https://cdn.example.com/styles.css\" as=\"style\" onload=\"this.onload=null;this.rel='stylesheet'\"&gt;\n&lt;noscript&gt;&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\"&gt;&lt;/noscript&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-04: 이미지 width/height 추가</h4>\n<p><strong>index.html (33행)</strong> 및 <strong>dashboard.tsx (50행)</strong>:</p>\n<pre>&lt;!-- 수정 전 --&gt;\n&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" /&gt;\n\n&lt;!-- 수정 후 --&gt;\n&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"800\" height=\"400\" /&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-05: loading=\"lazy\" 추가</h4>\n<p>LCP 이미지가 아닌 below-fold 이미지에 lazy loading 적용:</p>\n<pre>&lt;img src=\"/public/logo.png\" width=\"120\" height=\"40\" loading=\"lazy\" alt=\"Logo\"&gt;\n&lt;img src=\"/public/promo.png\" alt=\"Promo\" width=\"800\" height=\"400\" loading=\"lazy\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-06: WebP/AVIF 포맷 적용</h4>\n<pre>&lt;picture&gt;\n  &lt;source type=\"image/avif\" srcset=\"/public/hero.avif\"&gt;\n  &lt;source type=\"image/webp\" srcset=\"/public/hero.webp\"&gt;\n  &lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\"&gt;\n&lt;/picture&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-09: 레이아웃 스래싱 수정 (dashboard.tsx 11-13행)</h4>\n<pre>// 수정 전\nconst h = containerRef.current.offsetHeight;\ncontainerRef.current.style.minHeight = h + \"px\";\n\n// 수정 후: requestAnimationFrame으로 읽기/쓰기 분리\nrequestAnimationFrame(() =&gt; {\n  const h = containerRef.current.offsetHeight;\n  requestAnimationFrame(() =&gt; {\n    containerRef.current.style.minHeight = h + \"px\";\n  });\n});</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-10: font-display 추가 (index.html 13-17행)</h4>\n<pre>@font-face {\n  font-family: \"CustomFont\";\n  src: url(\"/fonts/custom.woff2\") format(\"woff2\");\n  font-display: swap;  /* 또는 optional */\n}</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-11: 폰트 preload 추가 (index.html head 내)</h4>\n<pre>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-12: LCP 요소 초기 HTML 렌더링 (dashboard.tsx 17-19행)</h4>\n<p>대시보드 콘텐츠가 <code>useEffect</code> + <code>setTimeout</code>으로 지연 로딩됩니다. 서버 사이드 렌더링(SSR) 또는 초기 상태에 기본 데이터를 포함시키세요.</p>\n<pre>// 수정 전\nconst [items, setItems] = useState&lt;string[]&gt;([]);\n\n// 수정 후: 초기 데이터 포함\nconst [items, setItems] = useState&lt;string[]&gt;([\"Dashboard\", \"Analytics\", \"Reports\"]);</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-18: 동적 콘텐츠 공간 예약 (dashboard.tsx 41행)</h4>\n<pre>&lt;!-- 수정 전 --&gt;\n&lt;section ref={containerRef} className=\"grid gap-4\"&gt;\n\n&lt;!-- 수정 후: min-height로 공간 예약 --&gt;\n&lt;section ref={containerRef} className=\"grid gap-4\" style={{ minHeight: '200px' }}&gt;</pre>\n</div>\n\n</body>\n</html>\n"}], "grading": {"expectations": [{"text": "리포트가 29개 항목(SEO-01~11, WP-01~18)을 모두 포함", "passed": true, "evidence": "CSV contains all 29 items: SEO-01 through SEO-11 (11 items) and WP-01 th a tag,\"Add <meta name=\"\"robots\"\" content=\"\"index, follow\"\"> to explicitly control crawling\"\nindex.html,10,Medium,Performance,Render-blocking CSS in head,\"Use media attribute, preload, or load CSS asynchronously to prevent render blocking\"\nindex.html,13-17,Medium,Performance,@font-face missing font-display: swap,\"Add font-display: swap to prevent invisible text during font loading (FOIT)\"\nindex.html,30,Critical,Accessibility/SEO,Image missing alt attribute,\"Add descriptive alt attribute to all images for accessibility and image SEO\"\nindex.html,33,Medium,Performance/CLS,Image missing width and height attributes,\"Add explicit width and height attributes to prevent Cumulative Layout Shift (CLS)\"\nindex.html,37-44,Low,Performance,Inline render-blocking script in body,\"Move script to end of body with defer attribute, or use async loading\"\nindex.html,42,Low,Security/SEO,innerHTML usage with user input (XSS risk),\"Use textContent instead of innerHTML to prevent XSS attacks; search engines may flag insecure pages\"\nindex.html,-,High,Sitemap,No reference to sitemap.xml,\"Add sitemap.xml and reference it in robots.txt for better crawlability\"\nindex.html,-,Medium,Mobile,No theme-color meta tag,\"Add <meta name=\"\"theme-color\"\" content=\"\"#...\"\"> for mobile browser theming\"\ndashboard.tsx,-,Critical,Meta Tags,No page title or meta tags defined,\"Use Next.js Head component or React Helmet to set title, description, and other meta tags\"\ndashboard.tsx,-,High,Meta Tags,No meta description for this page/route,\"Ensure each route/page has a unique meta description via Head or Helmet component\"\ndashboard.tsx,-,High,Structured Data,No structured data for dashboard content,\"Add JSON-LD structured data appropriate to the page content\"\ndashboard.tsx,16-19,Medium,Performance/CLS,Dynamic content insertion without size reservation causes CLS,\"Reserve space with min-height or use CSS aspect-ratio to prevent layout shift when items load\"\ndashboard.tsx,50,Medium,Performance,Below-fold image missing loading=\"\"lazy\"\" attribute,\"Add loading=\"\"lazy\"\" to images below the fold to improve initial page load performance\"\ndashboard.tsx,50,Medium,Performance/CLS,Image missing explicit width and height,\"Add width and height attributes to prevent CLS; use CSS aspect-ratio as fallback\"\ndashboard.tsx,45-46,Low,Performance,List items rendered without stable key prop,\"Add unique key prop to mapped elements; while primarily a React concern, it affects rendering performance\"\ndashboard.tsx,29-36,Medium,Accessibility/SEO,Icon buttons missing aria-label,\"Add aria-label to icon-only buttons for screen reader accessibility; improves overall page quality signals\"\ndashboard.tsx,-,Medium,SEO,No semantic heading hierarchy across the app,\"Ensure h1 is used once per page and heading levels follow a logical h1>h2>h3 order\"\ndashboard.tsx,-,Low,Navigation,No breadcrumb or internal link structure,\"Add breadcrumb navigation with structured data for better crawl context and SERP display\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>SEO Optimization Review Report</title>\n  <style>\n    :root {\n      --critical: #dc2626;\n      --high: #ea580c;\n      --medium: #ca8a04;\n      --low: #2563eb;\n      --good: #16a34a;\n      --bg: #f8fafc;\n      --card: #ffffff;\n      --border: #e2e8f0;\n      --text: #1e293b;\n      --text-muted: #64748b;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    body {\n      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n      background: var(--bg);\n      color: var(--text);\n      line-height: 1.6;\n      padding: 2rem;\n    }\n    .container { max-width: 1100px; margin: 0 auto; }\n    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }\n    .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }\n    .summary-grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n      gap: 1rem;\n      margin-bottom: 2rem;\n    }\n    .summary-card {\n      background: var(--card);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      padding: 1.25rem;\n      text-align: center;\n    }\n    .summary-card .count {\n      font-size: 2rem;\n      font-weight: 700;\n    }\n    .summary-card .label {\n      font-size: 0.85rem;\n      color: var(--text-muted);\n      text-transform: uppercase;\n      letter-spacing: 0.05em;\n    }\n    .critical .count { color: var(--critical); }\n    .high .count { color: var(--high); }\n    .medium .count { color: var(--medium); }\n    .low .count { color: var(--low); }\n    .score-card .count { color: var(--critical); }\n\n    .file-section {\n      background: var(--card);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      margin-bottom: 1.5rem;\n      overflow: hidden;\n    }\n    .file-header {\n      background: #f1f5f9;\n      padding: 1rem 1.25rem;\n      font-weight: 600;\n      font-size: 1.1rem;\n      border-bottom: 1px solid var(--border);\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n    }\n    .file-score {\n      font-size: 0.85rem;\n      padding: 0.25rem 0.75rem;\n      border-radius: 999px;\n      font-weight: 600;\n    }\n    .score-bad { background: #fef2f2; color: var(--critical); }\n    .score-warn { background: #fffbeb; color: var(--medium); }\n\n    .issue-table {\n      width: 100%;\n      border-collapse: collapse;\n    }\n    .issue-table th {\n      text-align: left;\n      padding: 0.6rem 1rem;\n      background: #f8fafc;\n      font-size: 0.8rem;\n      text-transform: uppercase;\n      letter-spacing: 0.05em;\n      color: var(--text-muted);\n      border-bottom: 1px solid var(--border);\n    }\n    .issue-table td {\n      padding: 0.75rem 1rem;\n      border-bottom: 1px solid var(--border);\n      font-size: 0.9rem;\n      vertical-align: top;\n    }\n    .issue-table tr:last-child td { border-bottom: none; }\n\n    .badge {\n      display: inline-block;\n      padding: 0.15rem 0.6rem;\n      border-radius: 999px;\n      font-size: 0.75rem;\n      font-weight: 600;\n      text-transform: uppercase;\n    }\n    .badge-critical { background: #fef2f2; color: var(--critical); }\n    .badge-high { background: #fff7ed; color: var(--high); }\n    .badge-medium { background: #fffbeb; color: var(--medium); }\n    .badge-low { background: #eff6ff; color: var(--low); }\n\n    .category-tag {\n      display: inline-block;\n      padding: 0.1rem 0.5rem;\n      background: #f1f5f9;\n      border-radius: 4px;\n      font-size: 0.78rem;\n      color: var(--text-muted);\n      margin-right: 0.25rem;\n    }\n\n    .recommendation {\n      color: var(--text-muted);\n      font-size: 0.85rem;\n      margin-top: 0.25rem;\n    }\n\n    .footer {\n      text-align: center;\n      margin-top: 2rem;\n      padding-top: 1.5rem;\n      border-top: 1px solid var(--border);\n      color: var(--text-muted);\n      font-size: 0.85rem;\n    }\n\n    .overall-score {\n      text-align: center;\n      margin-bottom: 2rem;\n    }\n    .overall-score .big-score {\n      font-size: 3.5rem;\n      font-weight: 800;\n    }\n    .overall-score .out-of {\n      font-size: 1.2rem;\n      color: var(--text-muted);\n    }\n  </style>\n</head>\n<body>\n  <div class=\"container\">\n    <h1>SEO Optimization Review Report</h1>\n    <p class=\"subtitle\">Generated: 2026-03-11 | Files reviewed: index.html, dashboard.tsx</p>\n\n    <div class=\"overall-score\">\n      <div class=\"big-score\" style=\"color: var(--critical);\">32<span class=\"out-of\"> / 100</span></div>\n      <p style=\"color: var(--text-muted); font-size:0.95rem;\">Overall SEO Score</p>\n    </div>\n\n    <div class=\"summary-grid\">\n      <div class=\"summary-card critical\">\n        <div class=\"count\">3</div>\n        <div class=\"label\">Critical</div>\n      </div>\n      <div class=\"summary-card high\">\n        <div class=\"count\">5</div>\n        <div class=\"label\">High</div>\n      </div>\n      <div class=\"summary-card medium\">\n        <div class=\"count\">12</div>\n        <div class=\"label\">Medium</div>\n      </div>\n      <div class=\"summary-card low\">\n        <div class=\"count\">4</div>\n        <div class=\"label\">Low</div>\n      </div>\n      <div class=\"summary-card\">\n        <div class=\"count\" style=\"color: var(--good);\">2</div>\n        <div class=\"label\">Files</div>\n      </div>\n    </div>\n\n    <!-- index.html -->\n    <div class=\"file-section\">\n      <div class=\"file-header\">\n        <span>index.html</span>\n        <span class=\"file-score score-bad\">SEO Score: 30/100</span>\n      </div>\n      <table class=\"issue-table\">\n        <thead>\n          <tr>\n            <th style=\"width:60px;\">Line</th>\n            <th style=\"width:80px;\">Severity</th>\n            <th style=\"width:140px;\">Category</th>\n            <th>Issue &amp; Recommendation</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr>\n            <td>7</td>\n            <td><span class=\"badge badge-critical\">Critical</span></td>\n            <td><span class=\"category-tag\">Meta Tags</span></td>\n            <td>\n              <strong>Missing meta description tag</strong>\n              <div class=\"recommendation\">Add <code>&lt;meta name=\"description\" content=\"...\"&gt;</code> with a unique 150-160 character description summarizing the page content. This directly impacts click-through rates from search results.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>30</td>\n            <td><span class=\"badge badge-critical\">Critical</span></td>\n            <td><span class=\"category-tag\">Accessibility</span><span class=\"category-tag\">SEO</span></td>\n            <td>\n              <strong>Image missing alt attribute</strong>\n              <div class=\"recommendation\">Add a descriptive <code>alt</code> attribute to <code>&lt;img src=\"/public/logo.png\"&gt;</code>. Missing alt text hurts both accessibility and image search SEO. If the image is decorative, use <code>alt=\"\"</code>.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>6</td>\n            <td><span class=\"badge badge-high\">High</span></td>\n            <td><span class=\"category-tag\">Meta Tags</span></td>\n            <td>\n              <strong>Title tag is too generic (\"Sample Page\")</strong>\n              <div class=\"recommendation\">Replace with a descriptive, keyword-rich title of 50-60 characters that accurately describes the page content. The title tag is one of the most important on-page SEO factors.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>8</td>\n            <td><span class=\"badge badge-high\">High</span></td>\n            <td><span class=\"category-tag\">Structured Data</span></td>\n            <td>\n              <strong>No JSON-LD structured data</strong>\n              <div class=\"recommendation\">Add a <code>&lt;script type=\"application/ld+json\"&gt;</code> block with appropriate schema (e.g., Organization, WebPage, BreadcrumbList) to enable rich results in search engines.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-high\">High</span></td>\n            <td><span class=\"category-tag\">Meta Tags</span></td>\n            <td>\n              <strong>Missing canonical link tag</strong>\n              <div class=\"recommendation\">Add <code>&lt;link rel=\"canonical\" href=\"https://...\"&gt;</code> to specify the preferred URL and prevent duplicate content issues across URL variations.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-high\">High</span></td>\n            <td><span class=\"category-tag\">Crawlability</span></td>\n            <td>\n              <strong>No reference to sitemap.xml</strong>\n              <div class=\"recommendation\">Create a sitemap.xml and reference it in robots.txt. Sitemaps help search engine crawlers discover and index all pages efficiently.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Social SEO</span></td>\n            <td>\n              <strong>Missing Open Graph meta tags</strong>\n              <div class=\"recommendation\">Add <code>og:title</code>, <code>og:description</code>, <code>og:image</code>, and <code>og:url</code> meta tags to control how the page appears when shared on social platforms.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Social SEO</span></td>\n            <td>\n              <strong>Missing Twitter Card meta tags</strong>\n              <div class=\"recommendation\">Add <code>twitter:card</code>, <code>twitter:title</code>, <code>twitter:description</code> meta tags for optimized display on Twitter/X.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Meta Tags</span></td>\n            <td>\n              <strong>Missing robots meta tag</strong>\n              <div class=\"recommendation\">Add <code>&lt;meta name=\"robots\" content=\"index, follow\"&gt;</code> to explicitly control search engine crawling and indexing behavior.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>10</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Performance</span></td>\n            <td>\n              <strong>Render-blocking CSS loaded synchronously in head</strong>\n              <div class=\"recommendation\">Use <code>media</code> attribute, <code>&lt;link rel=\"preload\"&gt;</code>, or load CSS asynchronously to prevent render-blocking. Page speed is a confirmed Google ranking factor.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>13-17</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Performance</span></td>\n            <td>\n              <strong>@font-face missing font-display: swap</strong>\n              <div class=\"recommendation\">Add <code>font-display: swap</code> to prevent Flash of Invisible Text (FOIT) and improve Largest Contentful Paint (LCP) scores.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>33</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Performance</span><span class=\"category-tag\">CLS</span></td>\n            <td>\n              <strong>Image missing width and height attributes</strong>\n              <div class=\"recommendation\">Add explicit <code>width</code> and <code>height</code> attributes to <code>&lt;img src=\"/public/promo.png\"&gt;</code> to prevent Cumulative Layout Shift (CLS). CLS is a Core Web Vital that affects rankings.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Mobile</span></td>\n            <td>\n              <strong>No theme-color meta tag</strong>\n              <div class=\"recommendation\">Add <code>&lt;meta name=\"theme-color\" content=\"#...\"&gt;</code> for mobile browser theming and improved mobile experience.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>37-44</td>\n            <td><span class=\"badge badge-low\">Low</span></td>\n            <td><span class=\"category-tag\">Performance</span></td>\n            <td>\n              <strong>Inline render-blocking script in body</strong>\n              <div class=\"recommendation\">Move script to end of body with <code>defer</code> attribute, or use async loading to avoid blocking page rendering.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>42</td>\n            <td><span class=\"badge badge-low\">Low</span></td>\n            <td><span class=\"category-tag\">Security</span></td>\n            <td>\n              <strong>innerHTML usage with user input (XSS risk)</strong>\n              <div class=\"recommendation\">Use <code>textContent</code> instead of <code>innerHTML</code> to prevent XSS attacks. Search engines may flag insecure pages, and Chrome shows security warnings that hurt user trust.</div>\n            </td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n\n    <!-- dashboard.tsx -->\n    <div class=\"file-section\">\n      <div class=\"file-header\">\n        <span>dashboard.tsx</span>\n        <span class=\"file-score score-bad\">SEO Score: 35/100</span>\n      </div>\n      <table class=\"issue-table\">\n        <thead>\n          <tr>\n            <th style=\"width:60px;\">Line</th>\n            <th style=\"width:80px;\">Severity</th>\n            <th style=\"width:140px;\">Category</th>\n            <th>Issue &amp; Recommendation</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-critical\">Critical</span></td>\n            <td><span class=\"category-tag\">Meta Tags</span></td>\n            <td>\n              <strong>No page title or meta tags defined</strong>\n              <div class=\"recommendation\">Use Next.js <code>&lt;Head&gt;</code> component or React Helmet to set a unique <code>&lt;title&gt;</code>, <code>meta description</code>, and other SEO meta tags for this route. Without these, the page is essentially invisible to search engines.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-high\">High</span></td>\n            <td><span class=\"category-tag\">Meta Tags</span></td>\n            <td>\n              <strong>No meta description for this page/route</strong>\n              <div class=\"recommendation\">Ensure each route has a unique meta description. For React SPAs, use a head management library to inject meta tags dynamically per route.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-high\">High</span></td>\n            <td><span class=\"category-tag\">Structured Data</span></td>\n            <td>\n              <strong>No structured data for dashboard content</strong>\n              <div class=\"recommendation\">Add JSON-LD structured data appropriate to the page content (e.g., WebApplication, SoftwareApplication schema) to enable rich results.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>16-19</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Performance</span><span class=\"category-tag\">CLS</span></td>\n            <td>\n              <strong>Dynamic content insertion without size reservation causes CLS</strong>\n              <div class=\"recommendation\">Reserve space with <code>min-height</code> or use CSS <code>aspect-ratio</code> to prevent layout shift when items load asynchronously. CLS is a Core Web Vital ranking factor.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>50</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Performance</span></td>\n            <td>\n              <strong>Below-fold image missing loading=\"lazy\" attribute</strong>\n              <div class=\"recommendation\">Add <code>loading=\"lazy\"</code> to images below the fold to defer loading until they are near the viewport. This improves initial page load performance and LCP.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>50</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Performance</span><span class=\"category-tag\">CLS</span></td>\n            <td>\n              <strong>Image missing explicit width and height</strong>\n              <div class=\"recommendation\">Add <code>width</code> and <code>height</code> attributes to prevent CLS. In JSX, use inline style or CSS <code>aspect-ratio</code> as an alternative.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>29-36</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">Accessibility</span><span class=\"category-tag\">SEO</span></td>\n            <td>\n              <strong>Icon buttons missing aria-label</strong>\n              <div class=\"recommendation\">Add <code>aria-label</code> to icon-only buttons for screen reader accessibility. Accessibility quality signals contribute to overall page quality assessment by search engines.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-medium\">Medium</span></td>\n            <td><span class=\"category-tag\">SEO</span></td>\n            <td>\n              <strong>No internal linking or breadcrumb navigation</strong>\n              <div class=\"recommendation\">Add breadcrumb navigation with BreadcrumbList structured data for better crawl context and enhanced SERP display.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>45-46</td>\n            <td><span class=\"badge badge-low\">Low</span></td>\n            <td><span class=\"category-tag\">Performance</span></td>\n            <td>\n              <strong>List items rendered without stable key prop</strong>\n              <div class=\"recommendation\">Add unique <code>key</code> prop to mapped elements. While primarily a React concern, unstable keys cause unnecessary re-renders that degrade performance.</div>\n            </td>\n          </tr>\n          <tr>\n            <td>-</td>\n            <td><span class=\"badge badge-low\">Low</span></td>\n            <td><span class=\"category-tag\">Navigation</span></td>\n            <td>\n              <strong>No breadcrumb or internal link structure</strong>\n              <div class=\"recommendation\">Add breadcrumb navigation to help search engines understand site hierarchy and improve SERP display with breadcrumb rich results.</div>\n            </td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"file-section\" style=\"padding: 1.25rem;\">\n      <h3 style=\"margin-bottom: 0.75rem;\">Key Recommendations Summary</h3>\n      <ol style=\"padding-left: 1.25rem; display: flex; flex-direction: column; gap: 0.5rem;\">\n        <li><strong>Add meta description and improve title tags</strong> -- These are the most impactful on-page SEO elements. Every page needs a unique, descriptive title (50-60 chars) and meta description (150-160 chars).</li>\n        <li><strong>Implement structured data (JSON-LD)</strong> -- Add schema.org markup to enable rich results in search engines, significantly improving click-through rates.</li>\n        <li><strong>Add canonical URLs</strong> -- Prevent duplicate content issues by specifying the canonical URL for each page.</li>\n        <li><strong>Fix Core Web Vitals issues (CLS, LCP)</strong> -- Add image dimensions, font-display: swap, and reserve space for dynamic content to improve ranking signals.</li>\n        <li><strong>Add social meta tags (OG + Twitter)</s d><td class=\"fail\">&#x274C; Fail</td><td>정적분석</td><td>모든 이미지(.png) 레거시 포맷 사용. <code>&lt;picture&gt;</code> 요소 미사용, WebP/AVIF 미제공.</td></tr>\n<tr><td>WP-07</td><td>JS</td><td>코드 스플리팅</td><td class=\"na\">&#x2796; N/A</td><td>정적분석</td><td>순수 HTML 파일로 동적 <code>import()</code> 해당 없음.</td></tr>\n<tr><td>WP-08</td><td>JS</td><td>트리 쉐이킹 패턴</td><td class=\"na\">&#x2796; N/A</td><td>정적분석</td><td>외부 라이브러리 임포트 없음.</td></tr>\n<tr><td>WP-09</td><td>JS</td><td>레이아웃 스래싱 없음</td><td class=\"pass\">&#x2705; Pass</td><td>정적분석</td><td>루프 내 레이아웃 속성 읽기/쓰기 혼합 없음.</td></tr>\n<tr><td>WP-10</td><td>폰트</td><td>font-display 최적화 (block 금지)</td><td class=\"fail\">&#x274C; Fail</td><td>정적분석</td><td>line 13-17: <code>@font-face</code>에 <code>font-display</code> 미선언. 폰트 로딩 시 텍스트 비가시(FOIT) 발생 가능.</td></tr>\n<tr><td>WP-11</td><td>폰트</td><td>중요 폰트 preload</td><td class=\"fail\">&#x274C; Fail</td><td>정적분석</td><td><code>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</code> 없음.</td></tr>\n<tr><td>WP-12</td><td>LCP</td><td>LCP 요소 초기 HTML 존재</td><td class=\"pass\">&#x2705; Pass</td><td>정적분석</td><td>hero.png가 초기 HTML에 직접 포함됨 (JS 의존 없음).</td></tr>\n<tr><td>WP-13</td><td>INP</td><td>이벤트 핸들러 즉각 시각 피드백</td><td class=\"na\">&#x2796; N/A</td><td>정적분석</td><td>클릭 이벤트 핸들러 없음.</td></tr>\n<tr><td>WP-14</td><td>INP</td><td>무거운 연산 지연 처리</td><td class=\"na\">&#x2796; N/A</td><td>정적분석</td><td>무거운 동기 연산 없음.</td></tr>\n<tr><td>WP-15</td><td>INP</td><td>React memo 활용</td><td class=\"na\">&#x2796; N/A</td><td>정적분석</td><td>React 사용하지 않음.</td></tr>\n<tr><td>WP-16</td><td>CLS</td><td>뷰포트 위 동적 삽입 금지</td><td class=\"pass\">&#x2705; Pass</td><td>정적분석</td><td><code>prepend()</code>, <code>insertBefore()</code> 사용 없음.</td></tr>\n<tr><td>WP-17</td><td>CLS</td><td>애니메이션 transform/opacity만</td><td class=\"pass\">&#x2705; Pass</td><td>정적분석</td><td>레이아웃 속성(height, width, top, left 등) 트랜지션 없음.</td></tr>\n<tr><td>WP-18</td><td>CLS</td><td>동적 콘텐츠 공간 예약</td><td class=\"na\">&#x2796; N/A</td><td>정적분석</td><td>iframe, video, 광고 슬롯 없음.</td></tr>\n</tbody>\n</table>\n\n<h2>수정 가이드</h2>\n\n<div class=\"fix-section\">\n<h4>SEO-02: title 태그 개선 (Critical)</h4>\n<p>현재 <code>&lt;title&gt;Sample Page&lt;/title&gt;</code> (11자)는 너무 짧고 비서술적입니다. 50-60자 이내로 주요 키워드를 포함한 고유한 타이틀을 작성하세요.</p>\n<pre>&lt;title&gt;프리미엄 위젯 쇼핑몰 | 무료배송 &amp; 최저가 보장 | Example Store&lt;/title&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>SEO-05: meta description 추가 (High)</h4>\n<p>검색 결과 스니펫에 표시될 설명이 없습니다. 150-160자 이내로 페이지 내용을 요약하고 행동 유도 문구를 포함하세요.</p>\n<pre>&lt;meta name=\"description\" content=\"프리미엄 위젯을 최저가로 만나보세요. 무료배송, 30일 반품 보장. 10,000명 이상의 고객이 선택한 신뢰할 수 있는 쇼핑몰입니다. 지금 주문하면 20% 할인!\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>SEO-06: canonical URL 추가 (High)</h4>\n<p>중복 콘텐츠 문제를 방지하기 위해 self-referencing canonical URL을 설정하세요.</p>\n<pre>&lt;link rel=\"canonical\" href=\"https://example.com/\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>SEO-07: JSON-LD 구조화 데이터 추가 (High)</h4>\n<p>검색 결과에서 리치 스니펫(별점, 가격 등) 노출을 위해 JSON-LD 구조화 데이터를 추가하세요. 홈페이지의 경우 Organization 스키마가 적합합니다.</p>\n<pre>&lt;script type=\"application/ld+json\"&gt;\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"Organization\",\n  \"name\": \"Example Company\",\n  \"url\": \"https://example.com\",\n  \"logo\": \"https://example.com/logo.png\",\n  \"contactPoint\": {\n    \"@type\": \"ContactPoint\",\n    \"telephone\": \"+1-555-123-4567\",\n    \"contactType\": \"customer service\"\n  }\n}\n&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-01: 인라인 스크립트 최적화</h4>\n<p>line 37의 인라인 스크립트를 외부 파일로 분리하고 <code>defer</code> 속성을 추가하세요. 또한, <code>innerHTML</code> 사용은 XSS 위험이 있으므로 <code>textContent</code>로 대체하세요.</p>\n<pre>&lt;script defer src=\"/js/main.js\"&gt;&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-02: LCP 이미지 우선순위 설정</h4>\n<p>hero.png에 <code>fetchpriority=\"high\"</code>를 추가하고, head에 preload를 선언하세요.</p>\n<pre>&lt;!-- head 내부 --&gt;\n&lt;link rel=\"preload\" href=\"/public/hero.png\" as=\"image\" fetchpriority=\"high\"&gt;\n\n&lt;!-- body 내부 --&gt;\n&lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-03: Critical CSS 처리</h4>\n<p>line 10의 외부 CSS를 비동기로 로딩하고, above-fold에 필요한 CSS는 인라인으로 삽입하세요.</p>\n<pre>&lt;style&gt;/* above-fold에 필요한 핵심 CSS */&lt;/style&gt;\n&lt;link rel=\"preload\" href=\"https://cdn.example.com/styles.css\" as=\"style\" onload=\"this.onload=null;this.rel='stylesheet'\"&gt;\n&lt;noscript&gt;&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\"&gt;&lt;/noscript&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-04: promo.png에 width/height 추가</h4>\n<p>line 33: CLS 방지를 위해 이미지에 width/height 또는 aspect-ratio를 지정하세요.</p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"800\" height=\"400\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-06: 현대 이미지 포맷 도입</h4>\n<p>PNG 대신 WebP/AVIF 포맷을 <code>&lt;picture&gt;</code> 요소로 제공하세요.</p>\n<pre>&lt;picture&gt;\n  &lt;source type=\"image/avif\" srcset=\"/public/hero.avif\"&gt;\n  &lt;source type=\"image/webp\" srcset=\"/public/hero.webp\"&gt;\n  &lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;\n&lt;/picture&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-10: font-display 추가</h4>\n<p>line 13-17: <code>@font-face</code>에 <code>font-display: swap</code>을 추가하여 폰트 로딩 중 텍스트가 보이도록 하세요.</p>\n<pre>@font-face {\n  font-family: \"CustomFont\";\n  src: url(\"/fonts/custom.woff2\") format(\"woff2\");\n  font-display: swap;\n}</pre>\n</div>\n\n<div class=\"fix-section\">\n<h4>WP-11: 폰트 preload 추가</h4>\n<p>head 영역에 중요 폰트를 preload하세요.</p>\n<pre>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</pre>\n</div>\n\n</body>\n</html>\n"}], "grading": {"expectations": [{"text": "meta description 누락 감지", "passed": true, "evidence": "SEO-05 marked Fail: '<meta name=\"description\"> 태그 없음. 검색 결과 스니펫에 표시될 설명이 없어 CTR 저하 우려.'"}, {"text": "JSON-LD 구조화 데이터 누락 감지", "passed": true, "evidence": "SEO-07 marked Fail: '<script type=\"application/ld+json\"> 없음. 검색 결과 리치 스니펫 노출 불가.'"}, {"text": "canonical URL 누락 감지", "passed": true, "evidence": "SEO-06 marked Fail: '<link rel=\"canonical\"> 없음. 중복 콘텐츠 문제 발생 가능.'"}, {"text": "title 태그가 너무 짧거나 일반적임을 지적", "passed": true, "evidence": "SEO-02 marked Fail: '<title>Sample Page</title> (11자) — 너무 짧고 비서술적. 50-60자 권장, 주요 키워드를 앞에 배치해야 함.'"}], "summary": {"passed": 4, "failed": 0, "total": 4, "pass_rate": 1.0}}}, {"id": "eval-2-without_skill", "prompt": "index.html의 메타 태그와 구조화 데이터를 SEO 관점에서 점검해줘", "eval_id": 2, "outputs": [{"name": "report.csv", "type": "text", "content": "id,severity,category,element,line,issue,recommendation\nSEO-001,critical,meta-tags,<title>,6,\"Title tag is too generic ('Sample Page') - lacks keywords, brand name, and descriptive content\",\"Use a descriptive title (50-60 chars) with primary keywords, e.g. 'Product Name - Primary Keyword | Brand Name'\"\nSEO-002,critical,meta-tags,<meta name=\"\"description\"\">,N/A,\"Missing meta description tag entirely\",\"Add <meta name=\"\"description\"\" content=\"\"...\"\"> with a compelling 150-160 character summary including target keywords\"\nSEO-003,critical,structured-data,JSON-LD,N/A,\"No structured data (JSON-LD / Schema.org) found on the page\",\"Add JSON-LD structured data (e.g. WebPage, Organization, or relevant schema type) to improve rich snippet eligibility\"\nSEO-004,major,meta-tags,<meta name=\"\"robots\"\">,N/A,\"Missing robots meta tag - search engine crawl/index directives are not explicitly set\",\"Add <meta name=\"\"robots\"\" content=\"\"index, follow\"\"> to explicitly declare indexing intent\"\nSEO-005,major,meta-tags,<link rel=\"\"canonical\"\">,N/A,\"Missing canonical URL tag - risk of duplicate content issues\",\"Add <link rel=\"\"canonical\"\" href=\"\"https://example.com/\"\"> to indicate the preferred URL\"\nSEO-006,major,meta-tags,Open Graph tags,N/A,\"Missing Open Graph meta tags (og:title, og:description, og:image, og:url) - poor social sharing appearance\",\"Add og:title, og:description, og:image, og:url, og:type meta tags for social media optimization\"\nSEO-007,major,meta-tags,Twitter Card tags,N/A,\"Missing Twitter Card meta tags (twitter:card, twitter:title, twitter:description)\",\"Add twitter:card, twitter:title, twitter:description, twitter:image meta tags\"\nSEO-008,minor,meta-tags,<html lang>,2,\"lang attribute is 'en' which is correct but could be more specific (e.g. en-US)\",\"Consider using a more specific locale like 'en-US' or 'en-GB' if targeting a specific region\"\nSEO-009,major,structured-data,Organization schema,N/A,\"No Organization or WebSite structured data - missing brand identity signals for search engines\",\"Add Organization schema with name, url, logo, and sameAs (social profiles)\"\nSEO-010,major,structured-data,BreadcrumbList,N/A,\"No BreadcrumbList structured data - breadcrumbs won't appear in search results\",\"Add BreadcrumbList JSON-LD if the site has hierarchical navigation\"\nSEO-011,minor,meta-tags,<meta charset>,4,\"charset is declared correctly as UTF-8 - no issue\",\"\"\nSEO-012,minor,meta-tags,<meta name=\"\"viewport\"\">,5,\"Viewport meta tag is present and correctly configured - no issue\",\"\"\nSEO-013,major,meta-tags,<link rel=\"\"icon\"\">,N/A,\"Missing favicon declaration - affects brand recognition in browser tabs and search results\",\"Add <link rel=\"\"icon\"\" href=\"\"/favicon.ico\"\"> and consider apple-touch-icon as well\"\nSEO-014,minor,content,<img alt>,30,\"Image at /public/logo.png is missing alt attribute - hurts image SEO and accessibility\",\"Add descriptive alt text to all images, especially brand-related ones like logos\"\nSEO-015,minor,performance,render-blocking CSS,10,\"Render-blocking external stylesheet in <head> can delay First Contentful Paint\",\"Consider using media queries, preload, or critical CSS inlining to reduce render-blocking\"\nSEO-016,minor,performance,font-display,13-17,\"@font-face missing font-display: swap - may cause invisible text during font load (FOIT)\",\"Add font-display: swap to @font-face declarations for better perceived performance\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>SEO Audit Report - index.html</title>\n  <style>\n    :root {\n      --critical: #dc2626;\n      --major: #ea580c;\n      --minor: #ca8a04;\n      --pass: #16a34a;\n      --bg: #f8fafc;\n      --card: #ffffff;\n      --border: #e2e8f0;\n      --text: #1e293b;\n      --text-muted: #64748b;\n    }\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }\n    .container { max-width: 960px; margin: 0 auto; }\n    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }\n    .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }\n    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }\n    .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; text-align: center; }\n    .summary-card .count { font-size: 2rem; font-weight: 700; }\n    .summary-card .label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }\n    .critical .count { color: var(--critical); }\n    .major .count { color: var(--major); }\n    .minor .count { color: var(--minor); }\n    .pass .count { color: var(--pass); }\n    .section { margin-bottom: 2rem; }\n    .section h2 { font-size: 1.2rem; margin-bottom: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }\n    .issue { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; border-left: 4px solid transparent; }\n    .issue.severity-critical { border-left-color: var(--critical); }\n    .issue.severity-major { border-left-color: var(--major); }\n    .issue.severity-minor { border-left-color: var(--minor); }\n    .issue.severity-pass { border-left-color: var(--pass); }\n    .issue-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }\n    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; color: #fff; text-transform: uppercase; }\n    .badge-critical { background: var(--critical); }\n    .badge-major { background: var(--major); }\n    .badge-minor { background: var(--minor); }\n    .badge-pass { background: var(--pass); }\n    .issue-id { font-family: monospace; color: var(--text-muted); font-size: 0.85rem; }\n    .issue-title { font-weight: 600; }\n    .issue-detail { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.4rem; }\n    .recommendation { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 0.5rem 0.75rem; font-size: 0.85rem; color: #166534; }\n    .recommendation strong { font-weight: 600; }\n    .meta-info { font-size: 0.8rem; color: var(--text-muted); margin-top: 2rem; text-align: center; }\n  </style>\n</head>\n<body>\n  <div class=\"container\">\n    <h1>SEO Audit Report</h1>\n    <p class=\"subtitle\">File: index.html &mdash; Meta Tags &amp; Structured Data Review</p>\n\n    <div class=\"summary\">\n      <div class=\"summary-card critical\">\n        <div class=\"count\">3</div>\n        <div class=\"label\">Critical</div>\n      </div>\n      <div class=\"summary-card major\">\n        <div class=\"count\">7</div>\n        <div class=\"label\">Major</div>\n      </div>\n      <div class=\"summary-card minor\">\n        <div class=\"count\">4</div>\n        <div class=\"label\">Minor</div>\n      </div>\n      <div class=\"summary-card pass\">\n        <div class=\"count\">2</div>\n        <div class=\"label\">Pass</div>\n      </div>\n    </div>\n\n    <!-- Critical Issues -->\n    <div class=\"section\">\n      <h2>Critical Issues</h2>\n\n      <div class=\"issue severity-critical\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-critical\">Critical</span>\n          <span class=\"issue-id\">SEO-001</span>\n          <span class=\"issue-title\">Generic Title Tag</span>\n        </div>\n        <p class=\"issue-detail\">\n          Line 6: The <code>&lt;title&gt;</code> is \"Sample Page\" which is too generic. It lacks target keywords, a brand name, and descriptive content. Search engines rely heavily on title tags for ranking signals.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Use a descriptive title (50-60 characters) containing primary keywords, e.g. <code>&lt;title&gt;Product Name - Primary Keyword | Brand Name&lt;/title&gt;</code>.\n        </div>\n      </div>\n\n      <div class=\"issue severity-critical\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-critical\">Critical</span>\n          <span class=\"issue-id\">SEO-002</span>\n          <span class=\"issue-title\">Missing Meta Description</span>\n        </div>\n        <p class=\"issue-detail\">\n          No <code>&lt;meta name=\"description\"&gt;</code> tag found. The meta description is a key factor in click-through rate from search results. Without it, search engines will auto-generate a snippet which may not be optimal.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add <code>&lt;meta name=\"description\" content=\"...\"&gt;</code> with a compelling 150-160 character summary that includes target keywords and a call to action.\n        </div>\n      </div>\n\n      <div class=\"issue severity-critical\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-critical\">Critical</span>\n          <span class=\"issue-id\">SEO-003</span>\n          <span class=\"issue-title\">No Structured Data (JSON-LD)</span>\n        </div>\n        <p class=\"issue-detail\">\n          No JSON-LD or Schema.org structured data found on the page. Structured data enables rich snippets in search results (ratings, breadcrumbs, FAQs, etc.) and helps search engines understand page content.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add JSON-LD structured data in a <code>&lt;script type=\"application/ld+json\"&gt;</code> block. At minimum, include WebPage or WebSite schema. Example:\n          <pre style=\"margin-top:0.5rem;background:#f1f5f9;padding:0.5rem;border-radius:4px;overflow-x:auto;font-size:0.8rem\">&lt;script type=\"application/ld+json\"&gt;\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"WebPage\",\n  \"name\": \"Page Title\",\n  \"description\": \"Page description\",\n  \"url\": \"https://example.com/\"\n}\n&lt;/script&gt;</pre>\n        </div>\n      </div>\n    </div>\n\n    <!-- Major Issues -->\n    <div class=\"section\">\n      <h2>Major Issues</h2>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-004</span>\n          <span class=\"issue-title\">Missing Robots Meta Tag</span>\n        </div>\n        <p class=\"issue-detail\">\n          No <code>&lt;meta name=\"robots\"&gt;</code> tag is present. While search engines default to \"index, follow\", explicitly declaring the directive is a best practice for controlling crawl behavior.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add <code>&lt;meta name=\"robots\" content=\"index, follow\"&gt;</code> to explicitly declare indexing intent.\n        </div>\n      </div>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-005</span>\n          <span class=\"issue-title\">Missing Canonical URL</span>\n        </div>\n        <p class=\"issue-detail\">\n          No <code>&lt;link rel=\"canonical\"&gt;</code> tag found. Without a canonical URL, duplicate content issues can arise from URL variations (www vs non-www, trailing slashes, query parameters).\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add <code>&lt;link rel=\"canonical\" href=\"https://example.com/\"&gt;</code> pointing to the preferred version of the page URL.\n        </div>\n      </div>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-006</span>\n          <span class=\"issue-title\">Missing Open Graph Meta Tags</span>\n        </div>\n        <p class=\"issue-detail\">\n          No Open Graph tags found (og:title, og:description, og:image, og:url, og:type). These tags control how the page appears when shared on social media platforms like Facebook, LinkedIn, and others.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add Open Graph meta tags:\n          <pre style=\"margin-top:0.5rem;background:#f1f5f9;padding:0.5rem;border-radius:4px;overflow-x:auto;font-size:0.8rem\">&lt;meta property=\"og:type\" content=\"website\"&gt;\n&lt;meta property=\"og:title\" content=\"Page Title\"&gt;\n&lt;meta property=\"og:description\" content=\"Page description\"&gt;\n&lt;meta property=\"og:url\" content=\"https://example.com/\"&gt;\n&lt;meta property=\"og:image\" content=\"https://example.com/image.png\"&gt;</pre>\n        </div>\n      </div>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-007</span>\n          <span class=\"issue-title\">Missing Twitter Card Meta Tags</span>\n        </div>\n        <p class=\"issue-detail\">\n          No Twitter Card tags found (twitter:card, twitter:title, twitter:description). These control the appearance of links shared on Twitter/X.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add Twitter Card meta tags:\n          <pre style=\"margin-top:0.5rem;background:#f1f5f9;padding:0.5rem;border-radius:4px;overflow-x:auto;font-size:0.8rem\">&lt;meta name=\"twitter:card\" content=\"summary_large_image\"&gt;\n&lt;meta name=\"twitter:title\" content=\"Page Title\"&gt;\n&lt;meta name=\"twitter:description\" content=\"Page description\"&gt;\n&lt;meta name=\"twitter:image\" content=\"https://example.com/image.png\"&gt;</pre>\n        </div>\n      </div>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-009</span>\n          <span class=\"issue-title\">Missing Organization Structured Data</span>\n        </div>\n        <p class=\"issue-detail\">\n          No Organization or WebSite schema found. These schemas provide brand identity signals to search engines and can enable knowledge panel features in SERPs.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add Organization JSON-LD with name, url, logo, contactPoint, and sameAs properties linking to social profiles.\n        </div>\n      </div>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-010</span>\n          <span class=\"issue-title\">Missing BreadcrumbList Structured Data</span>\n        </div>\n        <p class=\"issue-detail\">\n          No BreadcrumbList schema found. Breadcrumb structured data improves SERP appearance by showing the page's position within the site hierarchy.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> If the site has hierarchical navigation, add BreadcrumbList JSON-LD to enable breadcrumb rich results in search.\n        </div>\n      </div>\n\n      <div class=\"issue severity-major\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-major\">Major</span>\n          <span class=\"issue-id\">SEO-013</span>\n          <span class=\"issue-title\">Missing Favicon Declaration</span>\n        </div>\n        <p class=\"issue-detail\">\n          No <code>&lt;link rel=\"icon\"&gt;</code> or favicon reference found. Favicons affect brand recognition in browser tabs, bookmarks, and search results.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add <code>&lt;link rel=\"icon\" href=\"/favicon.ico\"&gt;</code> and consider including <code>&lt;link rel=\"apple-touch-icon\"&gt;</code> for iOS devices.\n        </div>\n      </div>\n    </div>\n\n    <!-- Minor Issues -->\n    <div class=\"section\">\n      <h2>Minor Issues</h2>\n\n      <div class=\"issue severity-minor\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-minor\">Minor</span>\n          <span class=\"issue-id\">SEO-008</span>\n          <span class=\"issue-title\">Language Attribute Could Be More Specific</span>\n        </div>\n        <p class=\"issue-detail\">\n          Line 2: The <code>lang=\"en\"</code> attribute is valid but could be more specific (e.g., <code>en-US</code> or <code>en-GB</code>) if targeting a specific geographic audience.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Consider using a region-specific locale code if the site targets a specific English-speaking market.\n        </div>\n      </div>\n\n      <div class=\"issue severity-minor\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-minor\">Minor</span>\n          <span class=\"issue-id\">SEO-014</span>\n          <span class=\"issue-title\">Image Missing Alt Attribute</span>\n        </div>\n        <p class=\"issue-detail\">\n          Line 30: The image at <code>/public/logo.png</code> has no <code>alt</code> attribute. This hurts image SEO and accessibility. Search engines use alt text to understand image content.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Add descriptive alt text to all images, e.g. <code>alt=\"Company Logo\"</code>.\n        </div>\n      </div>\n\n      <div class=\"issue severity-minor\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-minor\">Minor</span>\n          <span class=\"issue-id\">SEO-015</span>\n          <span class=\"issue-title\">Render-Blocking External CSS</span>\n        </div>\n        <p class=\"issue-detail\">\n          Line 10: A synchronous external stylesheet (<code>cdn.example.com/styles.css</code>) in <code>&lt;head&gt;</code> blocks rendering. Slow page load times negatively impact Core Web Vitals and search rankings.\n        </p>\n        <div class=\"recommendation\">\n          <strong>Recommendation:</strong> Consider inlining critical CSS, using <code>&lt;link rel=\"preload\"&gt;</code>, or deferring non-critical styles with media queries.\n        </div>\n      </div>\n\n      <div class=\"issue severity-minor\">\n        <div class=\"issue-header\">\n          <span class=\"badge badge-minor\">Minor</span>\n          <span class=\"issue-id\">SEO-016</span>\n          <span class=\"issue-title\">Missing font-display: swap</span>\n        </div>\n        <p class=\"issue-detail\">\n          Lines 13-17: The <code>@font-face</code> for \"CustomFont\
