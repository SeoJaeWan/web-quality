}\n  .summary-box { padding: 12px 20px; border-radius: 6px; font-weight: 600; }\n  .summary-pass { background: #dcfce7; color: #166534; }\n  .summary-fail { background: #fef2f2; color: #991b1b; }\n  .summary-advisory { background: #fffbeb; color: #92400e; }\n  .summary-na { background: #f3f4f6; color: #4b5563; }\n</style>\n</head>\n<body>\n\n<h1>SEO &amp; Web Performance Review Report — 2026-03-11</h1>\n\n<p><strong>Review files:</strong></p>\n<ul>\n  <li><code>features/web-sample/pages/dashboard.tsx</code></li>\n  <li><code>features/web-sample/components/Card.tsx</code></li>\n</ul>\n\n<p><strong>Review focus:</strong> Image optimization, rendering performance, CLS prevention, loading optimization</p>\n\n<div class=\"summary\">\n  <div class=\"summary-box summary-pass\">Pass: 5</div>\n  <div class=\"summary-box summary-fail\">Fail: 10</div>\n  <div class=\"summary-box summary-advisory\">Advisory: 4</div>\n  <div class=\"summary-box summary-na\">N/A: 10</div>\n</div>\n\n<h2>Technical SEO (11 items)</h2>\n\n<table>\n  <thead>\n    <tr><th>Code</th><th>Priority</th><th>Item</th><th>Result</th><th>Issue Found</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>SEO-01</td><td>Critical</td><td>noindex absence</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>React component file; no <code>&lt;meta&gt;</code> tags present. Document-level meta tags are managed at a higher level (e.g., _app.tsx or layout). Cannot evaluate.</td>\n    </tr>\n    <tr>\n      <td>SEO-02</td><td>Critical</td><td>title tag present &amp; unique (50-60 chars)</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>No <code>&lt;title&gt;</code> tag in component files. Document head is managed elsewhere.</td>\n    </tr>\n    <tr>\n      <td>SEO-03</td><td>Critical</td><td>Single h1 per page</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>dashboard.tsx has exactly one <code>&lt;h1&gt;</code> at line 25. Card.tsx uses <code>&lt;h3&gt;</code> which is appropriate for nested components.</td>\n    </tr>\n    <tr>\n      <td>SEO-04</td><td>Critical</td><td>HTTPS usage</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>No external resource URLs found using <code>http://</code>. Image uses a relative path <code>/public/promo.png</code>.</td>\n    </tr>\n    <tr>\n      <td>SEO-05</td><td>High</td><td>meta description (150-160 chars)</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; meta description managed at document level.</td>\n    </tr>\n    <tr>\n      <td>SEO-06</td><td>High</td><td>canonical URL</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; canonical URL managed at document level.</td>\n    </tr>\n    <tr>\n      <td>SEO-07</td><td>High</td><td>Structured data (JSON-LD)</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Dashboard page component; structured data typically added at document level.</td>\n    </tr>\n    <tr>\n      <td>SEO-08</td><td>Medium</td><td>Descriptive URL structure</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>No query-parameter-heavy URLs found. The file lives at <code>/pages/dashboard.tsx</code>, which produces a descriptive route <code>/dashboard</code>.</td>\n    </tr>\n    <tr>\n      <td>SEO-09</td><td>High</td><td>DOCTYPE html declaration</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; DOCTYPE is in the HTML shell/template.</td>\n    </tr>\n    <tr>\n      <td>SEO-10</td><td>High</td><td>charset UTF-8 at top of head</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; charset is in the HTML shell/template.</td>\n    </tr>\n    <tr>\n      <td>SEO-11</td><td>High</td><td>viewport meta tag</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; viewport meta is in the HTML shell/template.</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>Page Experience / Web Performance (18 items)</h2>\n\n<table>\n  <thead>\n    <tr><th>Code</th><th>Area</th><th>Item</th><th>Result</th><th>Issue Found</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>WP-01</td><td>CRP</td><td>No render-blocking scripts</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>Component file; no <code>&lt;script src=&gt;</code> tags present. Script loading strategy is managed by the framework bundler.</td>\n    </tr>\n    <tr>\n      <td>WP-02</td><td>CRP</td><td>LCP image fetchpriority + preload</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td><strong>dashboard.tsx line 50:</strong> The <code>&lt;img src=\"/public/promo.png\"&gt;</code> is the largest content element candidate. No <code>fetchpriority=\"high\"</code> is set and no <code>&lt;link rel=\"preload\" as=\"image\"&gt;</code> exists. If this image is the LCP element, add <code>fetchpriority=\"high\"</code> and a corresponding preload link in the document head.</td>\n    </tr>\n    <tr>\n      <td>WP-03</td><td>CRP</td><td>Critical CSS handling</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>No <code>&lt;link rel=\"stylesheet\"&gt;</code> tags in component files. CSS is handled via Tailwind utility classes (inline).</td>\n    </tr>\n    <tr>\n      <td>WP-04</td><td>Image</td><td>img width/height or aspect-ratio (CLS prevention)</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx line 50:</strong> <code>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\" /&gt;</code> has neither <code>width</code>/<code>height</code> attributes nor <code>aspect-ratio</code> CSS. When the image loads, the browser cannot reserve space, causing a layout shift (CLS).</td>\n    </tr>\n    <tr>\n      <td>WP-05</td><td>Image</td><td>loading=\"lazy\" for below-fold images</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx line 50:</strong> The image is positioned below the fold (after grid items with <code>className=\"mt-8\"</code>) but does not have <code>loading=\"lazy\"</code>. This causes unnecessary early loading and wastes bandwidth.</td>\n    </tr>\n    <tr>\n      <td>WP-06</td><td>Image</td><td>Modern image format (WebP/AVIF)</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx line 50:</strong> Uses <code>.png</code> format. No <code>&lt;picture&gt;</code> element with <code>.webp</code> or <code>.avif</code> sources. Modern formats offer 25-50% smaller file sizes.</td>\n    </tr>\n    <tr>\n      <td>WP-07</td><td>JS</td><td>Code splitting</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td>No dynamic <code>import()</code> expressions found in either file. The Dashboard component and its dependencies are bundled into a single chunk. For a dashboard page with potentially heavy content, route-based or component-based code splitting should be used.</td>\n    </tr>\n    <tr>\n      <td>WP-08</td><td>JS</td><td>Tree shaking patterns</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>No whole-library imports detected (e.g., <code>import _ from 'lodash'</code>). Imports are specific: <code>React</code>, <code>useEffect</code>, <code>useRef</code>, <code>useState</code> from React.</td>\n    </tr>\n    <tr>\n      <td>WP-09</td><td>JS</td><td>No layout thrashing</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 12-13:</strong> In <code>useEffect</code>, reads <code>containerRef.current.offsetHeight</code> (forces reflow) then immediately writes <code>containerRef.current.style.minHeight</code> (triggers another reflow). This is a layout thrashing pattern.</td>\n    </tr>\n    <tr>\n      <td>WP-10</td><td>Font</td><td>font-display optimization (no block)</td>\n      <td class=\"na\">&#10134; N/A</td>\n      <td>No <code>@font-face</code> declarations in the reviewed files. Font loading is managed elsewhere.</td>\n    </tr>\n    <tr>\n      <td>WP-11</td><td>Font</td><td>Critical font preload</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td>No font preload links found in these component files. Ensure critical fonts are preloaded in the document head.</td>\n    </tr>\n    <tr>\n      <td>WP-12</td><td>LCP</td><td>LCP element in initial HTML</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 17-19:</strong> The main dashboard content (<code>items</code>) is loaded via <code>useEffect</code> + <code>setTimeout</code>, meaning the LCP text content is JS-dependent and not present in initial HTML. This delays LCP by at least 500ms after component mount.</td>\n    </tr>\n    <tr>\n      <td>WP-13</td><td>INP</td><td>Event handler immediate visual feedback</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>Card.tsx lines 11-21:</strong> The <code>handleClick</code> function performs DOM query and style mutation but provides no immediate visual state change (e.g., button press state, loading indicator). The user gets no immediate feedback on click.</td>\n    </tr>\n    <tr>\n      <td>WP-14</td><td>INP</td><td>Heavy computation deferred</td>\n      <td class=\"pass\">&#9989; Pass</td>\n      <td>No synchronous heavy loops or large data processing detected. The <code>setTimeout</code> in dashboard.tsx is asynchronous. No <code>requestIdleCallback</code> or Web Worker needed for current workloads.</td>\n    </tr>\n    <tr>\n      <td>WP-15</td><td>INP</td><td>React memo usage</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td><strong>Card.tsx:</strong> The <code>Card</code> component is not wrapped in <code>React.memo()</code>. If rendered in a list (as the pattern suggests), it will re-render on every parent state change. Consider wrapping with <code>React.memo</code> for performance.</td>\n    </tr>\n    <tr>\n      <td>WP-16</td><td>CLS</td><td>No dynamic insertion above viewport</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 17-19:</strong> <code>setItems([\"Dashboard\", \"Analytics\", \"Reports\"])</code> is called in <code>useEffect</code> after a 500ms delay, injecting content into the top of the <code>&lt;section&gt;</code> grid. Since this section is near the top of the viewport, this causes a layout shift as the new items push existing content (including the image) downward.</td>\n    </tr>\n    <tr>\n      <td>WP-17</td><td>CLS</td><td>Animations use only transform/opacity</td>\n      <td class=\"advisory\">&#9888;&#65039; Advisory</td>\n      <td>No CSS transitions or animations detected in these files. Tailwind classes used are static. However, <strong>Card.tsx line 19</strong> directly mutates <code>style.background</code> which could cause a repaint (though not a layout shift). Consider using CSS classes instead of direct style manipulation.</td>\n    </tr>\n    <tr>\n      <td>WP-18</td><td>CLS</td><td>Dynamic content space reservation</td>\n      <td class=\"fail\">&#10060; Fail</td>\n      <td><strong>dashboard.tsx lines 17-19, 41:</strong> The <code>&lt;section&gt;</code> grid that receives dynamically loaded items has no <code>min-height</code> or placeholder to reserve space. When items appear after 500ms, the layout shifts. Should reserve space with <code>min-height</code> or use skeleton placeholders.</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>Correction Guide</h2>\n\n<div class=\"fix-section\">\n<h3>WP-04 (Fail): Image missing width/height — CLS prevention</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 50</p>\n<p><strong>Current:</strong></p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\" /&gt;</pre>\n<p><strong>Fix:</strong></p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\"\n     width={800} height={400} /&gt;</pre>\n<p>Or use CSS aspect-ratio:</p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\"\n     className=\"mt-8 w-full\" style={{ aspectRatio: '2/1' }} /&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-05 (Fail): Below-fold image without lazy loading</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 50</p>\n<p><strong>Fix:</strong> Add <code>loading=\"lazy\"</code> and <code>decoding=\"async\"</code>:</p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\"\n     width={800} height={400} loading=\"lazy\" decoding=\"async\" /&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-06 (Fail): Legacy image format (.png)</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 50</p>\n<p><strong>Fix:</strong> Convert to WebP/AVIF and use <code>&lt;picture&gt;</code> for format fallback:</p>\n<pre>&lt;picture&gt;\n  &lt;source type=\"image/avif\" srcSet=\"/public/promo.avif\" /&gt;\n  &lt;source type=\"image/webp\" srcSet=\"/public/promo.webp\" /&gt;\n  &lt;img src=\"/public/promo.png\" alt=\"Promo\" className=\"mt-8\"\n       width={800} height={400} loading=\"lazy\" decoding=\"async\" /&gt;\n&lt;/picture&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-07 (Fail): No code splitting</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code></p>\n<p><strong>Fix:</strong> Use <code>React.lazy()</code> for route-level or heavy component splitting:</p>\n<pre>// In router or parent component:\nconst Dashboard = React.lazy(() =&gt; import('./pages/dashboard'));</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-09 (Fail): Layout thrashing in useEffect</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> lines 12-13</p>\n<p><strong>Current:</strong></p>\n<pre>const h = containerRef.current.offsetHeight;\ncontainerRef.current.style.minHeight = h + \"px\";</pre>\n<p><strong>Fix:</strong> Use <code>requestAnimationFrame</code> to batch reads and writes, or use CSS <code>min-height</code> directly:</p>\n<pre>// Option 1: Use CSS instead\n// Remove the JS measurement entirely; set min-height via CSS class\n\n// Option 2: If measurement is needed, batch with rAF\nconst h = containerRef.current.offsetHeight;\nrequestAnimationFrame(() =&gt; {\n  containerRef.current.style.minHeight = h + \"px\";\n});</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-12 (Fail): LCP content loaded via JS (useEffect)</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> lines 17-19</p>\n<p><strong>Fix:</strong> Use server-side rendering (SSR) or static generation to include the initial items in the HTML:</p>\n<pre>// Next.js example:\nexport async function getServerSideProps() {\n  const items = [\"Dashboard\", \"Analytics\", \"Reports\"];\n  return { props: { items } };\n}\n\n// Or initialize state with data instead of loading in useEffect:\nconst [items] = useState([\"Dashboard\", \"Analytics\", \"Reports\"]);</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-13 (Fail): Click handler without immediate visual feedback</h3>\n<p><strong>File:</strong> <code>Card.tsx</code> lines 11-21</p>\n<p><strong>Fix:</strong> Add immediate visual state change on click:</p>\n<pre>const [isActive, setIsActive] = useState(false);\n\nconst handleClick = () =&gt; {\n  setIsActive(true); // Immediate visual feedback\n  // ... rest of handler\n};</pre>\n<p>Or use CSS <code>:active</code> pseudo-class for instant feedback.</p>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-16 (Fail): Dynamic content insertion above viewport causes CLS</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> lines 17-19</p>\n<p><strong>Fix:</strong> Either pre-render the items server-side (see WP-12 fix) or reserve space with a placeholder/skeleton:</p>\n<pre>{items.length === 0 ? (\n  &lt;div style={{ minHeight: '120px' }} className=\"animate-pulse bg-gray-100 rounded\" /&gt;\n) : (\n  items.map((item) =&gt; &lt;div key={item} className=\"border p-2\"&gt;{item}&lt;/div&gt;)\n)}</pre>\n</div>\n\n<div class=\"fix-section\">\n<h3>WP-18 (Fail): No space reservation for dynamic content</h3>\n<p><strong>File:</strong> <code>dashboard.tsx</code> line 41</p>\n<p><strong>Fix:</strong> Add <code>min-height</code> to the container section to prevent layout shift:</p>\n<pre>&lt;section ref={containerRef} className=\"grid gap-4\" style={{ minHeight: '300px' }}&gt;</pre>\n<p>Or use skeleton loading placeholders as shown in WP-16 fix above.</p>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-02 (Advisory): LCP image lacks fetchpriority and preload</h3>\n<p>If the promo image is the LCP element, add <code>fetchpriority=\"high\"</code> to the <code>&lt;img&gt;</code> tag and a <code>&lt;link rel=\"preload\" as=\"image\"&gt;</code> in the document head.</p>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-11 (Advisory): Font preload not present</h3>\n<p>Ensure critical fonts used on this page are preloaded in the document <code>&lt;head&gt;</code> with <code>&lt;link rel=\"preload\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</code>.</p>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-15 (Advisory): Card component not memoized</h3>\n<p>Wrap <code>Card</code> with <code>React.memo()</code> to prevent unnecessary re-renders when used in lists:</p>\n<pre>export default React.memo(Card);</pre>\n</div>\n\n<div class=\"advisory-section\">\n<h3>WP-17 (Advisory): Direct style mutation in Card.tsx</h3>\n<p>Replace <code>(el as HTMLElement).style.background = \"yellow\"</code> with a React state-driven class toggle for better performance and predictability.</p>\n</div>\n\n</body>\n</html>\n"}], "eval-3-image-cls-optimization-without_skill": [{"name": "report.csv", "type": "text", "content": "id,file,line,severity,category,issue,recommendation\n1,dashboard.tsx,50,high,image-optimization,\"img element missing width and height attributes, causing CLS\",\"Add explicit width and height attributes to the <img> tag so the browser can reserve space before the image loads (e.g. <img width=\"\"800\"\" height=\"\"400\"\" .../>)\"\n2,dashboard.tsx,50,high,image-optimization,\"img element missing loading=\"\"lazy\"\" for below-fold image\",\"Add loading=\"\"lazy\"\" to defer loading of off-screen images and reduce initial page weight\"\n3,dashboard.tsx,50,medium,image-optimization,\"Image served as PNG without modern format alternatives\",\"Use <picture> with WebP/AVIF sources and PNG fallback, or use Next.js <Image> component for automatic format negotiation\"\n4,dashboard.tsx,50,medium,image-optimization,\"No srcset or sizes attributes for responsive images\",\"Add srcset and sizes attributes to serve appropriately sized images for different viewports\"\n5,dashboard.tsx,16-19,high,cls-prevention,\"Dynamic content inserted via setTimeout without reserved space\",\"Reserve layout space with min-height or CSS aspect-ratio on the container before async content arrives\"\n6,dashboard.tsx,10-14,high,rendering-performance,\"Layout thrashing in useEffect: offsetHeight read immediately followed by style.minHeight write\",\"Batch DOM reads and writes separately, or use requestAnimationFrame to schedule the style write after the read\"\n7,dashboard.tsx,45-47,medium,rendering-performance,\"List items rendered without key prop, causing inefficient reconciliation\",\"Add a stable unique key to each mapped element (e.g. key={item} or a unique id)\"\n8,dashboard.tsx,41,medium,cls-prevention,\"Grid container has no explicit min-height or aspect-ratio to hold space while items load\",\"Set a CSS min-height or skeleton placeholder on the grid section to prevent layout shift when items appear\"\n9,Card.tsx,17-20,low,rendering-performance,\"Direct DOM manipulation via document.querySelector instead of React ref\",\"Replace global DOM query with useRef to avoid unintended side effects and improve predictability\"\n10,Card.tsx,27,medium,cls-prevention,\"Duplicate id=\"\"card-item\"\" when Card is rendered in a list\",\"Use unique ids (e.g. based on title or index) to avoid DOM conflicts that can confuse assistive tech and cause unpredictable behavior\"\n11,Card.tsx,13,low,rendering-performance,\"console.log left in production code\",\"Remove console.log statements or gate them behind a development-only flag to avoid minor performance overhead\"\n12,dashboard.tsx,50,medium,image-optimization,\"No fetchpriority attribute to hint browser about image importance\",\"Add fetchpriority=\"\"low\"\" for below-fold promotional images to let the browser prioritize critical resources first\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>Image Optimization &amp; CLS Review - dashboard.tsx</title>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }\n  h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }\n  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }\n  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }\n  .summary-card { padding: 1rem; border-radius: 8px; text-align: center; }\n  .summary-card .count { font-size: 2rem; font-weight: 700; }\n  .summary-card .label { font-size: 0.85rem; color: #555; }\n  .high-bg { background: #fde8e8; }\n  .medium-bg { background: #fef3cd; }\n  .low-bg { background: #d4edda; }\n  .category-section { margin-bottom: 2rem; }\n  .category-section h2 { font-size: 1.2rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.4rem; margin-bottom: 1rem; }\n  .issue-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }\n  .issue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }\n  .issue-header .location { font-family: monospace; font-size: 0.85rem; color: #555; }\n  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }\n  .badge-high { background: #f5c6cb; color: #721c24; }\n  .badge-medium { background: #ffeeba; color: #856404; }\n  .badge-low { background: #c3e6cb; color: #155724; }\n  .issue-desc { margin-bottom: 0.5rem; }\n  .recommendation { background: #f8f9fa; border-left: 3px solid #007bff; padding: 0.5rem 0.75rem; font-size: 0.9rem; color: #333; }\n  .recommendation strong { color: #007bff; }\n  table.details { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.85rem; }\n  table.details th, table.details td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }\n  table.details th { background: #f4f4f4; }\n</style>\n</head>\n<body>\n\n<h1>Image Optimization &amp; CLS Prevention Review</h1>\n<p class=\"subtitle\">Target: <code>dashboard.tsx</code>, <code>Card.tsx</code> | Focus: CLS prevention, image optimization, rendering performance</p>\n\n<!-- Summary -->\n<div class=\"summary\">\n  <div class=\"summary-card high-bg\">\n    <div class=\"count\">3</div>\n    <div class=\"label\">High Severity</div>\n  </div>\n  <div class=\"summary-card medium-bg\">\n    <div class=\"count\">6</div>\n    <div class=\"label\">Medium Severity</div>\n  </div>\n  <div class=\"summary-card low-bg\">\n    <div class=\"count\">3</div>\n    <div class=\"label\">Low Severity</div>\n  </div>\n</div>\n\n<!-- Image Optimization -->\n<div class=\"category-section\">\n  <h2>Image Optimization (5 issues)</h2>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\"><code>&lt;img&gt;</code> element is missing <code>width</code> and <code>height</code> attributes. Without intrinsic dimensions the browser cannot reserve space during layout, directly causing Cumulative Layout Shift (CLS).</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add explicit <code>width</code> and <code>height</code> attributes that match the image's intrinsic aspect ratio. Example: <code>&lt;img src=\"/public/promo.png\" alt=\"Promo\" width=\"800\" height=\"400\" /&gt;</code>. Alternatively, use the CSS <code>aspect-ratio</code> property on the element.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">Below-fold image lacks <code>loading=\"lazy\"</code>. The image is rendered after a long scrollable grid section (<code>className=\"mt-8\"</code>), meaning it is almost certainly below the viewport on initial load.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add <code>loading=\"lazy\"</code> to the <code>&lt;img&gt;</code> tag. This defers the network request until the user scrolls near the image, saving bandwidth and improving Largest Contentful Paint (LCP) for above-fold content.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">Image is served as a single PNG with no modern format alternatives (WebP, AVIF). Modern formats reduce file size by 25-50% compared to PNG.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Use a <code>&lt;picture&gt;</code> element with <code>&lt;source&gt;</code> tags for AVIF and WebP, falling back to PNG. Or adopt the Next.js <code>&lt;Image&gt;</code> component which handles format negotiation automatically.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">No <code>srcset</code> or <code>sizes</code> attributes for responsive image serving. Mobile devices may download an image far larger than needed.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Provide multiple resolutions via <code>srcset</code> and define <code>sizes</code> to match your layout breakpoints.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:50</span>\n    </div>\n    <p class=\"issue-desc\">No <code>fetchpriority</code> attribute. For a below-fold promotional image, the browser may still fetch it with default priority, competing with critical above-fold resources.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add <code>fetchpriority=\"low\"</code> to deprioritize the below-fold image and let the browser focus bandwidth on above-fold content.</div>\n  </div>\n</div>\n\n<!-- CLS Prevention -->\n<div class=\"category-section\">\n  <h2>CLS Prevention (3 issues)</h2>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:16-19</span>\n    </div>\n    <p class=\"issue-desc\">Dynamic content is injected after a 500ms <code>setTimeout</code> with no space reserved in the layout. When the three list items appear, every element below them shifts downward -- a textbook CLS violation.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Reserve space before the async data arrives. Options: (1) set a CSS <code>min-height</code> on the grid container that accounts for the expected items, (2) render skeleton/placeholder elements immediately that are later replaced with real data, or (3) use CSS <code>contain: layout</code> on the container to prevent its children from affecting external layout.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:41</span>\n    </div>\n    <p class=\"issue-desc\">The grid container (<code>&lt;section&gt;</code>) has no explicit dimensions or skeleton state. Its height is entirely determined by its children, which arrive asynchronously.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add a <code>min-height</code> style or render placeholder skeleton cards so the layout is stable before real content loads.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">Card.tsx:27</span>\n    </div>\n    <p class=\"issue-desc\">All Card instances share the same <code>id=\"card-item\"</code>. Duplicate IDs can cause unpredictable behavior in assistive technology and in any JavaScript that queries by ID, potentially leading to layout or interaction bugs.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Generate unique IDs per Card instance (e.g., <code>id={`card-${title.toLowerCase().replace(/\\s+/g, '-')}`}</code>).</div>\n  </div>\n</div>\n\n<!-- Rendering Performance -->\n<div class=\"category-section\">\n  <h2>Rendering Performance (4 issues)</h2>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-high\">HIGH</span>\n      <span class=\"location\">dashboard.tsx:10-14</span>\n    </div>\n    <p class=\"issue-desc\"><strong>Layout thrashing</strong> in <code>useEffect</code>: reading <code>offsetHeight</code> (forces a synchronous reflow) then immediately writing <code>style.minHeight</code> (invalidates layout, triggers another reflow). This forced-reflow cycle degrades frame rate and delays First Contentful Paint.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Separate reads and writes. Use <code>requestAnimationFrame</code> to schedule the write after the read:\n      <br/><code>const h = containerRef.current.offsetHeight;</code>\n      <br/><code>requestAnimationFrame(() => { containerRef.current.style.minHeight = h + \"px\"; });</code>\n      <br/>Or better yet, achieve the same result with pure CSS (<code>min-height: fit-content</code>).</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-medium\">MEDIUM</span>\n      <span class=\"location\">dashboard.tsx:45-47</span>\n    </div>\n    <p class=\"issue-desc\">List items rendered via <code>.map()</code> without a <code>key</code> prop. React cannot efficiently reconcile the list and may re-render all items instead of just the changed ones.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Add a stable, unique key: <code>{items.map((item) => &lt;div key={item} ...&gt;)}</code>. If items can have duplicates, use a unique identifier or combine with the index.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-low\">LOW</span>\n      <span class=\"location\">Card.tsx:17-20</span>\n    </div>\n    <p class=\"issue-desc\">Direct DOM manipulation via <code>document.querySelector</code> inside a React component bypasses the virtual DOM, creating a mismatch between React's internal state and the actual DOM.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Use a <code>useRef</code> to reference the target element and update its style through state or the ref, staying within React's rendering model.</div>\n  </div>\n\n  <div class=\"issue-card\">\n    <div class=\"issue-header\">\n      <span class=\"badge badge-low\">LOW</span>\n      <span class=\"location\">Card.tsx:13</span>\n    </div>\n    <p class=\"issue-desc\"><code>console.log</code> left in an event handler. While the performance impact is minor, it adds unnecessary overhead in production and can slow down the event loop if triggered frequently.</p>\n    <div class=\"recommendation\"><strong>Fix:</strong> Remove the <code>console.log</code> or guard it with a development-only check (e.g., <code>if (process.env.NODE_ENV === 'development')</code>).</div>\n  </div>\n</div>\n\n<!-- Detailed Table -->\n<h2 style=\"margin-top:2rem; margin-bottom:1rem;\">Full Issue Table</h2>\n<table class=\"details\">\n<thead>\n<tr><th>#</th><th>File</th><th>Line</th><th>Severity</th><th>Category</th><th>Issue</th></tr>\n</thead>\n<tbody>\n<tr><td>1</td><td>dashboard.tsx</td><td>50</td><td>High</td><td>Image Optimization</td><td>Missing width/height attributes (CLS)</td></tr>\n<tr><td>2</td><td>dashboard.tsx</td><td>50</td><td>High</td><td>Image Optimization</td><td>Missing loading=\"lazy\" for below-fold image</td></tr>\n<tr><td>3</td><td>dashboard.tsx</td><td>50</td><td>Medium</td><td>Image Optimization</td><td>No modern format alternatives (WebP/AVIF)</td></tr>\n<tr><td>4</td><td>dashboard.tsx</td><td>50</td><td>Medium</td><td>Image Optimization</td><td>No srcset/sizes for responsive serving</td></tr>\n<tr><td>5</td><td>dashboard.tsx</td><td>16-19</td><td>High</td><td>CLS Prevention</td><td>Async content injection without space reservation</td></tr>\n<tr><td>6</td><td>dashboard.tsx</td><td>10-14</td><td>High</td><td>Rendering Performance</td><td>Layout thrashing: read then write in useEffect</td></tr>\n<tr><td>7</td><td>dashboard.tsx</td><td>45-47</td><td>Medium</td><td>Rendering Performance</td><td>Missing key prop on mapped list items</td></tr>\n<tr><td>8</td><td>dashboard.tsx</td><td>41</td><td>Medium</td><td>CLS Prevention</td><td>Grid container with no reserved dimensions</td></tr>\n<tr><td>9</td><td>Card.tsx</td><td>17-20</td><td>Low</td><td>Rendering Performance</td><td>Direct DOM manipulation bypassing React</td></tr>\n<tr><td>10</td><td>Card.tsx</td><td>27</td><td>Medium</td><td>CLS Prevention</td><td>Duplicate id attribute across Card instances</td></tr>\n<tr><td>11</td><td>Card.tsx</td><td>13</td><td>Low</td><td>Rendering Performance</td><td>console.log in production event handler</td></tr>\n<tr><td>12</td><td>dashboard.tsx</td><td>50</td><td>Medium</td><td>Image Optimization</td><td>No fetchpriority attribute for below-fold image</td></tr>\n</tbody>\n</table>\n\n</body>\n</html>\n"}], "eval /strong> <code>index.html</code></p>\n\n<h2>Technical SEO (11항목)</h2>\n\n<table>\n  <thead>\n    <tr>\n      <th>코드</th>\n      <th>우선순위</th>\n      <th>항목</th>\n      <th>결과</th>\n      <th>발견된 문제</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>SEO-01</td>\n      <td>Critical</td>\n      <td>noindex 없음</td>\n      <td class=\"pass\">Pass</td>\n      <td>noindex 메타 태그가 없으므로 정상적으로 인덱싱됩니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-02</td>\n      <td>Critical</td>\n      <td>title 태그 존재하고 고유</td>\n      <td class=\"fail\">Fail</td>\n      <td>Line 6: <code>&lt;title&gt;Sample Page&lt;/title&gt;</code> &mdash; 11자로 50-60자 권장 범위에 크게 미달. 내용도 일반적이며 키워드가 포함되지 않음.</td>\n    </tr>\n    <tr>\n      <td>SEO-03</td>\n      <td>Critical</td>\n      <td>h1 하나</td>\n      <td class=\"pass\">Pass</td>\n      <td>Line 21에 <code>&lt;h1&gt;</code> 1개만 존재합니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-04</td>\n      <td>Critical</td>\n      <td>HTTPS 사용</td>\n      <td class=\"pass\">Pass</td>\n      <td>외부 리소스 URL이 모두 HTTPS를 사용합니다. 로컬 리소스는 상대 경로입니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-05</td>\n      <td>High</td>\n      <td>meta description</td>\n      <td class=\"fail\">Fail</td>\n      <td><code>&lt;meta name=\"description\"&gt;</code> 태그가 없습니다. 검색 결과에 스니펫이 자동 생성되어 의도하지 않은 내용이 노출될 수 있습니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-06</td>\n      <td>High</td>\n      <td>canonical URL</td>\n      <td class=\"fail\">Fail</td>\n      <td><code>&lt;link rel=\"canonical\"&gt;</code> 태그가 없습니다. 중복 콘텐츠 문제가 발생할 수 있습니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-07</td>\n      <td>High</td>\n      <td>구조화 데이터 (JSON-LD)</td>\n      <td class=\"fail\">Fail</td>\n      <td><code>&lt;script type=\"application/ld+json\"&gt;</code>이 없습니다. 리치 스니펫 기회를 놓치고 있습니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-08</td>\n      <td>Medium</td>\n      <td>서술적 URL 구조</td>\n      <td class=\"pass\">Pass</td>\n      <td>링크 URL들이 서술적이고 쿼리 파라미터 없이 깔끔합니다 (<code>/about</code>, <code>/deals</code>).</td>\n    </tr>\n    <tr>\n      <td>SEO-09</td>\n      <td>High</td>\n      <td>DOCTYPE html 선언</td>\n      <td class=\"pass\">Pass</td>\n      <td>Line 1에 <code>&lt;!DOCTYPE html&gt;</code> 선언이 있습니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-10</td>\n      <td>High</td>\n      <td>charset UTF-8 최상단</td>\n      <td class=\"pass\">Pass</td>\n      <td>Line 4에 <code>&lt;meta charset=\"UTF-8\"&gt;</code>가 <code>&lt;head&gt;</code> 최상단에 위치합니다.</td>\n    </tr>\n    <tr>\n      <td>SEO-11</td>\n      <td>High</td>\n      <td>viewport meta 태그</td>\n      <td class=\"pass\">Pass</td>\n      <td>Line 5에 적절한 viewport 메타 태그가 설정되어 있습니다.</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>Page Experience / Web Performance (18항목)</h2>\n\n<table>\n  <thead>\n    <tr>\n      <th>코드</th>\n      <th>영역</th>\n      <th>항목</th>\n      <th>결과</th>\n      <th>발견된 문제</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>WP-01</td>\n      <td>CRP</td>\n      <td>render-blocking script 없음</td>\n      <td class=\"fail\">Fail</td>\n      <td>Lines 37-44: <code>&lt;script&gt;</code> 인라인 스크립트가 <code>defer</code>/<code>async</code> 없이 <code>&lt;body&gt;</code> 끝에 위치하지만, DOM 파싱을 차단합니다. <code>defer</code> 속성이 있는 외부 스크립트 또는 <code>DOMContentLoaded</code> 이벤트 활용을 권장합니다.</td>\n    </tr>\n    <tr>\n      <td>WP-02</td>\n      <td>CRP</td>\n      <td>LCP fetchpriority + preload</td>\n      <td class=\"fail\">Fail</td>\n      <td>Line 27: 히어로 이미지 <code>/public/hero.png</code>에 <code>fetchpriority=\"high\"</code>가 없고, <code>&lt;head&gt;</code>에 <code>&lt;link rel=\"preload\" as=\"image\"&gt;</code>도 없습니다. LCP 지연 원인.</td>\n    </tr>\n    <tr>\n      <td>WP-03</td>\n      <td>CRP</td>\n      <td>Critical CSS 처리</td>\n      <td class=\"fail\">Fail</td>\n      <td>Line 10: <code>&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\"&gt;</code>가 렌더링을 차단합니다. <code>media</code> 속성이 없고, critical CSS 인라인 처리도 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-04</td>\n      <td>이미지</td>\n      <td>img width/height 또는 aspect-ratio</td>\n      <td class=\"fail\">Fail</td>\n      <td>Line 33: <code>&lt;img src=\"/public/promo.png\"&gt;</code>에 <code>width</code>/<code>height</code> 속성이 없습니다. CLS(레이아웃 시프트)를 유발합니다.</td>\n    </tr>\n    <tr>\n      <td>WP-05</td>\n      <td>이미지</td>\n      <td>loading=\"lazy\"</td>\n      <td class=\"fail\">Fail</td>\n      <td>Lines 30, 33: 비-LCP 이미지(<code>logo.png</code>, <code>promo.png</code>)에 <code>loading=\"lazy\"</code>가 없습니다. 불필요한 초기 로드 발생.</td>\n    </tr>\n    <tr>\n      <td>WP-06</td>\n      <td>이미지</td>\n      <td>WebP/AVIF 포맷</td>\n      <td class=\"fail\">Fail</td>\n      <td>모든 이미지가 <code>.png</code> 포맷입니다. <code>&lt;picture&gt;</code> 요소나 WebP/AVIF 포맷이 사용되지 않아 파일 크기가 비효율적입니다.</td>\n    </tr>\n    <tr>\n      <td>WP-07</td>\n      <td>JS</td>\n      <td>코드 스플리팅</td>\n      <td class=\"na\">N/A</td>\n      <td>단순 HTML 페이지로 빌드 시스템이나 모듈 번들러가 없습니다. 코드 스플리팅 대상이 아닙니다.</td>\n    </tr>\n    <tr>\n      <td>WP-08</td>\n      <td>JS</td>\n      <td>트리 쉐이킹 패턴</td>\n      <td class=\"na\">N/A</td>\n      <td>모듈 import 구문이 없습니다. 트리 쉐이킹 검사 대상이 아닙니다.</td>\n    </tr>\n    <tr>\n      <td>WP-09</td>\n      <td>JS</td>\n      <td>레이아웃 스래싱 없음</td>\n      <td class=\"pass\">Pass</td>\n      <td>루프 내에서 레이아웃 속성 읽기/쓰기가 혼합되는 패턴이 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-10</td>\n      <td>폰트</td>\n      <td>font-display 최적화</td>\n      <td class=\"fail\">Fail</td>\n      <td>Lines 13-17: <code>@font-face</code> 선언에 <code>font-display</code> 속성이 없습니다. 폰트 로딩 동안 텍스트가 보이지 않는 FOIT(Flash of Invisible Text) 문제가 발생합니다. LCP에 악영향.</td>\n    </tr>\n    <tr>\n      <td>WP-11</td>\n      <td>폰트</td>\n      <td>중요 폰트 preload</td>\n      <td class=\"fail\">Fail</td>\n      <td><code>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</code>이 없습니다. 폰트 다운로드가 CSS 파싱 후에야 시작됩니다.</td>\n    </tr>\n    <tr>\n      <td>WP-12</td>\n      <td>LCP</td>\n      <td>LCP 요소 초기 HTML 존재</td>\n      <td class=\"pass\">Pass</td>\n      <td>히어로 이미지가 초기 HTML에 직접 포함되어 있습니다 (Line 27). JavaScript 의존성이 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-13</td>\n      <td>INP</td>\n      <td>이벤트 핸들러 즉각 피드백</td>\n      <td class=\"na\">N/A</td>\n      <td>클릭 이벤트 핸들러가 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-14</td>\n      <td>INP</td>\n      <td>무거운 연산 지연 처리</td>\n      <td class=\"na\">N/A</td>\n      <td>인라인 스크립트가 단순 DOM 조작만 수행하며 무거운 동기 연산이 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-15</td>\n      <td>INP</td>\n      <td>React memo 활용</td>\n      <td class=\"na\">N/A</td>\n      <td>React 프로젝트가 아닙니다.</td>\n    </tr>\n    <tr>\n      <td>WP-16</td>\n      <td>CLS</td>\n      <td>뷰포트 위 동적 삽입 금지</td>\n      <td class=\"pass\">Pass</td>\n      <td><code>prepend()</code>이나 <code>insertBefore()</code> 사용이 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-17</td>\n      <td>CLS</td>\n      <td>애니메이션 transform/opacity</td>\n      <td class=\"pass\">Pass</td>\n      <td>레이아웃 속성(height, width, top, left, margin, padding)에 대한 CSS transition이 없습니다.</td>\n    </tr>\n    <tr>\n      <td>WP-18</td>\n      <td>CLS</td>\n      <td>동적 콘텐츠 공간 예약</td>\n      <td class=\"na\">N/A</td>\n      <td><code>&lt;iframe&gt;</code>, <code>&lt;video&gt;</code>, 광고 슬롯이 없습니다.</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>수정 가이드</h2>\n\n<div class=\"fix-section\">\n  <h4>SEO-02: title 태그 (Line 6)</h4>\n  <p>현재 11자로 50-60자 권장에 크게 미달합니다. 페이지 핵심 키워드를 포함한 고유한 제목으로 변경하세요.</p>\n<pre>&lt;!-- Before --&gt;\n&lt;title&gt;Sample Page&lt;/title&gt;\n\n&lt;!-- After --&gt;\n&lt;title&gt;Premium Sample Products - Free Shipping &amp; 30-Day Returns | BrandName&lt;/title&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>SEO-05: meta description 누락</h4>\n  <p>150-160자의 매력적인 메타 설명을 추가하세요. 주요 키워드와 CTA를 포함합니다.</p>\n<pre>&lt;meta name=\"description\" content=\"Premium quality sample products with free shipping.\nBrowse our collection of 500+ items. Rated 4.9/5 by 10,000+ customers. Order today and save 20%.\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>SEO-06: canonical URL 누락</h4>\n  <p><code>&lt;head&gt;</code> 내에 canonical URL을 추가하여 중복 콘텐츠 문제를 방지하세요.</p>\n<pre>&lt;link rel=\"canonical\" href=\"https://example.com/\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>SEO-07: JSON-LD 구조화 데이터 누락</h4>\n  <p>페이지 유형에 맞는 JSON-LD 구조화 데이터를 추가하세요.</p>\n<pre>&lt;script type=\"application/ld+json\"&gt;\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"WebPage\",\n  \"name\": \"Sample Page\",\n  \"url\": \"https://example.com/\"\n}\n&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-01: render-blocking 인라인 스크립트 (Lines 37-44)</h4>\n  <p>인라인 스크립트를 외부 파일로 분리하고 <code>defer</code>를 적용하거나, <code>DOMContentLoaded</code> 이벤트를 사용하세요.</p>\n<pre>&lt;!-- Option 1: External script with defer --&gt;\n&lt;script defer src=\"/js/app.js\"&gt;&lt;/script&gt;\n\n&lt;!-- Option 2: Wrap in DOMContentLoaded --&gt;\n&lt;script&gt;\ndocument.addEventListener('DOMContentLoaded', function() {\n  var label = document.getElementById(\"label\");\n  var userInput = location.hash.slice(1);\n  if (label) {\n    label.textContent = \"Hello, \" + userInput;  // textContent for XSS safety\n  }\n});\n&lt;/script&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-02: LCP 이미지 fetchpriority + preload 누락 (Line 27)</h4>\n  <p>히어로 이미지에 <code>fetchpriority=\"high\"</code>를 추가하고, <code>&lt;head&gt;</code>에 preload 링크를 추가하세요.</p>\n<pre>&lt;!-- head 내에 추가 --&gt;\n&lt;link rel=\"preload\" href=\"/public/hero.png\" as=\"image\" fetchpriority=\"high\"&gt;\n\n&lt;!-- img 태그 수정 --&gt;\n&lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-03: render-blocking CSS (Line 10)</h4>\n  <p>Critical CSS를 인라인 처리하고, 외부 CSS는 비동기로 로드하세요.</p>\n<pre>&lt;!-- Critical CSS inline --&gt;\n&lt;style&gt;/* Above-fold critical styles here */&lt;/style&gt;\n\n&lt;!-- Non-critical CSS deferred --&gt;\n&lt;link rel=\"preload\" href=\"https://cdn.example.com/styles.css\" as=\"style\"\n      onload=\"this.onload=null;this.rel='stylesheet'\"&gt;\n&lt;noscript&gt;&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\"&gt;&lt;/noscript&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-04: promo.png width/height 누락 (Line 33)</h4>\n  <p>이미지에 <code>width</code>와 <code>height</code> 속성을 추가하여 CLS를 방지하세요.</p>\n<pre>&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"800\" height=\"400\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-05: loading=\"lazy\" 누락 (Lines 30, 33)</h4>\n  <p>비-LCP 이미지에 <code>loading=\"lazy\"</code>를 추가하여 초기 로드를 최적화하세요.</p>\n<pre>&lt;img src=\"/public/logo.png\" width=\"120\" height=\"40\" loading=\"lazy\" alt=\"Logo\"&gt;\n&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"800\" height=\"400\" loading=\"lazy\"&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-06: 현대 이미지 포맷 미사용</h4>\n  <p>WebP 또는 AVIF 포맷을 <code>&lt;picture&gt;</code> 요소와 함께 사용하여 파일 크기를 줄이세요.</p>\n<pre>&lt;picture&gt;\n  &lt;source type=\"image/avif\" srcset=\"/public/hero.avif\"&gt;\n  &lt;source type=\"image/webp\" srcset=\"/public/hero.webp\"&gt;\n  &lt;img src=\"/public/hero.png\" alt=\"Hero banner\" width=\"800\" height=\"400\" fetchpriority=\"high\"&gt;\n&lt;/picture&gt;</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-10: font-display 누락 (Lines 13-17)</h4>\n  <p><code>@font-face</code>에 <code>font-display: swap</code>을 추가하여 FOIT를 방지하세요.</p>\n<pre>@font-face {\n  font-family: \"CustomFont\";\n  src: url(\"/fonts/custom.woff2\") format(\"woff2\");\n  font-display: swap;  /* or 'optional' for zero CLS */\n}</pre>\n</div>\n\n<div class=\"fix-section\">\n  <h4>WP-11: 중요 폰트 preload 누락</h4>\n  <p><code>&lt;head&gt;</code> 상단에 폰트 preload를 추가하여 다운로드를 앞당기세요.</p>\n<pre>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin&gt;</pre>\n</div>\n\n<h2>요약</h2>\n<ul>\n  <li><strong>Technical SEO:</strong> 7/11 Pass, 4 Fail (SEO-02, SEO-05, SEO-06, SEO-07)</li>\n  <li><strong>Page Experience:</strong> 5/18 Pass, 9 Fail (WP-01~06, WP-10, WP-11), 6 N/A (WP-07, WP-08, WP-13~15, WP-18), 4 Pass (WP-09, WP-12, WP-16, WP-17)</li>\n  <li><strong>총 결과:</strong> 29개 항목 중 11 Pass, 13 Fail, 6 N/A (해당 없음)</li>\n</ul>\n\n<p><strong>주요 성능 이슈:</strong> JavaScript 인라인 스크립트가 render-blocking이며, 폰트에 <code>font-display</code>가 없어 FOIT 발생, 폰트 preload 누락, LCP 이미지 최적화 미비, render-blocking CSS. 이 항목들은 Core Web Vitals (LCP, CLS)에 직접적으로 악영향을 미칩니다.</p>\n\n</body>\n</html>\n"}], "eval-4-js-font-cwv-without_skill": [{"name": "report.csv", "type": "text", "content": "id,category,issue,severity,cwv_impact,line,description,recommendation\n1,JavaScript,Render-blocking inline script,High,\"TBT, FCP\",37-44,\"Inline <script> block executes synchronously in <body>, blocking parser and increasing Total Blocking Time.\",\"Move to external file with defer attribute or wrap in DOMContentLoaded listener.\"\n2,JavaScript,No async/defer usage,Medium,TBT,N/A,\"No external JavaScript files use async or defer attributes. All scripting is inline and synchronous.\",\"Extract JS to external files; use defer for DOM-dependent scripts, async for independent scripts.\"\n3,JavaScript,innerHTML with unsanitized input,Medium,CLS (indirect),42,\"innerHTML injects unsanitized location.hash into DOM, creating XSS risk and potential unexpected layout shifts.\",\"Use textContent instead of innerHTML to prevent XSS and layout changes.\"\n4,Font,Missing font-display: swap,High,\"FCP, LCP, CLS\",13-17,\"@font-face for CustomFont lacks font-display: swap, causing invisible text (FOIT) during font load.\",\"Add font-display: swap to the @font-face declaration.\"\n5,Font,No font preloading,Medium,\"FCP, LCP\",N/A,\"Custom font /fonts/custom.woff2 is not preloaded; browser discovers it late during CSS parsing.\",\"Add <link rel=\"\"preload\"\" href=\"\"/fonts/custom.woff2\"\" as=\"\"font\"\" type=\"\"font/woff2\"\" crossorigin /> in <head>.\"\n6,Core Web Vitals,Image missing width/height (CLS),High,CLS,33,\"Image /public/promo.png lacks width and height attributes, causing layout shift when image loads.\",\"Add explicit width and height attributes to the <img> element.\"\n7,Core Web Vitals,Render-blocking external CSS,High,\"FCP, LCP\",10,\"External stylesheet loaded synchronously in <head> blocks rendering until fully downloaded.\",\"Inline critical CSS and load non-critical CSS asynchronously with preload/onload pattern.\"\n8,Core Web Vitals,No preconnect/dns-prefetch hints,Low,\"FCP, LCP\",N/A,\"No resource hints for cdn.example.com, adding DNS/connection overhead.\",\"Add <link rel=\"\"preconnect\"\"> and <link rel=\"\"dns-prefetch\"\"> for cdn.example.com.\"\n"}, {"name": "report.html", "type": "text", "content": "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>SEO Review Report: JavaScript Loading, Font Optimization &amp; Core Web Vitals</title>\n<style>\n  body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; max-width: 960px; margin: 0 auto; padding: 2rem; color: #1a1a1a; line-height: 1.6; }\n  h1 { border-bottom: 3px solid #2563eb; padding-bottom: 0.5rem; }\n  h2 { color: #2563eb; margin-top: 2rem; }\n  h3 { color: #374151; }\n  .severity-high { color: #dc2626; font-weight: bold; }\n  .severity-medium { color: #d97706; font-weight: bold; }\n  .severity-low { color: #16a34a; font-weight: bold; }\n  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }\n  th, td { border: 1px solid #d1d5db; padding: 0.75rem; text-align: left; }\n  th { background: #f3f4f6; }\n  tr:nth-child(even) { background: #f9fafb; }\n  code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }\n  pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow-x: auto; }\n  .summary-box { background: #eff6ff; border-left: 4px solid #2563eb; padding: 1rem 1.5rem; margin: 1rem 0; border-radius: 0 8px 8px 0; }\n  .issue-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }\n  .issue-card.high { border-left: 4px solid #dc2626; }\n  .issue-card.medium { border-left: 4px solid #d97706; }\n  .issue-card.low { border-left: 4px solid #16a34a; }\n</style>\n</head>\n<body>\n\n<h1>SEO Review Report: index.html</h1>\n<p><strong>File:</strong> <code>index.html</code> | <strong>Review Date:</strong> 2026-03-11 | <strong>Focus Areas:</strong> JavaScript Loading, Font Optimization, Core Web Vitals</p>\n\n<div class=\"summary-box\">\n  <strong>Summary:</strong> 7 issues identified across JavaScript loading, font optimization, and Core Web Vitals areas. 3 high severity, 3 medium severity, 1 low severity. The page has significant render-blocking resources, missing font optimization, and layout stability problems that negatively impact SEO performance and user experience.\n</div>\n\n<h2>1. JavaScript Loading Issues</h2>\n\n<div class=\"issue-card high\">\n  <h3><span class=\"severity-high\">[HIGH]</span> Render-blocking inline script in &lt;body&gt;</h3>\n  <p><strong>Line:</strong> 37-44</p>\n  <p><strong>Problem:</strong> An inline <code>&lt;script&gt;</code> block at the end of <code>&lt;body&gt;</code> executes synchronously. While it is placed at the bottom of the body (which is better than the head), it still blocks the parser at that point. The script uses <code>document.getElementById</code> and <code>innerHTML</code>, performing DOM manipulation synchronously. This contributes to longer Total Blocking Time (TBT) and can delay First Contentful Paint (FCP) if the browser hasn't finished rendering.</p>\n  <p><strong>SEO Impact:</strong> Synchronous JavaScript execution increases TBT, one of the Core Web Vitals proxies. Google's page experience signals penalize pages with high TBT.</p>\n  <p><strong>Recommendation:</strong></p>\n  <ul>\n    <li>Wrap the code in a <code>DOMContentLoaded</code> event listener or use <code>requestIdleCallback</code>.</li>\n    <li>Alternatively, move it to an external file and load with <code>defer</code> attribute: <code>&lt;script src=\"main.js\" defer&gt;&lt;/script&gt;</code>.</li>\n  </ul>\n  <pre>&lt;script defer src=\"/js/main.js\"&gt;&lt;/script&gt;</pre>\n</div>\n\n<div class=\"issue-card medium\">\n  <h3><span class=\"severity-medium\">[MEDIUM]</span> No async/defer scripts used anywhere</h3>\n  <p><strong>Line:</strong> N/A (absence)</p>\n  <p><strong>Problem:</strong> The page contains no external JavaScript files loaded with <code>async</code> or <code>defer</code> attributes. All scripting is inline and synchronous. For pages that grow in complexity, this pattern does not scale and will cause increasing render-blocking time.</p>\n  <p><strong>Recommendation:</strong> Extract JavaScript into external files and use <code>defer</code> for scripts that depend on DOM, or <code>async</code> for independent scripts (e.g., analytics).</p>\n</div>\n\n<div class=\"issue-card medium\">\n  <h3><span class=\"severity-medium\">[MEDIUM]</span> innerHTML usage creates XSS risk and potential rendering issues</h3>\n  <p><strong>Line:</strong> 42</p>\n  <p><strong>Problem:</strong> <code>label.innerHTML = \"Hello, \" + userInput</code> directly injects unsanitized user input from <code>location.hash</code> into the DOM. Beyond the security risk (XSS), this can cause unexpected re-renders and layout shifts if malicious or unexpected content is injected, impacting CLS.</p>\n  <p><strong>Recommendation:</strong> Use <code>textContent</code> instead of <code>innerHTML</code> to prevent XSS and avoid unintended layout changes:</p>\n  <pre>label.textContent = \"Hello, \" + userInput;</pre>\n</div>\n\n<h2>2. Font Optimization Issues</h2>\n\n<div class=\"issue-card high\">\n  <h3><span class=\"severity-high\">[HIGH]</span> Missing <code>font-display: swap</code> in @font-face declaration</h3>\n  <p><strong>Line:</strong> 13-17</p>\n  <p><strong>Problem:</strong> The <code>@font-face</code> rule for \"CustomFont\" does not include <code>font-display: swap</code>. Without this property, the browser uses the default behavior (typically <code>font-display: block</code>), which causes invisible text (FOIT - Flash of Invisible Text) for up to 3 seconds while the font loads. This directly harms:</p>\n  <ul>\n    <li><strong>FCP (First Contentful Paint):</strong> Text is invisible during font loading, delaying meaningful content display.</li>\n    <li><strong>LCP (Largest Contentful Paint):</strong> If the custom font is used for the largest text element, LCP is delayed until the font loads.</li>\n    <li><strong>CLS (Cumulative Layout Shift):</strong> When the font finally loads and swaps in, text dimensions may change, causing layout shift.</li>\n  </ul>\n  <p><strong>Recommendation:</strong> Add <code>font-display: swap</code> to show fallback text immediately:</p>\n  <pre>@font-face {\n  font-family: \"CustomFont\";\n  src: url(\"/fonts/custom.woff2\") format(\"woff2\");\n  font-display: swap;\n}</pre>\n</div>\n\n<div class=\"issue-card medium\">\n  <h3><span class=\"severity-medium\">[MEDIUM]</span> No font preloading</h3>\n  <p><strong>Line:</strong> N/A (absence in &lt;head&gt;)</p>\n  <p><strong>Problem:</strong> The custom font file <code>/fonts/custom.woff2</code> is not preloaded. The browser only discovers the font when it parses the CSS, which delays font loading and consequently delays text rendering.</p>\n  <p><strong>Recommendation:</strong> Add a <code>&lt;link rel=\"preload\"&gt;</code> in the <code>&lt;head&gt;</code>:</p>\n  <pre>&lt;link rel=\"preload\" href=\"/fonts/custom.woff2\" as=\"font\" type=\"font/woff2\" crossorigin /&gt;</pre>\n</div>\n\n<h2>3. Core Web Vitals Issues</h2>\n\n<div class=\"issue-card high\">\n  <h3><span class=\"severity-high\">[HIGH]</span> Image missing width/height attributes causes CLS</h3>\n  <p><strong>Line:</strong> 33</p>\n  <p><strong>Problem:</strong> The promotional banner image (<code>/public/promo.png</code>) lacks <code>width</code> and <code>height</code> attributes. When the image loads, the browser must recalculate layout, causing a Cumulative Layout Shift (CLS). CLS is a Core Web Vital directly measured by Google for ranking.</p>\n  <p><strong>Recommendation:</strong> Always specify <code>width</code> and <code>height</code> attributes on <code>&lt;img&gt;</code> elements to allow the browser to reserve space:</p>\n  <pre>&lt;img src=\"/public/promo.png\" alt=\"Promotional banner\" width=\"800\" height=\"300\" /&gt;</pre>\n</div>\n\n<div class=\"issue-card high\">\n  <h3><span class=\"severity-high\">[HIGH (already noted)]</span> Render-blocking external CSS</h3>\n  <p><strong>Line:</strong> 10</p>\n  <p><strong>Problem:</strong> The external stylesheet <code>https://cdn.example.com/styles.css</code> is loaded synchronously in the <code>&lt;head&gt;</code> without any optimization. This blocks rendering until the CSS is fully downloaded and parsed, directly impacting FCP and LCP.</p>\n  <p><strong>Recommendation:</strong></p>\n  <ul>\n    <li>Inline critical CSS directly in the <code>&lt;head&gt;</code> for above-the-fold content.</li>\n    <li>Load non-critical CSS asynchronously using the media/onload pattern:</li>\n  </ul>\n  <pre>&lt;link rel=\"preload\" href=\"https://cdn.example.com/styles.css\" as=\"style\" onload=\"this.onload=null;this.rel='stylesheet'\" /&gt;\n&lt;noscript&gt;&lt;link rel=\"stylesheet\" href=\"https://cdn.example.com/styles.css\" /&gt;&lt;/noscript&gt;</pre>\n</div>\n\n<div class=\"issue-card low\">\n  <h3><span class=\"severity-low\">[LOW]</span> No resource hints for external domain</h3>\n  <p><strong>Line:</strong> N/A (absence)</p>\n  <p><strong>Problem:</strong> The page loads resources from <code>cdn.example.com</code> but does not include <code>dns-prefetch</code> or <code>preconnect</code> hints. This adds DNS resolution and connection time before the resource can begin downloading.</p>\n  <p><strong>Recommendation:</strong> Add resource hints early in the <code>&lt;head&gt;</code>:</p>\n  <pre>&lt;link rel=\"preconnect\" href=\"https://cdn.example.com\" /&gt;\n&lt;link rel=\"dns-prefetch\" href=\"https://cdn.example.com\" /&gt;</pre>\n</div>\n\n<h2>Summary Table</h2>\n<table>\n  <thead>\n    <tr><th>#</th><th>Category</th><th>Issue</th><th>Severity</th><th>CWV Impact</th><th>Line(s)</th></tr>\n  </thead>\n  <tbody>\n    <tr><td>1</td><td>JavaScript</td><td>Render-blocking inline script</td><td class=\"severity-high\">High</td><td>TBT, FCP</td><td>37-44</td></tr>\n    <tr><td>2</td><td>JavaScript</td><td>No async/defer usage</td><td class=\"severity-medium\">Medium</td><td>TBT</td><td>N/A</td></tr>\n    <tr><td>3</td><td>JavaScript</td><td>innerHTML with unsanitized input</td><td class=\"severity-medium\">Medium</td><td>CLS (indirect)</td><td>42</td></tr>\n    <tr><td>4</td><td>Font</td><td>Missing font-display: swap</td><td class=\"severity-high\">High</td><td>FCP, LCP, CLS</td><td>13-17</td></tr>\n    <tr><td>5</td><td>Font</td><td>No font preloading</td><td class=\"severity-medium\">Medium</td><td>FCP, LCP</td><td>N/A</td></tr>\n    <tr><td>6</td><td>CWV</td><td>Image missing width/height (CLS)</td><td class=\"severity-high\">High</td><td>CLS</td><td>33</td></tr>\n    <tr><td>7</td><td>CWV</td><td>Render-blocking external CSS</td><td class=\"severity-high\">High</td><td>FCP, LCP</td><td>10</td></tr>\n    <tr><td>8</td><td>CWV</td><td>No preconnect/dns-prefetch hints</td><td class=\"severity-low\">Low</td><td>FCP, LCP</td><td>N/A</td></tr>\n  </tbody>\n</table>\n\n</body>\n</html>\n"}], "eval-5-full-seo-wp-review-with_skill": [{"name": "report.csv", "type": "text", "content": "Code,Area,Priority,Item,Result,File,Line,Issue\nSEO-01,Technical SEO,Critical,noindex 없음,Pass,index.html,,noindex 메타 태그 없음 - 정상 인덱싱 가능\nSEO-02,Technical SEO,Critical,title 태그 존재하고 고유 (50-60자),Fail,index.html,6,\"title이 'Sample Page'(11자)로 권장 범위 50-60자에 크게 미달. 키워드 없이 너무 일반적\"\nSEO-03,Technical SEO,Critical,페이지당 h1 하나,Pass,\"index.html, dashboard.tsx\",,\"각 페이지/컴포넌트에 h1 1개씩 정상\"\nSEO-04,Technical SEO,Critical,HTTPS 사용,Pass,all files,,\"모든 외부 URL이 https:// 사용\"\nSEO-05,Technical SEO,High,meta description 존재 (150-160자),Fail,index.html,,\"meta description 태그 완전 누락\"\nSEO-06,Technical SEO,High,canonical URL 설정,Fail,index.html,,\"link rel=canonical 태그 없음\"\nSEO-07,Technical SEO,High,구조화 데이터 (JSON-LD),Fail,index.html,,\"script type=application/ld+json 없음\"\nSEO-08,Technical SEO,Medium,서술적 URL 구조,Pass,index.html,,\"링크가 서술적 경로 사용. 불필요한 쿼리 파라미터 없음\"\nSEO-09,Technical SEO,High,DOCTYPE html 선언,Pass,index.html,1,\"<!DOCTYPE html> 정상 선언\"\nSEO-10,Technical SEO,High,charset UTF-8 head 최상단,Advisory,index.html,4,\"meta charset=UTF-8 존재. head 내 충분히 앞에 위치\"\nSEO-11,Technical SEO,High,viewport meta 태그,Advisory,index.html,5,\"viewport 메타 태그 존재. SPA 컴포넌트는 상위 레이아웃 확인 필요\"\nWP-01,CRP,Critical,render-blocking script 없음,Fail,index.html,37-44,\"인라인 script에 defer/async/type=module 없음\"\nWP-02,CRP,Critical,LCP fetchpriority + preload,Fail,index.html,27,\"hero 이미지에 fetchpriority=high 누락. preload 링크도 없음\"\nWP-03,CRP,Critical,Critical CSS 처리,Fail,index.html,10,\"외부 stylesheet이 media 속성 없이 동기 로딩 - 렌더링 차단\"\nWP-04,Image,High,img width/height 또는 aspect-ratio,Fail,\"index.html, dashboard.tsx\",\"33, 50\",\"promo.png에 width/height 속성 누락. CLS 위험\"\nWP-05,Image,High,loading=lazy (below-fold),Fail,\"index.html, dashboard.tsx\",\"33, 50\",\"below-fold 이미지에 loading=lazy 없음\"\nWP-06,Image,Medium,현대 이미지 포맷 (WebP/AVIF),Advisory,all files,,\"모든 이미지가 .png 형식. picture 요소 및 WebP/AVIF 미사용\"\nWP-07,JS,Medium,코드 스플리팅,Advisory,\"dashboard.tsx, Card.tsx\",,\"dynamic import() 미사용. 앱 확장 시 코드 스플리팅 권장\"\nWP-08,JS,Medium,트리 쉐이킹 패턴,N/A,all files,,\"전체 라이브러리 임포트 패턴 미발견\"\nWP-09,JS,High,레이아웃 스래싱 없음,Fail,dashboard.tsx,12-13,\"offsetHeight 읽기 직후 style.minHeight 쓰기 - 강제 리플로우\"\nWP-10,Font,High,font-display 최적화 (block 금지),Fail,index.html
